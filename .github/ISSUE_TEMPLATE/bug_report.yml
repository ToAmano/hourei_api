name: Bug Report
description: Report a reproducible bug in the application
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us reproduce and fix the issue.
  - type: input
    id: title
    attributes:
      label: Bug Summary
      placeholder: Short and descriptive summary of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `...`
        2. Execute `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened (including traceback / error log if applicable)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      placeholder: |
        - OS:
        - Python version:
        - Package version:
