chapters:
- title: 第一章　総則
  chapter_num: 1
  articles:
  - caption: （事業者の責務）
    title: 第一条
    article_num: '1'
    paragraphs:
    - content: 事業者は、石綿による労働者の肺がん、中皮腫その他の健康障害を予防するため、作業方法の確立、関係施設の改善、作業環境の整備、健康管理の徹底その他必要な措置を講じ、もって、労働者の危険の防止の趣旨に反しない限りで、石綿にばく露される労働者の人数並びに労働者がばく露される期間及び程度を最小限度にするよう努めなければならない。
    - paragraph_num: ２
      content: 事業者は、石綿を含有する製品の使用状況等を把握し、当該製品を計画的に石綿を含有しない製品に代替するよう努めなければならない。
  - caption: （定義）
    title: 第二条
    article_num: '2'
    paragraphs:
    - content: この省令において「石綿等」とは、労働安全衛生法施行令（以下「令」という。）第六条第二十三号に規定する石綿等をいう。
    - paragraph_num: ２
      content: この省令において「所轄労働基準監督署長」とは、事業場の所在地を管轄する労働基準監督署長をいう。
    - paragraph_num: ３
      content: この省令において「切断等」とは、切断、破砕、穿（せん）孔、研磨等をいう。
    - paragraph_num: ４
      content: この省令において「石綿分析用試料等」とは、令第六条第二十三号に規定する石綿分析用試料等をいう。
- title: 第二章　石綿等を取り扱う業務等に係る措置
  chapter_num: 2
  sections:
  - title: 第一節　解体等の業務に係る措置
    section_num: 1
    articles:
    - caption: （事前調査及び分析調査）
      title: 第三条
      article_num: '3'
      paragraphs:
      - content: 事業者は、建築物、工作物又は船舶（鋼製の船舶に限る。以下同じ。）の解体又は改修（封じ込め又は囲い込みを含む。）の作業（以下「解体等の作業」という。）を行うときは、石綿による労働者の健康障害を防止するため、あらかじめ、当該建築物、工作物又は船舶（それぞれ解体等の作業に係る部分に限る。以下「解体等対象建築物等」という。）について、石綿等の使用の有無を調査しなければならない。
      - paragraph_num: ２
        content: 前項の規定による調査（以下「事前調査」という。）は、解体等対象建築物等の全ての材料について次に掲げる方法により行わなければならない。
        items:
        - title: 一
          content: 設計図書等の文書（電磁的記録を含む。以下同じ。）を確認する方法。 ただし、設計図書等の文書が存在しないときは、この限りでない。
        - title: 二
          content: 目視により確認する方法。 ただし、解体等対象建築物等の構造上目視により確認することが困難な材料については、この限りでない。
      - paragraph_num: ３
        content: 前項の規定にかかわらず、解体等対象建築物等が次の各号のいずれかに該当する場合は、事前調査は、それぞれ当該各号に定める方法によることができる。
        items:
        - title: 一
          content: 既に前項各号に掲げる方法による調査に相当する調査が行われている解体等対象建築物等 当該解体等対象建築物等に係る当該相当する調査の結果の記録を確認する方法
        - title: 二
          content: 船舶の再資源化解体の適正な実施に関する法律（平成三十年法律第六十一号）第四条第一項の有害物質一覧表確認証書（同条第二項の有効期間が満了する日前のものに限る。）又は同法第八条の有害物質一覧表確認証書に相当する証書（同法附則第五条第二項に規定する相当証書を含む。）の交付を受けている船舶
            当該船舶に係る同法第二条第六項の有害物質一覧表を確認する方法
        - title: 三
          content: 建築物若しくは工作物の新築工事若しくは船舶（日本国内で製造されたものに限る。）の製造工事の着工日又は船舶が輸入された日（第七項第四号において「着工日等」という。）が平成十八年九月一日以降である解体等対象建築物等（次号から第八号までに該当するものを除く。）
            当該着工日等を設計図書等の文書で確認する方法
        - title: 四
          content: 平成十八年九月一日以降に新築工事が開始された非鉄金属製造業の用に供する施設の設備（配管を含む。以下この項において同じ。）であって、平成十九年十月一日以降にその接合部分にガスケットが設置されたもの
            当該新築工事の着工日及び当該ガスケットの設置日を設計図書等の文書で確認する方法
        - title: 五
          content: 平成十八年九月一日以降に新築工事が開始された鉄鋼業の用に供する施設の設備であって、平成二十一年四月一日以降にその接合部分にガスケット又はグランドパッキンが設置されたもの
            当該新築工事の着工日及び当該ガスケット又はグランドパッキンの設置日を設計図書等の文書で確認する方法
        - title: 六
          content: 平成十八年九月一日以降に製造工事が開始された潜水艦であって、平成二十一年四月一日以降にガスケット又はグランドパッキンが設置されたもの
            当該製造工事の着工日及び当該ガスケット又はグランドパッキンの設置日を設計図書等の文書で確認する方法
        - title: 七
          content: 平成十八年九月一日以降に新築工事が開始された化学工業の用に供する施設（次号において「化学工業施設」という。）の設備であって、平成二十三年三月一日以降にその接合部分にグランドパッキンが設置されたもの
            当該新築工事の着工日及び当該グランドパッキンの設置日を設計図書等の文書で確認する方法
        - title: 八
          content: 平成十八年九月一日以降に新築工事が開始された化学工業施設の設備であって、平成二十四年三月一日以降にその接合部分にガスケットが設置されたもの
            当該新築工事の着工日及び当該ガスケットの設置日を設計図書等の文書で確認する方法
      - paragraph_num: ４
        content: 事業者は、事前調査のうち、建築物及び船舶に係るものについては、前項各号に規定する場合を除き、適切に当該調査を実施するために必要な知識を有する者として厚生労働大臣が定めるものに行わせなければならない。
      - paragraph_num: ５
        content: 事業者は、事前調査を行ったにもかかわらず、当該解体等対象建築物等について石綿等の使用の有無が明らかとならなかったときは、石綿等の使用の有無について、分析による調査（以下「分析調査」という。）を行わなければならない。
          ただし、事業者が、当該解体等対象建築物等について石綿等が使用されているものとみなして労働安全衛生法（以下「法」という。）及びこれに基づく命令に規定する措置を講ずるときは、この限りでない。
      - paragraph_num: ６
        content: 事業者は、分析調査については、適切に分析調査を実施するために必要な知識及び技能を有する者として厚生労働大臣が定めるものに行わせなければならない。
      - paragraph_num: ７
        content: 事業者は、事前調査又は分析調査（以下「事前調査等」という。）を行ったときは、当該事前調査等の結果に基づき、次に掲げる事項（第三項第三号から第八号までの場合においては、第一号から第四号までに掲げる事項に限る。）の記録を作成し、これを事前調査を終了した日（分析調査を行った場合にあっては、解体等の作業に係る全ての事前調査を終了した日又は分析調査を終了した日のうちいずれか遅い日）（第三号及び次項第一号において「調査終了日」という。）から三年間保存するものとする。
        items:
        - title: 一
          content: 事業者の名称、住所及び電話番号
        - title: 二
          content: 解体等の作業を行う作業場所の住所並びに工事の名称及び概要
        - title: 三
          content: 調査終了日
        - title: 四
          content: 着工日等（第三項第四号から第八号までに規定する方法により事前調査を行った場合にあっては、設計図書等の文書で確認した着工日及び設置日）
        - title: 五
          content: 事前調査を行った建築物、工作物又は船舶の構造
        - title: 六
          content: 事前調査を行った部分（分析調査を行った場合にあっては、分析のための試料を採取した場所を含む。）
        - title: 七
          content: 事前調査の方法（分析調査を行った場合にあっては、分析調査の方法を含む。）
        - title: 八
          content: 第六号の部分における材料ごとの石綿等の使用の有無（第五項ただし書の規定により石綿等が使用されているものとみなした場合は、その旨を含む。）及び石綿等が使用されていないと判断した材料にあっては、その判断の根拠
        - title: 九
          content: 事前調査のうち、建築物及び船舶に係るもの（第三項第三号に掲げる方法によるものを除く。）を行った者（分析調査を行った場合にあっては、当該分析調査を行った者を含む。）の氏名及び第四項の厚生労働大臣が定める者であることを証明する書類（分析調査を行った場合にあっては、前項の厚生労働大臣が定める者であることを証明する書類を含む。）の写し
        - title: 十
          content: 第二項第二号ただし書に規定する材料の有無及び場所
      - paragraph_num: ８
        content: 事業者は、解体等の作業を行う作業場には、次の事項を、見やすい箇所に掲示するとともに、次条第一項の作業を行う作業場には、前項の規定による記録の写しを備え付けなければならない。
        items:
        - title: 一
          content: 調査終了日
        - title: 二
          content: 前項第六号及び第八号に規定する事項の概要
      - paragraph_num: ９
        content: 第二項第二号ただし書に規定する材料については、目視により確認することが可能となったときに、事前調査を行わなければならない。
    - caption: （作業計画）
      title: 第四条
      article_num: '4'
      paragraphs:
      - content: 事業者は、石綿等が使用されている解体等対象建築物等（前条第五項ただし書の規定により石綿等が使用されているものとみなされるものを含む。）の解体等の作業（以下「石綿使用建築物等解体等作業」という。）を行うときは、石綿による労働者の健康障害を防止するため、あらかじめ、作業計画を定め、かつ、当該作業計画により石綿使用建築物等解体等作業を行わなければならない。
      - paragraph_num: ２
        content: 前項の作業計画は、次の事項が示されているものでなければならない。
        items:
        - title: 一
          content: 石綿使用建築物等解体等作業の方法及び順序
        - title: 二
          content: 石綿等の粉じんの発散を防止し、又は抑制する方法
        - title: 三
          content: 石綿使用建築物等解体等作業を行う労働者への石綿等の粉じんのばく露を防止する方法
      - paragraph_num: ３
        content: 事業者は、第一項の作業計画を定めたときは、前項各号の事項について関係労働者に周知させなければならない。
    - caption: （事前調査の結果等の報告）
      title: 第四条の二
      article_num: '4_2'
      paragraphs:
      - content: 事業者は、次のいずれかの工事を行おうとするときは、あらかじめ、電子情報処理組織（厚生労働省の使用に係る電子計算機と、この項の規定による報告を行う者の使用に係る電子計算機とを電気通信回線で接続した電子情報処理組織をいう。）を使用して、次項に掲げる事項を所轄労働基準監督署長に報告しなければならない。
        items:
        - title: 一
          content: 建築物の解体工事（当該工事に係る部分の床面積の合計が八十平方メートル以上であるものに限る。）
        - title: 二
          content: 建築物の改修工事（当該工事の請負代金の額が百万円以上であるものに限る。）
        - title: 三
          content: 工作物（石綿等が使用されているおそれが高いものとして厚生労働大臣が定めるものに限る。）の解体工事又は改修工事（当該工事の請負代金の額が百万円以上であるものに限る。）
        - title: 四
          content: 船舶（総トン数二十トン以上の船舶に限る。）の解体工事又は改修工事
      - paragraph_num: ２
        content: 前項の規定により報告しなければならない事項は、次に掲げるもの（第三条第三項第三号から第八号までの場合においては、第一号から第四号までに掲げるものに限る。）とする。
        items:
        - title: 一
          content: 第三条第七項第一号から第四号までに掲げる事項及び労働保険番号
        - title: 二
          content: 解体工事又は改修工事の実施期間
        - title: 三
          content: 前項第一号に掲げる工事にあっては、当該工事の対象となる建築物（当該工事に係る部分に限る。）の床面積の合計
        - title: 四
          content: 前項第二号又は第三号に掲げる工事にあっては、当該工事に係る請負代金の額
        - title: 五
          content: 第三条第七項第五号、第八号及び第九号に掲げる事項の概要
        - title: 六
          content: 前条第一項に規定する作業を行う場合にあっては、当該作業に係る石綿作業主任者の氏名
        - title: 七
          content: 材料ごとの切断等の作業（石綿を含有する材料に係る作業に限る。）の有無並びに当該作業における石綿等の粉じんの発散を防止し、又は抑制する方法及び当該作業を行う労働者への石綿等の粉じんのばく露を防止する方法
      - paragraph_num: ３
        content: 第一項の規定による報告は、様式第一号による報告書を所轄労働基準監督署長に提出することをもって代えることができる。
      - paragraph_num: ４
        content: 第一項各号に掲げる工事を同一の事業者が二以上の契約に分割して請け負う場合においては、これを一の契約で請け負ったものとみなして、同項の規定を適用する。
      - paragraph_num: ５
        content: 第一項各号に掲げる工事の一部を請負人に請け負わせている事業者（当該仕事の一部を請け負わせる契約が二以上あるため、その者が二以上あることとなるときは、当該請負契約のうちの最も先次の請負契約における注文者とする。）があるときは、当該仕事の作業の全部について、当該事業者が同項の規定による報告を行わなければならない。
    - caption: （作業の届出）
      title: 第五条
      article_num: '5'
      paragraphs:
      - content: 事業者は、次に掲げる作業を行うときは、あらかじめ、様式第一号の二による届書に当該作業に係る解体等対象建築物等の概要を示す図面を添えて、所轄労働基準監督署長に提出しなければならない。
        items:
        - title: 一
          content: 解体等対象建築物等に吹き付けられている石綿等（石綿等が使用されている仕上げ用塗り材（第六条の三において「石綿含有仕上げ塗材」という。）を除く。）の除去、封じ込め又は囲い込みの作業
        - title: 二
          content: 解体等対象建築物等に張り付けられている石綿等が使用されている保温材、耐火被覆材（耐火性能を有する被覆材をいう。）等（以下「石綿含有保温材等」という。）の除去、封じ込め又は囲い込みの作業（石綿等の粉じんを著しく発散するおそれがあるものに限る。）
      - paragraph_num: ２
        content: 前項の規定は、法第八十八条第三項の規定による届出をする場合にあっては、適用しない。
    - caption: （吹き付けられた石綿等及び石綿含有保温材等の除去等に係る措置）
      title: 第六条
      article_num: '6'
      paragraphs:
      - content: 事業者は、次の作業に労働者を従事させるときは、適切な石綿等の除去等に係る措置を講じなければならない。 ただし、当該措置と同等以上の効果を有する措置を講じたときは、この限りでない。
        items:
        - title: 一
          content: 前条第一項第一号に掲げる作業（囲い込みの作業にあっては、石綿等の切断等の作業を伴うものに限る。）
        - title: 二
          content: 前条第一項第二号に掲げる作業（石綿含有保温材等の切断等の作業を伴うものに限る。）
      - paragraph_num: ２
        content: 前項本文の適切な石綿等の除去等に係る措置は、次に掲げるものとする。
        items:
        - title: 一
          content: 前項各号に掲げる作業を行う作業場所（以下この項において「石綿等の除去等を行う作業場所」という。）を、それ以外の作業を行う作業場所から隔離すること。
        - title: 二
          content: 石綿等の除去等を行う作業場所にろ過集じん方式の集じん・排気装置を設け、排気を行うこと。
        - title: 三
          content: 石綿等の除去等を行う作業場所の出入口に前室、洗身室及び更衣室を設置すること。 これらの室の設置に当たっては、石綿等の除去等を行う作業場所から労働者が退出するときに、前室、洗身室及び更衣室をこれらの順に通過するように互いに連接させること。
        - title: 四
          content: 石綿等の除去等を行う作業場所及び前号の前室を負圧に保つこと。
        - title: 五
          content: 第一号の規定により隔離を行った作業場所において初めて前項各号に掲げる作業を行う場合には、当該作業を開始した後速やかに、第二号のろ過集じん方式の集じん・排気装置の排気口からの石綿等の粉じんの漏えいの有無を点検すること。
        - title: 六
          content: 第二号のろ過集じん方式の集じん・排気装置の設置場所を変更したときその他当該集じん・排気装置に変更を加えたときは、当該集じん・排気装置の排気口からの石綿等の粉じんの漏えいの有無を点検すること。
        - title: 七
          content: その日の作業を開始する前及び作業を中断したときは、第三号の前室が負圧に保たれていることを点検すること。
        - title: 八
          content: 前三号の点検を行った場合において、異常を認めたときは、直ちに前項各号に掲げる作業を中止し、ろ過集じん方式の集じん・排気装置の補修又は増設その他の必要な措置を講ずること。
      - paragraph_num: ３
        content: 事業者は、前項第一号の規定により隔離を行ったときは、隔離を行った作業場所内の石綿等の粉じんを処理するとともに、第一項第一号に掲げる作業（石綿等の除去の作業に限る。）又は同項第二号に掲げる作業（石綿含有保温材等の除去の作業に限る。）を行った場合にあっては、吹き付けられた石綿等又は張り付けられた石綿含有保温材等を除去した部分を湿潤化するとともに、石綿等に関する知識を有する者が当該石綿等又は石綿含有保温材等の除去が完了したことを確認した後でなければ、隔離を解いてはならない。
    - caption: （石綿含有成形品の除去に係る措置）
      title: 第六条の二
      article_num: '6_2'
      paragraphs:
      - content: 事業者は、成形された材料であって石綿等が使用されているもの（石綿含有保温材等を除く。第三項において「石綿含有成形品」という。）を建築物、工作物又は船舶から除去する作業においては、切断等以外の方法により当該作業を実施しなければならない。
          ただし、切断等以外の方法により当該作業を実施することが技術上困難なときは、この限りでない。
      - paragraph_num: ２
        content: 事業者は、前項の作業の一部を請負人に請け負わせるときは、当該請負人に対し、切断等以外の方法により当該作業を実施する必要がある旨を周知させなければならない。
          ただし、同項ただし書の場合は、この限りでない。
      - paragraph_num: ３
        content: 事業者は、第一項ただし書の場合において、石綿含有成形品のうち特に石綿等の粉じんが発散しやすいものとして厚生労働大臣が定めるものを切断等の方法により除去する作業を行うときは、次に掲げる措置を講じなければならない。
          ただし、当該措置（第一号及び第二号に掲げる措置に限る。）と同等以上の効果を有する措置を講じたときは、第一号及び第二号の措置については、この限りでない。
        items:
        - title: 一
          content: 当該作業を行う作業場所を、当該作業以外の作業を行う作業場所からビニルシート等で隔離すること。
        - title: 二
          content: 当該作業中は、当該石綿含有成形品を常時湿潤な状態に保つこと、除じん性能を有する電動工具を使用することその他の石綿等の粉じんの発散を防止する措置を講ずること。
        - title: 三
          content: 当該作業の一部を請負人に請け負わせるときは、当該請負人に対し、前二号に掲げる措置を講ずる必要がある旨を周知させること。
    - caption: （石綿含有仕上げ塗材の電動工具による除去に係る措置）
      title: 第六条の三
      article_num: '6_3'
      paragraphs:
      - content: 前条第三項の規定は、事業者が建築物、工作物又は船舶の壁、柱、天井等に用いられた石綿含有仕上げ塗材を電動工具を使用して除去する作業に労働者を従事させる場合及び当該作業の一部を請負人に請け負わせる場合について準用する。
    - caption: （石綿等の切断等の作業を伴わない作業に係る措置）
      title: 第七条
      article_num: '7'
      paragraphs:
      - content: 事業者は、次に掲げる作業に労働者を従事させるときは、当該作業場所に当該作業に従事する労働者以外の者（第十四条に規定する措置が講じられた者を除く。）が立ち入ることを禁止し、かつ、その旨を見やすい箇所に表示しなければならない。
        items:
        - title: 一
          content: 第五条第一項第一号に掲げる作業（石綿等の切断等の作業を伴うものを除き、囲い込みの作業に限る。）
        - title: 二
          content: 第五条第一項第二号に掲げる作業（石綿含有保温材等の切断等の作業を伴うものを除き、除去又は囲い込みの作業に限る。）
      - paragraph_num: ２
        content: 特定元方事業者（法第十五条第一項の特定元方事業者をいう。）は、その労働者及び関係請負人（法第十五条第一項の関係請負人をいう。以下この項において同じ。）の労働者の作業が、前項各号に掲げる作業と同一の場所で行われるときは、当該作業の開始前までに、関係請負人に当該作業の実施について通知するとともに、作業の時間帯の調整等必要な措置を講じなければならない。
    - caption: （発注者の責務等）
      title: 第八条
      article_num: '8'
      paragraphs:
      - content: 解体等の作業を行う仕事の発注者（注文者のうち、その仕事を他の者から請け負わないで注文している者をいう。次項及び第三十五条の二第二項において同じ。）は、当該仕事の請負人に対し、当該仕事に係る解体等対象建築物等における石綿等の使用状況等を通知するよう努めなければならない。
      - paragraph_num: ２
        content: 解体等の作業を行う仕事の発注者は、当該仕事の請負人による事前調査等及び第三十五条の二第一項の規定による記録の作成が適切に行われるように配慮しなければならない。
    - caption: （建築物の解体等の作業等の条件）
      title: 第九条
      article_num: '9'
      paragraphs:
      - content: 解体等の作業を行う仕事の注文者は、事前調査等、当該事前調査等の結果を踏まえた当該作業等の方法、費用又は工期等について、法及びこれに基づく命令の規定の遵守を妨げるおそれのある条件を付さないように配慮しなければならない。
  - title: 第二節　労働者が石綿等の粉じんにばく露するおそれがある建築物等における業務に係る措置
    section_num: 2
    articles:
    - title: 第十条
      article_num: '10'
      paragraphs:
      - content: 事業者は、その労働者を就業させる建築物若しくは船舶又は当該建築物若しくは船舶に設置された工作物（次項及び第五項に規定するものを除く。）に吹き付けられた石綿等又は張り付けられた石綿含有保温材等が損傷、劣化等により石綿等の粉じんを発散させ、及び労働者がその粉じんにばく露するおそれがあるときは、当該吹き付けられた石綿等又は石綿含有保温材等の除去、封じ込め、囲い込み等の措置を講じなければならない。
      - paragraph_num: ２
        content: 事業者は、その労働者を臨時に就業させる建築物若しくは船舶又は当該建築物若しくは船舶に設置された工作物（第五項に規定するものを除く。）に吹き付けられた石綿等又は張り付けられた石綿含有保温材等が損傷、劣化等により石綿等の粉じんを発散させ、及び労働者がその粉じんにばく露するおそれがあるときは、労働者に呼吸用保護具及び作業衣又は保護衣を使用させなければならない。
      - paragraph_num: ３
        content: 事業者は、前項のおそれがある場所における作業の一部を請負人に請け負わせる場合であって、当該請負人が当該場所で臨時に就業するときは、当該請負人に対し、呼吸用保護具及び作業衣又は保護衣を使用する必要がある旨を周知させなければならない。
      - paragraph_num: ４
        content: 労働者は、事業者から第二項の保護具等の使用を命じられたときは、これを使用しなければならない。
      - paragraph_num: ５
        content: 法第三十四条の建築物貸与者は、当該建築物の貸与を受けた二以上の事業者が共用する廊下の壁等に吹き付けられた石綿等又は張り付けられた石綿含有保温材等が損傷、劣化等により石綿等の粉じんを発散させ、及び労働者がその粉じんにばく露するおそれがあるときは、第一項に規定する措置を講じなければならない。
  - title: 第三節　石綿等を取り扱う業務に係るその他の措置
    section_num: 3
    articles:
    - title: 第十一条
      article_num: '11'
      paragraphs:
      - content: 削除
    - caption: （作業に係る設備等）
      title: 第十二条
      article_num: '12'
      paragraphs:
      - content: 事業者は、石綿等の粉じんが発散する屋内作業場については、当該粉じんの発散源を密閉する設備、局所排気装置又はプッシュプル型換気装置を設けなければならない。
          ただし、当該粉じんの発散源を密閉する設備、局所排気装置若しくはプッシュプル型換気装置の設置が著しく困難なとき、又は臨時の作業を行うときは、この限りでない。
      - paragraph_num: ２
        content: 事業者は、前項ただし書の規定により石綿等の粉じんの発散源を密閉する設備、局所排気装置又はプッシュプル型換気装置を設けない場合には、全体換気装置を設け、又は当該石綿等を湿潤な状態にする等労働者の健康障害を予防するため必要な措置を講じなければならない。
    - caption: （石綿等の切断等の作業等に係る措置）
      title: 第十三条
      article_num: '13'
      paragraphs:
      - content: 事業者は、次の各号のいずれかに掲げる作業に労働者を従事させるときは、石綿等を湿潤な状態のものとすること、除じん性能を有する電動工具を使用することその他の石綿等の粉じんの発散を防止する措置を講じなければならない。
        items:
        - title: 一
          content: 石綿等の切断等の作業（第六条の二第三項に規定する作業を除く。）
        - title: 二
          content: 石綿等を塗布し、注入し、又は張り付けた物の解体等の作業（石綿使用建築物等解体等作業を含み、第六条の三に規定する作業を除く。）
        - title: 三
          content: 粉状の石綿等を容器に入れ、又は容器から取り出す作業
        - title: 四
          content: 粉状の石綿等を混合する作業
        - title: 五
          content: 前各号に掲げる作業、第六条の二第三項に規定する作業又は第六条の三に規定する作業（以下「石綿等の切断等の作業等」という。）において発散した石綿等の粉じんの掃除の作業
      - paragraph_num: ２
        content: 事業者は、石綿等の切断等の作業等を行う場所に、石綿等の切りくず等を入れるためのふたのある容器を備えなければならない。
      - paragraph_num: ３
        content: 事業者は、第一項各号のいずれかに掲げる作業の一部を請負人に請け負わせるときは、当該請負人に対し、石綿等を湿潤な状態のものとすること、除じん性能を有する電動工具を使用することその他の石綿等の粉じんの発散を防止する措置を講ずる必要がある旨を周知させなければならない。
    - title: 第十四条
      article_num: '14'
      paragraphs:
      - content: 事業者は、石綿等の切断等の作業等に労働者を従事させるときは、当該労働者に呼吸用保護具（第六条第二項第一号の規定により隔離を行った作業場所における同条第一項第一号に掲げる作業（除去の作業に限る。次項及び第三十五条の二第二項において「吹付石綿等除去作業」という。）に労働者を従事させるときは、防じん機能を有する電動ファン付き呼吸用保護具若しくは防毒機能を有する電動ファン付き呼吸用保護具であつて防じん機能を有するもの又はこれと同等以上の性能を有する空気呼吸器、酸素呼吸器若しくは送気マスク（次項及び第三十五条の二第二項において「電動ファン付き呼吸用保護具等」という。）に限る。）を使用させなければならない。
      - paragraph_num: ２
        content: 事業者は、石綿等の切断等の作業等の一部を請負人に請け負わせるときは、当該請負人に対し、呼吸用保護具（吹付石綿等除去作業の一部を請負人に請け負わせるときは、電動ファン付き呼吸用保護具等に限る。）を使用する必要がある旨を周知させなければならない。
      - paragraph_num: ３
        content: 事業者は、石綿等の切断等の作業等に労働者を従事させるときは、当該労働者に作業衣を使用させなければならない。 ただし、当該労働者に保護衣を使用させるときは、この限りでない。
      - paragraph_num: ４
        content: 事業者は、石綿等の切断等の作業等の一部を請負人に請け負わせるときは、当該請負人に対し、作業衣又は保護衣を使用する必要がある旨を周知させなければならない。
      - paragraph_num: ５
        content: 労働者は、事業者から第一項及び第三項の保護具等の使用を命じられたときは、これを使用しなければならない。
    - caption: （立入禁止措置）
      title: 第十五条
      article_num: '15'
      paragraphs:
      - content: 事業者は、石綿等を取り扱い（試験研究のため使用する場合を含む。以下同じ。）、若しくは試験研究のため製造する作業場又は石綿分析用試料等を製造する作業場には、当該作業場において作業に従事する者以外の者が立ち入ることについて、禁止する旨を見やすい箇所に表示することその他の方法により禁止するとともに、表示以外の方法により禁止したときは、当該作業場が立入禁止である旨を見やすい箇所に表示しなければならない。
- title: 第三章　設備の性能等
  chapter_num: 3
  articles:
  - caption: （局所排気装置等の要件）
    title: 第十六条
    article_num: '16'
    paragraphs:
    - content: 事業者は、第十二条第一項の規定により設ける局所排気装置については、次に定めるところに適合するものとしなければならない。
      items:
      - title: 一
        content: フードは、石綿等の粉じんの発散源ごとに設けられ、かつ、外付け式又はレシーバー式のフードにあっては、当該発散源にできるだけ近い位置に設けられていること。
      - title: 二
        content: ダクトは、長さができるだけ短く、ベンドの数ができるだけ少なく、かつ、適当な箇所に掃除口が設けられている等掃除しやすい構造のものであること。
      - title: 三
        content: 排気口は、屋外に設けられていること。 ただし、石綿の分析の作業に労働者を従事させる場合において、排気口からの石綿等の粉じんの排出を防止するための措置を講じたときは、この限りでない。
      - title: 四
        content: 厚生労働大臣が定める性能を有するものであること。
    - paragraph_num: ２
      content: 事業者は、第十二条第一項の規定により設けるプッシュプル型換気装置については、次に定めるところに適合するものとしなければならない。
      items:
      - title: 一
        content: ダクトは、長さができるだけ短く、ベンドの数ができるだけ少なく、かつ、適当な箇所に掃除口が設けられている等掃除しやすい構造のものであること。
      - title: 二
        content: 排気口は、屋外に設けられていること。 ただし、石綿の分析の作業に労働者を従事させる場合において、排気口からの石綿等の粉じんの排出を防止するための措置を講じたときは、この限りでない。
      - title: 三
        content: 厚生労働大臣が定める要件を具備するものであること。
  - caption: （局所排気装置等の稼働）
    title: 第十七条
    article_num: '17'
    paragraphs:
    - content: 事業者は、第十二条第一項の規定により設ける局所排気装置又はプッシュプル型換気装置については、労働者が石綿等に係る作業に従事する間、厚生労働大臣が定める要件を満たすように稼働させなければならない。
    - paragraph_num: ２
      content: 事業者は、前項の作業の一部を請負人に請け負わせるときは、当該請負人が当該作業に従事する間（労働者が当該作業に従事するときを除く。）、同項の局所排気装置又はプッシュプル型換気装置を同項の厚生労働大臣が定める要件を満たすように稼働させること等について配慮しなければならない。
    - paragraph_num: ３
      content: 事業者は、前二項の局所排気装置又はプッシュプル型換気装置の稼働時においては、バッフルを設けて換気を妨害する気流を排除する等当該装置を有効に稼働させるため必要な措置を講じなければならない。
  - caption: （除じん）
    title: 第十八条
    article_num: '18'
    paragraphs:
    - content: 事業者は、石綿等の粉じんを含有する気体を排出する製造設備の排気筒又は第十二条第一項の規定により設ける局所排気装置若しくはプッシュプル型換気装置には、次の表の上欄に掲げる粉じんの粒径に応じ、同表の下欄に掲げるいずれかの除じん方式による除じん装置又はこれらと同等以上の性能を有する除じん装置を設けなければならない。
      table:
        rows:
        - - 粉じんの粒径 （単位　マイクロメートル）
          - 除じん方式
        - - 五未満
          - ろ過除じん方式 電気除じん方式
        - - 五以上二十未満
          - スクラバによる除じん方式 ろ過除じん方式 電気除じん方式
        - - 二十以上
          - マルチサイクロン（処理風量が毎分二十立方メートル以内ごとに一つのサイクロンを設けたものをいう。）による除じん方式 スクラバによる除じん方式
            ろ過除じん方式 電気除じん方式
        - - 備考　この表における粉じんの粒径は、重量法で測定した粒径分布において最大頻度を示す粒径をいう。
    - paragraph_num: ２
      content: 事業者は、前項の除じん装置には、必要に応じ、粒径の大きい粉じんを除去するための前置き除じん装置を設けなければならない。
    - paragraph_num: ３
      content: 事業者は、前二項の除じん装置を有効に稼働させなければならない。
- title: 第四章　管理
  chapter_num: 4
  articles:
  - caption: （石綿作業主任者の選任）
    title: 第十九条
    article_num: '19'
    paragraphs:
    - content: 事業者は、令第六条第二十三号に掲げる作業については、石綿作業主任者技能講習を修了した者のうちから、石綿作業主任者を選任しなければならない。
  - caption: （石綿作業主任者の職務）
    title: 第二十条
    article_num: '20'
    paragraphs:
    - content: 事業者は、石綿作業主任者に次の事項を行わせなければならない。
      items:
      - title: 一
        content: 作業に従事する労働者が石綿等の粉じんにより汚染され、又はこれらを吸入しないように、作業の方法を決定し、労働者を指揮すること。
      - title: 二
        content: 局所排気装置、プッシュプル型換気装置、除じん装置その他労働者が健康障害を受けることを予防するための装置を一月を超えない期間ごとに点検すること。
      - title: 三
        content: 保護具の使用状況を監視すること。
  - caption: （定期自主検査を行うべき機械等）
    title: 第二十一条
    article_num: '21'
    paragraphs:
    - content: 令第十五条第一項第九号の厚生労働省令で定める局所排気装置、プッシュプル型換気装置及び除じん装置（石綿等に係るものに限る。）は、次のとおりとする。
      items:
      - title: 一
        content: 第十二条第一項の規定に基づき設けられる局所排気装置
      - title: 二
        content: 第十二条第一項の規定に基づき設けられるプッシュプル型換気装置
      - title: 三
        content: 第十八条第一項の規定に基づき設けられる除じん装置
  - caption: （定期自主検査）
    title: 第二十二条
    article_num: '22'
    paragraphs:
    - content: 事業者は、前条各号に掲げる装置については、一年以内ごとに一回、定期に、次の各号に掲げる装置の種類に応じ、当該各号に掲げる事項について自主検査を行わなければならない。
        ただし、一年を超える期間使用しない同条の装置の当該使用しない期間においては、この限りでない。
      items:
      - title: 一
        content: 局所排気装置
        subitems:
        - level: 1
          title: イ
          content: フード、ダクト及びファンの摩耗、腐食、くぼみ、その他損傷の有無及びその程度
        - level: 1
          title: ロ
          content: ダクト及び排風機におけるじんあいのたい積状態
        - level: 1
          title: ハ
          content: ダクトの接続部における緩みの有無
        - level: 1
          title: ニ
          content: 電動機とファンを連結するベルトの作動状態
        - level: 1
          title: ホ
          content: 吸気及び排気の能力
        - level: 1
          title: ヘ
          content: イからホまでに掲げるもののほか、性能を保持するため必要な事項
      - title: 二
        content: プッシュプル型換気装置
        subitems:
        - level: 1
          title: イ
          content: フード、ダクト及びファンの摩耗、腐食、くぼみ、その他損傷の有無及びその程度
        - level: 1
          title: ロ
          content: ダクト及び排風機におけるじんあいのたい積状態
        - level: 1
          title: ハ
          content: ダクトの接続部における緩みの有無
        - level: 1
          title: ニ
          content: 電動機とファンを連結するベルトの作動状態
        - level: 1
          title: ホ
          content: 送気、吸気及び排気の能力
        - level: 1
          title: ヘ
          content: イからホまでに掲げるもののほか、性能を保持するため必要な事項
      - title: 三
        content: 除じん装置
        subitems:
        - level: 1
          title: イ
          content: 構造部分の摩耗、腐食、破損の有無及びその程度
        - level: 1
          title: ロ
          content: 当該装置内におけるじんあいのたい積状態
        - level: 1
          title: ハ
          content: ろ過除じん方式の除じん装置にあっては、ろ材の破損又はろ材取付部等の緩みの有無
        - level: 1
          title: ニ
          content: 処理能力
        - level: 1
          title: ホ
          content: イからニまでに掲げるもののほか、性能を保持するため必要な事項
    - paragraph_num: ２
      content: 事業者は、前項ただし書の装置については、その使用を再び開始する際に同項各号に掲げる事項について自主検査を行わなければならない。
  - caption: （定期自主検査の記録）
    title: 第二十三条
    article_num: '23'
    paragraphs:
    - content: 事業者は、前条の自主検査を行ったときは、次の事項を記録し、これを三年間保存しなければならない。
      items:
      - title: 一
        content: 検査年月日
      - title: 二
        content: 検査方法
      - title: 三
        content: 検査箇所
      - title: 四
        content: 検査の結果
      - title: 五
        content: 検査を実施した者の氏名
      - title: 六
        content: 検査の結果に基づいて補修等の措置を講じたときは、その内容
  - caption: （点検）
    title: 第二十四条
    article_num: '24'
    paragraphs:
    - content: 事業者は、第二十一条各号に掲げる装置を初めて使用するとき、又は分解して改造若しくは修理を行ったときは、当該装置の種類に応じ第二十二条第一項各号に掲げる事項について、点検を行わなければならない。
  - caption: （点検の記録）
    title: 第二十五条
    article_num: '25'
    paragraphs:
    - content: 事業者は、前条の点検を行ったときは、次の事項を記録し、これを三年間保存しなければならない。
      items:
      - title: 一
        content: 点検年月日
      - title: 二
        content: 点検方法
      - title: 三
        content: 点検箇所
      - title: 四
        content: 点検の結果
      - title: 五
        content: 点検を実施した者の氏名
      - title: 六
        content: 点検の結果に基づいて補修等の措置を講じたときは、その内容
  - caption: （補修等）
    title: 第二十六条
    article_num: '26'
    paragraphs:
    - content: 事業者は、第二十二条の自主検査又は第二十四条の点検を行った場合において、異常を認めたときは、直ちに補修その他の措置を講じなければならない。
  - caption: （特別の教育）
    title: 第二十七条
    article_num: '27'
    paragraphs:
    - content: 事業者は、石綿使用建築物等解体等作業に係る業務に労働者を就かせるときは、当該労働者に対し、次の科目について、当該業務に関する衛生のための特別の教育を行わなければならない。
      items:
      - title: 一
        content: 石綿の有害性
      - title: 二
        content: 石綿等の使用状況
      - title: 三
        content: 石綿等の粉じんの発散を抑制するための措置
      - title: 四
        content: 保護具の使用方法
      - title: 五
        content: 前各号に掲げるもののほか、石綿等の粉じんのばく露の防止に関し必要な事項
    - paragraph_num: ２
      content: 労働安全衛生規則（昭和四十七年労働省令第三十二号。以下「安衛則」という。）第三十七条及び第三十八条並びに前項に定めるもののほか、同項の特別の教育の実施について必要な事項は、厚生労働大臣が定める。
  - caption: （休憩室）
    title: 第二十八条
    article_num: '28'
    paragraphs:
    - content: 事業者は、石綿等を常時取り扱い、若しくは試験研究のため製造する作業又は石綿分析用試料等を製造する作業に労働者を従事させるときは、当該作業を行う作業場以外の場所に休憩室を設けなければならない。
    - paragraph_num: ２
      content: 事業者は、前項の休憩室については、次の措置を講じなければならない。
      items:
      - title: 一
        content: 入口には、水を流し、又は十分湿らせたマットを置く等労働者の足部に付着した物を除去するための設備を設けること。
      - title: 二
        content: 入口には、衣服用ブラシを備えること。
    - paragraph_num: ３
      content: 第一項の作業に従事した者は、同項の休憩室に入る前に、作業衣等に付着した物を除去しなければならない。
  - caption: （床）
    title: 第二十九条
    article_num: '29'
    paragraphs:
    - content: 事業者は、石綿等を常時取り扱い、若しくは試験研究のため製造する作業場又は石綿分析用試料等を製造する作業場及び前条第一項の休憩室の床を水洗等によって容易に掃除できる構造のものとしなければならない。
  - caption: （掃除の実施）
    title: 第三十条
    article_num: '30'
    paragraphs:
    - content: 事業者は、前条の作業場及び休憩室の床等については、水洗する等粉じんの飛散しない方法によって、毎日一回以上、掃除を行わなければならない。
  - caption: （洗浄設備）
    title: 第三十一条
    article_num: '31'
    paragraphs:
    - content: 事業者は、石綿等を取り扱い、若しくは試験研究のため製造する作業又は石綿分析用試料等を製造する作業に労働者を従事させるときは、洗眼、洗身又はうがいの設備、更衣設備及び洗濯のための設備を設けなければならない。
  - caption: （容器等）
    title: 第三十二条
    article_num: '32'
    paragraphs:
    - content: 事業者は、石綿等を運搬し、又は貯蔵するときは、当該石綿等の粉じんが発散するおそれがないように、堅固な容器を使用し、又は確実な包装をしなければならない。
    - paragraph_num: ２
      content: 事業者は、前項の容器又は包装の見やすい箇所に石綿等が入っていること及びその取扱い上の注意事項を表示しなければならない。
    - paragraph_num: ３
      content: 事業者は、石綿等の保管については、一定の場所を定めておかなければならない。
    - paragraph_num: ４
      content: 事業者は、石綿等の運搬、貯蔵等のために使用した容器又は包装については、当該石綿等の粉じんが発散しないような措置を講じ、保管するときは、一定の場所を定めて集積しておかなければならない。
  - caption: （使用された器具等の付着物の除去）
    title: 第三十二条の二
    article_num: '32_2'
    paragraphs:
    - content: 事業者は、石綿等を取り扱い、若しくは試験研究のため製造する作業又は石綿分析用試料等を製造する作業に使用した器具、工具、足場等について、付着した物を除去した後でなければ作業場外に持ち出してはならない。
        ただし、廃棄のため、容器等に梱包したときは、この限りでない。
    - paragraph_num: ２
      content: 事業者は、前項の作業の一部を請負人に請け負わせるときは、当該請負人に対し、当該作業に使用した器具、工具、足場等について、廃棄のため、容器等に梱包したときを除き、付着した物を除去した後でなければ作業場外に持ち出してはならない旨を周知させなければならない。
  - caption: （喫煙等の禁止）
    title: 第三十三条
    article_num: '33'
    paragraphs:
    - content: 事業者は、石綿等を取り扱い、若しくは試験研究のため製造する作業場又は石綿分析用試料等を製造する作業場における作業に従事する者の喫煙又は飲食について、禁止する旨を見やすい箇所に表示することその他の方法により禁止するとともに、表示以外の方法により禁止したときは、当該作業場において喫煙又は飲食が禁止されている旨を当該作業場の見やすい箇所に表示しなければならない。
    - paragraph_num: ２
      content: 前項の作業場において作業に従事する者は、当該作業場で喫煙し、又は飲食してはならない。
  - caption: （掲示）
    title: 第三十四条
    article_num: '34'
    paragraphs:
    - content: 事業者は、石綿等を取り扱い、若しくは試験研究のため製造する作業場又は石綿分析用試料等を製造する作業場には、次の事項を、見やすい箇所に掲示しなければならない。
      items:
      - title: 一
        content: 石綿等を取り扱い、若しくは試験研究のため製造する作業場又は石綿分析用試料等を製造する作業場である旨
      - title: 二
        content: 石綿により生ずるおそれのある疾病の種類及びその症状
      - title: 三
        content: 石綿等の取扱い上の注意事項
      - title: 四
        content: 当該作業場においては保護具等を使用しなければならない旨及び使用すべき保護具等
  - caption: （作業の記録）
    title: 第三十五条
    article_num: '35'
    paragraphs:
    - content: 事業者は、石綿等の取扱い若しくは試験研究のための製造又は石綿分析用試料等の製造に伴い石綿等の粉じんを発散する場所において常時作業に従事する労働者について、一月を超えない期間ごとに次の事項を記録し、これを当該労働者が当該事業場において常時当該作業に従事しないこととなった日から四十年間保存するものとする。
      items:
      - title: 一
        content: 労働者の氏名
      - title: 二
        content: 石綿等を取り扱い、若しくは試験研究のため製造する作業又は石綿分析用試料等を製造する作業に従事した労働者にあっては、従事した作業の概要、当該作業に従事した期間、当該作業（石綿使用建築物等解体等作業に限る。）に係る事前調査（分析調査を行った場合においては事前調査及び分析調査）の結果の概要並びに次条第一項の記録の概要
      - title: 三
        content: 石綿等の取扱い若しくは試験研究のための製造又は石綿分析用試料等の製造に伴い石綿等の粉じんを発散する場所における作業（前号の作業を除く。以下この号及び次条第一項第二号において「周辺作業」という。）に従事した労働者（以下この号及び次条第一項第二号において「周辺作業従事者」という。）にあっては、当該場所において他の労働者が従事した石綿等を取り扱い、若しくは試験研究のため製造する作業又は石綿分析用試料等を製造する作業の概要、当該周辺作業従事者が周辺作業に従事した期間、当該場所において他の労働者が従事した石綿等を取り扱う作業（石綿使用建築物等解体等作業に限る。）に係る事前調査及び分析調査の結果の概要、次条第一項の記録の概要並びに保護具等の使用状況
      - title: 四
        content: 石綿等の粉じんにより著しく汚染される事態が生じたときは、その概要及び事業者が講じた応急の措置の概要
  - caption: （作業計画による作業の記録）
    title: 第三十五条の二
    article_num: '35_2'
    paragraphs:
    - content: 事業者は、石綿使用建築物等解体等作業を行ったときは、当該石綿使用建築物等解体等作業に係る第四条第一項の作業計画に従って石綿使用建築物等解体等作業を行わせたことについて、写真その他実施状況を確認できる方法により記録を作成するとともに、次の事項を記録し、これらを当該石綿使用建築物等解体等作業を終了した日から三年間保存するものとする。
      items:
      - title: 一
        content: 当該石綿使用建築物等解体等作業に従事した労働者の氏名及び当該労働者ごとの当該石綿使用建築物等解体等作業に従事した期間
      - title: 二
        content: 周辺作業従事者の氏名及び当該周辺作業従事者ごとの周辺作業に従事した期間
    - paragraph_num: ２
      content: 事業者は、前項の記録を作成するために必要である場合は、当該記録の作成者又は石綿使用建築物等解体等作業を行う仕事の発注者の労働者（いずれも呼吸用保護具（吹付石綿等除去作業が行われている場所に当該者を立ち入らせるときは、電動ファン付き呼吸用保護具等に限る。）及び作業衣又は保護衣を着用する者に限る。）を第六条第二項第一号及び第六条の二第三項第一号（第六条の三の規定により準用する場合を含む。）の規定により隔離された作業場所に立ち入らせることができる。
- title: 第五章　測定
  chapter_num: 5
  articles:
  - caption: （測定及びその記録）
    title: 第三十六条
    article_num: '36'
    paragraphs:
    - content: 事業者は、令第二十一条第七号の作業場（石綿等に係るものに限る。）について、六月以内ごとに一回、定期に、石綿の空気中における濃度を測定しなければならない。
    - paragraph_num: ２
      content: 事業者は、前項の規定による測定を行ったときは、その都度次の事項を記録し、これを四十年間保存しなければならない。
      items:
      - title: 一
        content: 測定日時
      - title: 二
        content: 測定方法
      - title: 三
        content: 測定箇所
      - title: 四
        content: 測定条件
      - title: 五
        content: 測定結果
      - title: 六
        content: 測定を実施した者の氏名
      - title: 七
        content: 測定結果に基づいて当該石綿による労働者の健康障害の予防措置を講じたときは、当該措置の概要
  - caption: （測定結果の評価）
    title: 第三十七条
    article_num: '37'
    paragraphs:
    - content: 事業者は、石綿に係る屋内作業場について、前条第一項又は法第六十五条第五項の規定による測定を行ったときは、その都度、速やかに、厚生労働大臣の定める作業環境評価基準に従って、作業環境の管理の状態に応じ、第一管理区分、第二管理区分又は第三管理区分に区分することにより当該測定の結果の評価を行わなければならない。
    - paragraph_num: ２
      content: 事業者は、前項の規定による評価を行ったときは、その都度次の事項を記録し、これを四十年間保存しなければならない。
      items:
      - title: 一
        content: 評価日時
      - title: 二
        content: 評価箇所
      - title: 三
        content: 評価結果
      - title: 四
        content: 評価を実施した者の氏名
  - caption: （評価の結果に基づく措置）
    title: 第三十八条
    article_num: '38'
    paragraphs:
    - content: 事業者は、前条第一項の規定による評価の結果、第三管理区分に区分された場所については、直ちに、施設、設備、作業工程又は作業方法の点検を行い、その結果に基づき、施設又は設備の設置又は整備、作業工程又は作業方法の改善その他作業環境を改善するため必要な措置を講じ、当該場所の管理区分が第一管理区分又は第二管理区分となるようにしなければならない。
    - paragraph_num: ２
      content: 事業者は、前項の規定による措置を講じたときは、その効果を確認するため、同項の場所について当該石綿の濃度を測定し、及びその結果の評価を行わなければならない。
    - paragraph_num: ３
      content: 事業者は、第一項の場所については、労働者に有効な呼吸用保護具を使用させるほか、健康診断の実施その他労働者の健康の保持を図るため必要な措置を講ずるとともに、前条第二項の規定による評価の記録、第一項の規定に基づき講ずる措置及び前項の規定に基づく評価の結果を次に掲げるいずれかの方法によって労働者に周知させなければならない。
      items:
      - title: 一
        content: 常時各作業場の見やすい場所に掲示し、又は備え付けること。
      - title: 二
        content: 書面を労働者に交付すること。
      - title: 三
        content: 事業者の使用に係る電子計算機に備えられたファイル又は電磁的記録媒体（電磁的記録（電子的方式、磁気的方式その他人の知覚によっては認識することができない方式で作られる記録であって、電子計算機による情報処理の用に供されるものをいう。）に係る記録媒体をいう。以下同じ。）をもって調製するファイルに記録し、かつ、各作業場に労働者が当該記録の内容を常時確認できる機器を設置すること。
    - paragraph_num: ４
      content: 事業者は、第一項の場所において作業に従事する者（労働者を除く。）に対し、同項の場所については、有効な呼吸用保護具を使用する必要がある旨を周知させなければならない。
  - title: 第三十九条
    article_num: '39'
    paragraphs:
    - content: 事業者は、第三十七条第一項の規定による評価の結果、第二管理区分に区分された場所については、施設、設備、作業工程又は作業方法の点検を行い、その結果に基づき、施設又は設備の設置又は整備、作業工程又は作業方法の改善その他作業環境を改善するため必要な措置を講ずるよう努めなければならない。
    - paragraph_num: ２
      content: 前項に定めるもののほか、事業者は、同項の場所については、第三十七条第二項の規定による評価の記録及び前項の規定に基づき講ずる措置を次に掲げるいずれかの方法によって労働者に周知させなければならない。
      items:
      - title: 一
        content: 常時各作業場の見やすい場所に掲示し、又は備え付けること。
      - title: 二
        content: 書面を労働者に交付すること。
      - title: 三
        content: 事業者の使用に係る電子計算機に備えられたファイル又は電磁的記録媒体をもって調製するファイルに記録し、かつ、各作業場に労働者が当該記録の内容を常時確認できる機器を設置すること。
- title: 第六章　健康診断
  chapter_num: 6
  articles:
  - caption: （健康診断の実施）
    title: 第四十条
    article_num: '40'
    paragraphs:
    - content: 事業者は、令第二十二条第一項第三号の業務（石綿等の取扱い若しくは試験研究のための製造又は石綿分析用試料等の製造に伴い石綿の粉じんを発散する場所における業務に限る。）に常時従事する労働者に対し、雇入れ又は当該業務への配置替えの際及びその後六月以内ごとに一回、定期に、次の項目について医師による健康診断を行わなければならない。
      items:
      - title: 一
        content: 業務の経歴の調査
      - title: 二
        content: 石綿によるせき、たん、息切れ、胸痛等の他覚症状又は自覚症状の既往歴の有無の検査
      - title: 三
        content: せき、たん、息切れ、胸痛等の他覚症状又は自覚症状の有無の検査
      - title: 四
        content: 胸部のエックス線直接撮影による検査
    - paragraph_num: ２
      content: 事業者は、令第二十二条第二項の業務（石綿等の製造又は取扱いに伴い石綿の粉じんを発散する場所における業務に限る。）に常時従事させたことのある労働者で、現に使用しているものに対し、六月以内ごとに一回、定期に、前項各号に掲げる項目について医師による健康診断を行わなければならない。
    - paragraph_num: ３
      content: 事業者は、前二項の健康診断の結果、他覚症状が認められる者、自覚症状を訴える者その他異常の疑いがある者で、医師が必要と認めるものについては、次の項目について医師による健康診断を行わなければならない。
      items:
      - title: 一
        content: 作業条件の調査
      - title: 二
        content: 胸部のエックス線直接撮影による検査の結果、異常な陰影（石綿肺による線維増殖性の変化によるものを除く。）がある場合で、医師が必要と認めるときは、特殊なエックス線撮影による検査、喀痰（かくたん）の細胞診又は気管支鏡検査
  - caption: （健康診断の結果の記録）
    title: 第四十一条
    article_num: '41'
    paragraphs:
    - content: 事業者は、前条各項の健康診断（法第六十六条第五項ただし書の場合において当該労働者が受けた健康診断を含む。次条において「石綿健康診断」という。）の結果に基づき、石綿健康診断個人票（様式第二号）を作成し、これを当該労働者が当該事業場において常時当該業務に従事しないこととなった日から四十年間保存しなければならない。
  - caption: （健康診断の結果についての医師からの意見聴取）
    title: 第四十二条
    article_num: '42'
    paragraphs:
    - content: 石綿健康診断の結果に基づく法第六十六条の四の規定による医師からの意見聴取は、次に定めるところにより行わなければならない。
      items:
      - title: 一
        content: 石綿健康診断が行われた日（法第六十六条第五項ただし書の場合にあっては、当該労働者が健康診断の結果を証明する書面を事業者に提出した日）から三月以内に行うこと。
      - title: 二
        content: 聴取した医師の意見を石綿健康診断個人票に記載すること。
    - paragraph_num: ２
      content: 事業者は、医師から、前項の意見聴取を行う上で必要となる労働者の業務に関する情報を求められたときは、速やかに、これを提供しなければならない。
  - caption: （健康診断の結果の通知）
    title: 第四十二条の二
    article_num: '42_2'
    paragraphs:
    - content: 事業者は、第四十条各項の健康診断を受けた労働者に対し、遅滞なく、当該健康診断の結果を通知しなければならない。
  - caption: （健康診断結果報告）
    title: 第四十三条
    article_num: '43'
    paragraphs:
    - content: 事業者は、第四十条各項の健康診断（定期のものに限る。）を行ったときは、遅滞なく、石綿健康診断結果報告書（様式第三号）を所轄労働基準監督署長に提出しなければならない。
- title: 第七章　保護具
  chapter_num: 7
  articles:
  - caption: （呼吸用保護具）
    title: 第四十四条
    article_num: '44'
    paragraphs:
    - content: 事業者は、石綿等を取り扱い、若しくは試験研究のため製造する作業場又は石綿分析用試料等を製造する作業場には、石綿等の粉じんを吸入することによる労働者の健康障害を予防するため必要な呼吸用保護具を備えなければならない。
  - caption: （保護具の数等）
    title: 第四十五条
    article_num: '45'
    paragraphs:
    - content: 事業者は、前条の呼吸用保護具については、同時に就業する労働者の人数と同数以上を備え、常時有効かつ清潔に保持しなければならない。
  - caption: （保護具等の管理）
    title: 第四十六条
    article_num: '46'
    paragraphs:
    - content: 事業者は、第十条第二項、第十四条第一項及び第三項、第三十五条の二第二項、第三十八条第三項、第四十四条並びに第四十八条第六号（第四十八条の四において準用する場合を含む。次項において同じ。）に規定する保護具等が使用された場合には、他の衣服等から隔離して保管しなければならない。
    - paragraph_num: ２
      content: 事業者は、労働者以外の者が第十条第三項、第十四条第二項及び第四項、第三十八条第四項並びに第四十八条第六号に規定する保護具等を使用したときは、当該者に対し、他の衣服等から隔離して保管する必要がある旨を周知させるとともに、必要に応じ、当該保護具等を使用した者（労働者を除く。）に対し他の衣服等から隔離して保管する場所を提供する等適切に保管が行われるよう必要な配慮をしなければならない。
    - paragraph_num: ３
      content: 事業者及び労働者は、第一項の保護具等について、付着した物を除去した後でなければ作業場外に持ち出してはならない。 ただし、廃棄のため、容器等に梱包したときは、この限りでない。
    - paragraph_num: ４
      content: 事業者は、第二項の保護具等を使用した者（労働者を除く。）に対し、当該保護具等であって、廃棄のため容器等に梱包されていないものについては、付着した物を除去した後でなければ作業場外に持ち出してはならない旨を周知させなければならない。
- title: 第八章　製造等
  chapter_num: 8
  articles:
  - caption: （石綿を含有するおそれのある製品の輸入時の措置）
    title: 第四十六条の二
    article_num: '46_2'
    paragraphs:
    - content: 石綿をその重量の〇・一パーセントを超えて含有するおそれのある製品であって厚生労働大臣が定めるものを輸入しようとする者（当該製品を販売の用に供し、又は営業上使用しようとする場合に限る。）は、当該製品の輸入の際に、厚生労働大臣が定める者が作成した次に掲げる事項を記載した書面を取得し、当該製品中に石綿がその重量の〇・一パーセントを超えて含有しないことを当該書面により確認しなければならない。
      items:
      - title: 一
        content: 書面の発行年月日及び書面番号その他の当該書面を特定することができる情報
      - title: 二
        content: 製品の名称及び型式
      - title: 三
        content: 分析に係る試料を採取した製品のロット（一の製造期間内に一連の製造工程により均質性を有するように製造された製品の一群をいう。以下この号及び次項において同じ。）を特定するための情報（ロットを構成しない製品であって、製造年月日及び製造番号がある場合はその製造年月日及び製造番号）
      - title: 四
        content: 分析の日時
      - title: 五
        content: 分析の方法
      - title: 六
        content: 分析を実施した者の氏名又は名称
      - title: 七
        content: 石綿の検出の有無及び検出された場合にあってはその含有率
    - paragraph_num: ２
      content: 前項の書面は、当該書面が輸入しようとする製品のロット（ロットを構成しない製品については、輸入しようとする製品）に対応するものであることを明らかにする書面及び同項第六号の分析を実施した者が同項に規定する厚生労働大臣が定める者に該当することを証する書面の写しが添付されたものでなければならない。
    - paragraph_num: ３
      content: 第一項の輸入しようとする者は、同項の書面（前項の規定により添付すべきこととされている書面及び書面の写しを含む。）を、当該製品を輸入した日から起算して三年間保存しなければならない。
  - caption: （令第十六条第一項第四号の厚生労働省令で定めるもの等）
    title: 第四十六条の三
    article_num: '46_3'
    paragraphs:
    - content: 令第十六条第一項第四号の厚生労働省令で定めるものは、次の各号に掲げる場合の区分に応じ、当該各号に定めるものとする。
      items:
      - title: 一
        content: 令第十六条第一項第四号イからハまでに掲げる石綿又はこれらの石綿をその重量の〇・一パーセントを超えて含有する製剤その他の物（以下この条において「製造等可能石綿等」という。）を製造し、輸入し、又は使用しようとする場合
          あらかじめ労働基準監督署長に届け出られたもの
      - title: 二
        content: 製造等可能石綿等を譲渡し、又は提供しようとする場合 製造等可能石綿等の粉じんが発散するおそれがないように、堅固な容器が使用され、又は確実な包装がされたもの
    - paragraph_num: ２
      content: 前項第一号の規定による届出をしようとする者は、様式第三号の二による届書を、製造等可能石綿等を製造し、輸入し、又は使用する場所を管轄する労働基準監督署長に提出しなければならない。
  - caption: （製造等の禁止の解除手続）
    title: 第四十七条
    article_num: '47'
    paragraphs:
    - content: 令第十六条第二項第一号の許可（石綿等に係るものに限る。次項において同じ。）を受けようとする者は、様式第四号による申請書を、石綿等を製造し、又は使用しようとする場合にあっては当該石綿等を製造し、又は使用する場所を管轄する労働基準監督署長を経由して当該場所を管轄する都道府県労働局長に、石綿等を輸入しようとする場合にあっては当該輸入する石綿等を使用する場所を管轄する労働基準監督署長を経由して当該場所を管轄する都道府県労働局長に提出しなければならない。
    - paragraph_num: ２
      content: 都道府県労働局長は、令第十六条第二項第一号の許可をしたときは、申請者に対し、様式第五号による許可証を交付するものとする。
  - caption: （石綿等の製造等に係る基準）
    title: 第四十八条
    article_num: '48'
    paragraphs:
    - content: 令第十六条第二項第二号の厚生労働大臣が定める基準（石綿等に係るものに限る。）は、次のとおりとする。
      items:
      - title: 一
        content: 石綿等を製造する設備は、密閉式の構造のものとすること。 ただし、密閉式の構造とすることが作業の性質上著しく困難である場合において、ドラフトチェンバー内部に当該設備を設けるときは、この限りでない。
      - title: 二
        content: 石綿等を製造する設備を設置する場所の床は、水洗によって容易に掃除できる構造のものとすること。
      - title: 三
        content: 石綿等を製造し、又は使用する者は、当該石綿等による健康障害の予防について、必要な知識を有する者であること。
      - title: 四
        content: 石綿等を入れる容器については、当該石綿等の粉じんが発散するおそれがないように堅固なものとし、かつ、当該容器の見やすい箇所に、当該石綿等が入っている旨を表示すること。
      - title: 五
        content: 石綿等の保管については、一定の場所を定め、かつ、その旨を見やすい箇所に表示すること。
      - title: 六
        content: 石綿等を製造し、又は使用する者は、保護前掛及び保護手袋を使用すること。
      - title: 七
        content: 石綿等を製造する設備を設置する場所には、当該石綿等の製造作業中関係者以外の者が立ち入ることを禁止し、かつ、その旨を見やすい箇所に表示すること。
  - caption: （製造の許可）
    title: 第四十八条の二
    article_num: '48_2'
    paragraphs:
    - content: 法第五十六条第一項の許可は、石綿分析用試料等を製造するプラントごとに行うものとする。
  - caption: （許可手続）
    title: 第四十八条の三
    article_num: '48_3'
    paragraphs:
    - content: 法第五十六条第一項の許可を受けようとする者は、様式第五号の二による申請書を、当該許可に係る石綿分析用試料等を製造する場所を管轄する労働基準監督署長を経由して厚生労働大臣に提出しなければならない。
    - paragraph_num: ２
      content: 厚生労働大臣は、法第五十六条第一項の許可をしたときは、申請者に対し、様式第五号の三による許可証（以下この条において「許可証」という。）を交付するものとする。
    - paragraph_num: ３
      content: 許可証の交付を受けた者は、これを滅失し、又は損傷したときは、様式第五号の四による申請書を第一項の労働基準監督署長を経由して厚生労働大臣に提出し、許可証の再交付を受けなければならない。
    - paragraph_num: ４
      content: 許可証の交付を受けた者は、氏名（法人にあっては、その名称）を変更したときは、様式第五号の四による申請書を第一項の労働基準監督署長を経由して厚生労働大臣に提出し、許可証の書替えを受けなければならない。
  - caption: （製造許可の基準）
    title: 第四十八条の四
    article_num: '48_4'
    paragraphs:
    - content: 第四十八条の規定は、石綿分析用試料等の製造に関する法第五十六条第二項の厚生労働大臣の定める基準について準用する。 この場合において、第四十八条第三号及び第六号中「製造し、又は使用する」とあるのは、「製造する」と読み替えるものとする。
- title: 第八章の二　石綿作業主任者技能講習
  chapter_num: 8
  articles:
  - title: 第四十八条の五
    article_num: '48_5'
    paragraphs:
    - content: 石綿作業主任者技能講習は、学科講習によって行う。
    - paragraph_num: ２
      content: 学科講習は、石綿に係る次の科目について行う。
      items:
      - title: 一
        content: 健康障害及びその予防措置に関する知識
      - title: 二
        content: 作業環境の改善方法に関する知識
      - title: 三
        content: 保護具に関する知識
      - title: 四
        content: 関係法令
    - paragraph_num: ３
      content: 安衛則第八十条から第八十二条の二まで及び前二項に定めるもののほか、石綿作業主任者技能講習の実施について必要な事項は、厚生労働大臣が定める。
- title: 第九章　報告
  chapter_num: 9
  articles:
  - caption: （石綿関係記録等の報告）
    title: 第四十九条
    article_num: '49'
    paragraphs:
    - content: 石綿等を取り扱い、若しくは試験研究のため製造する事業者又は石綿分析用試料等を製造する事業者は、事業を廃止しようとするときは、石綿関係記録等報告書（様式第六号）に次の記録及び石綿健康診断個人票又はこれらの写しを添えて、所轄労働基準監督署長に提出するものとする。
      items:
      - title: 一
        content: 第三十五条の作業の記録
      - title: 二
        content: 第三十六条第二項の測定の記録
      - title: 三
        content: 第四十一条の石綿健康診断個人票
  - caption: （石綿を含有する製品に係る報告）
    title: 第五十条
    article_num: '50'
    paragraphs:
    - content: 製品を製造し、又は輸入した事業者（当該製品を販売の用に供し、又は営業上使用する場合に限る。）は、当該製品（令第十六条第一項第四号及び第九号に掲げるものに限り、法第五十五条ただし書の要件に該当するものを除く。）が石綿をその重量の〇・一パーセントを超えて含有していることを知った場合には、遅滞なく、次に掲げる事項（当該製品について譲渡又は提供をしていない場合にあっては、第四号に掲げる事項を除く。）について、所轄労働基準監督署長に報告しなければならない。
      items:
      - title: 一
        content: 製品の名称及び型式
      - title: 二
        content: 製造した者の氏名又は名称
      - title: 三
        content: 製造し、又は輸入した製品の数量
      - title: 四
        content: 譲渡し、又は提供した製品の数量及び譲渡先又は提供先
      - title: 五
        content: 製品の使用に伴う健康障害の発生及び拡大を防止するために行う措置
