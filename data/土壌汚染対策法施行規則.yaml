- caption: （運搬に関する基準）
  title: 第六十五条
  article_num: '65'
  paragraphs:
  - content: 法第十七条第一項の規定による汚染土壌の運搬の基準は、次のとおりとする。
    items:
    - title: 一
      content: 運搬は、次のように行うこと。
      subitems:
      - level: 1
        title: イ
        content: 特定有害物質又は特定有害物質を含む固体若しくは液体の飛散等及び地下への浸透を防止するために必要な措置を講ずること。
      - level: 1
        title: ロ
        content: 運搬に伴う悪臭、騒音又は振動によって生活環境の保全上支障が生じないように必要な措置を講ずること。
    - title: 二
      content: 特定有害物質又は特定有害物質を含む固体若しくは液体が飛散等をし、若しくは地下へ浸透し、又は悪臭が発散したときは、当該運搬を中止し、直ちに、自動車等又は保管施設の点検を行うとともに、当該特定有害物質を含む固体の回収その他の環境の保全に必要な措置を講ずること。
    - title: 三
      content: 自動車等及び運搬容器は、特定有害物質又は特定有害物質を含む固体若しくは液体の飛散等及び地下への浸透並びに悪臭の発散のおそれのないものであること。
    - title: 四
      content: 運搬の用に供する自動車等の両側面に汚染土壌を運搬している旨を日本産業規格Ｚ八三〇五に規定する百四十ポイント以上の大きさの文字を用いて表示し、かつ、当該運搬を行う自動車等に当該汚染土壌に係る管理票（汚染土壌処理業に関する省令第五条第二十三号及び第十三条第一項第一号に規定する場合にあっては、第五条第二十三号の管理票をいう。以下この条において同じ。）を備え付けること。
    - title: 五
      content: 混載等については、次によること。
      subitems:
      - level: 1
        title: イ
        content: 運搬の過程において、汚染土壌とその他の物を混合してはならないこと。
      - level: 1
        title: ロ
        content: 運搬の過程において、汚染土壌から岩、コンクリートくずその他の物を分別してはならないこと。
      - level: 1
        title: ハ
        content: 異なる要措置区域等から搬出された汚染土壌が混合するおそれのないように、搬出された要措置区域等ごとに区分して運搬すること。 ただし、当該汚染土壌を一の汚染土壌処理施設において処理する場合（当該汚染土壌を法第二十二条第二項の申請書に記載した汚染土壌処理施設において処理する汚染土壌の特定有害物質による汚染状態及び処理の方法に照らして処理することが可能である場合に限る。）は、この限りでないこと。
    - title: 六
      content: 汚染土壌の積替えを行う場合には、次によること。
      subitems:
      - level: 1
        title: イ
        content: 積替えは、周囲に囲いが設けられ、かつ、汚染土壌の積替えの場所であることの表示がなされている場所で行うこと。
      - level: 1
        title: ロ
        content: 積替えの場所から特定有害物質又は特定有害物質を含む固体若しくは液体の飛散等及び地下への浸透並びに悪臭の発散を防止するために必要な措置を講ずること。
    - title: 七
      content: 汚染土壌の保管は、汚染土壌の積替えを行う場合を除き、行ってはならないこと。
    - title: 八
      content: 汚染土壌の積替えのために、これを一時的に保管する場合には、次によること。
      subitems:
      - level: 1
        title: イ
        content: 保管は、次に掲げる要件を満たす場所で行うこと。
        subitems:
        - level: 2
          title: （１）
          content: 特定有害物質又は特定有害物質を含む固体若しくは液体の飛散等及び地下への浸透並びに悪臭の発散を防止するために、周囲に囲い（保管する汚染土壌の荷重が当該囲いにかかる構造である場合にあっては、当該荷重に対して構造耐力上安全であるものに限る。）が設けられていること。
        - level: 2
          title: （２）
          content: 見やすい箇所に、次の掲示板が設けられていること。
          subitems:
          - level: 3
            title: （イ）
            content: 大きさが縦及び横それぞれ六十センチメートル以上であること。
          - level: 3
            title: （ロ）
            content: 保管施設である旨並びに当該保管施設の管理者の氏名又は名称及び連絡先が表示されていること。
      - level: 1
        title: ロ
        content: 当該保管施設からの特定有害物質又は特定有害物質を含む固体の飛散等及び地下への浸透並びに悪臭の発散を防止するために次に掲げる措置を講ずること。
        subitems:
        - level: 2
          title: （１）
          content: 保管施設の壁面及び床面は、特定有害物質又は特定有害物質を含む固体若しくは液体の飛散等及び地下への浸透並びに悪臭の発散を防止するための構造を有していること。
        - level: 2
          title: （２）
          content: 汚染土壌の保管に伴い汚水が生ずるおそれがある場合にあっては、当該汚水による公共用水域の汚染を防止するために必要な排水溝その他の設備を設けること。
        - level: 2
          title: （３）
          content: 屋内において汚染土壌を保管し、かつ、排気を行う場合にあっては、当該排出される気体による人の健康に係る被害を防止するために必要な設備を設けること。
    - title: 九
      content: 第六号及び前号の場合であって、汚染土壌の荷卸しその他の移動を行う場合には、当該汚染土壌の飛散を防止するため、次のいずれかによること。
      subitems:
      - level: 1
        title: イ
        content: 粉じんが飛散しにくい構造の設備内において当該移動を行うこと。
      - level: 1
        title: ロ
        content: 当該移動を行う場所において、散水装置による散水を行うこと。
      - level: 1
        title: ハ
        content: 当該移動させる汚染土壌を防じんカバーで覆うこと。
      - level: 1
        title: ニ
        content: 当該移動させる汚染土壌に薬液を散布し、又は締固めを行うことによってその表層を固化すること。
      - level: 1
        title: ホ
        content: イからニまでの措置と同等以上の効果を有する措置を講ずること。
    - title: 十
      content: 汚染土壌の荷卸しは、法第十六条第一項、第二項又は第三項の規定により提出した届出書に記載された場所（汚染土壌を試験研究の用に供するために当該運搬を行う場合は、当該試験研究を行う施設であって、当該汚染土壌若しくは特定有害物質の拡散防止措置が講じられている施設又は汚染土壌処理施設）以外の場所で行ってはならないこと。
    - title: 十一
      content: 汚染土壌の引渡しは、法第十六条第一項、第二項又は第三項の規定により提出した届出書に記載された者（汚染土壌を試験研究の用に供するために当該運搬を行う場合は、当該試験研究を行う者又は汚染土壌処理業者）以外に行ってはならないこと。
    - title: 十二
      content: 汚染土壌の運搬は、要措置区域等外への搬出の日（汚染土壌処理業に関する省令第五条第二十二号ロ及び第十三条第一項第一号に規定する場合にあっては、同号の汚染土壌処理施設外への搬出の日）から三十日以内に終了すること。
    - title: 十三
      content: 管理票の交付又は回付を受けた者は、管理票に記載されている事項に誤りがないかどうかを確認し、当該管理票に運搬の用に供した自動車等の番号及び運搬を担当した者の氏名を記載しなければならないこと。
    - title: 十四
      content: 管理票の交付又は回付を受けた者は、汚染土壌を引き渡すときは、交付又は回付を受けた管理票に汚染土壌を引き渡した年月日を記載し、引渡しの相手方に対し当該管理票を回付しなければならない。
    - title: 十五
      content: 当該汚染土壌の運搬を他人に委託してはならないこと。
- caption: （自然由来等形質変更時要届出区域に係る処理の委託の例外に関する基準）
  title: 第六十五条の二
  article_num: '65_2'
  paragraphs:
  - content: 法第十八条第一項第二号イの環境省令で定める基準は、自然由来等形質変更時要届出区域の指定に係る特定有害物質の種類ごとに、次の表の上欄に掲げる汚染状態である場合において、搬出先の自然由来等形質変更時要届出区域内の土地が、それぞれ同表の下欄に掲げる汚染状態であるものとする。
    table:
      rows:
      - - 自然由来等形質変更時要届出区域内の土地の汚染状態
        - 搬出先の自然由来等形質変更時要届出区域内の土地の汚染状態
      - - 土壌溶出量基準に適合しないものであって、土壌含有量基準に適合するもの
        - 土壌溶出量基準に適合しないものであって、土壌含有量基準に適合するもの又は土壌溶出量基準及び土壌含有量基準に適合しないもの
      - - 土壌溶出量基準に適合するものであって、土壌含有量基準に適合しないもの
        - 土壌溶出量基準に適合するものであって、土壌含有量基準に適合しないもの又は土壌溶出量基準及び土壌含有量基準に適合しないもの
      - - 土壌溶出量基準及び土壌含有量基準に適合しないもの
        - 土壌溶出量基準及び土壌含有量基準に適合しないもの
- title: 第六十五条の三
  article_num: '65_3'
  paragraphs:
  - content: 法第十八条第一項第二号ロの環境省令で定める基準は、次のとおりとする。
    items:
    - title: 一
      content: 自然由来等形質変更時要届出区域内の土地の土壌の特定有害物質による汚染が専ら自然に由来する場合にあっては、当該自然由来等形質変更時要届出区域内の土地と搬出先の自然由来等形質変更時要届出区域内の土地の土壌の特定有害物質による汚染状態が地質的に同質な状態で広がっているものであること。
    - title: 二
      content: 自然由来等形質変更時要届出区域内の土地の土壌の特定有害物質による汚染が専ら当該土地の造成に係る水面埋立てに用いられた土砂に由来する場合にあっては、当該自然由来等形質変更時要届出区域の港湾（漁業の用に供する港湾を含む。以下この号において同じ。）内の公有水面の埋立てに係る埋立地と搬出先の自然由来等形質変更時要届出区域の港湾内の公有水面の埋立てに係る埋立地が同一の港湾であること。
- caption: （自然由来等形質変更時要届出区域に係る要件）
  title: 第六十五条の四
  article_num: '65_4'
  paragraphs:
  - content: 法第十八条第二項の環境省令で定める要件は、次のいずれかに該当するものとする。
    items:
    - title: 一
      content: 土地の土壌の特定有害物質による汚染状態が専ら自然に由来するものとして次の要件のいずれにも該当すると認められること。
      subitems:
      - level: 1
        title: イ
        content: 当該土地を含む形質変更時要届出区域の指定に係る特定有害物質の種類が第二種特定有害物質（令第一条第五号に掲げる特定有害物質の種類を除く。）であること。
      - level: 1
        title: ロ
        content: 当該土地の土壌の特定有害物質による汚染状態が地質的に同質な状態で広がっていること。
      - level: 1
        title: ハ
        content: 土地の土壌の特定有害物質による汚染状態が第二溶出量基準に適合するものであること。
      - level: 1
        title: ニ
        content: 当該土地の土壌の特定有害物質による汚染状態が土地の造成に係る水面埋立てに用いられた土砂若しくは人為等に由来するおそれがない土地であること、当該汚染状態が土地の造成に係る水面埋立てに用いられた土砂若しくは人為等に由来するおそれがある土地であって、第三条の二第一号に掲げる土地の区分に分類した土地であること又は土壌汚染状況調査その他第三条から第十五条までに定める方法に準じた方法により調査した結果、当該汚染状態が土地の造成に係る水面埋立てに用いられた土砂若しくは人為等に由来する土地でないと認められる土地であること。
    - title: 二
      content: 土地の土壌の特定有害物質による汚染状態が専ら土地の造成に係る水面埋立てに用いられた土砂に由来するものとして次の要件のいずれにも該当すると認められること。
      subitems:
      - level: 1
        title: イ
        content: 昭和五十二年三月十五日以降に公有水面埋立法による埋立て又は干拓の事業により造成が開始された土地（廃棄物が埋め立てられている場所を除く。）又は大正十一年四月十日から昭和五十二年三月十四日までに公有水面埋立法による埋立て又は干拓の事業により造成が開始された土地（当該土地の土壌の第一種特定有害物質、第三種特定有害物質及び令第一条第五号に掲げる特定有害物質による汚染状態が土壌溶出量基準及び土壌含有量基準に適合する土地（廃棄物が埋め立てられている場所を除く。）に限る。）であって、当該土地の土壌の特定有害物質による汚染状態が第二溶出量基準に適合するものであること。
      - level: 1
        title: ロ
        content: 土地の土壌の特定有害物質による汚染状態が人為等に由来するおそれがない土地であること、当該汚染状態が人為等に由来するおそれがある土地であって、第三条の二第一号に掲げる土地の区分に分類した土地であること又は土壌汚染状況調査その他第三条から第十五条までに定める方法に準じた方法により調査した結果、当該汚染状態が人為等に由来する土地でないと認められるものであること。
- caption: （管理票の交付）
  title: 第六十六条
  article_num: '66'
  paragraphs:
  - content: 法第二十条第一項の管理票の交付は、次により行うものとする。
    items:
    - title: 一
      content: 第六十一条第二項第三号又は第六十四条第二項第二号の規定により都道府県知事に提出した管理票の写しの原本を交付すること。
    - title: 二
      content: 運搬の用に供する自動車等ごとに交付すること。 ただし、一の自動車等で運搬する汚染土壌の運搬先が二以上である場合には、運搬先ごとに交付すること。
    - title: 三
      content: 交付した管理票の控えを、運搬受託者（処理受託者がある場合にあっては、当該処理受託者）から管理票の写しの送付があるまでの間保管すること。
- caption: （管理票の記載事項等）
  title: 第六十七条
  article_num: '67'
  paragraphs:
  - content: 法第二十条第一項の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 管理票の交付年月日及び交付番号
    - title: 二
      content: 氏名又は名称、住所及び連絡先並びに法人にあっては、その代表者の氏名
    - title: 三
      content: 当該要措置区域等の所在地
    - title: 四
      content: 法人にあっては、管理票の交付を担当した者の氏名
    - title: 五
      content: 運搬受託者の住所及び連絡先
    - title: 六
      content: 運搬の際、積替えを行う場合には、当該積替えを行う場所の名称及び所在地
    - title: 七
      content: 保管施設の所在地並びに所有者の氏名又は名称及び連絡先
    - title: 八
      content: 処理受託者の住所及び連絡先
    - title: 九
      content: 当該委託に係る汚染土壌の処理を行う汚染土壌処理施設の名称及び所在地
    - title: 十
      content: 当該委託に係る汚染土壌の荷姿
  - paragraph_num: ２
    content: 管理票の様式は、様式第二十九のとおりとする。
- caption: （運搬受託者の記載事項）
  title: 第六十八条
  article_num: '68'
  paragraphs:
  - content: 法第二十条第三項の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 運搬を担当した者の氏名
    - title: 二
      content: 運搬の用に供した自動車等の番号
    - title: 三
      content: 汚染土壌を引き渡した年月日
    - title: 四
      content: 運搬を行った区間
    - title: 五
      content: 当該委託に係る汚染土壌の重量
- caption: （運搬受託者の管理票交付者への送付期限）
  title: 第六十九条
  article_num: '69'
  paragraphs:
  - content: 法第二十条第三項の環境省令で定める期間は、運搬を終了した日から十日とする。
- caption: （処理受託者の記載事項）
  title: 第七十条
  article_num: '70'
  paragraphs:
  - content: 法第二十条第四項の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 当該委託に係る汚染土壌の引渡しを受けた者の氏名
    - title: 二
      content: 処理を担当した者の氏名
    - title: 三
      content: 処理を終了した年月日
    - title: 四
      content: 処理の方法
- caption: （処理受託者の管理票交付者への送付期限）
  title: 第七十一条
  article_num: '71'
  paragraphs:
  - content: 法第二十条第四項の環境省令で定める期間は、処理を終了した日から十日とする。
- caption: （管理票交付者の管理票の写しの保存期間）
  title: 第七十二条
  article_num: '72'
  paragraphs:
  - content: 法第二十条第五項の環境省令で定める期間は、五年とする。
- caption: （管理票の写しの送付を受けるまでの期間）
  title: 第七十三条
  article_num: '73'
  paragraphs:
  - content: 法第二十条第六項の環境省令で定める期間は、次の各号に掲げる区分に応じ、それぞれ当該各号に定める期間とする。
    items:
    - title: 一
      content: 法第二十条第三項の規定による管理票の写しの送付 管理票の交付の日から四十日
    - title: 二
