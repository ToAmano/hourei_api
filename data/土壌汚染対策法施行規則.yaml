articles:
- caption: （使用が廃止された有害物質使用特定施設に係る工場又は事業場の敷地であった土地の調査）
  title: 第一条
  article_num: '1'
  paragraphs:
  - content: 土壌汚染対策法（平成十四年法律第五十三号。以下「法」という。）第三条第一項本文の報告は、次の各号に掲げる場合の区分に応じ、当該各号に定める日から起算して百二十日以内に行わなければならない。
      ただし、当該期間内に当該報告を行うことができない特別の事情があると認められるときは、都道府県知事（土壌汚染対策法施行令（平成十四年政令第三百三十六号。以下「令」という。）第十条に規定する市にあっては、市長。以下同じ。）は、当該土地の所有者等（法第三条第一項本文に規定する所有者等をいう。以下同じ。）の申請により、その期限を延長することができる。
    items:
    - title: 一
      content: 当該土地の所有者等が当該有害物質使用特定施設（法第三条第一項に規定する有害物質使用特定施設をいう。以下同じ。）を設置していた者である場合（同項ただし書の確認を受けた場合を除く。）
        当該有害物質使用特定施設の使用が廃止された日
    - title: 二
      content: 当該土地の所有者等が法第三条第三項の通知を受けた者である場合（法第三条第一項ただし書の確認を受けた場合を除く。） 当該通知を受けた日
    - title: 三
      content: 法第三条第一項ただし書の確認が取り消された場合 第二十一条の通知を受けた日
  - paragraph_num: ２
    content: 法第三条第一項本文の報告は、次に掲げる事項を記載した様式第一による報告書を提出して行うものとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 工場又は事業場の名称及び当該工場又は事業場の敷地であった土地の所在地
    - title: 三
      content: 使用が廃止された有害物質使用特定施設の種類、設置場所及び廃止年月日並びに当該有害物質使用特定施設において製造され、使用され、又は処理されていた特定有害物質（法第二条第一項に規定する特定有害物質をいう。以下同じ。）の種類その他の土壌汚染状況調査（同条第二項に規定する土壌汚染状況調査をいう。以下同じ。）の対象となる土地（以下「土壌汚染状況調査の対象地」という。）において土壌の汚染状態が第三十一条第一項の基準（以下「土壌溶出量基準」という。）又は同条第二項の基準（以下「土壌含有量基準」という。）に適合していないおそれがある特定有害物質の種類
    - title: 四
      content: 土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果、当該分析を行った計量法（平成四年法律第五十一号）第百七条の登録を受けた者の氏名又は名称その他の土壌汚染状況調査の結果に関する事項
    - title: 五
      content: 土壌汚染状況調査を行った指定調査機関の氏名又は名称
    - title: 六
      content: 土壌汚染状況調査に従事した者を監督した技術管理者（法第三十三条の技術管理者をいう。以下同じ。）の氏名及び技術管理者証（土壌汚染対策法に基づく指定調査機関及び指定支援法人に関する省令（平成十四年環境省令第二十三号）第一条第二項第三号の技術管理者証をいう。以下同じ。）の交付番号
  - paragraph_num: ３
    content: 前項の報告書には、土壌汚染状況調査の対象地の土壌の特定有害物質による汚染状態を明らかにした図面を添付しなければならない。
- caption: （土壌汚染状況調査の方法）
  title: 第二条
  article_num: '2'
  paragraphs:
  - content: 法第三条第一項の環境省令で定める方法は、次条から第十五条までに定めるとおりとする。
- caption: （土壌汚染状況調査の対象地の土壌汚染のおそれの把握）
  title: 第三条
  article_num: '3'
  paragraphs:
  - content: 土壌汚染状況調査を行う者（以下「調査実施者」という。）は、土壌汚染状況調査の対象地及びその周辺の土地について、その利用の状況、特定有害物質の製造、使用又は処理の状況、土壌又は地下水の特定有害物質による汚染の概況その他の土壌汚染状況調査の対象地における土壌の特定有害物質による汚染のおそれを推定するために有効な情報を把握するものとする。
  - paragraph_num: ２
    content: 調査実施者は、前項の規定により把握した情報により、土壌汚染状況調査の対象地において土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがあると認められる特定有害物質の種類（特定有害物質の種類が別表第一の上欄に掲げるものである場合にあっては、当該特定有害物質の種類の区分に応じ、それぞれ同表の下欄に掲げる特定有害物質の種類を含めるものとする。）について、土壌その他の試料の採取及び測定（以下「試料採取等」という。）の対象とするものとする。
      ただし、次の各号のいずれかに該当する場合には、当該各号に定める特定有害物質の種類以外の特定有害物質の種類について、試料採取等の対象としないことができる。
    items:
    - title: 一
      content: 次項の規定により都道府県知事から通知を受けた場合 当該通知に係る特定有害物質の種類
    - title: 二
      content: 法第四条第三項又は法第五条第一項の命令に基づき土壌汚染状況調査を行う場合 当該命令に係る第二十七条又は令第四条第一項の書面に記載された特定有害物質の種類
    - title: 三
      content: 申請に係る調査（法第十四条第二項に規定する申請に係る調査をいう。以下同じ。）を行う場合 同条第一項の申請をしようとする土地の所有者等が申請に係る調査の対象とした特定有害物質の種類
  - paragraph_num: ３
    content: 都道府県知事は、調査実施者が法第三条第一項又は第八項に基づき土壌汚染状況調査を行う場合において、土壌汚染状況調査の対象地において土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類があると認めるときは、当該調査実施者の申請に基づき、当該申請を受けた日から起算して三十日以内に、当該特定有害物質の種類を当該調査実施者に通知するものとする。
  - paragraph_num: ４
    content: 前項の申請は、様式第二による申請書を提出して行うものとする。
  - paragraph_num: ５
    content: 調査実施者は、第三項の申請をしようとする場合において、土壌汚染状況調査の対象地における土壌の特定有害物質による汚染のおそれを推定するために有効な情報を有しているときは、前項の申請書に当該情報を記載した書類を添付しなければならない。
  - paragraph_num: ６
    content: 調査実施者は、土壌汚染状況調査の対象地において、第二項の規定により試料採取等の対象とされた特定有害物質の種類（以下「試料採取等対象物質」という。）ごとに、次の各号に掲げる場合の区分に応じ、当該各号に定める方法により、試料採取等を行う区画の選定及び試料採取等（以下「試料採取等を行う区画の選定等」という。）を行うものとする。
    items:
    - title: 一
      content: 土壌汚染状況調査の対象地における試料採取等対象物質が第四条第三項第二号ロに規定する第二種特定有害物質（令第一条第五号に掲げる特定有害物質の種類を除く。）である場合であり、かつ、第一項の規定により把握した情報により、土壌汚染状況調査の対象地の土壌の当該試料採取等対象物質による汚染状態が自然に由来するおそれがあると認められる場合（土壌汚染状況調査の対象地に第十条の二第二項に規定する自然由来盛土等に使用した土壌があると認められる場合を含む。）
        第十条の二に定める方法
    - title: 二
      content: 第一項の規定により把握した情報により、土壌汚染状況調査の対象地が公有水面埋立法（大正十年法律第五十七号）による公有水面の埋立て又は干拓の事業により造成された土地であり、かつ、土壌汚染状況調査の対象地の土壌の試料採取等対象物質による汚染状態が当該造成時の水面埋立てに用いられた土砂に由来するおそれがあると認められる場合
        第十条の三に定める方法
    - title: 三
      content: 土壌汚染状況調査の対象地の土壌の試料採取等対象物質による汚染状態が自然又は前号の土砂以外（以下「人為等」という。）に由来するおそれがあると認められる場合
        次条から第十条までに定める方法
- caption: （第三条第六項第三号に掲げる場合の調査対象地の土壌汚染のおそれの分類）
  title: 第三条の二
  article_num: '3_2'
  paragraphs:
  - content: 調査実施者は、前条第一項の規定により把握した情報により、土壌汚染状況調査の対象地のうち前条第六項第三号に係る土地（以下次条、第六条、第八条、第十条、第十三条及び第十四条において「調査対象地」という。）を試料採取等対象物質ごとに次に掲げる土地の区分に分類するものとする。
    items:
    - title: 一
      content: 当該土地が有害物質使用特定施設に係る工場若しくは事業場において事業の用に供されていない旨の情報、水質汚濁防止法（昭和四十五年法律第百三十八号）第十二条の四の環境省令で定める基準に適合する有害物質使用特定施設（水質汚濁防止法の一部を改正する法律（平成二十三年法律第七十一号）の施行の際現に設置されているもの（設置の工事がされているものを含む。）を除く。）において水質汚濁防止法第十四条第五項の規定による点検が適切に行われることにより、試料採取等対象物質を含む水が地下へ浸透したおそれがないことが確認されている旨の情報その他の情報により、土壌溶出量基準又は土壌含有量基準に適合しない汚染状態にある土壌（以下「基準不適合土壌」という。）が存在するおそれがないと認められる土地
    - title: 二
      content: 当該土地が有害物質使用特定施設に係る工場又は事業場において試料採取等対象物質の製造、使用又は処理に係る事業の用に供されていない旨の情報その他の情報により、基準不適合土壌が存在するおそれが少ないと認められる土地
    - title: 三
      content: 前二号に掲げる土地以外の土地
- caption: （第三条第六項第三号に掲げる場合の試料採取等を行う区画の選定）
  title: 第四条
  article_num: '4'
  paragraphs:
  - content: 調査実施者は、土壌汚染状況調査の対象地の最も北にある地点（当該地点が複数ある場合にあっては、そのうち最も東にある地点。以下「起点」という。）を通り東西方向及び南北方向に引いた線並びにこれらと平行して十メートル間隔で引いた線により土壌汚染状況調査の対象地を区画するものとする。
      ただし、区画される部分の数が、これらの線を起点を支点として回転させることにより減少する場合にあっては、調査実施者は、これらの線を区画される部分の数が最も少なく、かつ、起点を支点として右に回転させた角度が最も小さくなるように回転させて得られる線により、土壌汚染状況調査の対象地を区画することができる。
  - paragraph_num: ２
    content: 前項の場合において、調査実施者は、区画された土壌汚染状況調査の対象地（以下「単位区画」という。）であって隣接するものの面積の合計が百三十平方メートルを超えないときは、これらの隣接する単位区画を一の単位区画とすることができる。
      ただし、当該一の単位区画を土壌汚染状況調査の対象地を区画する線に垂直に投影したときの長さは、二十メートルを超えてはならない。
  - paragraph_num: ３
    content: 調査実施者は、次に掲げる単位区画について、試料採取等の対象とする。
    items:
    - title: 一
      content: 前条第三号に掲げる土地を含む単位区画
    - title: 二
      content: 前条第二号に掲げる土地を含む単位区画（前号に掲げる単位区画を除く。以下「一部対象区画」という。）がある場合において、次のイ又はロに掲げる場合の区分に応じ、当該イ又はロに定める単位区画
      subitems:
      - level: 1
        title: イ
        content: 試料採取等対象物質が令第一条第三号、第七号から第十二号まで、第十五号、第十七号から第十九号まで又は第二十三号に掲げる特定有害物質の種類（以下「第一種特定有害物質」という。）である場合
          次の（１）又は（２）に掲げる場合の区分に応じ、当該（１）又は（２）に定める単位区画
        subitems:
        - level: 2
          title: （１）
          content: 第一項の規定により土壌汚染状況調査の対象地を区画する線であって起点を通るもの及びこれらと平行して三十メートル間隔で引いた線により分割されたそれぞれの部分（以下「三十メートル格子」という。）に一部対象区画が含まれ、かつ、当該三十メートル格子の中心が調査対象地の区域内にある場合
            当該三十メートル格子の中心を含む単位区画
        - level: 2
          title: （２）
          content: 三十メートル格子に一部対象区画が含まれ、かつ、当該三十メートル格子の中心が調査対象地の区域内にない場合 当該三十メートル格子内にある一部対象区画のうちいずれか一区画
      - level: 1
        title: ロ
        content: 試料採取等対象物質が令第一条第一号、第二号、第五号、第十三号、第十四号、第二十号から第二十二号まで若しくは第二十四号に掲げる特定有害物質の種類（以下「第二種特定有害物質」という。）又は第一種特定有害物質及び第二種特定有害物質以外の特定有害物質の種類（以下「第三種特定有害物質」という。）である場合
          次の（１）又は（２）に掲げる場合の区分に応じ、当該（１）又は（２）に定める単位区画
        subitems:
        - level: 2
          title: （１）
          content: 三十メートル格子内にある一部対象区画の数が六以上である場合 当該三十メートル格子内にある一部対象区画のうちいずれか五区画
        - level: 2
          title: （２）
          content: 三十メートル格子内にある一部対象区画の数が五以下である場合 当該三十メートル格子内にある全ての一部対象区画
  - paragraph_num: ４
    content: 前項の規定にかかわらず、法第三条第八項若しくは第四条第三項の命令又は同条第二項に基づき土壌汚染状況調査を行う場合であり、かつ、単位区画において行われる土地の形質の変更（法第三条第七項に規定する土地の形質の変更をいう。以下同じ。）に係る部分のうち最も深い位置の深さ（以下「最大形質変更深さ」という。）より一メートルを超える深さにのみ汚染のおそれが生じた場所の位置がある場合には、当該単位区画（第六条第一項第一号に基づき土壌ガス調査を行う場合であり、かつ、三十メートル格子内の一部対象区画のうち少なくとも一の一部対象区画において地表から最大形質変更深さより一メートル以内の深さに汚染のおそれが生じた場所の位置があるときには、当該三十メートル格子の中心を含む単位区画を除く。）について試料採取等の対象としないことができる。
- caption: （第三条第六項第三号に掲げる場合の土壌汚染状況調査の対象地が複数ある場合等の区画の特例）
  title: 第五条
  article_num: '5'
  paragraphs:
  - content: 調査実施者は、土壌汚染状況調査を行う場合において、当該土壌汚染状況調査に係る土地の区域内に当該土壌汚染状況調査の対象地が複数あるときは、前条第一項本文の規定にかかわらず、当該複数ある土壌汚染状況調査の対象地の起点のうち最も北にあるもの（当該最も北にある起点が複数ある場合にあっては、そのうち最も東にあるもの）を通り東西方向及び南北方向に引いた線並びにこれらと平行して十メートル間隔で引いた線により当該複数ある土壌汚染状況調査の対象地を区画することができる。
  - paragraph_num: ２
    content: 調査実施者は、土壌汚染状況調査を行う場合において、当該土壌汚染状況調査に係る土地の区域内において、過去に行った土壌汚染状況調査があるときは、前条第一項本文の規定にかかわらず、当該過去に行った土壌汚染状況調査の起点を通り東西方向及び南北方向に引いた線並びにこれらと平行して十メートル間隔で引いた線により土壌汚染状況調査の対象地を区画することができる。
- caption: （第三条第六項第三号に掲げる場合の試料採取等の実施）
  title: 第六条
  article_num: '6'
  paragraphs:
  - content: 調査実施者は、第四条第三項の規定により試料採取等の対象とされた単位区画（以下「試料採取等区画」という。）の土壌について、次の各号に掲げる試料採取等対象物質に応じ、当該各号に定める試料採取等を行うものとする。
    items:
    - title: 一
      content: 第一種特定有害物質 土壌中の気体の採取及び当該気体に含まれる特定有害物質の種類ごとの量の測定（以下「土壌ガス調査」という。）
    - title: 二
      content: 第二種特定有害物質 土壌の採取及び当該土壌に水を加えた場合に溶出する特定有害物質の種類ごとの量の測定（以下「土壌溶出量調査」という。）並びに土壌の採取及び当該土壌に含まれる特定有害物質の種類ごとの量の測定（以下「土壌含有量調査」という。）
    - title: 三
      content: 第三種特定有害物質 土壌溶出量調査
  - paragraph_num: ２
    content: 土壌ガス調査の方法は、次に掲げるとおりとする。
    items:
    - title: 一
      content: 試料採取等区画の中心（第三条第一項の規定により調査実施者が把握した情報により、当該試料採取等区画において基準不適合土壌が存在するおそれが多いと認められる部分がある場合にあっては、当該部分における任意の地点。以下「試料採取地点」という。）において、土壌中の気体（当該試料採取地点における土壌中の気体の採取が困難であると認められる場合にあっては、地下水）を、環境大臣が定める方法により採取すること。
    - title: 二
      content: 前号の規定により採取した気体又は地下水に含まれる試料採取等対象物質の量を、環境大臣が定める方法により測定すること。
  - paragraph_num: ３
    content: 土壌溶出量調査の方法は、次に掲げるとおりとする。
    items:
    - title: 一
      content: 試料採取地点の汚染のおそれが生じた場所の位置が明らかである場合（汚染のおそれが生じた場所の位置が地表と同一の位置にある場合を除く。）には、当該汚染のおそれが生じた場所の位置から深さ五十センチメートルまでの土壌（地表から深さ十メートルまでにある土壌に限る。）又は汚染のおそれが生じた場所の位置が地表と同一の位置にある場合若しくは汚染のおそれが生じた場所の位置が明らかでない場合には、地表から深さ五センチメートルまでの土壌（以下「表層の土壌」という。）及び深さ五センチメートルから五十センチメートルまでの土壌を採取すること。
        ただし、法第三条第八項若しくは第四条第三項の命令に基づき土壌汚染状況調査を行う場合又は同条第二項に基づき土壌汚染状況調査を行う場合であり、かつ、当該土壌が最大形質変更深さより一メートルを超える深さの位置にあるときは、当該土壌の採取を行わないことができること。
    - title: 二
      content: 前号本文の規定により表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌を採取した場合にあっては、当該土壌を、同じ重量混合すること。
    - title: 三
      content: 第四条第三項第二号ロの規定により三十メートル格子内にある二以上の単位区画が試料採取等区画である場合にあっては、当該二以上の単位区画に係る第一号の規定により採取された土壌（前号に規定する場合には、同号の規定により混合された土壌）をそれぞれ同じ重量混合すること。
    - title: 四
      content: 前三号の規定により採取され、又は混合された土壌に水を加えた検液に溶出する試料採取等対象物質の量を、環境大臣が定める方法により測定すること。
  - paragraph_num: ４
    content: 土壌含有量調査の方法は、次に掲げるとおりとする。
    items:
    - title: 一
      content: 前項第一号から第三号までに定めるところにより、試料採取地点の土壌を採取し、及び混合すること。
    - title: 二
      content: 前号の規定により採取され、又は混合された土壌に含まれる試料採取等対象物質の量を、環境大臣が定める方法により測定すること。
  - paragraph_num: ５
    content: 試料採取地点の傾斜が著しいことその他の理由により、当該試料採取地点において土壌その他の試料を採取することが困難であると認められる場合には、調査実施者は、第二項第一号、第三項第一号及び前項第一号の規定にかかわらず、当該試料採取地点に係る単位区画における調査対象地に係る任意の地点において行う土壌その他の試料の採取をもって、これらの規定に規定する土壌その他の試料の採取に代えることができる。
- caption: （第三条第六項第三号に掲げる場合の三十メートル格子内の汚染範囲の確定のための試料採取等）
  title: 第七条
  article_num: '7'
  paragraphs:
  - content: 調査実施者は、第四条第三項第二号イの規定による試料採取等区画に係る土壌ガス調査において気体から試料採取等対象物質が検出されたとき、又は地下水から検出された試料採取等対象物質が別表第二の上欄に掲げる特定有害物質の種類の区分に応じ、それぞれ同表の下欄に掲げる基準（以下「地下水基準」という。）に適合しなかったときは、当該試料採取等区画を含む三十メートル格子内にある一部対象区画（試料採取等区画であるものを除く。）において、土壌ガス調査を行うものとする。
  - paragraph_num: ２
    content: 調査実施者は、第四条第三項第二号ロの規定による試料採取等区画に係る土壌溶出量調査又は土壌含有量調査において、当該土壌溶出量調査又は土壌含有量調査に係る土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合しなかったときは、当該試料採取等区画を含む三十メートル格子内にある一部対象区画において、土壌溶出量調査又は土壌含有量調査を行うものとする。
  - paragraph_num: ３
    content: 前条第五項の規定は、前二項の規定による土壌ガス調査、土壌溶出量調査及び土壌含有量調査に係る土壌その他の試料の採取について準用する。
- caption: （第三条第六項第三号に掲げる場合の土壌ガス調査により試料採取等対象物質が検出された場合等における土壌の採取及び測定）
  title: 第八条
  article_num: '8'
  paragraphs:
  - content: 調査実施者は、土壌ガス調査において気体から試料採取等対象物質が検出された試料採取地点があるとき、又は地下水から検出された試料採取等対象物質が地下水基準に適合しなかった試料採取地点があるときは、当該試料採取地点を含む単位区画が連続する範囲（以下この条、次条及び第十四条において「検出範囲」という。）ごとに、基準不適合土壌が存在するおそれが当該検出範囲内で連続する他の単位区画と比較して多いと認められる単位区画の試料採取地点（以下この条、次条及び第十四条において「代表地点」という。）において、次に掲げる特定有害物質の種類ごとに、試料採取等を行うものとする。
    items:
    - title: 一
      content: 当該代表地点において、気体から検出された試料採取等対象物質又は地下水から検出され、かつ、地下水基準に適合しなかった試料採取等対象物質
    - title: 二
      content: 前号に掲げる試料採取等対象物質が使用等特定有害物質（第三条第一項の規定により、調査対象地において特定有害物質の製造、使用若しくは処理その他の行為により当該調査対象地の土壌の汚染状態が土壌溶出量基準に適合していないと認められる特定有害物質の種類又は適合していないおそれがあると認められる特定有害物質の種類をいう。以下同じ。）であり、かつ、当該使用等特定有害物質が別表第一の上欄に掲げる特定有害物質の種類のいずれかに該当する場合にあっては、当該特定有害物質の種類の区分に応じ、それぞれ同表の下欄に掲げる特定有害物質の種類
    - title: 三
      content: 第一号に掲げる試料採取等対象物質が別表第一の下欄に掲げる特定有害物質の種類であり、かつ、当該特定有害物質に係る使用等特定有害物質が同表の上欄に掲げる特定有害物質の種類のいずれかに該当する場合にあっては、同表の当該該当する特定有害物質の種類の項の上欄及び下欄に掲げる特定有害物質の種類（第一号に掲げるものを除く。）
  - paragraph_num: ２
    content: 前項の試料採取等の方法は、次に掲げるとおりとする。
    items:
    - title: 一
      content: 当該地点において、次の土壌（イ及びロにあっては、地表から深さ十メートルまでにある土壌に限る。）の採取を行うこと。 ただし、法第三条第八項若しくは第四条第三項の命令又は同条第二項の規定により土壌汚染状況調査を行う場合であり、かつ、当該土壌が前項に規定する検出範囲における最大形質変更深さのうち最も深い位置の深さより一メートルを超える深さの位置にあるときは、当該土壌の採取を行わないことができること。
      subitems:
      - level: 1
        title: イ
        content: 汚染のおそれが生じた場所の位置の土壌（当該汚染のおそれが生じた場所の位置が地表と同一の位置にある場合又は当該汚染のおそれが生じた場所の位置が明らかでない場合にあっては、表層の土壌）
      - level: 1
        title: ロ
        content: 汚染のおそれが生じた場所の位置から深さ五十センチメートルの土壌（当該汚染のおそれが生じた場所の位置が地表と同一の位置にある場合又は当該汚染のおそれが生じた場所の位置が明らかでない場合にあっては、地表から深さ五十センチメートルの土壌）
      - level: 1
        title: ハ
        content: 深さ一メートルから十メートルまでの一メートルごとの土壌（地表から汚染のおそれが生じた場所の位置の深さまでの土壌及び汚染のおそれが生じた場所の位置より深い位置に帯水層の底面がある場合における当該底面より深い位置にある土壌を除く。）
      - level: 1
        title: ニ
        content: 帯水層の底面の土壌（地表から深さ十メートル以内に帯水層の底面がある場合に限る。）
    - title: 二
      content: 前号の規定により採取されたそれぞれの土壌に水を加えた検液に溶出する当該特定有害物質の量を、第六条第三項第四号の環境大臣が定める方法により測定すること。
- caption: （第三条第六項第三号に掲げる場合の試料採取等の結果の評価）
  title: 第九条
  article_num: '9'
  paragraphs:
  - content: 土壌ガス調査において気体から試料採取等対象物質が検出され、又は地下水から検出された試料採取等対象物質が地下水基準に適合しなかった場合であって、代表地点において前条第二項第二号の方法により測定した結果、土壌の特定有害物質による汚染状態が次の各号のいずれかに該当するときは、当該土壌ガス調査を行った検出範囲の区域について、それぞれ次の各号に定める基準に適合しない汚染状態にある土地とみなす。
    items:
    - title: 一
      content: 少なくとも一の代表地点において土壌溶出量基準に適合しなかったとき（次号に掲げるときを除く。） 土壌溶出量基準
    - title: 二
      content: 少なくとも一の代表地点において別表第三の上欄に掲げる特定有害物質の種類の区分に応じ、それぞれ同表の下欄に掲げる基準（以下「第二溶出量基準」という。）に適合しなかったとき
        第二溶出量基準
  - paragraph_num: ２
    content: 前項の規定にかかわらず、検出範囲内の地点において、前条第二項第二号の方法により測定した結果、土壌の特定有害物質による汚染状態が次の各号のいずれかに該当するときは、当該地点を含む単位区画において当該試料採取等を行うものとされた特定有害物質について当該各号に定める単位区画とみなす。
    items:
    - title: 一
      content: 土壌溶出量基準に適合しなかったとき（次号に掲げるときを除く。） 土壌溶出量基準に適合しない汚染状態にある単位区画
    - title: 二
      content: 第二溶出量基準に適合しなかったとき 第二溶出量基準に適合しない汚染状態にある単位区画
    - title: 三
      content: 土壌溶出量基準に適合したとき 土壌溶出量基準に適合した単位区画
  - paragraph_num: ３
    content: 土壌溶出量調査又は土壌含有量調査（第四条第三項第二号ロの規定による試料採取等区画に係るものを除く。）において当該土壌溶出量調査又は土壌含有量調査に係る土壌の特定有害物質による汚染状態が次の各号のいずれかに該当するときは、当該土壌溶出量調査又は土壌含有量調査を行った単位区画の区域を、当該試料採取等対象物質について当該各号に定める基準に適合しない汚染状態にある土地とみなす。
    items:
    - title: 一
      content: 土壌溶出量基準に適合しなかったとき（次号に掲げるときを除く。） 土壌溶出量基準
    - title: 二
      content: 第二溶出量基準に適合しなかったとき 第二溶出量基準
    - title: 三
      content: 土壌含有量基準に適合しなかったとき 土壌含有量基準
- caption: （第三条第六項第三号に掲げる場合の土壌汚染による健康被害が生ずるおそれがある土地における都道府県知事の命令に基づく土壌汚染状況調査に係る特例）
  title: 第十条
  article_num: '10'
  paragraphs:
  - content: 調査実施者は、法第五条第一項の命令（令第三条第一号イ又はロに該当する場合においてなされたものに限る。）に基づき土壌汚染状況調査を行う場合において、調査対象地に前条の規定により土壌溶出量基準又は第二溶出量基準に適合しない汚染状態にあるとみなされる土地がないときには、次に定めるところにより、試料採取等を行うものとする。
    items:
    - title: 一
      content: 令第三条第一号イに該当する場合
      subitems:
      - level: 1
        title: イ
        content: 調査対象地において基準不適合土壌（土壌溶出量基準に係るものに限る。この号ロ及び次号イにおいて同じ。）が存在することが明らかである部分における任意の地点において帯水層のうち地下水基準に適合しないおそれが多いと認められる地下水を含むものの当該地下水を採取し、当該地下水に含まれる試料採取等対象物質の量を、第六条第二項第二号の環境大臣が定める方法により測定すること。
      - level: 1
        title: ロ
        content: この号イの測定において当該地下水から検出された試料採取等対象物質が地下水基準に適合しないものであるときは、当該地点において次に掲げる場合の区分に応じ、それぞれ次に定める土壌の採取を行うこと。
        subitems:
        - level: 2
          title: （１）
          content: 試料採取等対象物質が第一種特定有害物質である場合 次に掲げる土壌
          subitems:
          - level: 3
            title: （イ）
            content: 汚染のおそれが生じた場所の位置の土壌（当該汚染のおそれが生じた場所の位置が地表と同一の位置にある場合又は当該汚染のおそれが生じた場所の位置が明らかでない場合にあっては、表層の土壌）
          - level: 3
            title: （ロ）
            content: 汚染のおそれが生じた場所の位置から深さ五十センチメートルの土壌（当該汚染のおそれが生じた場所の位置が地表と同一の位置にある場合又は当該汚染のおそれが生じた場所の位置が明らかでない場合にあっては、地表から深さ五十センチメートルの土壌）
          - level: 3
            title: （ハ）
            content: 深さ一メートルから地下水基準に適合しない地下水を含む帯水層の底面までの一メートルごとの土壌（地表から汚染のおそれが生じた場所の位置の深さまでの土壌を除く。）
          - level: 3
            title: （ニ）
            content: 地下水基準に適合しない地下水を含む帯水層の底面の土壌
        - level: 2
          title: （２）
          content: 試料採取等対象物質が第二種特定有害物質又は第三種特定有害物質である場合 次に掲げる土壌
          subitems:
          - level: 3
            title: （イ）
            content: 汚染のおそれが生じた場所の位置から深さ五十センチメートルまでの土壌（当該汚染のおそれが生じた場所の位置が地表と同一の位置にある場合又は当該汚染のおそれが生じた場所の位置が明らかでない場合にあっては、表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌）
          - level: 3
            title: （ロ）
            content: 深さ一メートルから地下水基準に適合しない地下水を含む帯水層の底面までの一メートルごとの土壌（地表から汚染のおそれが生じた場所の位置の深さまでの土壌を除く。）
          - level: 3
            title: （ハ）
            content: 地下水基準に適合しない地下水を含む帯水層の底面の土壌
      - level: 1
        title: ハ
        content: この号ロ（２）（イ）括弧書の規定により土壌を採取した場合にあっては、採取された表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌を、同じ重量混合すること。
      - level: 1
        title: ニ
        content: この号ロ及びハの規定により採取され、又は混合されたそれぞれの土壌に水を加えた検液に溶出する試料採取等対象物質の量を、第六条第三項第四号の環境大臣が定める方法により測定すること。
    - title: 二
      content: 令第三条第一号ロに該当する場合
      subitems:
      - level: 1
        title: イ
        content: 調査対象地において基準不適合土壌が存在するおそれが多いと認められる部分における任意の地点において帯水層のうち地下水基準に適合しないおそれが多いと認められる地下水を含むものの当該地下水を採取し、当該地下水に含まれる試料採取等対象物質の量を、第六条第二項第二号の環境大臣が定める方法により測定すること。
      - level: 1
        title: ロ
        content: この号イの測定において当該地下水から検出された試料採取等対象物質が地下水基準に適合しないものであるときは、当該地点において前号ロ及びハの規定により採取され、又は混合されたそれぞれの土壌に水を加えた検液に溶出する試料採取等対象物質の量を、第六条第三項第四号の環境大臣が定める方法により測定すること。
  - paragraph_num: ２
    content: 前項第一号ニ又は第二号ロの測定において当該測定に係る土壌の特定有害物質による汚染状態が前条第一項各号のいずれかに該当するときは、調査対象地の区域（次に掲げる単位区画の区域を除く。）を、当該試料採取等対象物質について当該各号に定める基準に適合しない汚染状態にある土地とみなす。
    items:
    - title: 一
      content: 単位区画の全ての区域が第三条の二第一号に掲げる土地に分類される場合における当該単位区画の区域
    - title: 二
      content: 単位区画の中心（第三条第一項の規定により調査実施者が把握した情報により、当該単位区画に基準不適合土壌が存在するおそれが多いと認められる部分がある場合にあっては、当該部分における任意の地点。次項において同じ。）において前項第一号ロ及びハの規定により採取され、又は混合されたそれぞれの土壌に水を加えた検液に溶出する試料採取等対象物質の量を第六条第三項第四号の環境大臣が定める方法により測定した結果、当該測定に係る土壌の特定有害物質による汚染状態が土壌溶出量基準に適合するものである場合における当該単位区画の区域
  - paragraph_num: ３
    content: 前項第二号の単位区画の中心の傾斜が著しいことその他の理由により、当該単位区画の中心において第一項第一号ロの土壌の採取を行うことが困難であると認められる場合には、前項第二号の規定にかかわらず、当該単位区画における任意の地点において行う第一項第一号ロの土壌の採取をもって、前項第二号に規定する土壌の採取に代えることができる。
- caption: （第三条第六項第一号に掲げる場合の土地における土壌汚染状況調査）
  title: 第十条の二
  article_num: '10_2'
  paragraphs:
  - content: 第三条第六項第一号に掲げる場合における試料採取等を行う区画の選定等の方法は、次の各号のとおりとする。
    items:
    - title: 一
      content: 第四条第一項及び第二項並びに第五条に定める方法により土壌汚染状況調査の対象地を区画すること。
    - title: 二
      content: 調査実施者は、土壌汚染状況調査の対象地のうち第三条第六項第一号に係る対象地（以下この条及び第十四条の二において「調査対象地」という。）の最も離れた二つの単位区画を含む三十メートル格子（調査対象地が一の三十メートル格子内にある場合にあっては、当該三十メートル格子）の中心を含む単位区画（当該三十メートル格子の中心が調査対象地の区域内にない場合にあっては、当該三十メートル格子内にある調査対象地に係る単位区画のうちいずれか一区画）について、試料採取等の対象とすること。
        ただし、第四条第一項の規定により調査対象地を区画する線であって起点を通るもの及びこれらと平行して九百メートル間隔で引いた線により分割されたそれぞれの部分（以下「九百メートル格子」という。）のうち一の九百メートル格子内に試料採取等の対象とされた当該二つの単位区画が含まれない場合にあっては、調査対象地を含む九百メートル格子ごとに、当該九百メートル格子の最も離れた二つの単位区画を含む三十メートル格子の中心を含む単位区画（当該三十メートル格子の中心が調査対象地の区域内にない場合にあっては、当該三十メートル格子内にある調査対象地に係る単位区画のうちいずれか一区画）について、試料採取等の対象とすること。
    - title: 三
      content: 前号の規定にかかわらず、法第三条第八項若しくは第四条第三項の命令又は同条第二項の規定により土壌汚染状況調査を行う場合であり、かつ、最大形質変更深さより一メートルを超える深さにのみ汚染のおそれがあると認められる地層の位置があるときには、当該単位区画について試料採取等の対象としないことができること。
    - title: 四
      content: 調査実施者は、前二号の規定により試料採取等の対象とされた単位区画の中心（当該単位区画の中心が調査対象地の区域内にない場合にあっては、当該単位区画における調査対象地内の任意の地点。以下この号及び第九項において同じ。）において、次のイ又はロに掲げる場合の区分に応じ、当該イ又はロに定める土壌の採取を行うこと。
        ただし、法第三条第八項若しくは第四条第三項の命令又は同条第二項の規定により土壌汚染状況調査を行う場合であり、かつ、当該土壌が第二号に規定する九百メートル格子内における最大形質変更深さのうち最も深い位置の深さより一メートルを超える深さの位置にあるときは、当該土壌の採取を行わないことができること。
      subitems:
      - level: 1
        title: イ
        content: 当該単位区画の中心において基準不適合土壌が存在するおそれがあると認められる地層の位置が明らかでない場合 次に掲げる土壌
        subitems:
        - level: 2
          title: （１）
          content: 表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌
        - level: 2
          title: （２）
          content: 深さ一メートルから十メートルまでの一メートルごとの土壌
      - level: 1
        title: ロ
        content: 当該単位区画の中心において基準不適合土壌が存在するおそれがあると認められる地層の位置が明らかである場合 この号イの土壌のうち当該地層内にある土壌（この号イの土壌が当該地層内にない場合にあっては、当該地層内の任意の位置の土壌）
    - title: 五
      content: 前号イ（１）の規定により土壌を採取した場合にあっては、採取された表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌を、同じ重量混合すること。
    - title: 六
      content: 前二号の規定により採取され、又は混合されたそれぞれの土壌に水を加えた検液に溶出する試料採取等対象物質の量にあっては第六条第三項第四号の環境大臣が定める方法により、当該土壌に含まれる試料採取等対象物質の量にあっては同条第四項第二号の環境大臣が定める方法により、それぞれ測定すること。
  - paragraph_num: ２
    content: 前項の規定にかかわらず、第三条第一項の規定により把握した情報により、調査対象地に盛土又は埋め戻し（次の各号に掲げる要件を満たした土壌により行われたものに限る。以下「自然由来盛土等」という。）に使用した土壌がある場合には、当該土壌について、次項に定めるところにより、試料採取等を行わなければならない。
    items:
    - title: 一
      content: 調査対象地と専ら地質的に同質な状態で広がっている自然由来の汚染のおそれがある土壌が地表から十メートルまでの深さより浅い位置に分布している土地の土壌であること。
    - title: 二
      content: 次のいずれかに該当する土壌であること。
      subitems:
      - level: 1
        title: イ
        content: 自然由来盛土等に係る調査対象地からの距離が九百メートル未満である土地から掘削した土壌であること。
      - level: 1
        title: ロ
        content: 当該土壌の掘削を行った土地が、次の表の上欄に掲げる汚染状態である場合において、調査対象地が、それぞれ同表の下欄に掲げる汚染状態であることが第三条から第十五条までに定める方法に準じた方法により調査した結果その他の情報により確認されていること。
        table:
          rows:
          - - 盛土又は埋め戻しに使用した土壌の掘削を行った土地の汚染状態
            - 調査対象地の汚染状態
          - - 土壌溶出量基準に適合しないものであって、土壌含有量基準に適合するもの
            - 土壌溶出量基準に適合しないものであって、土壌含有量基準に適合するもの又は土壌溶出量基準及び土壌含有量基準に適合しないもの
          - - 土壌溶出量基準に適合するものであって、土壌含有量基準に適合しないもの
            - 土壌溶出量基準に適合するものであって、土壌含有量基準に適合しないもの又は土壌溶出量基準及び土壌含有量基準に適合しないもの
          - - 土壌溶出量基準及び土壌含有量基準に適合しないもの
            - 土壌溶出量基準及び土壌含有量基準に適合しないもの
  - paragraph_num: ３
    content: 調査実施者は、自然由来盛土等に使用した土壌があるときは、次に定めるところにより、試料採取等を行う区画の選定等を行わなければならない。
    items:
    - title: 一
      content: 第四条第一項及び第二項並びに第五条に定める方法により土壌汚染状況調査の対象地を区画すること。
    - title: 二
      content: 調査実施者は、次のイ又はロに掲げる場合の区分に応じ、当該イ又はロに規定する単位区画について、試料採取等の対象とすること。 ただし、自然由来盛土等に使用した土壌が一の均一な汚染状態にある土地において掘削されたものであることその他の情報により、当該土壌の汚染状態が均一であるとみなすことができる場合は、調査実施者は自然由来盛土等に係る全ての三十メートル格子のうちいずれか一つの三十メートル格子内にある自然由来盛土等に係る単位区画について、次のイ又はロに掲げる区分に応じ、当該イ又はロに規定する単位区画について、試料採取等の対象とすることができること。
      subitems:
      - level: 1
        title: イ
        content: 三十メートル格子の中心が自然由来盛土等に係る調査対象地の区域内にある場合 当該三十メートル格子の中心を含む自然由来盛土等に係る単位区画
      - level: 1
        title: ロ
        content: 三十メートル格子の中心が自然由来盛土等に係る調査対象地の区域内にない場合 当該三十メートル格子内にある自然由来盛土等に係る単位区画のうちいずれか一区画
    - title: 三
      content: 前号の規定にかかわらず、法第三条第八項若しくは第四条第三項の命令又は同条第二項の規定により土壌汚染状況調査を行う場合であり、かつ、最大形質変更深さより一メートルを超える深さにのみ自然由来盛土等の土壌の位置があるときには、当該単位区画について試料採取等の対象としないことができること。
    - title: 四
      content: 調査実施者は、前二号の規定により試料採取等の対象とされた単位区画の中心（当該単位区画の中心が自然由来盛土等に係る調査対象地の区域内にない場合にあっては、当該単位区画における自然由来盛土等に係る調査対象地内の任意の地点。以下この号及び第九項において同じ。）において次のイ又はロに掲げる場合の区分に応じ、当該イ又はロに定める土壌の採取を行うこと。
      subitems:
      - level: 1
        title: イ
        content: 当該単位区画の中心において自然由来盛土等の土壌の位置が明らかでない場合
        subitems:
        - level: 2
          title: （１）
          content: 表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌
        - level: 2
          title: （２）
          content: 深さ一メートルから十メートルまでの一メートルごとの土壌
      - level: 1
        title: ロ
        content: 当該単位区画の中心において自然由来盛土等の土壌の位置が明らかである場合 この号イの土壌のうち当該自然由来盛土等の土壌（この号イの土壌が当該自然由来盛土等の土壌でない場合にあっては、当該自然由来盛土等の土壌の任意の位置の土壌）
    - title: 五
      content: 前号の規定にかかわらず、法第三条第八項若しくは第四条第三項の命令又は同条第二項の規定により土壌汚染状況調査を行う場合であり、かつ、当該土壌が第二号に規定する三十メートル格子内における最大形質変更深さのうち最も深い位置の深さより一メートルを超える深さの位置にあるときは、当該土壌の採取を行わないことができること。
        ただし、同号ただし書に基づき試料採取等の対象とした場合においては、当該土壌が自然由来盛土等の土壌の全ての最大形質変更深さのうち最も深い位置の深さより一メートルを超える深さの位置にあるときは、当該土壌の採取を行わないことができること。
    - title: 六
      content: 第四号イ（１）の規定により土壌を採取した場合にあっては、採取された表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌を、同じ重量混合すること。
    - title: 七
      content: 第四号及び前号の規定により採取され、又は混合されたそれぞれの土壌に水を加えた検液に溶出する試料採取等対象物質の量にあっては第六条第三項第四号の環境大臣が定める方法により、当該土壌に含まれる試料採取等対象物質の量にあっては同条第四項第二号の環境大臣が定める方法により、それぞれ測定すること。
  - paragraph_num: ４
    content: 調査対象地内に土壌の第二種特定有害物質（令第一条第五号に掲げる特定有害物質の種類を除く。）による汚染状態が土壌溶出量基準若しくは第二溶出量基準又は土壌含有量基準に適合しないことが明らかである土地を含む単位区画がある場合には、前三項の規定にかかわらず、当該単位区画に係る試料採取等の結果をもって、前三項の規定による試料採取等の結果の全部又は一部としなければならない。
  - paragraph_num: ５
    content: 第一項第六号の測定又は前項の試料採取等において当該測定又は試料採取等に係る土壌の特定有害物質による汚染状態が土壌溶出量基準若しくは第二溶出量基準又は土壌含有量基準に適合しないものであるときは、調査対象地（第一項第二号ただし書に規定する場合にあっては、九百メートル格子内の調査対象地。以下第七項及び第八項において同じ。）の区域を当該試料採取等対象物質について土壌溶出量基準若しくは第二溶出量基準又は土壌含有量基準に適合しない汚染状態にある土地とみなす。
  - paragraph_num: ６
    content: 第三項第七号の測定において当該測定に係る土壌の特定有害物質による汚染状態が土壌溶出量基準若しくは第二溶出量基準又は土壌含有量基準に適合しないものであるときは、次の各号に掲げる場合の区分に応じ、当該各号に定める単位区画について、当該試料採取等対象物質について土壌溶出量基準若しくは第二溶出量基準又は土壌含有量基準に適合しない汚染状態にある土地とみなす。
    items:
    - title: 一
      content: 自然由来盛土等に使用した土壌がある場合（次号に掲げる場合を除く。） 当該測定に係る単位区画を含む三十メートル格子内にある自然由来盛土等に係る全ての単位区画
    - title: 二
      content: 自然由来盛土等に係る全ての三十メートル格子のうちいずれか一つの三十メートル格子内にある単位区画について試料採取等の対象とした場合 自然由来盛土等に係る全ての三十メートル格子内にある自然由来盛土等に係る全ての単位区画
  - paragraph_num: ７
    content: 前二項の規定にかかわらず、第一項第六号若しくは第三項第七号の測定又は第四項の試料採取等において当該測定若しくは試料採取等に係るいずれかの単位区画（第一項第二号ただし書に規定する場合にあっては、九百メートル格子ごとのいずれかの単位区画。第十四条の二第一項第一号において同じ。）の土地の土壌の試料採取等対象物質による汚染状態が次の各号のいずれかに該当するときは、当該単位区画を含む三十メートル格子内にある調査対象地に係る全ての単位区画において当該試料採取等対象物質について当該各号に定める単位区画とみなすことができる。
    items:
    - title: 一
      content: 土壌溶出量基準及び土壌含有量基準に適合したとき 土壌溶出量基準及び土壌含有量基準に適合する汚染状態にある単位区画
    - title: 二
      content: 土壌溶出量基準に適合したとき、かつ、土壌含有量基準に適合しなかったとき 土壌溶出量基準に適合し、かつ、土壌含有量基準に適合しない汚染状態にある単位区画
    - title: 三
      content: 土壌溶出量基準に適合しなかったとき、かつ、土壌含有量基準に適合したとき（第五号に掲げるときを除く。） 土壌溶出量基準に適合しない、かつ、土壌含有量基準に適合する汚染状態にある単位区画
    - title: 四
      content: 土壌溶出量基準及び土壌含有量基準に適合しなかったとき 土壌溶出量基準及び土壌含有量基準に適合しない汚染状態にある単位区画
    - title: 五
      content: 第二溶出量基準に適合しなかったとき、かつ、土壌含有量基準に適合したとき 第二溶出量基準に適合しない、かつ、土壌含有量基準に適合する汚染状態にある単位区画
  - paragraph_num: ８
    content: 第五項の規定にかかわらず、三十メートル格子の中心を含む単位区画（当該三十メートル格子の中心が調査対象地の区域内にない場合にあっては、当該三十メートル格子内にある調査対象地に係る単位区画のうちいずれか一区画）の中心（当該単位区画の中心が調査対象地の区域内にない場合にあっては、当該単位区画における調査対象地内の任意の地点。以下この項及び次項において同じ。）において第一項第四号から第六号までの規定により第二種特定有害物質（令第一条第五号に掲げる特定有害物質の種類を除く。）に係る試料採取等を行った結果、測定に係る土壌の試料採取等対象物質による汚染状態が次の各号のいずれかに該当するときは、当該単位区画を含む三十メートル格子内にある調査対象地に係る全ての単位区画において当該試料採取等対象物質について当該各号に定める単位区画とみなすことができる。
      ただし、法第三条第八項若しくは第四条第三項の命令又は同条第二項の規定により土壌汚染状況調査を行う場合であり、かつ、当該土壌が第一項第二号に規定する九百メートル格子内における最大形質変更深さのうち最も深い位置の深さより一メートルを超える深さの位置にあるときは、当該土壌の採取を行わないことができる。
    items:
    - title: 一
      content: 土壌溶出量基準及び土壌含有量基準に適合したとき 土壌溶出量基準及び土壌含有量基準に適合する汚染状態にある単位区画
    - title: 二
      content: 土壌溶出量基準に適合したとき、かつ、土壌含有量基準に適合しなかったとき 土壌溶出量基準に適合し、かつ、土壌含有量基準に適合しない汚染状態にある単位区画
    - title: 三
      content: 土壌溶出量基準に適合しなかったとき、かつ、土壌含有量基準に適合したとき（第五号に掲げるときを除く。） 土壌溶出量基準に適合しない、かつ、土壌含有量基準に適合する汚染状態にある単位区画
    - title: 四
      content: 土壌溶出量基準及び土壌含有量基準に適合しなかったとき（第六号に掲げるときを除く。） 土壌溶出量基準及び土壌含有量基準に適合しない汚染状態にある単位区画
    - title: 五
      content: 第二溶出量基準に適合しなかったとき、かつ、土壌含有量基準に適合したとき 第二溶出量基準に適合しない、かつ、土壌含有量基準に適合する汚染状態にある単位区画
    - title: 六
      content: 第二溶出量基準及び土壌含有量基準に適合しなかったとき 第二溶出量基準及び土壌含有量基準に適合しない汚染状態にある単位区画
  - paragraph_num: ９
    content: 第一項第四号、第三項第四号又は前項の単位区画の中心の傾斜が著しいことその他の理由により、当該単位区画の中心において土壌の採取を行うことが困難であると認められる場合には、これらの規定にかかわらず、当該単位区画における調査対象地又は自然由来盛土等に係る調査対象地内の任意の地点において行うこれらの規定の土壌の採取をもって、これらの規定の土壌の採取に代えることができる。
- caption: （第三条第六項第二号に掲げる場合の公有水面埋立法による公有水面の埋立て又は干拓の事業により造成された土地における土壌汚染状況調査）
  title: 第十条の三
  article_num: '10_3'
  paragraphs:
  - content: 第三条第六項第二号に掲げる場合における試料採取等を行う区画の選定等の方法は、次の各号のとおりとする。
    items:
    - title: 一
      content: 第四条第一項及び第二項並びに第五条に定める方法により土壌汚染状況調査の対象地を区画すること。
    - title: 二
      content: 調査実施者は、土壌汚染状況調査の対象地のうち第三条第六項第二号に係る対象地（以下この条、第十三条の二及び第十四条の二において「調査対象地」という。）の区域を、次のイ又はロに掲げる場合の区分に応じ、当該イ又はロに定める単位区画について、試料採取等の対象とすること。
        ただし、法第三条第八項若しくは第四条第三項に規定する命令又は同条第二項の規定により土壌汚染状況調査を行う場合であり、かつ、最大形質変更深さより一メートルを超える深さにのみ汚染のおそれがあると認められる埋立て又は干拓の事業により造成された土壌の層（以下「埋立層等」という。）の位置があるときは、当該単位区画について試料採取等の対象としないことができること。
      subitems:
      - level: 1
        title: イ
        content: 三十メートル格子の中心が調査対象地の区域内にある場合 当該三十メートル格子の中心を含む単位区画
      - level: 1
        title: ロ
        content: 三十メートル格子の中心が調査対象地の区域内にない場合 当該三十メートル格子内にある調査対象地に係る単位区画のうちいずれか一区画
    - title: 三
      content: 調査実施者は、前号の規定により試料採取等の対象とされた単位区画の中心（当該単位区画の中心が調査対象地の区域内にない場合にあっては、当該単位区画における調査対象地内の任意の地点。以下この号及び第三項において同じ。）において次のイ又はロに掲げる場合の区分に応じ、当該イ又はロに定める土壌の採取を行うこと。
        ただし、法第三条第八項若しくは第四条第三項の命令又は同条第二項の規定により土壌汚染状況調査を行う場合であり、かつ、当該土壌が前号に規定する三十メートル格子内における最大形質変更深さのうち最も深い位置の深さより一メートルを超える深さの位置にあるときは、当該土壌の採取を行わないことができること。
      subitems:
      - level: 1
        title: イ
        content: 当該単位区画の中心において基準不適合土壌が存在するおそれがあると認められる埋立層等の位置が明らかでない場合 次に掲げる土壌
        subitems:
        - level: 2
          title: （１）
          content: 表層の土壌（試料採取等対象物質が第二種特定有害物質又は第三種特定有害物質である場合においては、表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌）
        - level: 2
          title: （２）
          content: 深さ一メートルから十メートルまでの一メートルごとの土壌（地表から深さ十メートル以内に帯水層の底面がある場合における当該底面より深い位置にある土壌を除く。）
        - level: 2
          title: （３）
          content: 帯水層の底面の土壌（地表から深さ十メートル以内に帯水層の底面がある場合に限る。）
      - level: 1
        title: ロ
        content: 当該単位区画の中心において基準不適合土壌が存在するおそれがあると認められる埋立層等の位置が明らかである場合 この号イ（１）から（３）までに掲げる土壌のうち当該埋立層等内の土壌（この号イ（１）から（３）までに掲げる土壌が当該埋立層等内にない場合にあっては、当該埋立層等内の任意の位置の土壌）
    - title: 四
      content: 前号イ（１）（試料採取等対象物質が第二種特定有害物質又は第三種特定有害物質である場合に限る。）の規定により土壌を採取した場合にあっては、採取された表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌を、同じ重量混合すること。
    - title: 五
      content: 前二号の規定により採取され、又は混合されたそれぞれの土壌に水を加えた検液に溶出する試料採取等対象物質の量にあっては第六条第三項第四号の環境大臣が定める方法により、当該土壌に含まれる試料採取等対象物質の量にあっては同条第四項第二号の環境大臣が定める方法により、それぞれ測定すること。
  - paragraph_num: ２
    content: 前項第五号の測定において当該測定に係る土壌の特定有害物質による汚染状態が第九条第三項各号のいずれかに該当するときは、当該試料採取等の対象とされた単位区画を含む当該三十メートル格子内にある調査対象地に係る全ての単位区画の区域を、当該試料採取等対象物質について当該各号に定める基準に適合しない汚染状態にある土地とみなす。
  - paragraph_num: ３
    content: 第一項第三号の単位区画の中心の傾斜が著しいことその他の理由により、当該単位区画の中心において同号の土壌の採取を行うことが困難であると認められる場合には、同号の規定にかかわらず、当該単位区画における調査対象地内の任意の地点において行う同号の土壌の採取をもって、同号に規定する土壌の採取に代えることができる。
- caption: （土壌汚染状況調査の対象地の土壌汚染のおそれの把握等の省略）
  title: 第十一条
  article_num: '11'
  paragraphs:
  - content: 調査実施者は、第三条から第八条まで及び前三条の規定にかかわらず、これらの規定による土壌汚染状況調査の対象地の土壌汚染のおそれの把握、試料採取等を行う区画の選定及び試料採取等（以下「土壌汚染状況調査の対象地の土壌汚染のおそれの把握等」という。）を行わないことができる。
  - paragraph_num: ２
    content: 前項の規定により土壌汚染状況調査の対象地の土壌汚染のおそれの把握等を行わなかったときは、土壌汚染状況調査の対象地の区域を、当該試料採取等対象物質（調査実施者が法第三条第一項又は第八項に基づき土壌汚染状況調査を行う場合であって、第三条第一項の規定による土壌汚染状況調査の対象地における土壌の特定有害物質による汚染のおそれを推定するために有効な情報の把握を行わなかったときは、全ての特定有害物質）について第二溶出量基準及び土壌含有量基準に適合しない汚染状態にある土地とみなす。
- caption: （第一種特定有害物質に関する試料採取等に係る特例）
  title: 第十二条
  article_num: '12'
  paragraphs:
  - content: 調査実施者は、第一種特定有害物質に係る試料採取等を行うときは、第四条第三項、第六条第一項第一号、第二項及び第五項、第七条第一項及び第三項並びに第八条第一項の規定にかかわらず、これらの規定による試料採取等を行う区画の選定等に代えて、第三条の二第二号及び第三号に掲げる土地を含む単位区画の中心（第三条第一項の規定により調査実施者が把握した情報により、当該単位区画において基準不適合土壌が存在するおそれが多いと認められる部分がある場合にあっては、当該部分における任意の地点）において、当該第一種特定有害物質に係る試料採取等を行うことができる。
  - paragraph_num: ２
    content: 第八条第二項の規定は、前項の試料採取等について準用する。 この場合において、同項中「前項に規定する検出範囲」とあるのは、「試料採取等を行う区画」と読み替えるものとする。
  - paragraph_num: ３
    content: 第一項の規定により試料採取等を行った場合であって、前項において準用する第八条第二項第二号の測定において当該測定に係る土壌の特定有害物質による汚染状態が次の各号のいずれかに該当するときは、当該試料採取等の対象とされた単位区画の区域を、当該第一種特定有害物質について当該各号に定める基準に適合しない汚染状態にある土地とみなす。
    items:
    - title: 一
      content: 土壌溶出量基準に適合しなかったとき（次号に掲げる場合を除く。） 土壌溶出量基準
    - title: 二
      content: 第二溶出量基準に適合しなかったとき 第二溶出量基準
- caption: （試料採取等を行う区画の選定等の省略）
  title: 第十三条
  article_num: '13'
  paragraphs:
  - content: 調査実施者は、第三条第六項第三号に掲げる場合において、第四条第三項及び第六条から第八条までの規定にかかわらず、これらの規定による試料採取等を行う区画の選定等を行わないことができる。
  - paragraph_num: ２
    content: 前項の規定により試料採取等を行う区画の選定等を行わなかったときは、調査対象地の区域（全ての区域が第三条の二第一号に掲げる土地に分類される単位区画の区域を除く。）を、当該試料採取等対象物質について第二溶出量基準及び土壌含有量基準に適合しない汚染状態にある土地とみなす。
- title: 第十三条の二
  article_num: '13_2'
  paragraphs:
  - content: 調査実施者は、第三条第六項第二号に掲げる場合において、第十条の三第一項の規定にかかわらず、同項の規定による試料採取等を行う区画の選定等を行わないことができる。
  - paragraph_num: ２
    content: 前項の規定により試料採取等を行う区画の選定等を行わなかったときは、調査対象地の区域を、当該試料採取等対象物質について第二溶出量基準（調査対象地が昭和五十二年三月十五日以降に公有水面埋立法による公有水面の埋立て又は干拓の事業により造成が開始された土地（廃棄物（廃棄物の処理及び清掃に関する法律（昭和四十五年法律第百三十七号）第二条第一項に規定する廃棄物をいう。第三十五条第一項第三号を除き、以下同じ。）が埋め立てられている場所を除く。）であり、かつ、当該土地の土壌の特定有害物質による汚染が当該造成時の水面埋立てに用いられた土砂に由来すると認められるものにあっては、土壌溶出量基準）及び土壌含有量基準に適合しない汚染状態にある土地とみなす。
- caption: （試料採取等の省略）
  title: 第十四条
  article_num: '14'
  paragraphs:
  - content: 調査実施者は、第六条から第八条までの規定による試料採取等の結果が次に掲げるものに該当するときは、これらの規定にかかわらず、当該試料採取等対象物質についてこれらの規定によるその他の試料採取等を行わないことができる。
    items:
    - title: 一
      content: 土壌ガス調査において気体から試料採取等対象物質が検出されていること、又は地下水から検出された試料採取等対象物質が地下水基準に適合しないものであること。
    - title: 二
      content: 土壌溶出量調査又は土壌含有量調査において当該土壌溶出量調査又は土壌含有量調査に係る土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合しないものであること。
    - title: 三
      content: 第八条第二項第二号の測定において当該測定に係る土壌の特定有害物質による汚染状態が土壌溶出量基準に適合しないものであること。
  - paragraph_num: ２
    content: 前項第一号の規定により試料採取等を行わなかったときにあっては、試料採取等を行わなかった代表地点に係る検出範囲の区域（次に掲げる単位区画及び全ての区域が第三条の二第一号に掲げる土地に分類される単位区画の区域を除く。この項において同じ。）又は前項第二号若しくは第三号の規定により試料採取等を行わなかったときにあっては、調査対象地の区域を、当該試料採取等対象物質について第二溶出量基準及び土壌含有量基準に適合しない汚染状態にある土地とみなす。
      ただし、当該区域のうち、第六条から第八条までの規定による試料採取等の結果が前項第二号又は第三号に掲げるものに該当する単位区画にあっては、当該測定に係る土壌の試料採取等対象物質による汚染状態が第九条第三項各号のいずれかに該当するときは、当該試料採取等対象物質について当該各号に定める基準に適合しない汚染状態にある土地とみなす。
    items:
    - title: 一
      content: 土壌ガス調査において気体から試料採取等対象物質が検出されず、又は地下水から検出された試料採取等対象物質が地下水基準に適合するものであった単位区画
    - title: 二
      content: 土壌溶出量調査又は土壌含有量調査（第四条第三項第二号ロの規定による試料採取等区画に係るものを除く。）において当該土壌溶出量調査又は土壌含有量調査に係る土壌の特定有害物質による汚染状態が土壌溶出量基準及び土壌含有量基準に適合するものであった単位区画
    - title: 三
      content: 第四条第三項第二号イの規定による試料採取等区画に係る土壌ガス調査において気体から試料採取等対象物質が検出されず、又は地下水から検出された試料採取等対象物質が地下水基準に適合するものであった場合における当該三十メートル格子内にある一部対象区画
    - title: 四
      content: 第四条第三項第二号ロの規定による試料採取等区画に係る土壌溶出量調査又は土壌含有量調査において当該土壌溶出量調査又は土壌含有量調査に係る土壌の特定有害物質による汚染状態が土壌溶出量基準及び土壌含有量基準に適合するものであった場合における当該三十メートル格子内にある一部対象区画
    - title: 五
      content: 第八条第二項第二号の測定において当該測定に係る土壌の特定有害物質による汚染状態が土壌溶出量基準に適合するものであった地点を含む単位区画
- title: 第十四条の二
  article_num: '14_2'
  paragraphs:
  - content: 調査実施者は、第十条の二第一項若しくは第三項又は第十条の三第一項の規定による試料採取等の結果が次に掲げるものに該当するときは、これらの規定にかかわらず、当該試料採取等対象物質についてこれらの規定によるその他の試料採取等を行わないことができる。
    items:
    - title: 一
      content: 第十条の二第一項第六号若しくは第三項第七号の測定又は同条第四項の試料採取等において当該測定又は試料採取等に係るいずれかの単位区画の土地の土壌の特定有害物質による汚染状態が第二溶出量基準に適合するものであること。
    - title: 二
      content: 第十条の三第一項第五号の測定において当該測定に係る土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合しないものであること。
  - paragraph_num: ２
    content: 前項の規定により試料採取等を行わなかったときは、調査対象地（第十条の二第一項第二号ただし書に規定する場合にあっては、九百メートル格子内の調査対象地）又は自然由来盛土等に係る調査対象地の区域（次に掲げる単位区画の区域を除く。）を、当該試料採取等対象物質について土壌溶出量基準（第十三条の二第二項括弧書に規定する土地以外の土地において第十条の三第一項第五号の測定を行った場合にあっては、第二溶出量基準）及び土壌含有量基準に適合しない汚染状態にある土地とみなす。
      ただし、当該区域のうち、第十条の二第一項若しくは第三項又は第十条の三第一項の規定による試料採取等の結果が前項各号に掲げるものに該当する単位区画にあっては、当該各号に掲げる測定に係る土壌の特定有害物質による汚染状態が第九条第三項各号のいずれかに該当するときは、当該各号に定める基準に適合しない汚染状態にある土地とみなす。
    items:
    - title: 一
      content: 第十条の二第一項第六号若しくは同条第三項第七号の測定又は同条第四項の試料採取等において当該測定又は試料採取等に係るいずれかの単位区画の土地の土壌の特定有害物質による汚染状態が全て土壌溶出量基準及び土壌含有量基準に適合するものであった場合における当該単位区画を含む三十メートル格子内にある全ての単位区画
    - title: 二
      content: 第十条の三第一項第五号の測定において当該測定に係る土壌の特定有害物質による汚染状態が全て土壌溶出量基準及び土壌含有量基準に適合するものであった場合における当該単位区画を含む三十メートル格子内にある全ての単位区画
- caption: （法施行前に行われた調査の結果の利用）
  title: 第十五条
  article_num: '15'
  paragraphs:
  - content: 土壌汚染状況調査の対象地において、法の施行前に第六条から第八条まで又は第十条から第十条の三までの規定による試料採取等と同等程度に土壌の特定有害物質による汚染状態を把握できる精度を保って試料採取等が行われたと認められる場合であって、当該試料採取等の後に土壌の特定有害物質による汚染が生じたおそれがないと認められるときは、当該試料採取等の結果をこれらの規定による試料採取等の結果とみなす。
- caption: （人の健康に係る被害が生ずるおそれがない旨の確認）
  title: 第十六条
  article_num: '16'
  paragraphs:
  - content: 法第三条第一項ただし書の確認を受けようとする土地の所有者等は、次に掲げる事項を記載した様式第三による申請書を提出しなければならない。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 工場又は事業場の名称及び当該工場又は事業場の敷地であった土地の所在地
    - title: 三
      content: 使用が廃止された有害物質使用特定施設の種類、設置場所及び廃止年月日並びに当該有害物質使用特定施設において製造され、使用され、又は処理されていた特定有害物質の種類
    - title: 四
      content: 確認を受けようとする土地の場所
    - title: 五
      content: 確認を受けようとする土地について予定されている利用の方法
  - paragraph_num: ２
    content: 前項の申請書には、法第三条第一項本文に規定する工場又は事業場の敷地であった土地及び同項ただし書の確認を受けようとする土地の場所を明らかにした図面を添付しなければならない。
  - paragraph_num: ３
    content: 都道府県知事は、第一項の申請に係る同項第四号の土地の場所が次のいずれかに該当することが確実であると認められる場合に限り、当該土地の場所について、法第三条第一項ただし書の確認をするものとする。
    items:
    - title: 一
      content: 工場又は事業場（当該有害物質使用特定施設を設置していたもの又は当該工場若しくは事業場に係る事業に従事する者その他の関係者以外の者が立ち入ることができないものに限る。）の敷地として利用されること。
    - title: 二
      content: 当該有害物質使用特定施設を設置していた小規模な工場又は事業場において、事業の用に供されている建築物と当該工場又は事業場の設置者（その者が法人である場合にあっては、その代表者）の居住の用に供されている建築物とが同一のものであり、又は近接して設置されており、かつ、当該居住の用に供されている建築物が引き続き当該設置者の居住の用に供される場合において、当該居住の用に供されている建築物の敷地（これと一体として管理される土地を含む。）として利用されること。
    - title: 三
      content: 鉱山保安法（昭和二十四年法律第七十号）第二条第二項本文に規定する鉱山（以下この号において「鉱山」という。）若しくは同項ただし書に規定する附属施設の敷地又は鉱山の敷地であった土地（鉱業権の消滅後五年以内であるもの又は同法第三十九条第一項の命令に基づき土壌の特定有害物質による汚染による鉱害を防止するために必要な設備がされているものに限る。）（第二十一条の四第二号及び第二十五条第四号において「鉱山関係の土地」という。）であること。
  - paragraph_num: ４
    content: 法第三条第一項ただし書の確認を受けた土地の所有者等が当該確認に係る土地に関する権利を譲渡し、又は当該土地の所有者等について相続、合併若しくは分割（当該確認に係る土地に関する権利を承継させるものに限る。）があったときは、その権利を譲り受けた者又は相続人、合併若しくは分割後存続する法人若しくは合併若しくは分割により設立した法人は、当該土地の所有者等の地位を承継する。
  - paragraph_num: ５
    content: 前項の規定により土地の所有者等の地位を承継した者は、遅滞なく、その旨を様式第四の届出書により都道府県知事に届け出なければならない。
- caption: （有害物質使用特定施設の使用の廃止等の通知）
  title: 第十七条
  article_num: '17'
  paragraphs:
  - content: 法第三条第三項の通知は、有害物質使用特定施設の使用が廃止された際の土地の所有者等（当該土地の所有者等から土地に関する権利を譲り受けた者その他の新たに土地の所有者等となった者が同条第一項の調査を行うことについて、当該土地の所有者等及び当該新たに土地の所有者等となった者が合意している場合にあっては、当該新たに土地の所有者等となった者）に対して行うものとする。
- caption: （有害物質使用特定施設の使用の廃止等に関し通知すべき事項）
  title: 第十八条
  article_num: '18'
  paragraphs:
  - content: 法第三条第三項の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 使用が廃止された有害物質使用特定施設の種類、設置場所及び廃止年月日並びに当該有害物質使用特定施設において製造され、使用され、又は処理されていた特定有害物質の種類
    - title: 二
      content: 工場又は事業場の名称及び当該工場又は事業場の敷地であった土地の所在地
    - title: 三
      content: 法第三条第一項の報告を行うべき期限
- caption: （法第三条第一項ただし書の確認に係る土地の利用の方法の変更の届出）
  title: 第十九条
  article_num: '19'
  paragraphs:
  - content: 法第三条第五項の届出は、次に掲げる事項を記載した様式第五による届出書を提出して行うものとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 法第三条第一項ただし書の確認に係る土地の所在地及び当該確認を受けた年月日
    - title: 三
      content: 利用の方法を変更しようとする土地の場所
    - title: 四
      content: 当該変更後の当該確認に係る土地の利用の方法
  - paragraph_num: ２
    content: 前項の届出書には、法第三条第一項本文に規定する工場又は事業場の敷地であった土地及び同項ただし書の確認を受けた土地の場所を明らかにした図面を添付しなければならない。
- caption: （法第三条第一項ただし書の確認の取消しを行う場所）
  title: 第二十条
  article_num: '20'
  paragraphs:
  - content: 法第三条第六項の規定による同条第一項ただし書の確認の取消しは、前条第一項第三号の土地の場所について行うものとする。
- caption: （法第三条第一項ただし書の確認の取消しの通知）
  title: 第二十一条
  article_num: '21'
  paragraphs:
  - content: 都道府県知事は、法第三条第六項の規定により同条第一項ただし書の確認を取り消したときは、遅滞なく、その旨を当該確認に係る土地の所有者等に通知するものとする。
- caption: （法第三条第一項ただし書の確認に係る土地における土地の形質の変更の届出）
  title: 第二十一条の二
  article_num: '21_2'
  paragraphs:
  - content: 法第三条第七項の届出は、様式第六による届出書を提出して行うものとする。
  - paragraph_num: ２
    content: 前項の届出書には、土地の形質の変更をしようとする場所を明らかにした平面図、立面図及び断面図を添付しなければならない。
- title: 第二十一条の三
  article_num: '21_3'
  paragraphs:
  - content: 法第三条第七項の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 法第三条第一項ただし書の確認を受けた土地の工場又は事業場の名称及び当該工場又は事業場の敷地であった土地の所在地
    - title: 三
      content: 土地の形質の変更の対象となる土地の所在地
    - title: 四
      content: 土地の形質の変更の対象となる土地の面積及び当該土地の形質の変更に係る部分の深さ
- caption: （法第三条第一項ただし書の確認に係る土地における土地の形質の変更の届出を要しない行為）
  title: 第二十一条の四
  article_num: '21_4'
  paragraphs:
  - content: 法第三条第七項第一号の環境省令で定める行為は、次に掲げる行為とする。
    items:
    - title: 一
      content: 対象となる土地の面積が九百平方メートル未満の土地の形質の変更
    - title: 二
      content: 対象となる土地の面積が九百平方メートル以上の土地の形質の変更であって、次のいずれにも該当しない行為又は鉱山関係の土地において行われる土地の形質の変更
      subitems:
      - level: 1
        title: イ
        content: 土壌を当該土地の形質の変更の対象となる土地の区域外へ搬出すること。
      - level: 1
        title: ロ
        content: 土壌の飛散又は流出を伴う土地の形質の変更を行うこと。
      - level: 1
        title: ハ
        content: 土地の形質の変更に係る部分の深さが五十センチメートル以上であること。
- caption: （法第三条第一項ただし書の確認に係る土地における土壌汚染状況調査の命令）
  title: 第二十一条の五
  article_num: '21_5'
  paragraphs:
  - content: 法第三条第八項の命令は、次に掲げる事項を記載した書面により行うものとする。
    items:
    - title: 一
      content: 法第三条第八項の規定による土壌汚染状況調査の対象となる土地の場所
    - title: 二
      content: 法第三条第八項の命令に係る報告を行うべき期限
- caption: （法第三条第八項の命令に係る報告）
  title: 第二十一条の六
  article_num: '21_6'
  paragraphs:
  - content: 法第三条第八項の命令に係る報告は、次に掲げる事項を記載した様式第七による報告書を提出して行うものとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 法第三条第八項の命令を受けた年月日
    - title: 三
      content: 土壌汚染状況調査を行った場所
    - title: 四
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合はその旨、当該試料採取等の対象としなかった深さの位置及び当該深さの位置の土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類
    - title: 五
      content: 土壌汚染状況調査の対象地において土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類
    - title: 六
      content: 土壌その他の試料の採取を行った地点及び深さ、日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の土壌汚染状況調査の結果に関する事項
    - title: 七
      content: 土壌汚染状況調査を行った指定調査機関の氏名又は名称
    - title: 八
      content: 土壌汚染状況調査に従事した者を監督した技術管理者の氏名及び技術管理者証の交付番号
  - paragraph_num: ２
    content: 前項の報告書には、土壌汚染状況調査の対象地の土壌の特定有害物質による汚染状態を明らかにした図面及び土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合は、当該試料採取等の対象としなかった深さの位置を明らかにした図面を添付しなければならない。
- caption: （法第四条第一項の土地の形質の変更の届出の対象となる土地の規模）
  title: 第二十二条
  article_num: '22'
  paragraphs:
  - content: 法第四条第一項の環境省令で定める規模は、三千平方メートルとする。 ただし、現に有害物質使用特定施設が設置されている工場若しくは事業場の敷地又は法第三条第一項本文に規定する使用が廃止された有害物質使用特定施設に係る工場若しくは事業場の敷地（同項本文の報告をした工場若しくは事業場の敷地又は同項ただし書の確認を受けた土地を除く。）の土地の形質の変更にあっては、九百平方メートルとする。
- caption: （法第四条第一項の土地の形質の変更の届出）
  title: 第二十三条
  article_num: '23'
  paragraphs:
  - content: 法第四条第一項の届出は、様式第六による届出書を提出して行うものとする。
  - paragraph_num: ２
    content: 前項の届出書には、次に掲げる図面及び書類を添付しなければならない。
    items:
    - title: 一
      content: 土地の形質の変更をしようとする場所を明らかにした平面図、立面図及び断面図
    - title: 二
      content: 土地の形質の変更をしようとする者が当該土地の所有者等でない場合にあっては、登記事項証明書その他の当該土地の所有者等の所在が明らかとなる書面
- title: 第二十四条
  article_num: '24'
  paragraphs:
  - content: 法第四条第一項の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 土地の形質の変更の対象となる土地の所在地
    - title: 三
      content: 土地の形質の変更の対象となる土地の面積及び当該土地の形質の変更に係る部分の深さ
    - title: 四
      content: 現に有害物質使用特定施設が設置されている工場若しくは事業場の敷地又は法第三条第一項本文に規定する使用が廃止された有害物質使用特定施設に係る工場若しくは事業場の敷地（同条第一項本文の報告をした工場若しくは事業場の敷地又は同項ただし書の確認を受けた土地を除く。）にあっては、当該工場若しくは事業場の名称、当該有害物質使用特定施設の種類及び設置場所並びに当該有害物質使用特定施設において製造され、使用され、又は処理されていた特定有害物質の種類
- caption: （法第四条第一項の土地の形質の変更の届出を要しない行為）
  title: 第二十五条
  article_num: '25'
  paragraphs:
  - content: 法第四条第一項第二号の環境省令で定める行為は、次に掲げる行為とする。
    items:
    - title: 一
      content: 次のいずれにも該当しない行為
      subitems:
      - level: 1
        title: イ
        content: 土壌を当該土地の形質の変更の対象となる土地の区域外へ搬出すること。
      - level: 1
        title: ロ
        content: 土壌の飛散又は流出を伴う土地の形質の変更を行うこと。
      - level: 1
        title: ハ
        content: 土地の形質の変更に係る部分の深さが五十センチメートル以上であること。
    - title: 二
      content: 農業を営むために通常行われる行為であって、前号イに該当しないもの
    - title: 三
      content: 林業の用に供する作業路網の整備であって、第一号イに該当しないもの
    - title: 四
      content: 鉱山関係の土地において行われる土地の形質の変更
    - title: 五
      content: 都道府県知事が第三条から第十五条までに定める方法に準じた方法により調査した結果、基準不適合土壌が存在するおそれがない又は土地の土壌の汚染状態が全ての特定有害物質の種類について土壌溶出量基準及び土壌含有量基準に適合するものと認められるものとして都道府県知事が指定した土地において行われる土地の形質の変更
- caption: （土壌汚染状況調査の結果の提出に係る土地の所有者等の同意）
  title: 第二十五条の二
  article_num: '25_2'
  paragraphs:
  - content: 法第四条第二項の規定による土地の所有者等の同意は、同条第一項の規定による届出に係る土地の形質の変更の場所を記載した書面により行うものとする。
- caption: （法第四条第二項の調査の結果の提出）
  title: 第二十五条の三
  article_num: '25_3'
  paragraphs:
  - content: 法第四条第二項の報告は、次に掲げる事項を記載した様式第七による報告書を提出して行うものとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 土壌汚染状況調査を行った場所
    - title: 三
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合はその旨、当該試料採取等の対象としなかった深さの位置及び当該深さの位置の土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類
    - title: 四
      content: 土壌汚染状況調査の対象地において土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類
    - title: 五
      content: 土壌その他の試料の採取を行った地点及び深さ、日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の土壌汚染状況調査の結果に関する事項
    - title: 六
      content: 土壌汚染状況調査を行った指定調査機関の氏名又は名称
    - title: 七
      content: 土壌汚染状況調査に従事した者を監督した技術管理者の氏名及び技術管理者証の交付番号
    - title: 八
      content: 土地の形質の変更をしようとする者が土壌汚染状況調査に係る土地の所有者等でない場合にあっては、当該土地の所有者等の氏名又は名称
  - paragraph_num: ２
    content: 前項の報告書には、土壌汚染状況調査の対象地の土壌の特定有害物質による汚染状態を明らかにした図面及び土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合は当該試料採取等の対象としなかった深さの位置を明らかにした図面を添付しなければならない。
- caption: （特定有害物質によって汚染されているおそれがある土地の基準）
  title: 第二十六条
  article_num: '26'
  paragraphs:
  - content: 法第四条第三項の環境省令で定める基準は、次の各号のいずれかに該当することとする。
    items:
    - title: 一
      content: 土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合しないことが明らかである土地であること。
    - title: 二
      content: 特定有害物質又は特定有害物質を含む固体若しくは液体が埋められ、飛散し、流出し、又は地下に浸透した土地であること。
    - title: 三
      content: 特定有害物質をその施設において製造し、使用し、又は処理する施設に係る工場又は事業場の敷地である土地又は敷地であった土地であること。
    - title: 四
      content: 特定有害物質又は特定有害物質を含む固体若しくは液体をその施設において貯蔵し、又は保管する施設に係る工場又は事業場の敷地である土地又は敷地であった土地であること。
    - title: 五
      content: 前三号に掲げる土地と同等程度に土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合しないおそれがある土地であること。
- caption: （法第四条第一項の届出に係る土地における土壌汚染状況調査の命令）
  title: 第二十七条
  article_num: '27'
  paragraphs:
  - content: 法第四条第三項の命令は、次に掲げる事項を記載した書面により行うものとする。
    items:
    - title: 一
      content: 法第四条第三項に規定する調査の対象となる土地の場所及び特定有害物質の種類並びにその理由
    - title: 二
      content: 法第四条第三項の命令に係る報告を行うべき期限
- caption: （法第四条第三項の命令に係る報告）
  title: 第二十七条の二
  article_num: '27_2'
  paragraphs:
  - content: 法第四条第三項の命令に係る報告は、次に掲げる事項を記載した様式第七による報告書を提出して行うものとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 法第四条第三項の命令を受けた年月日
    - title: 三
      content: 土壌汚染状況調査を行った場所
    - title: 四
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合はその旨、当該試料採取等の対象としなかった深さの位置及び当該深さの位置の土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類
    - title: 五
      content: 土壌汚染状況調査の対象地において土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類
    - title: 六
      content: 土壌その他の試料の採取を行った地点及び深さ、日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の土壌汚染状況調査の結果に関する事項
    - title: 七
      content: 土壌汚染状況調査を行った指定調査機関の氏名又は名称
    - title: 八
      content: 土壌汚染状況調査に従事した者を監督した技術管理者の氏名及び技術管理者証の交付番号
  - paragraph_num: ２
    content: 前項の報告書には、土壌汚染状況調査の対象地の土壌の特定有害物質による汚染状態を明らかにした図面及び土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合は当該試料採取等の対象としなかった深さの位置を明らかにした図面を添付しなければならない。
- caption: （土壌汚染状況調査の対象となる土地の土壌の特定有害物質による汚染状態に係る基準）
  title: 第二十八条
  article_num: '28'
  paragraphs:
  - content: 令第三条第一号イの環境省令で定める基準は、土壌溶出量基準とする。
  - paragraph_num: ２
    content: 令第三条第一号ハの環境省令で定める基準は、土壌含有量基準とする。
- caption: （地下水の水質の汚濁に係る限度）
  title: 第二十九条
  article_num: '29'
  paragraphs:
  - content: 令第三条第一号イの環境省令で定める限度は、地下水基準とする。
- caption: （地下水の利用状況等に係る要件）
  title: 第三十条
  article_num: '30'
  paragraphs:
  - content: 令第三条第一号イの環境省令で定める要件は、地下水の流動の状況等からみて、地下水汚染（地下水から検出された特定有害物質が地下水基準に適合しないものであることをいう。以下同じ。）が生じているとすれば地下水汚染が拡大するおそれがあると認められる区域に、次の各号のいずれかの地点があることとする。
    items:
    - title: 一
      content: 地下水を人の飲用に供するために用い、又は用いることが確実である井戸のストレーナー、揚水機の取水口その他の地下水の取水口
    - title: 二
      content: 地下水を水道法（昭和三十二年法律第百七十七号）第三条第二項に規定する水道事業（同条第五項に規定する水道用水供給事業者により供給される水道水のみをその用に供するものを除く。）、同条第四項に規定する水道用水供給事業若しくは同条第六項に規定する専用水道のための原水として取り入れるために用い、又は用いることが確実である取水施設の取水口
    - title: 三
      content: 災害対策基本法（昭和三十六年法律第二百二十三号）第四十条第一項の都道府県地域防災計画等に基づき、災害時において地下水を人の飲用に供するために用いるものとされている井戸のストレーナー、揚水機の取水口その他の地下水の取水口
    - title: 四
      content: 地下水基準に適合しない地下水のゆう出を主たる原因として、水質の汚濁に係る環境上の条件についての環境基本法（平成五年法律第九十一号）第十六条第一項の基準が確保されない水質の汚濁が生じ、又は生ずることが確実である公共用水域の地点
- caption: （法第五条第一項の命令に係る報告）
  title: 第三十条の二
  article_num: '30_2'
  paragraphs:
  - content: 法第五条第一項の命令に係る報告は、次に掲げる事項を記載した様式第八による報告書を提出して行うものとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 法第五条第一項の命令を受けた年月日
    - title: 三
      content: 土壌汚染状況調査を行った場所
    - title: 四
      content: 土壌汚染状況調査の対象地において土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類
    - title: 五
      content: 土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の土壌汚染状況調査の結果に関する事項
    - title: 六
      content: 土壌汚染状況調査を行った指定調査機関の氏名又は名称
    - title: 七
      content: 土壌汚染状況調査に従事した者を監督した技術管理者の氏名及び技術管理者証の交付番号
  - paragraph_num: ２
    content: 前項の報告書には、土壌汚染状況調査の対象地の土壌の特定有害物質による汚染状態を明らかにした図面を添付しなければならない。
- caption: （区域の指定に係る基準）
  title: 第三十一条
  article_num: '31'
  paragraphs:
  - content: 法第六条第一項第一号の環境省令で定める基準のうち土壌に水を加えた場合に溶出する特定有害物質の量に関するものは、特定有害物質の量を第六条第三項第四号の環境大臣が定める方法により測定した結果が、別表第四の上欄に掲げる特定有害物質の種類の区分に応じ、それぞれ同表の下欄に掲げる要件に該当することとする。
  - paragraph_num: ２
    content: 法第六条第一項第一号の環境省令で定める基準のうち土壌に含まれる特定有害物質の量に関するものは、特定有害物質の量を第六条第四項第二号の環境大臣が定める方法により測定した結果が、別表第五の上欄に掲げる特定有害物質の種類の区分に応じ、それぞれ同表の下欄に掲げる要件に該当することとする。
- caption: （要措置区域の指定の公示）
  title: 第三十二条
  article_num: '32'
  paragraphs:
  - content: 法第六条第二項（同条第五項において準用する場合を含む。）の要措置区域（同条第四項に規定する要措置区域をいう。以下同じ。）の指定（同条第五項において準用する場合にあっては、指定の解除。以下この条において同じ。）の公示は、当該指定をする旨、当該要措置区域、当該要措置区域において土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していない特定有害物質の種類及び当該要措置区域において講ずべき指示措置（法第七条第一項第一号に規定する指示措置をいう。以下同じ。）（法第六条第五項において準用する場合にあっては、当該要措置区域において講じられた実施措置（法第七条第一項第一号に規定する実施措置をいう。以下同じ。））を明示して、都道府県又は令第十条に規定する市の公報に掲載して行うものとする。
      この場合において、当該要措置区域の明示については、次のいずれかによることとする。
    items:
    - title: 一
      content: 市町村（特別区を含む。）、大字、字、小字及び地番
    - title: 二
      content: 一定の地物、施設、工作物又はこれらからの距離及び方向
    - title: 三
      content: 平面図
- caption: （汚染除去等計画の作成及び提出の指示）
  title: 第三十三条
  article_num: '33'
  paragraphs:
  - content: 法第七条第一項本文に規定する指示は、書面により行うものとする。
- caption: （汚染除去等計画の作成及び提出の指示において示す事項）
  title: 第三十四条
  article_num: '34'
  paragraphs:
  - content: 法第七条第一項本文の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 汚染の除去等の措置（法第六条第一項に規定する汚染の除去等の措置をいう。以下同じ。）を講ずべき要措置区域の場所
    - title: 二
      content: 汚染除去等計画（法第七条第一項に規定する汚染除去等計画をいう。以下同じ。）を提出すべき期限
  - paragraph_num: ２
    content: 法第七条第一項本文の措置を講ずべき期限は、汚染の除去等の措置を講ずべき要措置区域の場所、当該要措置区域内の土地の土壌の特定有害物質による汚染状態、当該要措置区域内の土地の所有者等の経理的基礎及び技術的能力等を勘案し、相当なものとなるよう示すものとする。
  - paragraph_num: ３
    content: 第一項第一号の要措置区域の場所は、当該要措置区域若しくはその周辺の土地の土壌又は当該要措置区域若しくはその周辺の土地にある地下水の特定有害物質による汚染状態等を勘案し、人の健康に係る被害を防止するため必要な限度において示すものとする。
  - paragraph_num: ４
    content: 第一項第二号の汚染除去等計画を提出すべき期限は、基準不適合土壌のある範囲及び深さを把握するための調査に要する期間等を勘案し、相当なものとなるよう示すものとする。
- caption: （土壌汚染を生じさせる行為をした者に対する指示）
  title: 第三十五条
  article_num: '35'
  paragraphs:
  - content: 法第七条第一項ただし書に規定する指示は、特定有害物質若しくは特定有害物質を含む固体若しくは液体を埋め、飛散させ、流出させ、又は地下へ浸透させる行為をした者に対して行うものとする。
      ただし、当該行為が次に掲げる行為に該当する場合は、この限りでない。
    items:
    - title: 一
      content: 廃棄物の処理及び清掃に関する法律第六条の二第二項に規定する一般廃棄物処理基準に従ってする同法第二条第二項に規定する一般廃棄物の埋立処分
    - title: 二
      content: 廃棄物の処理及び清掃に関する法律第十二条第一項に規定する産業廃棄物処理基準又は同法第十二条の二第一項に規定する特別管理産業廃棄物処理基準に従ってする同法第二条第四項に規定する産業廃棄物の埋立処分
    - title: 三
      content: 海洋汚染等及び海上災害の防止に関する法律（昭和四十五年法律第百三十六号）第十条第二項第四号に規定する基準に従ってする同法第三条第六号に規定する廃棄物の排出
  - paragraph_num: ２
    content: 法第七条第一項ただし書に規定する指示は、二以上の者に対して行う場合には、当該二以上の者が当該土地の土壌の特定有害物質による汚染を生じさせたと認められる程度を勘案して行うものとする。
  - paragraph_num: ３
    content: 前二条の規定は、法第七条第一項ただし書に規定する指示について準用する。 この場合において、前条第二項中「当該要措置区域内の土地の所有者等」とあるのは、「当該土壌汚染を生じさせる行為をした者」と読み替えるものとする。
- caption: （指示措置及び指示措置と同等以上の効果を有すると認められる汚染の除去等の措置）
  title: 第三十六条
  article_num: '36'
  paragraphs:
  - content: 指示措置は、別表第六の上欄に掲げる土地の区分に応じ、それぞれ同表の中欄に定める汚染の除去等の措置とする。
  - paragraph_num: ２
    content: 都道府県知事が、自らが有する担保権の実行としての競売における競落その他これに類する行為により土地の所有者等となった者であって、当該土地を譲渡する意思の有無等からみて土地の所有者等であることが一時的であると認められるものに対し、法第七条第一項の規定により当該要措置区域において講ずべき汚染の除去等の措置を示すときは、前項の規定にかかわらず、当該要措置区域内の土地の土壌の特定有害物質による汚染状態が土壌溶出量基準に適合しない場合にあっては別表第六の一の項に規定する地下水の水質の測定、当該要措置区域内の土地の土壌の特定有害物質による汚染状態が土壌含有量基準に適合しない場合にあっては同表の七の項に規定する立入禁止を示すものとする。
  - paragraph_num: ３
    content: 法第七条第一項第一号の環境省令で定める指示措置と同等以上の効果を有すると認められる汚染の除去等の措置は、別表第六の上欄に掲げる土地の区分に応じ、それぞれ同表の下欄に定める汚染の除去等の措置とする。
- caption: （汚染除去等計画の記載事項）
  title: 第三十六条の二
  article_num: '36_2'
  paragraphs:
  - content: 法第七条第一項第三号の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 汚染の除去等の措置を講ずべき要措置区域の所在地
    - title: 三
      content: 実施措置を選択した理由
    - title: 四
      content: 別表第八の一の項第二号、二の項、三の項、四の項第二号、五の項から七の項まで又は十の項第二号に規定するボーリングによる土壌の採取及び測定その他の方法により、汚染除去等計画の作成のために必要な情報を把握した場合にあっては、土壌その他の試料の採取を行った地点並びに日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
    - title: 五
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について汚染の除去等の措置を講ずるときは、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした調査に係る土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
    - title: 六
      content: 土壌溶出量基準に適合しない汚染状態にある土壌が要措置区域内の帯水層に接する場合にあっては、基準不適合土壌、特定有害物質又は特定有害物質を含む液体の飛散、揮散若しくは流出（以下「飛散等」という。）、地下への浸透及び地下水汚染の拡大を防止するために講ずる措置
    - title: 七
      content: 前号に定めるもののほか、基準不適合土壌、特定有害物質又は特定有害物質を含む液体の飛散等を防止するために講ずる措置
    - title: 八
      content: 実施措置の施行中に基準不適合土壌、特定有害物質若しくは特定有害物質を含む液体の飛散等、地下への浸透又は地下水汚染の拡大が確認された場合における対応方法
    - title: 九
      content: 事故、災害その他の緊急事態が発生した場合における対応方法
    - title: 十
      content: 土壌を掘削する範囲及び深さと地下水位との位置関係
    - title: 十一
      content: 要措置区域外から搬入された土壌を使用する場合にあっては、当該土壌の特定有害物質による汚染状態を把握するための土壌溶出量調査及び土壌含有量調査における試料採取の頻度並びに当該土壌の使用方法
    - title: 十二
      content: 要措置区域の指定に係る土壌汚染状況調査と一の土壌汚染状況調査により指定された他の要措置区域から搬出された汚染土壌を使用する場合にあっては、当該他の要措置区域の汚染状態及び当該汚染土壌の使用方法
    - title: 十三
      content: 別表第七の上欄に掲げる実施措置の種類の区分に応じ、それぞれ同表の中欄に定める事項
- caption: （汚染除去等計画の提出）
  title: 第三十六条の三
  article_num: '36_3'
  paragraphs:
  - content: 法第七条第一項の規定により都道府県知事から指示を受けた者は、様式第九による汚染除去等計画を作成し、都道府県知事に提出しなければならない。
  - paragraph_num: ２
    content: 前項の汚染除去等計画には、次に掲げる図面を添付しなければならない。
    items:
    - title: 一
      content: 別表第八の一の項第二号、二の項、三の項、四の項第二号、五の項から七の項まで又は十の項第二号に規定するボーリングによる土壌の採取及び測定その他の方法により、汚染除去等計画の作成のために必要な情報を把握した場合にあっては、汚染の除去等の措置を講ずべき要措置区域内の土地の土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 二
      content: 汚染の除去等の措置を講ずべき要措置区域の場所及び実施措置の施行方法を明らかにした平面図、立面図及び断面図
    - title: 三
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について汚染の除去等の措置を講ずるときは、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした図面
- caption: （軽微な変更）
  title: 第三十六条の四
  article_num: '36_4'
  paragraphs:
  - content: 法第七条第三項の環境省令で定める軽微な変更は、次のとおりとする。
    items:
    - title: 一
      content: 実施措置の着手予定時期の変更
    - title: 二
      content: 実施措置の完了予定時期に係る変更であって、法第七条第一項本文の規定により都道府県知事が示した措置を講ずべき期限までのもの
    - title: 三
      content: 基準不適合土壌、特定有害物質又は特定有害物質を含む液体の飛散等、地下への浸透及び地下水汚染の拡大を防止するために講ずる措置であって、当該措置と同等以上の効果を有するもの
    - title: 四
      content: 別表第七の上欄に掲げる実施措置の種類の区分に応じ、それぞれ同表の下欄に定める事項に係る変更
- caption: （変更後の汚染除去等計画の提出）
  title: 第三十七条
  article_num: '37'
  paragraphs:
  - content: 法第七条第三項の変更後の汚染除去等計画の提出は、変更後の同条第一項各号に掲げる事項を記載した様式第九による計画を提出して行うものとする。
- caption: （汚染除去等計画の変更の命令）
  title: 第三十八条
  article_num: '38'
  paragraphs:
  - content: 法第七条第四項の命令は、相当の履行期限を定めて、書面により行うものとする。
- caption: （実施措置に係る技術的基準）
  title: 第三十九条
  article_num: '39'
  paragraphs:
  - content: 法第七条第四項の実施措置に関する技術的基準は、次条及び第四十一条に定めるところによる。
- caption: （実施措置の実施の方法）
  title: 第四十条
  article_num: '40'
  paragraphs:
  - content: 別表第六の一の項に規定する地下水の水質の測定、同表の二の項に規定する原位置封じ込め、遮水工封じ込め、地下水汚染の拡大の防止及び土壌汚染の除去、同表の三の項に規定する遮断工封じ込め、同表の四の項に規定する不溶化、同表の七の項に規定する舗装及び立入禁止、同表の八の項に規定する土壌入換え並びに同表の九の項に規定する盛土の実施の方法は、別表第八に定めるところによる。
  - paragraph_num: ２
    content: 前項に定めるもののほか、次に定めるところにより、実施措置を講じるものとする。
    items:
    - title: 一
      content: 土壌溶出量基準に適合しない汚染状態にある土壌が要措置区域内の帯水層に接する場合にあっては、土地の形質の変更の施行方法が環境大臣が定める基準に適合していること。
    - title: 二
      content: 前号に定めるもののほか、基準不適合土壌、特定有害物質又は特定有害物質を含む液体の飛散等、地下への浸透及び地下水汚染の拡大を防止するために必要な措置を講ずること。
    - title: 三
      content: 要措置区域外から搬入された土壌を使用する場合にあっては、環境大臣が定める方法により当該土壌の特定有害物質による汚染状態を調査し、把握すること。
    - title: 四
      content: 要措置区域の指定に係る土壌汚染状況調査と一の土壌汚染状況調査により指定された他の要措置区域から搬出された汚染土壌を使用する場合にあっては、当該土壌の使用に伴い、人の健康に係る被害が生ずるおそれがないようにすること。
- caption: （廃棄物埋立護岸において造成された土地における実施措置）
  title: 第四十一条
  article_num: '41'
  paragraphs:
  - content: 次に掲げる基準に従い港湾法（昭和二十五年法律第二百十八号）第二条第五項第九号の二に掲げる廃棄物埋立護岸において造成された土地であって、同条第一項に規定する港湾管理者が管理するものについては、実施措置が講じられている土地とみなす。
    items:
    - title: 一
      content: 廃棄物の処理及び清掃に関する法律第六条の二第二項に規定する一般廃棄物処理基準又は同法第十二条第一項に規定する産業廃棄物処理基準若しくは同法第十二条の二第一項に規定する特別管理産業廃棄物処理基準
    - title: 二
      content: 海洋汚染等及び海上災害の防止に関する法律第十条第二項第四号に規定する基準
- caption: （実施措置を講ずべき旨の命令）
  title: 第四十二条
  article_num: '42'
  paragraphs:
  - content: 法第七条第八項の命令は、相当の履行期限を定めて、書面により行うものとする。
- caption: （工事完了の報告及び実施措置完了の報告に係る手続）
  title: 第四十二条の二
  article_num: '42_2'
  paragraphs:
  - content: 法第七条第九項の報告は、次項から第四項までに定めるところにより行うものとする。
  - paragraph_num: ２
    content: 次の各号に掲げる措置の実施が完了した場合において、様式第十による報告書を提出して行うものとする。
    items:
    - title: 一
      content: 別表第八の二の項の原位置封じ込めに係る措置の実施のうち、同項下欄のイからチまでの実施が完了した場合
    - title: 二
      content: 別表第八の三の項の遮水工封じ込めに係る措置の実施のうち、同項下欄のイからチまでの実施が完了した場合
    - title: 三
      content: 別表第八の四の項の地下水汚染の拡大の防止に係る措置の実施のうち、同項下欄第二号に掲げる透過性地下水浄化壁による地下水汚染の拡大の防止のイからハまでの実施が完了した場合
    - title: 四
      content: 別表第六の一の項から六の項までの上欄に掲げる土地に該当する要措置区域において実施措置を講じた場合であり、別表第八の五の項の土壌汚染の除去に係る措置の実施のうち、同項下欄第一号に掲げる基準不適合土壌の掘削による除去のイからニまでの実施が完了した場合又は同欄第二号に掲げる原位置での浄化による除去のイからハまでの実施が完了した場合
    - title: 五
      content: 別表第八の六の項の遮断工封じ込めに係る措置の実施のうち、同項下欄のイからチまでの実施が完了した場合
    - title: 六
      content: 別表第八の七の項の不溶化に係る措置の実施のうち、同項下欄第一号に掲げる原位置不溶化のイからホまでの実施が完了した場合又は同欄第二号に掲げる不溶化埋め戻しのイからホまでの実施が完了した場合
  - paragraph_num: ３
    content: 前項の報告書には、次に掲げる事項を記載しなければならない。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 要措置区域の所在地
    - title: 三
      content: 実施措置の種類
    - title: 四
      content: 実施措置の着手時期及び前項各号に掲げる措置の実施が完了した時期
    - title: 五
      content: 要措置区域外から搬入された土壌を使用した場合にあっては、第四十条第二項第三号に定める方法その他の方法により当該搬入された土壌の特定有害物質による汚染状態を明らかにした調査の土壌の採取を行った地点及び日時、当該土壌の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
    - title: 六
      content: 第三十六条の四第三号に規定する軽微な変更を行った場合にあっては、変更後の基準不適合土壌、特定有害物質又は特定有害物質を含む液体の飛散等、地下への浸透及び地下水汚染の拡大を防止するために講じた措置
    - title: 七
      content: 別表第九の上欄に掲げる実施措置の種類の区分に応じ、それぞれ同表の中欄に定める工事完了の報告事項
  - paragraph_num: ４
    content: 実施措置に係る全ての措置の実施が完了した場合において、次に掲げる事項を記載した様式第十一による報告書を提出して行うものとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 要措置区域の所在地
    - title: 三
      content: 実施措置の種類
    - title: 四
      content: 実施措置の着手時期及び実施措置に係る全ての措置の実施が完了した時期
    - title: 五
      content: 別表第九の上欄に掲げる実施措置の種類の区分に応じ、それぞれ同表の下欄に定める実施措置完了の報告事項
  - paragraph_num: ５
    content: 前二項の報告書には、実施措置が講じられた要措置区域の場所及び実施措置の施行方法を明らかにした書類及び図面を添付しなければならない。
- caption: （要措置区域内における土地の形質の変更の禁止の例外）
  title: 第四十三条
  article_num: '43'
  paragraphs:
  - content: 法第九条第二号の環境省令で定めるものは、次に掲げる行為とする。
    items:
    - title: 一
      content: 次のいずれにも該当しない行為
      subitems:
      - level: 1
        title: イ
        content: 実施措置を講ずるために設けられた構造物に変更を加えること。
      - level: 1
        title: ロ
        content: 土地の形質の変更であって、その対象となる土地の面積の合計が十平方メートル以上であり、かつ、その深さが五十センチメートル以上（地表から一定の深さまでに帯水層（その中にある地下水が飲用に適さないものとして環境大臣が定める要件に該当するものを除く。ハにおいて同じ。）がない旨の都道府県知事の確認を受けた場合にあっては、当該一定の深さより一メートル浅い深さ以上）であること。
      - level: 1
        title: ハ
        content: 土地の形質の変更であって、その深さが三メートル以上（ロの都道府県知事の確認を受けた場合にあっては、当該一定の深さより一メートル浅い深さ以上）であること。
    - title: 二
      content: 土壌汚染の状況その他の必要な情報を把握するために行う土壌の採取及び測定に係るボーリング又は観測井を設けるために行うボーリングであって、次のいずれにも該当すること。
      subitems:
      - level: 1
        title: イ
        content: 基準不適合土壌、特定有害物質若しくは特定有害物質を含む液体のボーリング孔への流出を防止するために必要な措置が講じられているもの
      - level: 1
        title: ロ
        content: 掘削に当たって水等を用いる場合にあっては、当該水等により基準不適合土壌、特定有害物質又は特定有害物質を含む液体の飛散等及び地下への浸透を防止するために必要な措置が講じられているもの
    - title: 三
      content: 実施措置と一体として行われる土地の形質の変更であって、その施行方法が第四十条第二項第一号の環境大臣が定める基準に適合する旨の都道府県知事の確認を受けたもの
    - title: 四
      content: 次のいずれかに該当する要措置区域内における土地の形質の変更であって、その施行方法が第四十条第二項第一号の環境大臣が定める基準に適合する旨の都道府県知事の確認を受けたもの
      subitems:
      - level: 1
        title: イ
        content: 別表第六の一の項の上欄に掲げる土地に該当する要措置区域であって、地下水の水質の測定が講じられているもの
      - level: 1
        title: ロ
        content: 別表第六の一の項から四の項まで及び六の項の上欄に掲げる土地（同表の一の項の上欄に掲げる土地にあっては、土壌の第三種特定有害物質による汚染状態が第二溶出量基準に適合しない土地を除く。）に該当する要措置区域であって、原位置封じ込めが講じられているもの（別表第八の二の項の原位置封じ込めに係る措置の実施のうち、同項下欄のイからチまでの実施が完了しているものに限る。）
      - level: 1
        title: ハ
        content: 別表第六の一の項から四の項まで及び六の項の上欄に掲げる土地（同表の一の項の上欄に掲げる土地にあっては、土壌の第三種特定有害物質による汚染状態が第二溶出量基準に適合しない土地を除く。）に該当する要措置区域であって、遮水工封じ込めが講じられているもの（別表第八の三の項の遮水工封じ込めに係る措置の実施のうち、同項下欄のイからチまでの実施が完了しているものに限る。）
      - level: 1
        title: ニ
        content: 別表第六の一の項から六の項までの上欄に掲げる土地に該当する要措置区域であって、地下水汚染の拡大の防止が講じられているもの
      - level: 1
        title: ホ
        content: 土壌汚染の除去が講じられている要措置区域（別表第八の五の項の土壌汚染の除去に係る措置の実施のうち、同項下欄第一号に掲げる基準不適合土壌の掘削による除去のイからニまでの実施が完了しているもの又は同欄第二号に掲げる原位置での浄化による除去のイからハまで及びホの実施が完了しているものに限る。）
      - level: 1
        title: ヘ
        content: 別表第六の一の項及び三の項から六の項までの上欄に掲げる土地（同表の一の項の上欄に掲げる土地にあっては、土壌の第一種特定有害物質による汚染状態が土壌溶出量基準に適合しない土地を除く。）に該当する要措置区域であって、遮断工封じ込めが講じられているもの（別表第八の六の項の遮断工封じ込めに係る措置の実施のうち、同項下欄のイからチまでの実施が完了しているものに限る。）
      - level: 1
        title: ト
        content: 別表第六の一の項及び四の項の上欄に掲げる土地（同表の一の項の上欄に掲げる土地にあっては、土壌の第一種特定有害物質又は第三種特定有害物質による汚染状態が土壌溶出量基準に適合しない土地及び土壌の第二種特定有害物質による汚染状態が第二溶出量基準に適合しない土地を除く。）に該当する要措置区域であって、不溶化が講じられているもの（別表第八の七の項の不溶化に係る措置の実施のうち、同項下欄第一号に掲げる原位置不溶化のイからホまでの措置の実施が完了しているもの又は同欄第二号に掲げる不溶化埋め戻しのイからホまでの実施が完了しているものに限る。）
- caption: （土地の形質の変更の例外）
  title: 第四十三条の二
  article_num: '43_2'
  paragraphs:
  - content: 一の土壌汚染状況調査の結果に基づき指定された複数の要措置区域の間において、一の要措置区域から搬出された汚染土壌を他の要措置区域内の土地の形質の変更に自ら使用し、又は他人に使用させる場合にあっては、当該土地の形質の変更は、当該汚染土壌が当該他の要措置区域に搬入された日から六十日以内に終了するものとする。
- caption: （帯水層の深さに係る確認の申請）
  title: 第四十四条
  article_num: '44'
  paragraphs:
  - content: 第四十三条第一号ロの確認を受けようとする者は、次に掲げる事項を記載した様式第十二による申請書を提出しなければならない。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 要措置区域の所在地
    - title: 三
      content: 要措置区域のうち地下水位を観測するための井戸を設置した地点及び当該地点に当該井戸を設置した理由
    - title: 四
      content: 前号の地下水位の観測の結果
    - title: 五
      content: 観測された地下水位のうち最も浅いものにおける地下水を含む帯水層の深さ
  - paragraph_num: ２
    content: 前項の申請書には、次に掲げる書類及び図面を添付しなければならない。
    items:
    - title: 一
      content: 前項第三号の井戸の構造図
    - title: 二
      content: 前項第三号の井戸を設置した地点を明らかにした当該要措置区域の図面
    - title: 三
      content: 前項第五号の帯水層の深さを定めた理由を説明する書類
  - paragraph_num: ３
    content: 都道府県知事は、第一項の申請があったときは、同項第三号の井戸を設置した地点及び当該地点に当該井戸を設置した理由並びに同項第四号の観測の結果からみて前項第三号の帯水層の深さを定めた理由が相当であると認められる場合に限り、第四十三条第一号ロの確認をするものとする。
  - paragraph_num: ４
    content: 都道府県知事は、第四十三条第一号ロの確認をする場合において、当該確認に係る地下水位及び帯水層の深さの変化を的確に把握するため必要があると認めるときは、当該確認に、当該地下水位及び帯水層の深さを都道府県知事に定期的に報告することその他の条件を付することができる。
  - paragraph_num: ５
    content: 都道府県知事は、第四十三条第一号ロの確認をした後において、前項の報告その他の資料により当該確認に係る要措置区域において当該確認に係る深さまで帯水層が存在しないと認められなくなったとき又は前項の報告がなかったときは、遅滞なく、当該確認を取り消し、その旨を当該確認を受けた者に通知するものとする。
- caption: （土地の形質の変更に係る確認の申請）
  title: 第四十五条
  article_num: '45'
  paragraphs:
  - content: 第四十三条第三号の確認を受けようとする者は、次に掲げる事項を記載した様式第十三による申請書を提出しなければならない。
