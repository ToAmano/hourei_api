  article_num: '74'
  paragraphs:
  - content: 法第二十条第六項の届出は、様式第三十による届出書を提出して行うものとする。
- caption: （運搬受託者の管理票の保存期間）
  title: 第七十五条
  article_num: '75'
  paragraphs:
  - content: 法第二十条第七項の環境省令で定める期間は、五年とする。
- caption: （処理受託者の管理票の保存期間）
  title: 第七十六条
  article_num: '76'
  paragraphs:
  - content: 法第二十条第八項の環境省令で定める期間は、五年とする。
- caption: （準用）
  title: 第七十六条の二
  article_num: '76_2'
  paragraphs:
  - content: 第六十六条から前条までの規定は、汚染土壌を他人に法第十八条第一項第二号又は第三号に規定する土地の形質の変更に使用させる場合について準用する。
      この場合において、次の表の上欄に掲げる規定中同表の中欄に掲げる字句は、それぞれ同表の下欄に掲げる字句に読み替えるものとする。
    table:
      rows:
      - - 読み替える規定
        - 読み替えられる字句
        - 読み替える字句
      - - 第六十六条第三号
        - 運搬受託者（処理受託者がある場合にあっては、当該処理受託者）
        - 運搬受託者（土壌使用者（法第二十条第九項に規定する土壌使用者をいう。以下同じ。）がある場合にあっては、当該土壌使用者）
      - - 第六十七条第一項第三号
        - 当該要措置区域等の所在地
        - 汚染土壌を法第十八条第一項第二号に規定する土地の形質の変更に使用する場合にあっては、当該自然由来等形質変更時要届出区域の所在地又は汚染土壌を同項第三号に規定する土地の形質の変更に使用する場合にあっては、当該要措置区域等の所在地
      - - 第六十七条第一項第八号
        - 処理受託者
        - 土壌使用者
      - - 第六十七条第一項第九号
        - 当該委託に係る汚染土壌の処理を行う汚染土壌処理施設の名称及び所在地
        - 汚染土壌を法第十八条第一項第二号に規定する土地の形質の変更に使用する場合にあっては、当該搬出先の自然由来等形質変更時要届出区域の所在地又は汚染土壌を同項第三号に規定する土地の形質の変更に使用する場合にあっては、当該搬出先の要措置区域等の所在地
      - - 第七十条見出し
