    - title: 十
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について土地の形質の変更（当該土地の形質の変更に係る部分のうち最も深い位置の深さより一メートルを超える深さの位置に汚染のおそれが生じた場所の位置がある場合の土地の形質の変更を除く。次項第三号、第四十八条第二項第五号、第四十九条第一項第六号、第五十一条第一項第十号、第五十二条の二第二項第三号及び第五十二条の四第一項第七号において同じ。）をしようとするときは、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした調査に係る土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
  - paragraph_num: ２
    content: 前項の申請書には、次に掲げる書類及び図面を添付しなければならない。
    items:
