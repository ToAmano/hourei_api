    - title: 三
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について土地の形質の変更をしようとするときは、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした図面
  - paragraph_num: ３
    content: 都道府県知事は、第一項の申請があったときは、当該申請に係る土地の形質の変更の施行方法が第四十条第二項第一号の環境大臣が定める基準に適合していると認められる場合に限り、第四十三条第四号の確認をするものとする。
- caption: （形質変更時要届出区域の指定の公示）
  title: 第四十七条
  article_num: '47'
  paragraphs:
  - content: 法第十一条第三項において準用する法第六条第二項の規定により、都道府県が行う形質変更時要届出区域（法第十一条第二項に規定する形質変更時要届出区域をいう。以下同じ。）の指定及びその解除の公示は、当該指定及びその解除をする旨、当該形質変更時要届出区域、当該形質変更時要届出区域において土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していない特定有害物質の種類並びに第五十八条第五項第十号から第十三号までに該当するものにあってはその旨並びに指定の解除の公示の場合にあっては当該形質変更時要届出区域において講じられた汚染の除去等の措置を明示して、都道府県又は令第十条に規定する市の公報に掲載して行うものとする。
      この場合において、当該形質変更時要届出区域の明示については、第三十二条後段の規定を準用する。
- caption: （形質変更時要届出区域内における土地の形質の変更の届出）
  title: 第四十八条
  article_num: '48'
  paragraphs:
  - content: 法第十二条第一項の届出は、様式第十五による届出書を提出して行うものとする。
  - paragraph_num: ２
    content: 前項の届出書には、次に掲げる書類及び図面を添付しなければならない。
    items:
    - title: 一
      content: 土地の形質の変更をしようとする場所を明らかにした形質変更時要届出区域の図面
    - title: 二
      content: 土地の形質の変更をしようとする形質変更時要届出区域の状況を明らかにした図面
    - title: 三
      content: 土地の形質の変更の施行方法を明らかにした平面図、立面図及び断面図
    - title: 四
      content: 土地の形質の変更の終了後における当該土地の利用の方法を明らかにした図面
    - title: 五
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について土地の形質の変更をしようとするときは、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 六
      content: 自然由来等形質変更時要届出区域（法第十八条第二項に規定する自然由来等形質変更時要届出区域をいう。以下同じ。）から搬出された自然由来等土壌（同項に規定する自然由来等土壌をいう。以下同じ。）を使用する場合にあっては、次に掲げる書類及び図面
      subitems:
      - level: 1
        title: イ
        content: 当該自然由来等形質変更時要届出区域が形質変更時要届出区域であって、当該土地の土壌の特定有害物質による汚染状態が専ら自然又は専ら当該土地の造成に係る水面埋立てに用いられた土砂に由来するものであることを明らかにした書類
      - level: 1
        title: ロ
        content: 当該自然由来等形質変更時要届出区域内の土地の土壌の特定有害物質による汚染状態を明らかにした図面
      - level: 1
        title: ハ
        content: 土地の形質の変更をしようとする者が当該土地の所有者等でない場合にあっては、自然由来等形質変更時要届出区域から搬出された自然由来等土壌を使用することについての当該土地の所有者等の同意書
  - paragraph_num: ３
    content: 別表第八の一の項第二号、二の項、三の項、四の項第二号、五の項から七の項まで又は十の項第二号に規定するボーリングによる土壌の採取及び測定その他の方法と同等な方法により、土地の形質の変更をしようとする形質変更時要届出区域内の土地の土壌の特定有害物質による汚染状態を把握した場合にあっては、当該汚染状態を明らかにした図面を添付することができる。
- title: 第四十九条
  article_num: '49'
  paragraphs:
  - content: 法第十二条第一項本文の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 土地の形質の変更を行う形質変更時要届出区域の所在地
    - title: 三
      content: 土地の形質の変更の完了予定日
    - title: 四
      content: 土地の形質の変更の施行中に地下水汚染の拡大が確認された場合における対応方法
    - title: 五
      content: 事故、災害その他の緊急事態が発生した場合における対応方法
    - title: 六
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について土地の形質の変更をしようとするときは、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした調査に係る土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
    - title: 七
      content: 自然由来等形質変更時要届出区域から搬出された自然由来等土壌を使用する場合にあっては、当該自然由来等形質変更時要届出区域の所在地
  - paragraph_num: ２
    content: 別表第八の一の項第二号、二の項、三の項、四の項第二号、五の項から七の項まで又は十の項第二号に規定するボーリングによる土壌の採取及び測定その他の方法と同等な方法により、土地の形質の変更をしようとする形質変更時要届出区域内の土地の土壌の特定有害物質による汚染状態を把握した場合にあっては、土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項を記載することができる。
- caption: （施行管理方針の確認の申請）
  title: 第四十九条の二
  article_num: '49_2'
  paragraphs:
  - content: 法第十二条第一項第一号の確認を受けようとする土地の所有者等は、次に掲げる事項を記載した様式第十六による申請書を提出しなければならない。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 法第十二条第一項第一号の土地の形質の変更の施行及び管理に関する方針（以下「施行管理方針」という。）の確認に係る形質変更時要届出区域の所在地
    - title: 三
      content: 次条第一項第二号の表の上欄及び中欄に掲げる土地の区分並びに当該土地の区分に応じた施行管理方針の確認に係る土地の形質の変更の施行方法
    - title: 四
      content: 土地の形質の変更の施行及び管理に係る記録及びその保存の方法
    - title: 五
      content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態が人為等に由来することが確認された場合における対応方法
    - title: 六
      content: 土地の形質の変更の施行中に基準不適合土壌、特定有害物質若しくは特定有害物質を含む液体の飛散等、地下への浸透又は地下水汚染の拡大が確認された場合における対応方法
    - title: 七
      content: 前各号に掲げるもののほか、土地の所有者等が自主的に実施する事項その他都道府県知事が必要と認める事項
  - paragraph_num: ２
    content: 前項の申請書には、次に掲げる図面及び書類を添付しなければならない。
    items:
    - title: 一
      content: 施行管理方針の確認に係る土地の周辺の地図
    - title: 二
      content: 施行管理方針の確認に係る土地の場所を明らかにした図面
    - title: 三
      content: 施行管理方針の確認に係る土地が第四十九条の四及び第四十九条の五に規定する要件に該当することを証する書類
    - title: 四
      content: 施行管理方針の確認に係る土地を次条第一項第二号の表の上欄及び中欄に掲げる土地に区分した図面
    - title: 五
      content: 申請者が施行管理方針の確認に係る土地の所有者等であることを証する書類
    - title: 六
      content: 施行管理方針の確認に係る土地に申請者以外の所有者等がいる場合にあっては、これらの所有者等全員の当該申請することについての合意を得たことを証する書類
- caption: （施行管理方針に係る基準）
  title: 第四十九条の三
  article_num: '49_3'
  paragraphs:
  - content: 法第十二条第一項第一号の環境省令で定める基準のうち土地の形質の変更の施行に関する方針の基準は、次のとおりとする。
    items:
    - title: 一
      content: 施行管理方針の確認に係る土地を次号の表の上欄及び中欄に掲げる土地に区分すること。
    - title: 二
      content: 次の表の上欄及び中欄に掲げる土地の区分に応じ、それぞれ同表下欄に掲げる施行方法とすること。
      table:
        rows:
        - - 施行管理方針の確認に係る土地
          - 土地の土壌の汚染状態が人為等に由来するおそれがない土地又は第三条の二第一号若しくは第二号に掲げる土地
          - 土地の形質の変更の施行方法
        - - 一　土地の土壌の特定有害物質による汚染状態が自然に由来する土地
          - 人為等に由来するおそれがない土地又は第三条の二第一号に掲げる土地
          - 第五十三条第二号から第四号までに定める基準に適合する施行方法
        - - ''
          - 第三条の二第二号に掲げる土地
          - 第五十三条各号に定める基準に適合する施行方法
        - - 二　土地の土壌の特定有害物質による汚染状態が昭和五十二年三月十五日以降に公有水面埋立法による埋立て若しくは干拓の事業により造成が開始された土地（廃棄物が埋め立てられている場所を除く。）又は大正十一年四月十日から昭和五十二年三月十四日までに公有水面埋立法による埋立て若しくは干拓の事業により造成が開始された土地（当該土地の土壌の第一種特定有害物質、第三種特定有害物質及び令第一条第五号に掲げる特定有害物質による汚染状態が土壌溶出量基準及び土壌含有量基準に適合する土地（廃棄物が埋め立てられている場所を除く。）に限る。）の土壌に由来する土地であって、当該土地の土壌の特定有害物質による汚染状態が第二溶出量基準に適合する土地
          - 人為等に由来するおそれがない土地又は第三条の二第一号に掲げる土地
          - 第五十三条第二号から第四号までに定める基準に適合する施行方法
        - - 第三条の二第二号に掲げる土地
          - 第五十三条第一号ロの環境大臣が定める基準に適合する施行方法及び第五十三条第二号から第四号までに定める基準に適合する施行方法
        - - 三　土地の土壌の特定有害物質による汚染状態が大正十一年四月十日以降に公有水面埋立法による埋立て又は干拓の事業により造成が開始された土地（二の項を除く。）の土壌に由来する土地
          - 人為等に由来するおそれがない土地又は第三条の二第一号若しくは第二号に掲げる土地
          - 第五十三条第一号ロの環境大臣が定める基準に適合する施行方法及び第五十三条第二号から第四号までに定める基準に適合する施行方法
        - - 四　土地の土壌の特定有害物質による汚染状態が大正十一年四月九日以前に埋立て又は干拓の事業により造成が開始された土地の土壌に由来する土地
          - 人為等に由来するおそれがない土地又は第三条の二第一号若しくは第二号に掲げる土地
          - 第五十三条各号に定める基準に適合する施行方法
  - paragraph_num: ２
    content: 法第十二条第一項第一号の環境省令で定める基準のうち土地の形質の変更の管理に関する方針の基準は、次のとおりとする。
    items:
    - title: 一
      content: 土地の形質の変更（第五十条に定める土地の形質の変更を除く。以下この号において同じ。）を行う者は、次に掲げる事項を記録し、土地の所有者等は、当該記録をその作成の日から五年間保存すること。
      subitems:
      - level: 1
        title: イ
        content: 土地の形質の変更の種類
      - level: 1
        title: ロ
        content: 土地の形質の変更の場所
      - level: 1
        title: ハ
        content: 土地の形質の変更の施行方法
      - level: 1
        title: ニ
        content: 土地の形質の変更の着手日及び完了日（土地の形質の変更を施行中である場合にあっては完了予定日）
      - level: 1
        title: ホ
        content: 土地の形質の変更の範囲及び深さ
      - level: 1
        title: ヘ
        content: 土地の形質の変更の施行中の基準不適合土壌、特定有害物質若しくは特定有害物質を含む液体の飛散等、地下への浸透又は地下水汚染の拡大の有無及び飛散等、地下への浸透又は地下水汚染の拡大を確認した場合にあっては、当該飛散等、地下への浸透又は地下水汚染の拡大を防止するために実施した措置
      - level: 1
        title: ト
        content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態
- caption: （汚染が専ら自然又は専ら土地の造成に係る水面埋立てに用いられた土砂に由来するものに係る要件）
  title: 第四十九条の四
  article_num: '49_4'
  paragraphs:
  - content: 法第十二条第一項第一号イの環境省令で定める要件は、次の各号のいずれかに該当することとする。
    items:
    - title: 一
      content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態が専ら自然に由来するものとして次の要件のいずれにも該当すると認められること。
      subitems:
      - level: 1
        title: イ
        content: 施行管理方針の確認に係る土地を含む形質変更時要届出区域の指定に係る特定有害物質の種類が第二種特定有害物質（令第一条第五号に掲げる特定有害物質の種類を除く。）であること。
      - level: 1
        title: ロ
        content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態が地質的に同質な状態で広がっていること。
      - level: 1
        title: ハ
        content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態が第二溶出量基準に適合するものであること。
      - level: 1
        title: ニ
        content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態が土地の造成に係る水面埋立てに用いられた土砂及び人為等に由来するおそれがない土地、土地の造成に係る水面埋立てに用いられた土砂に由来するおそれがない土地であって、第三条の二第一号若しくは第二号に掲げる土地又は土壌汚染状況調査若しくは第三条から第十五条までに定める方法に準じた方法により調査した結果、土地の造成に係る水面埋立てに用いられた土砂及び人為等に由来する土地でないと認められる土地であること。
    - title: 二
      content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態が専ら土地の造成に係る水面埋立てに用いられた土砂に由来するものとして次の要件のいずれにも該当すると認められること。
      subitems:
      - level: 1
        title: イ
        content: 水面埋立てに用いられた土砂が次のいずれかに該当すること。
        subitems:
        - level: 2
          title: （１）
          content: 大正十一年四月十日以降に公有水面埋立法による埋立て又は干拓の事業により造成が開始された土地（廃棄物が埋め立てられている場所を除く。）であって、当該造成時の水面埋立てに用いられた土砂であること。
        - level: 2
          title: （２）
          content: 大正十一年四月九日以前に水面の埋立て又は干拓の事業により造成が開始されたことが明らかな土地（廃棄物が埋め立てられている場所を除く。）であって、当該造成時の水面埋立てに用いられた土砂であること。
        - level: 2
          title: （３）
          content: （１）又は（２）の土地と隣接する土地（廃棄物が埋め立てられている場所を除く。）であって、（１）又は（２）の事業と同一の事業により造成が開始された土地における当該（１）又は（２）の造成時の水面埋立てに用いられた土砂と同一の土砂であること。
      - level: 1
        title: ロ
        content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態が人為等に由来するおそれがない土地、第三条の二第一号若しくは第二号に掲げる土地又は土壌汚染状況調査若しくは第三条から第十五条までに定める方法に準じた方法により調査した結果、人為等に由来する土地でないと認められる土地であること。
- caption: （法第十二条第一項第一号ロの環境省令で定める要件）
  title: 第四十九条の五
  article_num: '49_5'
  paragraphs:
  - content: 法第十二条第一項第一号ロの環境省令で定める要件は、次の各号のいずれにも該当することとする。
    items:
    - title: 一
      content: 都市計画法（昭和四十三年法律第百号）第八条第一項第一号の工業専用地域（港湾法第三十九条第一項の規定により指定された分区であって、同法第四十条第一項（同法第五十条の五第二項の規定により読み替えて適用する場合を含む。以下この号において同じ。）の条例により建築基準法（昭和二十五年法律第二百一号）別表第二（わ）項に掲げる建築物を建設してはならないことが定められている区域以外の区域を除く。）又は港湾法第三十九条第一項第三号の工業港区（都市計画法第八条第一項第一号の工業専用地域である区域を除く。）であって港湾法第四十条第一項の条例により建築基準法別表第二（わ）項に掲げる建築物を建設してはならないことが定められている区域（以下「工業専用地域等」という。）であること。
    - title: 二
      content: 施行管理方針の確認に係る土地から海域までの間の地下水の下流側に工業専用地域等以外の地域がないこと。
- caption: （形質変更時要届出区域内における土地の形質の変更の届出を要しない通常の管理行為、軽易な行為その他の行為）
  title: 第五十条
  article_num: '50'
  paragraphs:
  - content: 法第十二条第一項第二号の環境省令で定めるものは、次に掲げる行為とする。
    items:
    - title: 一
      content: 次のいずれにも該当しない行為
      subitems:
      - level: 1
        title: イ
        content: 汚染の除去等の措置を講ずるために設けられた構造物に変更を加えること。
      - level: 1
        title: ロ
        content: 土地の形質の変更であって、その対象となる土地の面積の合計が十平方メートル以上であり、かつ、その深さが五十センチメートル以上（地表から一定の深さまでに帯水層（その中にある地下水が飲用に適さないものとして第四十三条第一号ロの環境大臣が定める要件に該当するものを除く。ハにおいて同じ。）がない旨の都道府県知事の確認を受けた場合にあっては、当該一定の深さより一メートル浅い深さ以上）であること。
      - level: 1
        title: ハ
        content: 土地の形質の変更であって、その深さが三メートル以上（ロの都道府県知事の確認を受けた場合にあっては、当該一定の深さより一メートル浅い深さ以上）であること。
      - level: 1
        title: ニ
        content: 他の自然由来等形質変更時要届出区域内の土地の形質の変更に自然由来等形質変更時要届出区域内の自然由来等土壌を、自ら使用し、若しくは他人に使用させるために、当該自然由来等形質変更時要届出区域内で土地の形質の変更を行うこと又は一の土壌汚染状況調査の結果に基づき指定された複数の形質変更時要届出区域の間において、他の形質変更時要届出区域内の土地の形質の変更に一の形質変更時要届出区域から搬出された汚染土壌を、自ら使用し、若しくは他人に使用させるために、当該形質変更時要届出区域内で土地の形質の変更を行うこと。
      - level: 1
        title: ホ
        content: 自然由来等形質変更時要届出区域内の自然由来等土壌を、他の自然由来等形質変更時要届出区域内の土地の形質の変更に自ら使用し、若しくは他人に使用させること又は一の土壌汚染状況調査の結果に基づき指定された複数の形質変更時要届出区域の間において、一の形質変更時要届出区域から搬出された汚染土壌を他の形質変更時要届出区域内の土地の形質の変更に自ら使用し、若しくは他人に使用させること。
    - title: 二
      content: 土壌汚染の状況その他の必要な情報を把握するために行う土壌の採取及び測定に係るボーリング又は観測井を設けるために行うボーリングであって、次のいずれにも該当すること。
      subitems:
      - level: 1
        title: イ
        content: 基準不適合土壌又は特定有害物質のボーリング孔への流出を防止するために必要な措置が講じられているもの
      - level: 1
        title: ロ
        content: 掘削に当たって水等を用いる場合にあっては、当該水等により基準不適合土壌、特定有害物質又は特定有害物質を含む液体の飛散等及び地下への浸透を防止するために必要な措置が講じられているもの
    - title: 三
      content: 土地の形質の変更であって、その施行方法が第四十条第二項第一号の環境大臣が定める基準に適合する旨の都道府県知事の確認を受けたもの
  - paragraph_num: ２
    content: 第四十四条の規定は、前項第一号ロの確認を受けようとする者について準用する。 この場合において、同条中「要措置区域」とあるのは「形質変更時要届出区域」と読み替えるものとする。
  - paragraph_num: ３
    content: 第四十六条の規定は、第一項第三号の確認を受けようとする者について準用する。 この場合において、同条中「要措置区域」とあるのは「形質変更時要届出区域」と読み替えるものとする。
  - paragraph_num: ４
    content: 第四十三条第一号ロの確認に係る要措置区域が法第十一条第一項の規定により形質変更時要届出区域として指定された場合においては、当該形質変更時要届出区域は、第一項第一号ロの確認に係る形質変更時要届出区域とみなす。
  - paragraph_num: ５
    content: 第一項第一号ロの確認に係る形質変更時要届出区域が法第六条第一項の規定により要措置区域として指定された場合においては、当該要措置区域は、第四十三条第一号ロの確認に係る要措置区域とみなす。
- caption: （既に土地の形質の変更に着手している者の届出）
  title: 第五十一条
  article_num: '51'
  paragraphs:
  - content: 法第十二条第二項の届出は、次に掲げる事項を記載した様式第十五による届出書を提出して行うものとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 土地の形質の変更をしている形質変更時要届出区域の所在地
    - title: 三
      content: 土地の形質の変更の種類
    - title: 四
      content: 土地の形質の変更の場所
    - title: 五
      content: 土地の形質の変更の施行方法
    - title: 六
      content: 土地の形質の変更の着手日
    - title: 七
      content: 土地の形質の変更の完了日又は完了予定日
    - title: 八
      content: 土地の形質の変更の施行中に地下水汚染の拡大が確認された場合の対応方法
    - title: 九
      content: 事故、災害その他の緊急事態が発生した場合における対応方法
    - title: 十
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について土地の形質の変更をしているときは、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした調査に係る土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
    - title: 十一
      content: 自然由来等形質変更時要届出区域から搬出された自然由来等土壌を使用する場合にあっては、当該自然由来等形質変更時要届出区域の所在地
  - paragraph_num: ２
    content: 第四十八条第二項及び第三項の規定は、前項の届出について準用する。 この場合において、同条中「をしようとする」とあるのは、「をしている」と読み替えるものとする。
- caption: （非常災害のために必要な応急措置として土地の形質の変更をした者の届出）
  title: 第五十二条
  article_num: '52'
  paragraphs:
  - content: 第四十八条第二項及び第三項並びに前条第一項（第八号及び第九号を除く。）の規定は、法第十二条第三項の届出について準用する。 この場合において、第四十八条中「をしようとする」とあり、及び前条第一項中「変更をしている」とあるのは「変更をした」と、同項第七号中「完了日又は完了予定日」とあるのは「完了日」と、それぞれ読み替えるものとする。
- caption: （施行管理方針の確認に係る土地における土地の形質の変更の届出）
  title: 第五十二条の二
  article_num: '52_2'
  paragraphs:
  - content: 法第十二条第四項の届出は、様式第十七による届出書を提出して行うものとする。
  - paragraph_num: ２
    content: 前項の届出書には、次に掲げる書類及び図面を添付しなければならない。
    items:
    - title: 一
      content: 法第十二条第四項の期間の開始の日から当該期間の終了の日までの間に行った土地の形質の変更ごとに施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 二
      content: 土地の形質の変更の施行方法を明らかにした平面図、立面図及び断面図
    - title: 三
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について土地の形質の変更をしたときにあっては、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 四
      content: 自然由来等形質変更時要届出区域から搬出された自然由来等土壌を使用した場合にあっては、次に掲げる書類及び図面
      subitems:
      - level: 1
        title: イ
        content: 当該自然由来等形質変更時要届出区域が形質変更時要届出区域であって、当該土地の土壌の特定有害物質による汚染状態が専ら自然又は専ら当該土地の造成に係る水面埋立てに用いられた土砂に由来するものであることを明らかにした書類
      - level: 1
        title: ロ
        content: 当該自然由来等形質変更時要届出区域内の土地の土壌の特定有害物質による汚染状態を明らかにした図面
      - level: 1
        title: ハ
        content: 土地の形質の変更をした者が当該土地の所有者等でない場合にあっては、自然由来等形質変更時要届出区域から搬出された自然由来等土壌を使用したことについての当該土地の所有者等の同意書
  - paragraph_num: ３
    content: 第一項の届出書には、施行管理方針の確認を受けた土地の区域内の土壌の移動又は区域外からの土壌の搬入若しくは区域外への土壌の搬出を行った場合にあっては、当該区域の土壌の特定有害物質による汚染状態を明らかにした図面を添付することができる。
- caption: （施行管理方針の確認に係る土地における土地の形質の変更の届出期間）
  title: 第五十二条の三
  article_num: '52_3'
  paragraphs:
  - content: 法第十二条第四項の環境省令で定める期間は、一年とする。
- caption: （施行管理方針の確認に係る土地における土地の形質の変更の届出）
  title: 第五十二条の四
  article_num: '52_4'
  paragraphs:
  - content: 法第十二条第四項の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 土地の形質の変更を行った形質変更時要届出区域の所在地
    - title: 三
      content: 土地の形質の変更の施行方法
    - title: 四
      content: 土地の形質の変更の着手日
    - title: 五
      content: 土地の形質の変更の完了日
    - title: 六
      content: 土地の形質の変更の施行中に基準不適合土壌、特定有害物質若しくは特定有害物質を含む液体の飛散等、地下への浸透又は地下水汚染の拡大の有無及び当該飛散等、地下への浸透又は地下水汚染の拡大を確認した場合にあっては、次条の届出の日及び当該飛散等、地下への浸透又は地下水汚染の拡大を防止するために実施した措置
    - title: 七
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について土地の形質の変更をしたときにあっては、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした調査に係る土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
    - title: 八
      content: 自然由来等形質変更時要届出区域から搬出された自然由来等土壌を使用した場合にあっては、当該自然由来等形質変更時要届出区域の所在地
  - paragraph_num: ２
    content: 施行管理方針の確認を受けた土地の区域内の土壌の移動又は区域外からの土壌の搬入若しくは区域外への土壌の搬出を行った場合にあっては、その旨、当該土壌の量、当該土壌の移動又は土壌の搬入若しくは土壌の搬出を行った場所並びに第四十条第二項第三号に定める方法により、当該土壌の特定有害物質による汚染状態を明らかにした調査に係る土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項を記載することができる。
- caption: （施行管理方針の確認に係る土地の汚染状態が人為等に由来することが確認された場合等の届出）
  title: 第五十二条の五
  article_num: '52_5'
  paragraphs:
  - content: 土地の所有者等は、施行管理方針の確認を受けた土地の土壌の特定有害物質による汚染状態が人為等に由来することが確認された場合又は土地の形質の変更の施行中に基準不適合土壌、特定有害物質若しくは特定有害物質を含む液体の飛散等、地下への浸透若しくは地下水汚染の拡大が確認された場合は、次に掲げる事項を記載した様式第十八の届出書により都道府県知事に届け出なければならない。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 施行管理方針の確認を受けた土地の形質変更時要届出区域の所在地
    - title: 三
      content: 人為等に由来することが確認された土地の場所又は飛散等、地下への浸透若しくは地下水汚染の拡大が確認された土地の場所
    - title: 四
      content: 人為等に由来することが確認された土地の土壌の特定有害物質の種類又は飛散等、地下への浸透若しくは地下水汚染の拡大が確認された特定有害物質の種類
    - title: 五
      content: 人為等に由来することが確認された年月日又は飛散等、地下への浸透若しくは地下水汚染の拡大が確認された年月日
    - title: 六
      content: 飛散等、地下への浸透又は地下水汚染の拡大が確認された場合にあっては、当該飛散等、地下への浸透又は地下水汚染の拡大を防止するために実施した措置
  - paragraph_num: ２
    content: 前項の届出書には、土壌の特定有害物質による汚染状態が人為等に由来することが確認された場所又は基準不適合土壌、特定有害物質若しくは特定有害物質を含む液体の飛散等、地下への浸透又は地下水汚染の拡大が確認された場所を明らかにした図面を添付しなければならない。
- caption: （施行管理方針の変更の届出）
  title: 第五十二条の六
  article_num: '52_6'
  paragraphs:
  - content: 土地の所有者等は、法第十二条第一項第一号の確認を受けた施行管理方針のうち第四十九条の二第一項第二号及び第三号に掲げる事項を変更しようとするときは、あらかじめ、様式第十六の届出書により都道府県知事に届け出なければならない。
  - paragraph_num: ２
    content: 土地の所有者等は、法第十二条第一項第一号の確認を受けた施行管理方針のうち第四十九条の二第一項第一号及び第四号から第七号までに掲げる事項を変更したときは、遅滞なく、様式第十六の届出書により都道府県知事に届け出なければならない。
- caption: （施行管理方針の廃止の届出）
  title: 第五十二条の七
  article_num: '52_7'
  paragraphs:
  - content: 土地の所有者等は、施行管理方針を廃止しようとするときは、次の掲げる事項を記載した様式第十九の届出書により都道府県知事に届け出なければならない。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 施行管理方針の確認を受けた土地の形質変更時要届出区域の所在地
    - title: 三
      content: 施行管理方針を廃止する場所
    - title: 四
      content: 施行管理方針の確認を受けた年月日
    - title: 五
      content: 施行管理方針の廃止予定年月日
    - title: 六
      content: 施行管理方針を廃止する理由
    - title: 七
      content: 施行管理方針の廃止に係る土地の土壌の特定有害物質による汚染状態
    - title: 八
      content: 施行管理方針の廃止に係る土地の土壌の特定有害物質による汚染状態が人為等に由来する汚染のおそれがある場合にあっては、当該特定有害物質の種類
  - paragraph_num: ２
    content: 前項の届出書には、法第十二条第四項の期間の開始の日から廃止の日までの間に行った土地の形質の変更ごとに施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態を明らかにした図面を添付しなければならない。
  - paragraph_num: ３
    content: 都道府県知事は、第一項の規定による届出を受けた場合は、当該土地の土壌の特定有害物質による汚染の状況について、第三条から第十五条までに定める方法に準じた方法により当該土地の所有者等が調査した結果その他の情報により把握するものとする。
- caption: （施行管理方針の確認の取消し）
  title: 第五十二条の八
  article_num: '52_8'
  paragraphs:
  - content: 都道府県知事は、次の各号のいずれかに該当するときは、法第十二条第一項第一号の確認を取り消すことができる。
    items:
    - title: 一
      content: 施行管理方針が第四十九条の三の基準に適合しなくなったとき。
    - title: 二
      content: 施行管理方針の確認に係る土地が第四十九条の四及び第四十九条の五に規定する要件に該当しなくなったとき。
    - title: 三
      content: 土地の形質の変更をした者が法第十二条第四項の届出を行わなかったとき。
  - paragraph_num: ２
    content: 都道府県知事は、前項の規定により確認を取り消した場合は、当該土地の土壌の特定有害物質による汚染の状況について、第三条から第十五条までに定める方法に準じた方法により当該土地の所有者等が調査した結果その他の情報により把握するものとする。
- caption: （土地の形質の変更の施行方法に関する基準）
  title: 第五十三条
  article_num: '53'
  paragraphs:
  - content: 法第十二条第五項の環境省令で定める基準は、次のとおりとする。
    items:
    - title: 一
      content: 土壌溶出量基準に適合しない汚染状態にある土壌が形質変更時要届出区域内の帯水層に接する場合にあっては、土地の形質の変更（施行管理方針の確認を受けた土地の形質の変更を除く。この条において同じ。）の施行方法が第四十条第二項第一号の環境大臣が定める基準に適合すること。
        ただし、次のいずれかに該当する場合は、この限りでない。
      subitems:
      - level: 1
        title: イ
        content: 第五十八条第五項第十号又は第十一号に該当する区域内における土地の形質の変更である場合
      - level: 1
        title: ロ
        content: 第五十八条第五項第十二号に該当する区域内における土地の形質の変更であって、その施行方法が環境大臣が定める基準に適合するものである場合
    - title: 二
      content: 前号に定めるもののほか、土地の形質の変更に当たり、基準不適合土壌、特定有害物質又は特定有害物質を含む液体の飛散等を防止するために必要な措置を講ずること。
    - title: 三
      content: 形質変更時要届出区域の指定に係る土壌汚染状況調査と一の土壌汚染状況調査により指定された他の形質変更時要届出区域から搬出された汚染土壌を使用する場合にあっては、当該土壌の使用に伴い、人の健康に係る被害が生ずるおそれがないようにすること。
    - title: 四
      content: 土地の形質の変更を行った後、法第七条第四項の技術的基準に適合する汚染の除去等の措置が講じられた場合と同等以上に人の健康に係る被害が生ずるおそれがないようにすること。
- caption: （土地の形質の変更の例外）
  title: 第五十三条の二
  article_num: '53_2'
  paragraphs:
  - content: 自然由来等形質変更時要届出区域内の自然由来等土壌を他の自然由来等形質変更時要届出区域内の土地の形質の変更に自ら使用し、又は他人に使用させる場合にあっては、当該土地の形質の変更は、当該自然由来等土壌が当該他の自然由来等形質変更時要届出区域に搬入された日から六十日以内に終了するものとする。
  - paragraph_num: ２
    content: 一の土壌汚染状況調査の結果に基づき指定された複数の形質変更時要届出区域の間において、一の形質変更時要届出区域から搬出された汚染土壌を他の形質変更時要届出区域内の土地の形質の変更に自ら使用し、又は他人に使用させる場合にあっては、当該土地の形質の変更は、当該汚染土壌が当該他の形質変更時要届出区域に搬入された日から六十日以内に終了するものとする。
- caption: （指定の申請）
  title: 第五十四条
  article_num: '54'
  paragraphs:
  - content: 法第十四条第一項の申請は、様式第二十による申請書を提出して行うものとする。
- title: 第五十五条
  article_num: '55'
  paragraphs:
  - content: 法第十四条第二項の環境省令で定める事項は、次のとおりとする。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 申請に係る土地の所在地
    - title: 三
      content: 申請に係る調査における試料採取等対象物質
    - title: 四
      content: 申請に係る調査において土壌その他の試料の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称
    - title: 五
      content: 申請に係る調査を行った者の氏名又は名称
- title: 第五十六条
  article_num: '56'
  paragraphs:
  - content: 法第十四条第二項の環境省令で定める書類は、次のとおりとする。
    items:
    - title: 一
      content: 申請に係る土地の周辺の地図
    - title: 二
      content: 申請に係る土地の場所を明らかにした図面
    - title: 三
      content: 申請に係る土地の土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 四
      content: 申請者が申請に係る土地の所有者等であることを証する書類
    - title: 五
      content: 申請に係る土地に申請者以外の所有者等がいる場合にあっては、これらの所有者等全員の当該申請することについての合意を得たことを証する書類
- title: 第五十七条
  article_num: '57'
  paragraphs:
  - content: 法第十四条第四項の規定により立入検査をする職員は、その身分を示す様式第二十一による証明書を携帯し、関係者に提示しなければならない。
- caption: （台帳）
  title: 第五十八条
  article_num: '58'
  paragraphs:
  - content: 法第十五条第一項の台帳は、帳簿及び図面をもって調製するものとする。
  - paragraph_num: ２
    content: 法第六条第一項の規定により要措置区域が指定された場合、又は法第十一条第一項の規定により形質変更時要届出区域が指定された場合には、都道府県知事は、当該要措置区域又は形質変更時要届出区域に係る前項の帳簿及び図面を調製するものとする。
  - paragraph_num: ３
    content: 法第六条第四項又は法第十一条第二項の規定により要措置区域等（法第十六条第一項に規定する要措置区域等をいう。以下同じ。）の全部又は一部の指定が解除された場合には、都道府県知事は、当該要措置区域等の全部又は一部に係る帳簿及び図面を台帳から消除し、法第六条第四項の規定により同条第一項の指定が解除された要措置区域（以下「指定解除要措置区域」という。）又は法第十一条第二項の規定により同条第一項の指定が解除された形質変更時要届出区域（以下「指定解除形質変更時要届出区域」という。）に係る第一項の帳簿及び図面を調製するものとする。
  - paragraph_num: ４
    content: 第一項の帳簿及び図面であって、要措置区域、形質変更時要届出区域、指定解除要措置区域又は指定解除形質変更時要届出区域に関するものは、それぞれ区別して保管しなければならない。
  - paragraph_num: ５
    content: 要措置区域等に係る第一項の帳簿は、少なくとも次に掲げる事項を記載するものとし、その様式は、要措置区域にあっては様式第二十二、形質変更時要届出区域にあっては様式第二十三のとおりとする。
    items:
    - title: 一
      content: 要措置区域等に指定された年月日
    - title: 二
      content: 要措置区域等の所在地
    - title: 三
      content: 要措置区域等の概況
    - title: 四
      content: 法第十四条第三項の規定により指定された要措置区域等にあっては、その旨
    - title: 五
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合はその旨、当該試料採取等の対象としなかった深さの位置及び当該深さの位置の土壌の汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれがある特定有害物質の種類
    - title: 六
      content: 要措置区域等内の土壌の汚染状態並びに第十一条第一項、第十三条第一項、第十三条の二第一項、第十四条第一項又は第十四条の二第一項の規定により土壌汚染状況調査の対象地の土壌汚染のおそれの把握等、試料採取等を行う区画の選定等又は試料採取等を省略した場合における土壌汚染状況調査（法第十四条第三項の規定により指定された要措置区域等にあっては、同項の規定により土壌汚染状況調査とみなされた申請に係る調査。第七項第一号において同じ。）の結果により法第六条第一項、第十一条第一項又は第十四条第三項の規定により指定された要措置区域等にあっては、当該省略をした旨及びその理由
    - title: 七
      content: 土壌汚染状況調査を行った指定調査機関（法第十四条第三項の規定により指定された要措置区域等にあっては、同項の規定により土壌汚染状況調査とみなされた申請に係る調査を行った者）の氏名又は名称
    - title: 八
      content: 要措置区域（土壌溶出量基準に係るものに限る。）にあっては、地下水汚染の有無
    - title: 九
      content: 形質変更時要届出区域であって法第七条第四項の技術的基準に適合する汚染の除去等の措置が講じられたものにあっては、その旨及び当該汚染の除去等の措置
    - title: 十
      content: 自然由来特例区域（形質変更時要届出区域（自然由来盛土等に使用した土壌がある区域を含む。）であって当該形質変更時要届出区域内の土地の土壌の特定有害物質による汚染状態が専ら自然に由来すると認められるもの（当該土地の土壌の第二種特定有害物質（令第一条第五号に掲げる特定有害物質の種類を除く。）による汚染状態が土壌溶出量基準又は土壌含有量基準に適合せず、かつ、第二溶出量基準に適合するものに限る。）をいう。）にあっては、その旨（自然由来盛土等に使用した土壌がある区域である場合にあっては、その旨を含む。）
    - title: 十一
      content: 埋立地特例区域（形質変更時要届出区域であって、当該形質変更時要届出区域内の土地の土壌の特定有害物質による汚染状態が土地の造成に係る水面埋立てに用いられた土砂に由来するものであって、次の要件のいずれにも該当すると認められるものをいう。）にあっては、その旨
      subitems:
      - level: 1
        title: イ
        content: 昭和五十二年三月十五日以降に公有水面埋立法による埋立て若しくは干拓の事業により造成が開始された土地（廃棄物が埋め立てられている場所を除く。）又は大正十一年四月十日から昭和五十二年三月十四日までに公有水面埋立法による埋立て若しくは干拓の事業により造成が開始された土地（当該土地の土壌の第一種特定有害物質、第三種特定有害物質及び令第一条第五号に掲げる特定有害物質による汚染状態が土壌溶出量基準及び土壌含有量基準に適合する土地（廃棄物が埋め立てられている場所を除く。）に限る。）であって、当該土地の土壌の特定有害物質による汚染状態が第二溶出量基準に適合するもの
      - level: 1
        title: ロ
        content: 土地の土壌の特定有害物質による汚染状態が人為等に由来するおそれがない土地であること、当該汚染状態が人為等に由来するおそれがある土地であって、第三条の二第一号に掲げる土地の区分に分類した土地であること又は土壌汚染状況調査その他第三条から第十五条までに定める方法に準じた方法により調査した結果、当該汚染状態が人為等に由来する土地でないと認められるもの
    - title: 十二
      content: 埋立地管理区域（形質変更時要届出区域であって、当該形質変更時要届出区域内の土地が公有水面埋立法による埋立て又は干拓の事業により造成が開始された土地として次の要件のいずれかに該当すると認められるものをいう。）にあっては、その旨
      subitems:
      - level: 1
        title: イ
        content: 工業専用地域内にある土地
      - level: 1
        title: ロ
        content: イに掲げる土地以外の土地であって当該土地又はその周辺の土地にある地下水の利用状況その他の状況が工業専用地域内にある土地と同等以上に将来にわたり第三十条の要件に該当しないと認められるもの
    - title: 十三
      content: 臨海部特例区域（形質変更時要届出区域であって、法第十二条第一項第一号の確認を受けた施行管理方針の確認に係る土地の区域をいう。第七項第五号において同じ。）にあっては、その旨
    - title: 十四
      content: 土地の形質の変更の実施状況
  - paragraph_num: ６
    content: 指定解除要措置区域又は指定解除形質変更時要届出区域（以下「指定解除要措置区域等」という。）に係る第一項の帳簿は、少なくとも次に掲げる事項を記載するものとする。
    items:
    - title: 一
      content: 指定解除要措置区域等に関する前項各号までの事項
    - title: 二
      content: 要措置区域等の指定が解除された年月日
    - title: 三
      content: 要措置区域等の指定が解除された理由となった汚染の除去等の措置
    - title: 四
      content: 要措置区域の指定が解除されたときに形質変更時要届出区域に指定された場合又は形質変更時要届出区域の指定が解除されたときに要措置区域に指定された場合にあっては、その旨
  - paragraph_num: ７
    content: 要措置区域等に係る第一項の図面は、次のとおりとする。
    items:
    - title: 一
      content: 土壌汚染状況調査において土壌その他の試料の採取を行った地点及び要措置区域等内の土地の土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 二
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合は当該試料採取等の対象としなかった深さの位置を明らかにした図面
    - title: 三
      content: 別表第八の一の項第二号、二の項、三の項、四の項第二号、五の項から七の項まで若しくは十の項第二号に規定するボーリングによる土壌の採取及び測定その他の方法又はこれと同等な方法により、要措置区域等内の土地の土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 四
      content: 汚染の除去等の措置の実施場所及び施行方法を明らかにした図面
    - title: 五
      content: 臨海部特例区域にあっては、次に掲げる図面
      subitems:
      - level: 1
        title: イ
        content: 施行管理方針の確認に係る土地の場所を明らかにした図面
      - level: 1
        title: ロ
        content: 施行管理方針の確認に係る土地を第四十九条の三第一項第二号の表の上欄及び中欄に掲げる土地に区分した図面
      - level: 1
        title: ハ
        content: 施行管理方針の確認に係る土地の土壌の特定有害物質による汚染状態が人為等に由来することが確認された場合又は土地の形質の変更の施行中に基準不適合土壌、特定有害物質若しくは特定有害物質を含む液体の飛散等、地下への浸透若しくは地下水汚染の拡大が確認された場合にあっては、土壌の特定有害物質による汚染状態が人為等に由来することが確認された場所又は飛散等、地下への浸透若しくは地下水汚染の拡大が確認された場所を明らかにした図面
      - level: 1
        title: ニ
        content: 施行管理方針の確認を受けた土地の区域内の土壌の移動又は区域外からの土壌の搬入若しくは区域外への土壌の搬出を行った場合であり、第五十二条の二第三項の規定により図面を添付したときは、当該区域の土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 六
      content: 土地の形質の変更を行った場合にあっては、実施措置又は土地の形質の変更の施行方法を明らかにした平面図、立面図及び断面図
    - title: 七
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について汚染の除去等の措置を講じたとき又は土地の形質の変更をしたときにあっては、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 八
      content: 法第十六条第一項の調査（第六十条第一項第三号において「認定調査」という。）を行った場合にあっては、土壌の掘削の対象となる土地の区域（以下「掘削対象地」という。）の土地の土壌の特定有害物質による汚染状態を明らかにした図面
    - title: 九
      content: 要措置区域等の周辺の地図
  - paragraph_num: ８
    content: 指定解除要措置区域等に係る第一項の図面は、次のとおりとする。
    items:
    - title: 一
      content: 指定解除要措置区域等に関する前項各号に掲げる図面
    - title: 二
      content: 指定解除要措置区域等の範囲を明らかにした図面
    - title: 三
      content: 汚染の除去等の措置に該当する行為の実施場所及び施行方法を明らかにした図面
  - paragraph_num: ９
    content: 台帳には、次に掲げる書類を添付しなければならない。
    items:
    - title: 一
      content: 要措置区域等の指定に係る土壌汚染状況調査の土壌その他の試料の分析の結果
    - title: 二
      content: 別表第八の一の項第二号、二の項、三の項、四の項第二号、五の項から七の項まで若しくは十の項第二号に規定するボーリングによる土壌の採取及び測定その他の方法又はこれと同等な方法により、要措置区域等内の土地の土壌の特定有害物質による汚染状態を明らかにした調査の土壌その他の試料の分析の結果
    - title: 三
      content: 土壌汚染状況調査において最大形質変更深さより一メートルを超える深さの位置について試料採取等の対象としなかった場合であって、当該深さの位置の土壌について汚染の除去等の措置を講じたとき又は土地の形質の変更をしたときにあっては、第三条から第十五条までに定める方法に準じた方法により、当該土壌の特定有害物質による汚染状態を明らかにした調査の土壌その他の試料の分析の結果
    - title: 四
      content: 要措置区域外から搬入された土壌を使用した場合にあっては、第四十条第二項第三号に定める方法その他の方法により当該搬入された土壌の特定有害物質による汚染状態を明らかにした調査の土壌の分析の結果その他の調査の結果に関する事項
    - title: 五
      content: 法第十二条第一項第一号の確認を受けた施行管理方針
  - paragraph_num: １０
    content: 帳簿の記載事項、図面又は書類に変更があったときは、都道府県知事は、速やかにこれを訂正しなければならない。
- caption: （搬出しようとする土壌の調査）
  title: 第五十九条
  article_num: '59'
  paragraphs:
  - content: 法第十六条第一項の環境省令で定める方法は、次のいずれかの方法とする。
    items:
    - title: 一
      content: 要措置区域等内の土地の土壌を掘削する前に当該掘削しようとする土壌を調査する方法（次項、次条並びに第六十条第一項第四号及び第三項第一号において「掘削前調査の方法」という。）
    - title: 二
      content: 要措置区域等内の土地の土壌を掘削した後に当該掘削した土壌を調査する方法（次項、第五十九条の三並びに第六十条第一項第五号及び第三項第二号において「掘削後調査の方法」という。）
  - paragraph_num: ２
    content: 掘削前調査の方法は次条に定めるとおりとし、掘削後調査の方法は第五十九条の三に定めるとおりとする。
- caption: （掘削前調査の方法）
  title: 第五十九条の二
  article_num: '59_2'
  paragraphs:
  - content: 指定調査機関は、掘削対象地について、その利用の状況、特定有害物質の製造、使用又は処理の状況、土壌又は地下水の特定有害物質による汚染の概況その他の掘削対象地における土壌の特定有害物質による汚染のおそれを推定するために有効な情報を把握するものとする。
  - paragraph_num: ２
    content: 指定調査機関は、前項の規定により把握した情報により、掘削対象地において当該掘削対象地を含む要措置区域等の指定に係る特定有害物質の種類及び次の各号に掲げる場合の区分に応じ、それぞれ当該各号に定める特定有害物質の種類について、試料採取等の対象とするものとする。
    items:
    - title: 一
      content: 掘削対象地を含む要措置区域等の指定に係る土壌汚染状況調査において試料採取等の対象としなかった特定有害物質の種類について、土壌溶出量基準又は土壌含有量基準に適合していないおそれがあると認められる場合
        当該特定有害物質の種類
    - title: 二
      content: 掘削対象地を含む要措置区域等の指定後に当該要措置区域等内の土地の土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合していないおそれが生じたと認められる場合（次号に掲げる場合を除く。）
        当該特定有害物質の種類
    - title: 三
      content: 掘削対象地を含む要措置区域等の指定後に当該要措置区域等外から搬入された土壌により、当該要措置区域等内の土地の土壌の特定有害物質による汚染状態が土壌溶出量基準若しくは土壌含有量基準に適合していないおそれが生じたと認められる場合又は当該要措置区域等外から土壌が搬入されたかどうか明らかでないと認められる場合
        次のイ又はロに掲げる場合の区分に応じ、それぞれ当該イ又はロに定める特定有害物質の種類
      subitems:
      - level: 1
        title: イ
        content: 掘削対象地を含む要措置区域等に係る土地の所有者等が当該要措置区域等の指定の日から一年ごとに、次に掲げる事項を記載した様式第二十四による届出書に、当該要措置区域等外から土壌が搬入された場合にあっては当該土壌の場所を明らかにした図面を添付して、都道府県知事に届け出た場合
          当該搬入された土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合しないと認められる当該特定有害物質の種類
        subitems:
        - level: 2
          title: （１）
          content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
        - level: 2
          title: （２）
          content: 掘削対象地を含む要措置区域等の所在地
        - level: 2
          title: （３）
          content: 掘削対象地を含む要措置区域等の指定された年月日
        - level: 2
          title: （４）
          content: 掘削対象地を含む要措置区域等外からの土壌の搬入の有無
        - level: 2
          title: （５）
          content: 掘削対象地を含む要措置区域等外から土壌が搬入された場合にあっては、搬入された年月日、土壌の量並びに第四十条第二項第三号に定める方法その他の方法により当該要措置区域等に搬入された土壌の特定有害物質による汚染状態を明らかにした調査の土壌の採取を行った地点及び日時、当該試料の分析の結果並びに当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
        - level: 2
          title: （６）
          content: 掘削対象地を含む要措置区域等外から搬入された土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合する場合にあっては、当該土壌の管理方法
      - level: 1
        title: ロ
        content: イ以外の場合 全ての特定有害物質（当該掘削対象地を含む要措置区域等の指定に係る特定有害物質の種類、前二号及びこの号イに定める特定有害物質の種類並びに前項の規定により把握した情報により、掘削対象地において土壌の第三種特定有害物質（令第一条第二十五号に掲げる特定有害物質の種類を除く。）による汚染状態が土壌溶出量基準に適合していないおそれがないと認められる場合における当該第三種特定有害物質を除く。）の種類
  - paragraph_num: ３
    content: 指定調査機関は、掘削対象地を、当該掘削対象地を含む要措置区域等に係る土壌汚染状況調査において第四条第一項（第五条の規定により土壌汚染状況調査の対象地を区画した場合にあっては同条）及び第二項に基づき土壌汚染状況調査の対象地を区画した単位区画（申請に係る調査にあっては、第四条第一項及び第二項に準じて土壌汚染状況調査の対象地を区画した単位区画）に区画する方法により区画するものとする。
  - paragraph_num: ４
    content: 指定調査機関は、前項の規定により区画された掘削対象地（以下「掘削対象単位区画」という。）について、第二項の規定により試料採取等の対象とされた特定有害物質の種類ごとに、次の各号に掲げる場合の区分に応じ、当該各号に定める掘削対象単位区画について、試料採取等の対象とする。
    items:
    - title: 一
      content: 掘削対象地を含む要措置区域等の指定に係る特定有害物質の種類並びに第二項第一号、第二号及び第三号イに掲げる特定有害物質の種類を試料採取等の対象とする場合
        掘削対象単位区画
    - title: 二
      content: 第二項第三号ロに掲げる特定有害物質の種類を試料採取等の対象とする場合 次のイ又はロに掲げる場合の区分に応じ、当該イ又はロに定める掘削対象単位区画（前項に掲げる掘削対象単位区画を除く。以下「掘削前調査一部対象単位区画」という。）
      subitems:
      - level: 1
        title: イ
        content: 第一種特定有害物質に係る試料採取等を行う場合 前項の規定により掘削対象地を区画する線であって起点を通るもの及びこれらと平行して三十メートル間隔で引いた線により分割されたそれぞれの部分（以下この条において「掘削対象三十メートル格子」という。）にある掘削前調査一部対象単位区画のうちいずれか一区画（当該掘削対象三十メートル格子の中心を含む掘削前調査一部対象単位区画がある場合にあっては、当該掘削前調査一部対象単位区画）
      - level: 1
        title: ロ
        content: 第二種特定有害物質又は第三種特定有害物質に係る試料採取等を行う場合 次の（１）又は（２）に掲げる場合の区分に応じ、当該（１）又は（２）に定める掘削対象単位区画
        subitems:
        - level: 2
          title: （１）
          content: 掘削対象三十メートル格子内にある掘削前調査一部対象単位区画の数が六以上である場合 当該掘削対象三十メートル格子内にある掘削前調査一部対象単位区画のうちいずれか五区画
        - level: 2
          title: （２）
          content: 掘削対象三十メートル格子内にある掘削前調査一部対象単位区画の数が五以下である場合 当該掘削対象三十メートル格子内にある全ての掘削前調査一部対象単位区画
  - paragraph_num: ５
    content: 指定調査機関は、前項の規定により試料採取等の対象とされた掘削対象単位区画の中心（当該掘削対象単位区画において基準不適合土壌が存在するおそれが多いと認められる部分がある場合にあっては、当該部分における任意の地点）において、次に掲げる土壌の採取を行うものとする。
    items:
    - title: 一
      content: 表層の土壌
    - title: 二
      content: 深さ五センチメートルから五十センチメートルまでの土壌
    - title: 三
      content: 地表から深さ五十センチメートルの土壌
    - title: 四
      content: 深さ一メートルから土壌の掘削の対象となる部分の深さまでの一メートルごとの土壌
    - title: 五
      content: 帯水層の底面の土壌（掘削の対象となる部分の深さの範囲内に帯水層の底面がある場合に限る。）
    - title: 六
      content: 掘削の対象となる部分の深さの土壌
    - title: 七
      content: 汚染のおそれが生じた場所の位置が地表より深い位置にあり、かつ、汚染のおそれが生じた場所の位置が明らかであると認められる場合にあっては、当該汚染のおそれが生じた場所の位置の土壌、当該汚染のおそれが生じた場所の位置から深さ五十センチメートルまでの土壌及び当該汚染のおそれが生じた場所の位置から深さ五十センチメートルの土壌
    - title: 八
      content: 基準不適合土壌が存在するおそれが多いと認められる地層の位置が明らかである場合であり、第一号及び第三号から第七号までに掲げる土壌に当該地層が含まれないときは、当該地層内の任意の位置の土壌（掘削の対象となる部分の深さの範囲内に当該地層がある場合に限る。）
  - paragraph_num: ６
    content: 指定調査機関は、前項の規定にかかわらず、次の各号のいずれかに該当する場合には、当該各号に定める土壌の採取を行わないことができる。
    items:
    - title: 一
      content: 第二項第三号イの規定により、掘削対象地を含む要措置区域等の指定後に当該要措置区域等外から搬入された土壌（土壌の特定有害物質による汚染状態が土壌溶出量基準及び土壌含有量基準に適合するものに限る。）について都道府県知事に届け出た場合であり、かつ、当該土壌が適切に管理されている場合
        当該土壌（浄化等済土壌（汚染土壌処理業に関する省令（平成二十一年環境省令第十号）第五条第二十二号イに規定する浄化等済土壌をいう。）、法第十六条第一項の規定による都道府県知事が認めた土壌及び第四十条第二項第三号に定める方法その他の方法により測定した結果、土壌溶出量基準及び土壌含有量基準に適合していると認められる土壌を含む。）
    - title: 二
      content: 土壌汚染状況調査の結果又は別表第八の一の項第二号、二の項、三の項、四の項第二号、五の項から七の項まで若しくは十の項第二号に規定するボーリングによる土壌の採取及び測定その他の方法による調査の結果、掘削対象地を含む要措置区域等内の土地の土壌のうち、特定有害物質による汚染状態が土壌溶出量基準及び土壌含有量基準に適合するものと認められる土壌があり、かつ、当該土壌が適切に管理されている場合
        当該土壌
    - title: 三
      content: 別表第八の五の項に規定する目標土壌溶出量を超える汚染状態又は土壌含有量基準に適合しない汚染状態にある土壌を当該要措置区域等内に設置した施設において浄化し、当該浄化した土壌（当該土壌の特定有害物質による汚染状態が土壌溶出量基準及び土壌含有量基準に適合することを確認した場合に限る。）で埋め戻した場合であり、かつ、当該埋め戻した土壌が適切に管理されている場合
        当該埋め戻した土壌
  - paragraph_num: ７
    content: 指定調査機関は、第五項第一号及び第二号の規定により採取された表層の土壌及び深さ五センチメートルから五十センチメートルまでの土壌を、同じ重量混合するものとする。
  - paragraph_num: ８
    content: 指定調査機関は、第四項第二号ロの規定により掘削対象三十メートル格子内にある二以上の掘削対象単位区画が試料採取等の対象とされた掘削対象単位区画である場合にあっては、当該二以上の掘削対象単位区画に係る第五項の規定により採取された土壌（前項に規定する場合には、前項の規定により混合された土壌）を第五項第一号から第八号までに掲げる土壌ごとに、それぞれ同じ重量混合するものとする。
  - paragraph_num: ９
    content: 指定調査機関は、前四項の規定により採取され、又は混合されたそれぞれの土壌（第一種特定有害物質の量を測定する場合にあっては深さ五センチメートルから五十センチメートルまでの土壌及び第五項第七号の場合における汚染のおそれが生じた場所の位置から深さ五十センチメートルまでの土壌を除き、第二種特定有害物質及び第三種特定有害物質の量を測定する場合にあっては地表から深さ五十センチメートルの土壌並びに同項第七号の場合における汚染のおそれが生じた場所の位置の土壌及び当該汚染のおそれが生じた場所の位置から深さ五十センチメートルの土壌を除く。）に水を加えた検液に溶出する特定有害物質の量にあっては第六条第三項第四号の環境大臣が定める方法により、当該土壌（地表から深さ五十センチメートルの土壌並びに第五項第七号の場合における汚染のおそれが生じた場所の位置の土壌及び当該汚染のおそれが生じた場所の位置から深さ五十センチメートルの土壌を除く。）に含まれる第二種特定有害物質の量にあっては同条第四項第二号の環境大臣が定める方法により、それぞれ測定するものとする。
  - paragraph_num: １０
    content: 指定調査機関は、第四項第二号の規定により試料採取等の対象とされた掘削対象単位区画に係る前項の測定において、当該測定に係る土壌の特定有害物質による汚染状態が土壌溶出量基準又は土壌含有量基準に適合しなかったときは、当該試料採取等の対象とされた掘削対象単位区画を含む掘削対象三十メートル格子内にある掘削対象単位区画において、第五項、第六項及び前項の規定により採取され、又は混合されたそれぞれの土壌に水を加えた検液に溶出する特定有害物質の量にあっては第六条第三項第四号の環境大臣が定める方法により、当該土壌に含まれる第二種特定有害物質の量にあっては同条第四項第二号の環境大臣が定める方法により、それぞれ測定することができる。
- caption: （掘削後調査の方法）
  title: 第五十九条の三
  article_num: '59_3'
  paragraphs:
  - content: 指定調査機関は、前条第一項に定めるところにより、掘削対象地における土壌の特定有害物質による汚染のおそれを推定するために有効な情報を把握し、当該把握した情報により、当該掘削対象地において、同条第二項に定めるところにより、試料採取等の対象とするものとする。
  - paragraph_num: ２
    content: 指定調査機関は、掘削対象地を、前条第三項に定める方法により区画し、掘削対象単位区画において土壌の掘削の対象となる部分の深さまで一メートルごとの土壌を掘削するものとする。
  - paragraph_num: ３
    content: 指定調査機関は、前項の規定により掘削した土壌が混合するおそれのないように、百立方メートル以下ごと（掘削対象地を含む要措置区域等に係る土壌汚染状況調査において第四条第二項の規定により隣接する単位区画を一の単位区画とした場合（申請に係る調査にあっては、同項に準じて隣接する単位区画を一の単位区画とした場合）にあっては、百三十立方メートル以下ごと）に区分するものとする。
  - paragraph_num: ４
    content: 指定調査機関は、前項の規定により区分されたそれぞれの土壌（以下「ロット」という。）について、次に掲げるところにより、試料採取等の対象とするものとする。
    items:
    - title: 一
      content: 掘削対象地を含む要措置区域等の指定に係る特定有害物質並びに前条第二項第一号、第二号及び第三号イに掲げる特定有害物質を試料採取等の対象とする場合は、当該掘削対象地の土壌を含む全てのロット
    - title: 二
      content: 前条第二項第三号ロに掲げる特定有害物質を試料採取等の対象とする場合は、次のイ又はロに掲げる場合の区分に応じ、当該イ又はロに定めるロット
      subitems:
      - level: 1
        title: イ
        content: 第一種特定有害物質に係る試料採取等を行う場合 掘削対象三十メートル格子内にあった同じ深さのロットのうちいずれか一のロット
      - level: 1
        title: ロ
        content: 第二種特定有害物質又は第三種特定有害物質に係る試料採取等を行う場合 次の（１）又は（２）に掲げる場合の区分に応じ、当該（１）又は（２）に定めるロット
        subitems:
        - level: 2
          title: （１）
          content: 掘削対象三十メートル格子内にあった同じ深さのロットの数が六以上である場合 当該掘削対象三十メートル格子内にあった同じ深さのロットのうちいずれか五のロット
        - level: 2
          title: （２）
          content: 掘削対象三十メートル格子内にあった同じ深さのロットの数が五以下である場合 当該掘削対象三十メートル格子内にあった同じ深さの全てのロット
  - paragraph_num: ５
    content: 指定調査機関は、前項の規定により試料採取等の対象とされたロットの中心部分（当該ロットにおいて基準不適合土壌が存在するおそれが多いと認められる部分がある場合にあっては、当該部分）において掘削直後に、任意の五点の土壌を採取するものとする。
  - paragraph_num: ６
    content: 前項の規定にかかわらず、指定調査機関は、前条第六項各号のいずれかに該当する場合には、当該各号に定める土壌の採取を行わないことができる。
  - paragraph_num: ７
    content: 指定調査機関は、第五項の規定により採取された五点の土壌を、それぞれ同じ重量混合するものとする。
  - paragraph_num: ８
    content: 指定調査機関は、第四項第二号ロの規定により掘削対象三十メートル格子内にあった同じ深さのロットのうち二以上のロットが試料採取等の対象とされたロットである場合にあっては、当該二以上のロットに係る前項の規定により混合された土壌をそれぞれ同じ重量混合するものとする。
  - paragraph_num: ９
    content: 指定調査機関は、前四項の規定により採取され、又は混合されたそれぞれの土壌（第一種特定有害物質に係る測定を行う場合にあっては、第五項の規定により採取された五点の土壌のうち任意の一点の土壌）に水を加えた検液に溶出する特定有害物質の量にあっては第六条第三項第四号の環境大臣が定める方法により、当該土壌に含まれる第二種特定有害物質の量にあっては同条第四項第二号の環境大臣が定める方法により、それぞれ測定するものとする。
- caption: （搬出しようとする土壌に係る環境省令で定める基準に適合する旨の認定）
  title: 第六十条
  article_num: '60'
  paragraphs:
  - content: 法第十六条第一項の規定による都道府県知事の認定を受けようとする者は、次に掲げる事項を記載した様式第二十五による申請書を提出しなければならない。
    items:
    - title: 一
      content: 氏名又は名称及び住所並びに法人にあっては、その代表者の氏名
    - title: 二
      content: 要措置区域等の所在地
    - title: 三
      content: 認定調査の方法の種類
    - title: 四
      content: 掘削前調査の方法により認定調査を行った場合にあっては、土壌の採取を行った地点及び日時、当該土壌の分析の結果、当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の認定調査の結果に関する事項
    - title: 五
      content: 掘削後調査の方法により認定調査を行った場合にあっては、土壌の採取を行った日時、調査対象とした土壌全体の体積、当該土壌の分析の結果、当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の認定調査の結果に関する事項
    - title: 六
      content: 認定調査を行った指定調査機関の氏名又は名称
    - title: 七
      content: 認定調査に従事した者を監督した技術管理者の氏名及び技術管理者証の交付番号
  - paragraph_num: ２
    content: 前項の申請書には、認定を受けようとする範囲及び要措置区域等内の土地の土壌の特定有害物質による汚染状態を明らかにした図面を添付しなければならない。
  - paragraph_num: ３
    content: 都道府県知事は、第一項の申請があったときは、次の各号に掲げる調査の方法に応じ、それぞれ当該各号に定める土壌について、法第十六条第一項の認定をするものとする。
    items:
    - title: 一
      content: 掘削前調査の方法 第五十九条の二第六項の規定により土壌の採取を行わなかった土壌及び第五十九条の二第五項から第八項までの規定により採取され、若しくは混合された土壌のうち連続する二以上の深さにおいて採取された土壌を同条第九項若しくは第十項の規定により測定した結果、その汚染状態が全ての特定有害物質の種類について土壌溶出量基準及び土壌含有量基準に適合することが明らかになった場合における、当該二以上の土壌を採取した深さの位置の間の部分にある当該測定に係る同条第四項の掘削対象単位区画内の土壌（当該二以上の土壌を採取した深さの位置の間の部分において、土壌汚染状況調査その他の調査の結果、少なくとも一の特定有害物質の種類について土壌溶出量基準又は土壌含有量基準に適合しないことが明らかとなった土壌を採取した位置を含む場合における当該位置を含む連続する二の土壌を採取した深さの位置の間の部分にある土壌を除く。）
    - title: 二
      content: 掘削後調査の方法 前条第六項の規定により土壌の採取を行わなかった土壌及び同条第九項の測定において同項の測定に係る土壌の汚染状態が全ての特定有害物質の種類について土壌溶出量基準及び土壌含有量基準に適合することが明らかになった場合における、当該土壌に係るロット
- caption: （汚染土壌の搬出の届出）
  title: 第六十一条
  article_num: '61'
  paragraphs:
  - content: 法第十六条第一項の届出は、様式第二十六による届出書を提出して行うものとする。
  - paragraph_num: ２
    content: 前項の届出書には、次に掲げる書類及び図面を添付しなければならない。
    items:
    - title: 一
      content: 汚染土壌の場所を明らかにした要措置区域等の図面
    - title: 二
      content: 土壌の特定有害物質による汚染状態が第二溶出量基準に適合しない土地とみなされた要措置区域等において、ボーリングによる土壌の採取及び測定その他の方法により搬出しようとする土壌が第二溶出量基準に適合することが明らかとなった場合にあっては、土壌の採取を行った地点及び日時、当該土壌の分析の結果、当該分析を行った計量法第百七条の登録を受けた者の氏名又は名称その他の調査の結果に関する事項
    - title: 三
      content: 搬出に係る必要事項が記載された使用予定の管理票（法第二十条第一項に規定する管理票をいう。以下同じ。）の写し
    - title: 四
      content: 汚染土壌の運搬の用に供する自動車等（法第五十四条第三項に規定する自動車等をいう。以下同じ。）の構造を記した書類
    - title: 五
      content: 運搬の過程において、積替えのために当該汚染土壌を一時的に保管する場合には、当該保管の用に供する施設の構造を記した書類
    - title: 六
      content: 汚染土壌を処理する場合にあっては、次に掲げる書類
      subitems:
      - level: 1
        title: イ
        content: 汚染土壌の処理を汚染土壌処理業者（法第十六条第四項第二号に規定する汚染土壌処理業者をいう。以下同じ。）に委託したことを証する書類
      - level: 1
        title: ロ
        content: 汚染土壌の処理を行う汚染土壌処理施設に関する法第二十二条第一項の許可を受けた者の当該許可に係る許可証（汚染土壌処理業に関する省令第十七条第一項に規定する許可証をいう。第六十四条第二項第五号ロにおいて同じ。）の写し
    - title: 七
      content: 汚染土壌を法第十八条第一項第二号に規定する土地の形質の変更に使用する場合にあっては、次に掲げる書類及び図面
      subitems:
      - level: 1
        title: イ
        content: 自然由来等形質変更時要届出区域内の自然由来等土壌を、他の自然由来等形質変更時要届出区域（以下「搬出先の自然由来等形質変更時要届出区域」という。）内の土地の形質の変更に自ら使用し、又は他人に使用させる場所を明らかにした図面
      - level: 1
        title: ロ
        content: 自然由来等形質変更時要届出区域内及び搬出先の自然由来等形質変更時要届出区域内の土地の土壌の特定有害物質による汚染の状況が第六十五条の二に規定する基準に該当することを証する書類
      - level: 1
        title: ハ
        content: 自然由来等形質変更時要届出区域内及び搬出先の自然由来等形質変更時要届出区域内の土地の地質が第六十五条の三に規定する基準に該当することを証する書類
      - level: 1
        title: ニ
        content: 自然由来等形質変更時要届出区域内及び搬出先の自然由来等形質変更時要届出区域内の土地の土壌の特定有害物質による汚染が専ら自然又は専ら当該土地の造成に係る水面埋立てに用いられた土砂に由来するものとして、第六十五条の四に規定する要件に該当することを証する書類
      - level: 1
        title: ホ
        content: 自然由来等形質変更時要届出区域内の自然由来等土壌を搬出先の自然由来等形質変更時要届出区域内の土地の形質の変更に他人に使用させる場合にあっては、その旨を証する書類
    - title: 八
      content: 汚染土壌を法第十八条第一項第三号に規定する土地の形質の変更に使用する場合にあっては、次に掲げる書類及び図面
      subitems:
      - level: 1
        title: イ
        content: 一の要措置区域から搬出された汚染土壌を他の要措置区域（以下「搬出先の要措置区域」という。）内の土地の形質の変更又は一の形質変更時要届出区域から搬出された汚染土壌を他の形質変更時要届出区域（以下「搬出先の形質変更時要届出区域」という。）内の土地の形質の変更に自ら使用し、若しくは他人に使用させる場所を明らかにした図面
      - level: 1
        title: ロ
        content: 要措置区域及び搬出先の要措置区域又は形質変更時要届出区域及び搬出先の形質変更時要届出区域が一の土壌汚染状況調査の結果に基づき指定された要措置区域等であることを証する書類
