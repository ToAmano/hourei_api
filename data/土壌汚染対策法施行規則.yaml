  - paragraph_num: ３
    content: 都道府県知事は、第一項の申請があったときは、当該申請に係る土地の形質の変更が次の要件のいずれにも該当すると認められる場合に限り、第四十三条第三号の確認をするものとする。
    items:
    - title: 一
      content: 当該申請に係る土地の形質の変更とそれと一体として行われる実施措置との間に一体性が認められること。
    - title: 二
      content: 当該申請に係る土地の形質の変更の施行方法が第四十条第二項第一号の環境大臣が定める基準に適合していること。
    - title: 三
      content: 当該申請に係る土地の形質の着手予定日及び完了予定日が法第七条第一項の期限に照らして適当であると認められること。
- caption: （土地の形質の変更の施行方法に係る確認の申請）
  title: 第四十六条
  article_num: '46'
  paragraphs:
