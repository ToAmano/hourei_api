        - 土地の形質の変更をした
      - - 第七十条第三号
        - 処理を終了した
        - 土地の形質の変更をした
      - - 第七十条第四号
        - 処理
        - 土地の形質の変更
      - - 第七十一条見出し
        - 処理受託者
        - 土壌使用者
      - - 第七十一条
        - 処理を終了した
        - 土地の形質の変更をした
      - - 第七十四条見出し
        - 処理
        - 土地の形質の変更
      - - 第七十六条見出し
        - 処理受託者
        - 土壌使用者
- caption: （光ディスクによる手続）
  title: 第七十七条
  article_num: '77'
  paragraphs:
  - content: 第一条第二項、第二十一条の六第一項、第二十五条の三第一項、第二十七条の二第一項、第三十条の二第一項並びに第四十二条の二第二項及び第四項の規定による報告書、第三条第四項、第十六条第一項、第四十四条第一項（第五十条第二項において読み替えて準用する場合を含む。）、第四十五条第一項、第四十六条第一項（第五十条第三項において読み替えて準用する場合を含む。）、第四十九条の二第一項、第五十四条及び第六十条第一項の規定による申請書、第十六条第五項、第十九条第一項、第二十一条の二第一項、第二十三条第一項、第四十八条第一項、第五十一条第一項（第五十二条において読み替えて準用する場合を含む。）、第五十二条の二第一項、第五十二条の五第一項、第五十二条の六第一項及び第二項、第五十二条の七第一項、第五十九条の二第二項第三号イ、第六十一条第一項、第六十三条第一項、第六十四条第一項並びに第七十四条の規定による届出書並びに第三十六条の三第一項及び第三十七条の規定による計画並びにこれらの添付図面及び添付書類（以下この条において「報告書等」という。）の提出については、当該報告書等に明示すべき事項を記録した光ディスク及び様式第三十一の光ディスク提出書を提出することによって行うことができる。
- caption: （光ディスクの構造）
  title: 第七十八条
  article_num: '78'
  paragraphs:
  - content: 前条の光ディスクは、次の各号のいずれかに該当するものでなければならない。
    items:
    - title: 一
      content: 日本産業規格Ｘ〇六〇六及びＸ六二八二又はＸ〇六〇六及びＸ六二八三に適合する直径百二十ミリメートルの光ディスク
    - title: 二
      content: 日本産業規格Ｘ〇六〇九又はＸ〇六一一及びＸ六二四八又はＸ六二四九に適合する直径百二十ミリメートルの光ディスク
- caption: （立入検査の身分証明書）
  title: 第七十九条
  article_num: '79'
  paragraphs:
  - content: 法第五十四条第一項、第三項及び第四項の規定による立入検査に係る同条第七項の証明書の様式は、様式第三十二のとおりとする。 ただし、環境省の職員が立入検査をするときに携帯すべき証明書については、この限りでない。
- caption: （権限の委任）
  title: 第八十条
  article_num: '80'
  paragraphs:
  - content: 法第五十四条第一項及び第五十六条第一項に規定する環境大臣の権限は、地方環境事務所長に委任する。 ただし、当該権限は、環境大臣が自ら行うことを妨げない。
