chapters:
- title: 第一章　総則
  chapter_num: 1
  articles:
  - caption: （目的）
    title: 第一条
    article_num: '1'
    paragraphs:
    - content: この法律は、電気事業の運営を適正かつ合理的ならしめることによつて、電気の使用者の利益を保護し、及び電気事業の健全な発達を図るとともに、電気工作物の工事、維持及び運用を規制することによつて、公共の安全を確保し、及び環境の保全を図ることを目的とする。
  - caption: （定義）
    title: 第二条
    article_num: '2'
    paragraphs:
    - content: この法律において、次の各号に掲げる用語の意義は、当該各号に定めるところによる。
      items:
      - title: 一
        content: 小売供給 一般の需要に応じ電気を供給することをいう。
      - title: 二
        content: 小売電気事業 小売供給を行う事業（一般送配電事業、特定送配電事業及び発電事業に該当する部分を除く。）をいう。
      - title: 三
        content: 小売電気事業者 小売電気事業を営むことについて次条の登録を受けた者をいう。
      - title: 四
        content: 振替供給 他の者から受電した者が、同時に、その受電した場所以外の場所において、当該他の者に、その受電した電気の量に相当する量の電気を供給することをいう。
      - title: 五
        content: 接続供給 次に掲げるものをいう。
        subitems:
        - level: 1
          title: イ
          content: 小売供給を行う事業を営む他の者から受電した者が、同時に、その受電した場所以外の場所において、当該他の者に対して、当該他の者のその小売供給を行う事業の用に供するための電気の量に相当する量の電気を供給すること。
        - level: 1
          title: ロ
          content: 電気事業の用に供する発電等用電気工作物（発電用の電気工作物及び蓄電用の電気工作物をいう。以下同じ。）以外の発電等用電気工作物（以下このロにおいて「非電気事業用電気工作物」という。）を維持し、及び運用する他の者から当該非電気事業用電気工作物（当該他の者と経済産業省令で定める密接な関係を有する者が維持し、及び運用する非電気事業用電気工作物を含む。）の発電又は放電に係る電気を受電した者が、同時に、その受電した場所以外の場所において、当該他の者に対して、当該他の者があらかじめ申し出た量の電気を供給すること（当該他の者又は当該他の者と経済産業省令で定める密接な関係を有する者の需要に応ずるものに限る。）。
      - title: 六
        content: 託送供給 振替供給及び接続供給をいう。
      - title: 七
        content: 電力量調整供給 次のイ又はロに掲げる者に該当する他の者から、当該イ又はロに定める電気を受電した者が、同時に、その受電した場所において、当該他の者に対して、当該他の者があらかじめ申し出た量の電気を供給することをいう。
        subitems:
        - level: 1
          title: イ
          content: 発電等用電気工作物を維持し、及び運用する者 当該発電等用電気工作物の発電又は放電に係る電気
        - level: 1
          title: ロ
          content: 特定卸供給を行う事業を営む者 特定卸供給に係る電気
      - title: 八
        content: 一般送配電事業 自らが維持し、及び運用する送電用及び配電用の電気工作物によりその供給区域において託送供給及び電力量調整供給を行う事業（発電事業に該当する部分を除く。）をいい、当該送電用及び配電用の電気工作物により次に掲げる小売供給を行う事業（発電事業に該当する部分を除く。）を含むものとする。
        subitems:
        - level: 1
          title: イ
          content: その供給区域（離島（その区域内において自らが維持し、及び運用する電線路が自らが維持し、及び運用する主要な電線路（第二十条の二第一項において「主要電線路」という。）と電気的に接続されていない離島として経済産業省令で定めるものに限る。）及び同項の指定区域（ロ及び第二十一条第三項第一号において「離島等」という。）を除く。）における一般の需要（小売電気事業者又は登録特定送配電事業者（第二十七条の十九第一項に規定する登録特定送配電事業者をいう。）から小売供給を受けているものを除く。ロにおいて同じ。）に応ずる電気の供給を保障するための電気の供給（以下「最終保障供給」という。）
        - level: 1
          title: ロ
          content: その供給区域内に離島等がある場合において、当該離島等における一般の需要に応ずる電気の供給を保障するための電気の供給（以下「離島等供給」という。）
      - title: 九
        content: 一般送配電事業者 一般送配電事業を営むことについて第三条の許可を受けた者をいう。
      - title: 十
        content: 送電事業 自らが維持し、及び運用する送電用の電気工作物により一般送配電事業者又は配電事業者に振替供給を行う事業（一般送配電事業に該当する部分を除く。）であつて、その事業の用に供する送電用の電気工作物が経済産業省令で定める要件に該当するものをいう。
      - title: 十一
        content: 送電事業者 送電事業を営むことについて第二十七条の四の許可を受けた者をいう。
      - title: 十一の二
        content: 配電事業 自らが維持し、及び運用する配電用の電気工作物によりその供給区域において託送供給及び電力量調整供給を行う事業（一般送配電事業及び発電事業に該当する部分を除く。）であつて、その事業の用に供する配電用の電気工作物が経済産業省令で定める要件に該当するものをいう。
      - title: 十一の三
        content: 配電事業者 配電事業を営むことについて第二十七条の十二の二の許可を受けた者をいう。
      - title: 十二
        content: 特定送配電事業 自らが維持し、及び運用する送電用及び配電用の電気工作物により特定の供給地点において小売供給又は小売電気事業、一般送配電事業若しくは配電事業を営む他の者にその小売電気事業、一般送配電事業若しくは配電事業の用に供するための電気に係る託送供給を行う事業（発電事業に該当する部分を除く。）をいう。
      - title: 十三
        content: 特定送配電事業者 特定送配電事業を営むことについて第二十七条の十三第一項の規定による届出をした者をいう。
      - title: 十四
        content: 発電事業 自らが維持し、及び運用する発電等用電気工作物を用いて小売電気事業、一般送配電事業、配電事業又は特定送配電事業の用に供するための電気を発電し、又は放電する事業であつて、その事業の用に供する発電等用電気工作物が経済産業省令で定める要件に該当するものをいう。
      - title: 十五
        content: 発電事業者 発電事業を営むことについて第二十七条の二十七第一項の規定による届出をした者をいう。
      - title: 十五の二
        content: 特定卸供給 発電等用電気工作物を維持し、及び運用する他の者に対して発電又は放電を指示する方法その他の経済産業省令で定める方法により電気の供給能力を有する者（発電事業者を除く。）から集約した電気を、小売電気事業、一般送配電事業、配電事業又は特定送配電事業の用に供するための電気として供給することをいう。
      - title: 十五の三
        content: 特定卸供給事業 特定卸供給を行う事業であつて、その供給能力が経済産業省令で定める要件に該当するものをいう。
      - title: 十五の四
        content: 特定卸供給事業者 特定卸供給事業を営むことについて第二十七条の三十第一項の規定による届出をした者をいう。
      - title: 十六
        content: 電気事業 小売電気事業、一般送配電事業、送電事業、配電事業、特定送配電事業、発電事業及び特定卸供給事業をいう。
      - title: 十七
        content: 電気事業者 小売電気事業者、一般送配電事業者、送電事業者、配電事業者、特定送配電事業者、発電事業者及び特定卸供給事業者をいう。
      - title: 十八
        content: 電気工作物 発電、蓄電、変電、送電若しくは配電又は電気の使用のために設置する機械、器具、ダム、水路、貯水池、電線路その他の工作物（船舶、車両又は航空機に設置されるものその他の政令で定めるものを除く。）をいう。
    - paragraph_num: ２
      content: 一般送配電事業者が次に掲げる事業を営むときは、その事業は、一般送配電事業とみなす。
      items:
      - title: 一
        content: 他の一般送配電事業者又は配電事業者にその一般送配電事業又は配電事業の用に供するための電気を供給する事業
      - title: 二
        content: 配電事業者から託送供給を受けて当該配電事業者が維持し、及び運用する配電用の電気工作物によりその供給区域において最終保障供給又は離島等供給を行う事業
      - title: 三
        content: 特定送配電事業者から託送供給を受けて当該特定送配電事業者が維持し、及び運用する送電用及び配電用の電気工作物によりその供給区域において接続供給、電力量調整供給、最終保障供給又は離島等供給を行う事業
      - title: 四
        content: 第二十四条第一項の許可を受けて行う電気を供給する事業及びその供給区域以外の地域に自らが維持し、及び運用する電線路を設置し、当該電線路により振替供給（小売電気事業若しくは特定送配電事業の用に供するための電気又は前項第五号ロに掲げる接続供給に係る電気に係るものに限る。第四項第三号において同じ。）を行う事業
    - paragraph_num: ３
      content: 送電事業者が営む一般送配電事業者又は配電事業者に振替供給を行う事業は、送電事業とみなす。
    - paragraph_num: ４
      content: 配電事業者が次に掲げる事業を営むときは、その事業は、配電事業とみなす。
      items:
      - title: 一
        content: 一般送配電事業者又は他の配電事業者にその一般送配電事業又は配電事業の用に供するための電気を供給する事業
      - title: 二
        content: 特定送配電事業者から託送供給を受けて当該特定送配電事業者が維持し、及び運用する送電用及び配電用の電気工作物によりその供給区域において接続供給又は電力量調整供給を行う事業
      - title: 三
        content: 第二十七条の十二の十三において準用する第二十四条第一項の許可を受けて行う電気を供給する事業及びその供給区域以外の地域に自らが維持し、及び運用する電線路を設置し、当該電線路により振替供給を行う事業
- title: 第二章　電気事業
  chapter_num: 2
  sections:
  - title: 第一節　小売電気事業
    section_num: 1
    subsections:
    - title: 第一款　事業の登録
      article_num: 1
      articles:
      - caption: （事業の登録）
        title: 第二条の二
        article_num: '2_2'
        paragraphs:
        - content: 小売電気事業を営もうとする者は、経済産業大臣の登録を受けなければならない。
      - caption: （登録の申請）
        title: 第二条の三
        article_num: '2_3'
        paragraphs:
        - content: 前条の登録を受けようとする者は、経済産業省令で定めるところにより、次に掲げる事項を記載した申請書を経済産業大臣に提出しなければならない。
          items:
          - title: 一
            content: 氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
          - title: 二
            content: 主たる営業所その他の営業所の名称及び所在地
          - title: 三
            content: 小売供給の相手方の電気の需要に応ずるために必要と見込まれる供給能力の確保に関する事項
          - title: 四
            content: 事業開始の予定年月日
          - title: 五
            content: その他経済産業省令で定める事項
        - paragraph_num: ２
          content: 前項の申請書には、第二条の五第一項各号（第四号を除く。）に該当しないことを誓約する書面、小売電気事業を適正かつ確実に遂行する体制の整備に関する事項を記載した書類その他の経済産業省令で定める書類を添付しなければならない。
      - caption: （登録の実施）
        title: 第二条の四
        article_num: '2_4'
        paragraphs:
        - content: 経済産業大臣は、第二条の二の登録の申請があつた場合においては、次条第一項の規定により登録を拒否する場合を除き、次に掲げる事項を小売電気事業者登録簿に登録しなければならない。
          items:
          - title: 一
            content: 前条第一項各号（第五号を除く。）に掲げる事項
          - title: 二
            content: 登録年月日及び登録番号
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定による登録をしたときは、遅滞なく、その旨を申請者に通知しなければならない。
      - caption: （登録の拒否）
        title: 第二条の五
        article_num: '2_5'
        paragraphs:
        - content: 経済産業大臣は、第二条の三第一項の申請書を提出した者が次の各号のいずれかに該当するとき、又は当該申請書若しくはその添付書類のうちに重要な事項について虚偽の記載があり、若しくは重要な事実の記載が欠けているときは、その登録を拒否しなければならない。
          items:
          - title: 一
            content: この法律又はこの法律に基づく命令の規定に違反し、罰金以上の刑に処せられ、その執行を終わり、又はその執行を受けることがなくなつた日から二年を経過しない者
          - title: 二
            content: 第二条の九第一項の規定により登録を取り消され、その取消しの日から二年を経過しない者
          - title: 三
            content: 法人であつて、その役員のうちに前二号のいずれかに該当する者があるもの
          - title: 四
            content: 小売供給の相手方の電気の需要に応ずるために必要な供給能力を確保できる見込みがないと認められる者その他の電気の使用者の利益の保護のために適切でないと認められる者
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定による登録の拒否をしたときは、理由を記載した文書をその申請書を提出した者に送付しなければならない。
      - caption: （変更登録等）
        title: 第二条の六
        article_num: '2_6'
        paragraphs:
        - content: 小売電気事業者は、第二条の三第一項第三号に掲げる事項を変更しようとするときは、経済産業大臣の変更登録を受けなければならない。
            ただし、経済産業省令で定める軽微な変更については、この限りでない。
        - paragraph_num: ２
          content: 前項の変更登録を受けようとする小売電気事業者は、経済産業省令で定めるところにより、変更に係る事項を記載した申請書を経済産業大臣に提出しなければならない。
        - paragraph_num: ３
          content: 第二条の三第二項及び前二条の規定は、第一項の変更登録に準用する。 この場合において、第二条の四第一項中「次に掲げる事項」とあるのは「変更に係る事項」と、前条第一項中「第二条の三第一項の申請書を提出した者が次の各号」とあるのは「変更登録に係る申請書を提出した者が次の各号（第二号を除く。）」と読み替えるものとする。
        - paragraph_num: ４
          content: 小売電気事業者は、第二条の三第一項各号（第三号を除く。）に掲げる事項に変更があつたとき、又は第一項ただし書の経済産業省令で定める軽微な変更をしたときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
        - paragraph_num: ５
          content: 経済産業大臣は、前項の規定による届出を受理したときは、その届出があつた事項のうち第二条の四第一項第一号に掲げる事項を小売電気事業者登録簿に登録しなければならない。
      - caption: （承継）
        title: 第二条の七
        article_num: '2_7'
        paragraphs:
        - content: 小売電気事業の全部の譲渡しがあり、又は小売電気事業者について相続、合併若しくは分割（小売電気事業の全部を承継させるものに限る。）があつたときは、小売電気事業の全部を譲り受けた者又は相続人、合併後存続する法人若しくは合併により設立した法人若しくは分割により当該小売電気事業の全部を承継した法人は、小売電気事業者の地位を承継する。
            ただし、当該小売電気事業の全部を譲り受けた者又は相続人、合併後存続する法人若しくは合併により設立した法人若しくは分割により当該小売電気事業の全部を承継した法人が第二条の五第一項各号（第四号を除く。）のいずれかに該当するときは、この限りでない。
        - paragraph_num: ２
          content: 前項の規定により小売電気事業者の地位を承継した者は、遅滞なく、その旨を経済産業大臣に届け出なければならない。
        - paragraph_num: ３
          content: 前条第五項の規定は、前項の規定による届出に準用する。
      - caption: （事業の休止及び廃止並びに法人の解散）
        title: 第二条の八
        article_num: '2_8'
        paragraphs:
        - content: 小売電気事業者は、その事業を休止し、又は廃止したときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
        - paragraph_num: ２
          content: 小売電気事業者である法人が合併以外の事由により解散したときは、その清算人（解散が破産手続開始の決定による場合にあつては、破産管財人）は、遅滞なく、その旨を経済産業大臣に届け出なければならない。
        - paragraph_num: ３
          content: 小売電気事業者は、その事業を休止し、又は廃止しようとするときは、経済産業省令で定めるところにより、あらかじめ、その小売供給の相手方に対し、その旨を周知させなければならない。
      - caption: （登録の取消し）
        title: 第二条の九
        article_num: '2_9'
        paragraphs:
        - content: 経済産業大臣は、小売電気事業者が次の各号のいずれかに該当するときは、第二条の二の登録を取り消すことができる。
          items:
          - title: 一
            content: この法律又はこの法律に基づく命令の規定に違反した場合において、公共の利益を阻害すると認めるとき。
          - title: 二
            content: 不正の手段により第二条の二の登録又は第二条の六第一項の変更登録を受けたとき。
          - title: 三
            content: 第二条の五第一項第一号又は第三号に該当するに至つたとき。
        - paragraph_num: ２
          content: 第二条の五第二項の規定は、前項の場合に準用する。
      - caption: （登録の抹消）
        title: 第二条の十
        article_num: '2_10'
        paragraphs:
        - content: 経済産業大臣は、第二条の八第一項若しくは第二項の規定による小売電気事業の廃止若しくは解散の届出があつたとき、又は前条第一項の規定による登録の取消しをしたときは、当該小売電気事業者の登録を抹消しなければならない。
      - caption: （経済産業省令への委任）
        title: 第二条の十一
        article_num: '2_11'
        paragraphs:
        - content: 第二条の二から前条までに定めるもののほか、小売電気事業者の登録に関し必要な事項は、経済産業省令で定める。
    - title: 第二款　業務
      article_num: 2
      articles:
      - caption: （供給能力の確保）
        title: 第二条の十二
        article_num: '2_12'
        paragraphs:
        - content: 小売電気事業者は、正当な理由がある場合を除き、その小売供給の相手方の電気の需要に応ずるために必要な供給能力を確保しなければならない。
        - paragraph_num: ２
          content: 経済産業大臣は、小売電気事業者がその小売供給の相手方の電気の需要に応ずるために必要な供給能力を確保していないため、電気の使用者の利益を阻害し、又は阻害するおそれがあると認めるときは、小売電気事業者に対し、当該電気の需要に応ずるために必要な供給能力の確保その他の必要な措置をとるべきことを命ずることができる。
      - caption: （供給条件の説明等）
        title: 第二条の十三
        article_num: '2_13'
        paragraphs:
        - content: 小売電気事業者及び小売電気事業者が行う小売供給に関する契約（以下「小売供給契約」という。）の締結の媒介、取次ぎ又は代理を業として行う者（以下「小売電気事業者等」という。）は、小売供給を受けようとする者（電気事業者である者を除く。以下この条において同じ。）と小売供給契約の締結又はその媒介、取次ぎ若しくは代理をしようとするときは、経済産業省令で定めるところにより、当該小売供給に係る料金その他の供給条件について、その者に説明しなければならない。
        - paragraph_num: ２
          content: 小売電気事業者等は、前項の規定による説明をするときは、経済産業省令で定める場合を除き、小売供給を受けようとする者に対し、当該小売供給に係る料金その他の供給条件であつて経済産業省令で定める事項を記載した書面を交付しなければならない。
        - paragraph_num: ３
          content: 小売電気事業者等は、前項の規定による書面の交付に代えて、政令で定めるところにより、小売供給を受けようとする者の承諾を得て、当該書面に記載すべき事項を電子情報処理組織を使用する方法その他の情報通信の技術を利用する方法であつて経済産業省令で定めるものにより提供することができる。
            この場合において、当該小売電気事業者等は、当該書面を交付したものとみなす。
      - caption: （書面の交付）
        title: 第二条の十四
        article_num: '2_14'
        paragraphs:
        - content: 小売電気事業者等は、小売供給を受けようとする者と小売供給契約を締結したとき（小売供給契約の締結の媒介を業として行う者にあつては、当該媒介により小売供給契約が成立したとき）は、経済産業省令で定める場合を除き、遅滞なく、その者に対し、次に掲げる事項を記載した書面を交付しなければならない。
          items:
          - title: 一
            content: 小売電気事業者等の氏名又は名称及び住所
          - title: 二
            content: 契約年月日
          - title: 三
            content: 当該小売供給に係る料金その他の供給条件であつて経済産業省令で定める事項
        - paragraph_num: ２
          content: 小売電気事業者等は、前項の規定による書面の交付に代えて、政令で定めるところにより、小売供給を受けようとする者の承諾を得て、当該書面に記載すべき事項を電子情報処理組織を使用する方法その他の情報通信の技術を利用する方法であつて経済産業省令で定めるものにより提供することができる。
            この場合において、当該小売電気事業者等は、当該書面を交付したものとみなす。
      - caption: （苦情等の処理）
        title: 第二条の十五
        article_num: '2_15'
        paragraphs:
        - content: 小売電気事業者は、当該小売電気事業者の小売供給の業務の方法又は当該小売電気事業者が行う小売供給に係る料金その他の供給条件についての小売供給の相手方（当該小売電気事業者から小売供給を受けようとする者を含み、電気事業者である者を除く。）からの苦情及び問合せについては、適切かつ迅速にこれを処理しなければならない。
      - caption: （名義の利用等の禁止）
        title: 第二条の十六
        article_num: '2_16'
        paragraphs:
        - content: 小売電気事業者は、その名義を他人に小売電気事業のため利用させてはならない。
        - paragraph_num: ２
          content: 小売電気事業者は、事業の貸渡しその他いかなる方法をもつてするかを問わず、小売電気事業を他人にその名において経営させてはならない。
      - caption: （業務改善命令）
        title: 第二条の十七
        article_num: '2_17'
        paragraphs:
        - content: 経済産業大臣は、小売電気事業の運営が適切でないため、電気の使用者の利益の保護又は電気事業の健全な発達に支障が生じ、又は生ずるおそれがあると認めるときは、小売電気事業者に対し、電気の使用者の利益又は公共の利益を確保するために必要な限度において、その小売電気事業の運営の改善に必要な措置をとることを命ずることができる。
        - paragraph_num: ２
          content: 経済産業大臣は、小売電気事業者等が第二条の十三第一項又は第二項の規定に違反したときは、小売電気事業者等に対し、その業務の方法の改善に必要な措置をとることを命ずることができる。
        - paragraph_num: ３
          content: 経済産業大臣は、小売電気事業者が第二条の十五の規定に違反したときは、小売電気事業者に対し、その業務の方法の改善に必要な措置をとることを命ずることができる。
  - title: 第二節　一般送配電事業
    section_num: 2
    subsections:
    - title: 第一款　事業の許可
      article_num: 1
      articles:
      - caption: （事業の許可）
        title: 第三条
        article_num: '3'
        paragraphs:
        - content: 一般送配電事業を営もうとする者は、経済産業大臣の許可を受けなければならない。
      - caption: （許可の申請）
        title: 第四条
        article_num: '4'
        paragraphs:
        - content: 前条の許可を受けようとする者は、次に掲げる事項を記載した申請書を経済産業大臣に提出しなければならない。
          items:
          - title: 一
            content: 商号及び住所
          - title: 二
            content: 取締役（指名委員会等設置会社にあつては、取締役及び執行役。第六条第二項第三号において同じ。）の氏名
          - title: 三
            content: 主たる営業所その他の営業所の名称及び所在地
          - title: 四
            content: 供給区域
          - title: 五
            content: 一般送配電事業の用に供する電気工作物に関する次に掲げる事項
            subitems:
            - level: 1
              title: イ
              content: 送電用のものにあつては、その設置の場所、電気方式、設置の方法、回線数、周波数及び電圧
            - level: 1
              title: ロ
              content: 配電用のものにあつては、その電気方式、周波数及び電圧
            - level: 1
              title: ハ
              content: 変電用のものにあつては、その設置の場所、周波数及び出力
            - level: 1
              title: ニ
              content: 発電用のものにあつては、その設置の場所、原動力の種類、周波数及び出力
            - level: 1
              title: ホ
              content: 蓄電用のものにあつては、その設置の場所、周波数、出力及び容量
        - paragraph_num: ２
          content: 前項の申請書には、事業計画書、事業収支見積書その他経済産業省令で定める書類を添附しなければならない。
      - caption: （許可の基準）
        title: 第五条
        article_num: '5'
        paragraphs:
        - content: 経済産業大臣は、第三条の許可の申請が次の各号のいずれにも適合していると認めるときでなければ、同条の許可をしてはならない。
          items:
          - title: 一
            content: その一般送配電事業の開始がその供給区域における需要に適合すること。
          - title: 二
            content: その一般送配電事業を適確に遂行するに足りる経理的基礎及び技術的能力があること。
          - title: 三
            content: その一般送配電事業の計画が確実であること。
          - title: 四
            content: その一般送配電事業の用に供する電気工作物の能力がその供給区域における需要に応ずることができるものであること。
          - title: 五
            content: その一般送配電事業の開始によつてその供給区域の全部又は一部について一般送配電事業の用に供する電気工作物が著しく過剰とならないこと。
          - title: 六
            content: 前各号に掲げるもののほか、その一般送配電事業の開始が電気事業の総合的かつ合理的な発達その他の公共の利益の増進のため必要かつ適切であること。
      - caption: （許可証）
        title: 第六条
        article_num: '6'
        paragraphs:
        - content: 経済産業大臣は、第三条の許可をしたときは、許可証を交付する。
        - paragraph_num: ２
          content: 許可証には、次に掲げる事項を記載しなければならない。
          items:
          - title: 一
            content: 許可の年月日及び許可の番号
          - title: 二
            content: 商号及び住所
          - title: 三
            content: 取締役の氏名
          - title: 四
            content: 主たる営業所その他の営業所の名称及び所在地
          - title: 五
            content: 供給区域
          - title: 六
            content: 一般送配電事業の用に供する電気工作物に関する次に掲げる事項
            subitems:
            - level: 1
              title: イ
              content: 送電用のものにあつては、その設置の場所、電気方式、設置の方法、回線数、周波数及び電圧
            - level: 1
              title: ロ
              content: 配電用のものにあつては、その電気方式、周波数及び電圧
            - level: 1
              title: ハ
              content: 変電用のものにあつては、その設置の場所、周波数及び出力
            - level: 1
              title: ニ
              content: 発電用のものにあつては、その設置の場所、原動力の種類、周波数及び出力
            - level: 1
              title: ホ
              content: 蓄電用のものにあつては、その設置の場所、周波数、出力及び容量
      - caption: （機関）
        title: 第六条の二
        article_num: '6_2'
        paragraphs:
        - content: 一般送配電事業者は、株式会社であつて次に掲げる機関を置くものでなければならない。
          items:
          - title: 一
            content: 取締役会
          - title: 二
            content: 監査役、監査等委員会又は指名委員会等（会社法（平成十七年法律第八十六号）第二条第十二号に規定する指名委員会等をいう。）
      - caption: （事業の開始の義務）
        title: 第七条
        article_num: '7'
        paragraphs:
        - content: 一般送配電事業者は、事業の許可を受けた日から十年以内において経済産業大臣が指定する期間内に、その事業を開始しなければならない。
        - paragraph_num: ２
          content: 経済産業大臣は、特に必要があると認めるときは、供給区域を区分して前項の規定による指定をすることができる。
        - paragraph_num: ３
          content: 経済産業大臣は、一般送配電事業者から申請があつた場合において、正当な理由があると認めるときは、第一項の規定により指定した期間を延長することができる。
        - paragraph_num: ４
          content: 一般送配電事業者は、その事業（第二項の規定により供給区域を区分して第一項の規定による指定があつたときは、その区分に係る事業）を開始したときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
      - caption: （供給区域の変更）
        title: 第八条
        article_num: '8'
        paragraphs:
        - content: 一般送配電事業者は、第六条第二項第五号に掲げる事項を変更しようとするときは、経済産業大臣の許可を受けなければならない。
        - paragraph_num: ２
          content: 第五条及び前条の規定は、前項の許可（同条の規定にあつては、供給区域の減少に係るものを除く。）に準用する。
      - caption: （電気工作物等の変更）
        title: 第九条
        article_num: '9'
        paragraphs:
        - content: 一般送配電事業者は、第六条第二項第六号に掲げる事項について経済産業省令で定める重要な変更をしようとするときは、経済産業省令で定めるところにより、あらかじめ、経済産業大臣に届け出なければならない。
        - paragraph_num: ２
          content: 一般送配電事業者は、第六条第二項第二号から第四号までに掲げる事項に変更があつたとき、又は同項第六号に掲げる事項の変更（前項に規定するものを除く。）をしたときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
        - paragraph_num: ３
          content: 第一項の規定による届出をした一般送配電事業者は、その届出が受理された日から二十日を経過した後でなければ、その届出に係る変更をしてはならない。
        - paragraph_num: ４
          content: 経済産業大臣は、第一項の規定による届出の内容がその届出をした一般送配電事業者の一般送配電事業の適確な遂行に支障を及ぼすおそれがないと認めるときは、前項に規定する期間を短縮することができる。
        - paragraph_num: ５
          content: 経済産業大臣は、第一項の規定による届出の内容がその届出をした一般送配電事業者の一般送配電事業の適確な遂行に支障を及ぼすおそれがあると認めるときは、その届出をした一般送配電事業者に対し、その届出を受理した日から二十日以内に限り、その届出の内容を変更し、又は中止すべきことを命ずることができる。
      - caption: （事業の譲渡し及び譲受け並びに合併及び会社分割）
        title: 第十条
        article_num: '10'
        paragraphs:
        - content: 一般送配電事業の全部の譲渡し及び譲受けは、経済産業大臣の認可を受けなければ、その効力を生じない。
        - paragraph_num: ２
          content: 一般送配電事業者の合併及び会社分割（一般送配電事業の全部を承継させるものに限る。次条において同じ。）は、経済産業大臣の認可を受けなければ、その効力を生じない。
        - paragraph_num: ３
          content: 第五条の規定は、前二項の認可に準用する。
      - caption: （承継）
        title: 第十一条
        article_num: '11'
        paragraphs:
        - content: 一般送配電事業の全部の譲渡しがあり、又は一般送配電事業者について合併若しくは会社分割があつたときは、一般送配電事業の全部を譲り受けた株式会社又は合併後存続する株式会社若しくは合併により設立した株式会社若しくは会社分割により当該一般送配電事業の全部を承継した株式会社は、一般送配電事業者の地位を承継する。
      - title: 第十二条
        article_num: '12'
        paragraphs:
        - content: 削除
      - caption: （設備の譲渡し等）
        title: 第十三条
        article_num: '13'
        paragraphs:
        - content: 一般送配電事業者は、その一般送配電事業の用に供する設備を譲り渡し、又は所有権以外の権利の目的としようとするときは、経済産業大臣に届け出なければならない。
            ただし、経済産業省令で定める設備については、この限りでない。
        - paragraph_num: ２
          content: 第九条第三項から第五項までの規定は、前項の届出に準用する。 この場合において、同条第三項中「変更を」とあるのは「設備を譲り渡し、又は所有権以外の権利の目的と」と、同条第四項中「の内容」とあるのは「に係る設備を譲り渡し、又は所有権以外の権利の目的とすること（次項において「設備の譲渡し等」という。）」と、同条第五項中「の内容」とあるのは「に係る設備の譲渡し等」と読み替えるものとする。
      - caption: （事業の休止及び廃止並びに解散）
        title: 第十四条
        article_num: '14'
        paragraphs:
        - content: 一般送配電事業者は、一般送配電事業の全部又は一部を休止し、又は廃止しようとするときは、経済産業大臣の許可を受けなければならない。
        - paragraph_num: ２
          content: 一般送配電事業者の解散についての株主総会の決議は、経済産業大臣の認可を受けなければ、その効力を生じない。
        - paragraph_num: ３
          content: 経済産業大臣は、一般送配電事業の休止若しくは廃止又は一般送配電事業者の解散により公共の利益が阻害されるおそれがないと認めるときでなければ、第一項の許可又は前項の認可をしてはならない。
      - caption: （事業の許可の取消し等）
        title: 第十五条
        article_num: '15'
        paragraphs:
        - content: 経済産業大臣は、一般送配電事業者が第七条第一項の規定により指定した期間（同条第三項の規定による延長があつたときは、延長後の期間。次条第一項において同じ。）内に事業を開始しないときは、第三条の許可を取り消すことができる。
        - paragraph_num: ２
          content: 経済産業大臣は、前項に規定する場合を除くほか、一般送配電事業者がこの法律又はこの法律に基づく命令の規定に違反した場合において、公共の利益を阻害すると認めるときは、第三条の許可を取り消すことができる。
        - paragraph_num: ３
          content: 経済産業大臣は、前二項の規定による許可の取消しをしたときは、理由を記載した文書をその一般送配電事業者に送付しなければならない。
      - title: 第十六条
        article_num: '16'
        paragraphs:
        - content: 経済産業大臣は、第八条第一項の許可を受けた一般送配電事業者が同条第二項において準用する第七条第一項の規定により指定した期間内にその増加する供給区域において事業を開始しないときは、その許可を取り消すことができる。
        - paragraph_num: ２
          content: 経済産業大臣は、一般送配電事業者がその供給区域の一部において一般送配電事業を行つていない場合において、公共の利益を阻害すると認めるときは、その一部について供給区域を減少することができる。
        - paragraph_num: ３
          content: 前条第三項の規定は、前二項の場合に準用する。
    - title: 第二款　業務
      article_num: 2
      articles:
      - caption: （託送供給義務等）
        title: 第十七条
        article_num: '17'
        paragraphs:
        - content: 一般送配電事業者は、正当な理由がなければ、その供給区域における託送供給（振替供給にあつては、小売電気事業、一般送配電事業、配電事業若しくは特定送配電事業の用に供するための電気又は第二条第一項第五号ロに掲げる接続供給に係る電気に係るものであつて、経済産業省令で定めるものに限る。次条第一項において同じ。）を拒んではならない。
        - paragraph_num: ２
          content: 一般送配電事業者は、その電力量調整供給を行うために過剰な供給能力を確保しなければならないこととなるおそれがあるときその他正当な理由がなければ、その供給区域における電力量調整供給を拒んではならない。
        - paragraph_num: ３
          content: 一般送配電事業者は、正当な理由がなければ、最終保障供給及び離島等供給を拒んではならない。
        - paragraph_num: ４
          content: 一般送配電事業者は、発電等用電気工作物を維持し、及び運用し、又は維持し、及び運用しようとする者から、当該発電等用電気工作物と当該一般送配電事業者が維持し、及び運用する電線路とを電気的に接続することを求められたときは、当該発電等用電気工作物が当該電線路の機能に電気的又は磁気的な障害を与えるおそれがあるときその他正当な理由がなければ、当該接続を拒んではならない。
        - paragraph_num: ５
          content: 一般送配電事業者は、当該一般送配電事業者の最終保障供給若しくは離島等供給の業務の方法又は当該一般送配電事業者が行う最終保障供給若しくは離島等供給に係る料金その他の供給条件についての最終保障供給又は離島等供給の相手方（当該一般送配電事業者から最終保障供給又は離島等供給を受けようとする者を含み、電気事業者である者を除く。）からの苦情及び問合せについては、適切かつ迅速にこれを処理しなければならない。
      - caption: （託送供給等に係る収入の見通し）
        title: 第十七条の二
        article_num: '17_2'
        paragraphs:
        - content: 一般送配電事業者は、経済産業省令で定める期間ごとに、経済産業省令で定めるところにより、その供給区域における託送供給及び電力量調整供給（次項、次条第一項及び第十八条において「託送供給等」という。）の業務に係る料金の算定の基礎とするため、その業務を能率的かつ適正に運営するために通常必要と見込まれる収入（以下この条から第十八条までにおいて「収入の見通し」という。）を算定し、経済産業大臣の承認を受けなければならない。
        - paragraph_num: ２
          content: 経済産業大臣は、一般送配電事業者による収入の見通しの適確な算定に資するため、託送供給等の業務に係る適正な原価及び物価その他の社会的経済的事情を勘案し、必要な指針を定め、これを公表するものとする。
        - paragraph_num: ３
          content: 経済産業大臣は、第一項の承認の申請があつた場合において、当該申請に係る収入の見通しが前項の指針に照らして適切なものであると認めるときは、その承認をするものとする。
        - paragraph_num: ４
          content: 一般送配電事業者は、第一項の経済産業省令で定める期間中において、同項の承認を受けた収入の見通しを変更しようとするときは、経済産業大臣の承認を受けなければならない。
        - paragraph_num: ５
          content: 経済産業大臣は、前項の変更の承認の申請があつた場合において、当該申請に係る収入の見通しが次に掲げる基準に適合するものであると認めるときは、その承認をするものとする。
          items:
          - title: 一
            content: 変更の目的が次のいずれかに該当するものであること。
            subitems:
            - level: 1
              title: イ
              content: 需要の変動その他の一般送配電事業者がその事業の遂行上予見し難い事由として経済産業省令で定めるものに対応するためのものであること。
            - level: 1
              title: ロ
              content: 他の法律の規定により支払うべき費用の額の変動に対応する場合（当該費用の額の増加に対応する場合にあつては、一般送配電事業を行うに当たり当該費用を節減することが著しく困難な場合に限る。）として経済産業省令で定める場合に該当するものであること。
          - title: 二
            content: 変更の内容が第二項の指針に照らして適切なものであること。
        - paragraph_num: ６
          content: 一般送配電事業者は、第一項の承認若しくは第四項の変更の承認を受け、又は次条第三項の規定による変更の通知を受けたときは、経済産業省令で定めるところにより、その収入の見通しを公表しなければならない。
      - caption: （収入の見通しに関する命令及び処分）
        title: 第十七条の三
        article_num: '17_3'
        paragraphs:
        - content: 経済産業大臣は、一般送配電事業者の託送供給等の業務における能率的かつ適正な運営を確保するため必要があると認めるときは、当該一般送配電事業者に対し、相当の期限を定め、前条第一項の承認を受けた収入の見通し（同条第四項の変更の承認又は次項の規定による変更があつたときは、その変更後のもの。次条第三項第一号及び第四項において同じ。）の変更の承認を申請すべきことを命ずることができる。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定による命令をした場合において、同項の期限までに承認の申請がないときは、その収入の見通しを変更することができる。
        - paragraph_num: ３
          content: 経済産業大臣は、前項の規定により収入の見通しを変更したときは、速やかに、その変更の内容を当該一般送配電事業者に対して通知するものとする。
      - caption: （託送供給等約款）
        title: 第十八条
        article_num: '18'
        paragraphs:
        - content: 一般送配電事業者は、その供給区域における託送供給等に係る料金その他の供給条件（以下この款において単に「供給条件」という。）について、経済産業省令で定める期間ごとに、経済産業省令で定めるところにより、託送供給等約款を定め、経済産業大臣の認可を受けなければならない。
            当該期間中において、これを変更しようとするときも、同様とする。
        - paragraph_num: ２
          content: 一般送配電事業者は、前項の認可を受けた託送供給等約款（第五項若しくは第八項の規定による変更の届出があつたとき、又は次条第二項の規定による変更があつたときは、その変更後のもの）以外の供給条件により託送供給等を行つてはならない。
            ただし、その託送供給等約款により難い特別の事情がある場合において、経済産業大臣の認可を受けた供給条件（同項の規定による変更があつたときは、その変更後のもの）により託送供給等を行うときは、この限りでない。
        - paragraph_num: ３
          content: 経済産業大臣は、第一項の認可の申請が次の各号のいずれにも適合していると認めるときは、同項の認可をしなければならない。
          items:
          - title: 一
            content: 料金が第十七条の二第一項の承認を受けた収入の見通しを超えない額の収入をその算定の基礎とするものであること。
          - title: 二
            content: 第一項の認可の申請に係る託送供給等約款により電気の供給を受ける者が託送供給等を受けることを著しく困難にするおそれがないこと。
          - title: 三
            content: 料金の額の算出方法が適正かつ明確に定められていること。
          - title: 四
            content: 一般送配電事業者及び第一項の認可の申請に係る託送供給等約款により電気の供給を受ける者の責任に関する事項並びに電気計器及び工事に関する費用の負担の方法が適正かつ明確に定められていること。
          - title: 五
            content: 特定の者に対して不当な差別的取扱いをするものでないこと。
          - title: 六
            content: 前各号に掲げるもののほか、公共の利益の増進に支障がないこと。
        - paragraph_num: ４
          content: 一般送配電事業者は、第一項後段の規定にかかわらず、第十七条の二第一項の承認を受けた収入の見通しを超えない額の収入をその算定の基礎として料金を変更する場合その他の電気の使用者の利益を阻害するおそれがないと見込まれる場合として経済産業省令で定める場合には、経済産業省令で定めるところにより、第一項の認可を受けた託送供給等約款（次項又は第八項の規定による変更の届出があつたときは、その変更後のもの。第七項において同じ。）で設定した供給条件を変更することができる。
        - paragraph_num: ５
          content: 一般送配電事業者は、前項の規定により供給条件を変更したときは、経済産業省令で定めるところにより、変更後の託送供給等約款を経済産業大臣に届け出なければならない。
        - paragraph_num: ６
          content: 経済産業大臣は、前項の規定による届出に係る託送供給等約款が次の各号のいずれかに該当しないと認めるときは、当該一般送配電事業者に対し、相当の期限を定め、その託送供給等約款を変更すべきことを命ずることができる。
          items:
          - title: 一
            content: 前項の規定による届出に係る託送供給等約款により電気の供給を受ける者が託送供給等を受けることを著しく困難にするおそれがないこと。
          - title: 二
            content: 料金の額の算出方法が適正かつ明確に定められていること。
          - title: 三
            content: 一般送配電事業者及び前項の規定による届出に係る託送供給等約款により電気の供給を受ける者の責任に関する事項並びに電気計器及び工事に関する費用の負担の方法が適正かつ明確に定められていること。
          - title: 四
            content: 特定の者に対して不当な差別的取扱いをするものでないこと。
          - title: 五
            content: 前各号に掲げるもののほか、公共の利益の増進に支障がないこと。
        - paragraph_num: ７
          content: 一般送配電事業者は、第一項後段の規定にかかわらず、他の法律の規定により支払うべき費用の額の増加に対応する場合（一般送配電事業を行うに当たり当該費用を節減することが著しく困難な場合に限る。）として経済産業省令で定める場合には、経済産業省令で定めるところにより、同項の認可を受けた託送供給等約款で設定した供給条件（料金を除く。次項において同じ。）を変更することができる。
        - paragraph_num: ８
          content: 一般送配電事業者は、前項の規定により供給条件を変更しようとするときは、経済産業省令で定めるところにより、その旨及びその変更後の託送供給等約款を経済産業大臣に届け出なければならない。
        - paragraph_num: ９
          content: 前項の規定による届出に係る託送供給等約款は、その届出が受理された日から三十日を経過した後でなければ、その効力を生じない。
        - paragraph_num: １０
          content: 経済産業大臣は、第八項の規定による届出に係る託送供給等約款が次の各号のいずれにも適合していると認めるときは、前項に規定する期間を短縮することができる。
          items:
          - title: 一
            content: 第八項の規定による届出に係る託送供給等約款により電気の供給を受ける者が託送供給等を受けることを著しく困難にするおそれがないこと。
          - title: 二
            content: 一般送配電事業者及び第八項の規定による届出に係る託送供給等約款により電気の供給を受ける者の責任に関する事項並びに電気計器及び工事に関する費用の負担の方法が適正かつ明確に定められていること。
          - title: 三
            content: 特定の者に対して不当な差別的取扱いをするものでないこと。
          - title: 四
            content: 前三号に掲げるもののほか、公共の利益の増進に支障がないこと。
        - paragraph_num: １１
          content: 経済産業大臣は、第八項の規定による届出に係る託送供給等約款が前項各号のいずれかに適合していないと認めるときは、当該一般送配電事業者に対し、その届出を受理した日から三十日以内に限り、その託送供給等約款を変更すべきことを命ずることができる。
        - paragraph_num: １２
          content: 一般送配電事業者は、第一項の規定により託送供給等約款の認可を受け、第五項若しくは第八項の規定により託送供給等約款の変更の届出をし、又は次条第三項の規定による託送供給等約款の変更の通知を受けたときは、経済産業省令で定めるところにより、その託送供給等約款を公表しなければならない。
      - caption: （託送供給等約款に関する命令及び処分）
        title: 第十九条
        article_num: '19'
        paragraphs:
        - content: 経済産業大臣は、供給条件が社会的経済的事情の変動により著しく不適当となり、公共の利益の増進に支障があると認めるときは、一般送配電事業者に対し、相当の期限を定め、前条第一項の認可を受けた託送供給等約款（同条第五項又は第八項の規定による変更の届出があつたときは、その変更後のもの）又は同条第二項ただし書の認可を受けた供給条件（次項の規定による変更があつたときは、その変更後の託送供給等約款又は供給条件）の変更の認可を申請すべきことを命ずることができる。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定による命令をした場合において、同項の期限までに認可の申請がないときは、その託送供給等約款又は供給条件を変更することができる。
        - paragraph_num: ３
          content: 経済産業大臣は、前項の規定により託送供給等約款又は供給条件を変更したときは、速やかに、その変更の内容を当該一般送配電事業者に対して通知するものとする。
      - caption: （最終保障供給約款）
        title: 第二十条
        article_num: '20'
        paragraphs:
        - content: 一般送配電事業者は、最終保障供給に係る供給条件について約款を定め、経済産業省令で定めるところにより、経済産業大臣に届け出なければならない。
            これを変更しようとするときも、同様とする。
        - paragraph_num: ２
          content: 一般送配電事業者は、前項の規定による届出をした約款（以下この条において「最終保障供給約款」という。）以外の供給条件により最終保障供給を行つてはならない。
            ただし、その最終保障供給約款により難い特別の事情がある場合において、経済産業大臣の承認を受けた供給条件により最終保障供給を行うときは、この限りでない。
        - paragraph_num: ３
          content: 経済産業大臣は、最終保障供給約款が次の各号のいずれかに該当しないと認めるときは、当該一般送配電事業者に対し、相当の期限を定め、その最終保障供給約款を変更すべきことを命ずることができる。
          items:
          - title: 一
            content: 料金が供給の種類により定率又は定額をもつて明確に定められていること。
          - title: 二
            content: 一般送配電事業者及び電気の使用者の責任に関する事項並びに電気計器その他の用品及び配線工事その他の工事に関する費用の負担の方法が適正かつ明確に定められていること。
          - title: 三
            content: 特定の者に対して不当な差別的取扱いをするものでないこと。
          - title: 四
            content: 社会的経済的事情に照らして著しく不適切であり、最終保障供給約款により電気の供給を受ける者の利益を著しく阻害するおそれがあるものでないこと。
        - paragraph_num: ４
          content: 第十八条第十二項の規定は、第一項の規定により最終保障供給約款の届出をしたときに準用する。
      - caption: （指定区域の指定等）
        title: 第二十条の二
        article_num: '20_2'
        paragraphs:
        - content: 経済産業大臣は、一般送配電事業者の申請に基づき、当該一般送配電事業者の供給区域内の区域であつて、次に掲げる基準のいずれにも適合すると認められるものを、指定区域として指定することができる。
          items:
          - title: 一
            content: 主要電線路から独立して当該区域内における電線路を維持し、及び運用することが、一般送配電事業の効率的な運営に資すること。
          - title: 二
            content: 主要電線路から独立して当該区域内における電線路を維持し、及び運用することが、当該区域内の電気の安定供給を阻害するおそれがないこと。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定による指定をしたときは、遅滞なく、経済産業省令で定めるところにより、その旨及び当該指定区域を公表するものとする。
        - paragraph_num: ３
          content: 経済産業大臣は、指定区域が第一項各号に掲げる基準のいずれかに適合しなくなつたと認めるときは、当該指定区域の指定を解除するものとする。
            この場合においては、前項の規定を準用する。
      - caption: （離島等供給約款）
        title: 第二十一条
        article_num: '21'
        paragraphs:
        - content: 一般送配電事業者は、離島等供給に係る供給条件について約款を定め、経済産業省令で定めるところにより、経済産業大臣に届け出なければならない。
            これを変更しようとするときも、同様とする。
        - paragraph_num: ２
          content: 一般送配電事業者は、前項の規定による届出をした約款（以下この条において「離島等供給約款」という。）以外の供給条件により離島等供給を行つてはならない。
            ただし、その離島等供給約款により難い特別の事情がある場合において、経済産業大臣の承認を受けた供給条件により離島等供給を行うときは、この限りでない。
        - paragraph_num: ３
          content: 経済産業大臣は、離島等供給約款が次の各号のいずれかに該当しないと認めるときは、当該一般送配電事業者に対し、相当の期限を定め、その離島等供給約款を変更すべきことを命ずることができる。
          items:
          - title: 一
            content: 料金の水準がその供給区域（離島等を除く。）において小売電気事業者が行う小売供給に係る料金の水準と同程度のものであること。
          - title: 二
            content: 料金が供給の種類により定率又は定額をもつて明確に定められていること。
          - title: 三
            content: 一般送配電事業者及び電気の使用者の責任に関する事項並びに電気計器その他の用品及び配線工事その他の工事に関する費用の負担の方法が適正かつ明確に定められていること。
          - title: 四
            content: 特定の者に対して不当な差別的取扱いをするものでないこと。
          - title: 五
            content: 料金以外の供給条件が社会的経済的事情に照らして著しく不適切であり、離島等供給約款により電気の供給を受ける者の利益を著しく阻害するおそれがあるものでないこと。
        - paragraph_num: ４
          content: 第十八条第十二項の規定は、第一項の規定により離島等供給約款の届出をしたときに準用する。
      - caption: （一般送配電事業等の業務に関する会計整理等）
        title: 第二十二条
        article_num: '22'
        paragraphs:
        - content: 一般送配電事業者は、一般送配電事業以外の事業を営む場合には、経済産業省令で定めるところにより、一般送配電事業の業務その他変電、送電及び配電に係る業務に関する会計を整理しなければならない。
        - paragraph_num: ２
          content: 前項の場合において、一般送配電事業者は、経済産業省令で定めるところにより、同項の整理の結果を公表しなければならない。
      - caption: （兼業の制限等）
        title: 第二十二条の二
        article_num: '22_2'
        paragraphs:
        - content: 一般送配電事業者は、小売電気事業、発電事業（小売電気事業の用に供するための電気を発電するものに限る。第百十七条の二第四号において同じ。）又は特定卸供給事業（小売電気事業の用に供するための電気を供給するものに限る。同号において同じ。）を営んではならない。
            ただし、経済産業省令で定めるところにより、経済産業大臣の認可を受けたときは、小売電気事業（その供給区域における一般の需要に応ずるものに限る。次項において同じ。）、発電事業（その供給区域における一般の需要に応ずる小売電気事業の用に供するための電気を発電するものに限る。同項において同じ。）又は特定卸供給事業（その供給区域における一般の需要に応ずる小売電気事業の用に供するための電気を供給するものに限る。同項において同じ。）を営むことができる。
        - paragraph_num: ２
          content: 経済産業大臣は、前項ただし書の認可の申請があつたときは、当該申請に係る一般送配電事業者が維持し、及び運用する送電用及び配電用の電気工作物の総体としての規模、その供給区域の自然的社会的条件等を勘案して当該一般送配電事業者が小売電気事業、発電事業又は特定卸供給事業を営むことがその供給区域内の電気の使用者の利益を確保するため特に必要であると認める場合でなければ、これを認可してはならない。
        - paragraph_num: ３
          content: 次の各号に掲げる者については、当該各号に定める規定は、適用しない。 ただし、第一項ただし書の認可を受けた一般送配電事業者（以下この項において「認可一般送配電事業者」という。）の特定関係事業者（次条第一項に規定する特定関係事業者をいう。第三号において同じ。）である小売電気事業者、発電事業者又は特定卸供給事業者が、小売電気事業（当該認可一般送配電事業者の供給区域以外の地域における一般の需要に応ずるものに限る。）、発電事業（当該認可一般送配電事業者の供給区域以外の地域における一般の需要に応ずる小売電気事業の用に供するための電気を発電するものに限る。）又は特定卸供給事業（当該認可一般送配電事業者の供給区域以外の地域における一般の需要に応ずる小売電気事業の用に供するための電気を供給するものに限る。）を営むときは、この限りでない。
          items:
          - title: 一
            content: 認可一般送配電事業者 次条第二項及び第二十三条第二項から第五項までの規定
          - title: 二
            content: 認可一般送配電事業者の取締役、執行役又は使用人その他の従業者（以下単に「従業者」という。） 次条第一項の規定
          - title: 三
            content: 認可一般送配電事業者の特定関係事業者 第二十三条の二第一項及び第二十三条の三第一項の規定
      - caption: （一般送配電事業者の取締役又は執行役の兼職の制限等）
        title: 第二十二条の三
        article_num: '22_3'
        paragraphs:
        - content: 一般送配電事業者の取締役又は執行役は、その特定関係事業者（一般送配電事業者の子会社（会社法第二条第三号に規定する子会社をいう。以下同じ。）、親会社（同条第四号に規定する親会社をいう。以下この項及び第二十七条の十一の三第一項において同じ。）若しくは当該一般送配電事業者以外の当該親会社の子会社等（同法第二条第三号の二に規定する子会社等をいう。以下同じ。）に該当する小売電気事業者、発電事業者若しくは特定卸供給事業者又は当該小売電気事業者、発電事業者若しくは特定卸供給事業者の経営を実質的に支配していると認められる者として経済産業省令で定める要件に該当する者をいう。以下この款において同じ。）の取締役、執行役その他業務を執行する役員（以下この項及び第二十七条の十一の三第一項において「取締役等」という。）又は従業者を、一般送配電事業者の従業者は、その特定関係事業者の取締役等を、それぞれ兼ねてはならない。
            ただし、電気を供給する事業を営む者（以下「電気供給事業者」という。）の間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
        - paragraph_num: ２
          content: 一般送配電事業者は、次の各号に掲げるその特定関係事業者ごとに当該各号に定める当該特定関係事業者の従業者を、当該一般送配電事業者が営む一般送配電事業の業務その他変電、送電及び配電に係る業務のうち、電気供給事業者間の適正な競争関係の確保のためその運営における中立性の確保が特に必要な業務として経済産業省令で定めるもの（第二十三条の二第一項において「特定送配電等業務」という。）に従事させてはならない。
            ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
          items:
          - title: 一
            content: 小売電気事業者 小売電気事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
          - title: 二
            content: 発電事業者 発電事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
          - title: 三
            content: 特定卸供給事業者 特定卸供給事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
          - title: 四
            content: 前項本文の経済産業省令で定める要件に該当する者 その経営を実質的に支配していると認められる小売電気事業者、発電事業者又は特定卸供給事業者の経営管理に係る業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
        - paragraph_num: ３
          content: 経済産業大臣は、一般送配電事業者の取締役、執行役又は従業者が第一項の規定に違反した場合には一般送配電事業者又はその特定関係事業者に対し、一般送配電事業者が前項の規定に違反した場合には一般送配電事業者に対し、当該違反を是正するために必要な措置をとることを命ずることができる。
      - caption: （一般送配電事業者の禁止行為等）
        title: 第二十三条
        article_num: '23'
        paragraphs:
        - content: 一般送配電事業者は、次に掲げる行為をしてはならない。
          items:
          - title: 一
            content: 託送供給及び電力量調整供給の業務に関して知り得た他の電気供給事業者に関する情報及び電気の使用者に関する情報（電気供給事業者間の適正な競争関係を阻害するおそれがない情報として経済産業省令で定めるものを除く。）を当該業務及び再生可能エネルギー電気の利用の促進に関する特別措置法（平成二十三年法律第百八号。以下「再生可能エネルギー電気特措法」という。）第二条第五項又は第二条の七第一項に規定する特定契約又は一時調達契約に基づき調達する再生可能エネルギー電気特措法第二条第一項に規定する再生可能エネルギー電気の供給に係る業務の用に供する目的以外の目的のために利用し、又は提供すること。
          - title: 二
            content: その託送供給及び電力量調整供給の業務その他の変電、送電及び配電に係る業務について、特定の電気供給事業者に対し、不当に優先的な取扱いをし、若しくは利益を与え、又は不当に不利な取扱いをし、若しくは不利益を与えること。
          - title: 三
            content: 前二号に掲げるもののほか、電気供給事業者間の適正な競争関係を阻害するものとして経済産業省令で定める行為をすること。
        - paragraph_num: ２
          content: 一般送配電事業者は、通常の取引の条件と異なる条件であつて電気供給事業者間の適正な競争関係を阻害するおそれのある条件で、その特定関係事業者その他一般送配電事業者と経済産業省令で定める特殊の関係のある者（第百六条第五項において「一般送配電事業者の特定関係事業者等」という。）と取引を行つてはならない。
            ただし、当該取引を行うことにつきやむを得ない事情がある場合において、あらかじめ経済産業大臣の承認を受けたときは、この限りでない。
        - paragraph_num: ３
          content: 一般送配電事業者は、その託送供給及び電力量調整供給の業務その他の変電、送電及び配電に係る業務をその特定関係事業者又は当該特定関係事業者の子会社等（特定関係事業者に該当するものを除く。）に委託してはならない。
            ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
        - paragraph_num: ４
          content: 一般送配電事業者は、その最終保障供給又は離島等供給の業務を委託する場合においては、経済産業省令で定めるところにより、これらの業務を受託する者を公募することなく、その特定関係事業者である小売電気事業者、発電事業者又は特定卸供給事業者にこれらの業務を委託してはならない。
            ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
        - paragraph_num: ５
          content: 一般送配電事業者は、その特定関係事業者である小売電気事業者、発電事業者又は特定卸供給事業者からその営む小売電気事業、発電事業又は特定卸供給事業の業務を受託してはならない。
            ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
        - paragraph_num: ６
          content: 経済産業大臣は、前各項の規定に違反する行為があると認めるときは、一般送配電事業者に対し、当該行為の停止又は変更を命ずることができる。
      - caption: （一般送配電事業者の特定関係事業者が一般送配電事業者の従業者をその従業者として従事させることの制限等）
        title: 第二十三条の二
        article_num: '23_2'
        paragraphs:
        - content: 次の各号に掲げる一般送配電事業者の特定関係事業者は、当該一般送配電事業者が営む特定送配電等業務に従事する者を、当該各号に定める従業者として従事させてはならない。
            ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
          items:
          - title: 一
            content: 小売電気事業者 小売電気事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
          - title: 二
            content: 発電事業者 発電事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
          - title: 三
            content: 特定卸供給事業者 特定卸供給事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
          - title: 四
            content: 第二十二条の三第一項本文の経済産業省令で定める要件に該当する者 その経営を実質的に支配していると認められる小売電気事業者、発電事業者又は特定卸供給事業者の経営管理に係る業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
        - paragraph_num: ２
          content: 経済産業大臣は、一般送配電事業者の特定関係事業者が前項の規定に違反した場合には、一般送配電事業者の特定関係事業者に対し当該違反を是正するために必要な措置をとることを命ずることができる。
      - caption: （一般送配電事業者の特定関係事業者の禁止行為等）
        title: 第二十三条の三
        article_num: '23_3'
        paragraphs:
        - content: 一般送配電事業者の特定関係事業者は、次に掲げる行為をしてはならない。
          items:
          - title: 一
            content: 当該一般送配電事業者に対し、第二十三条第一項各号に掲げる行為又は同条第二項本文、第三項本文、第四項本文若しくは第五項本文の行為をするように要求し、又は依頼すること。
          - title: 二
            content: 前号に掲げるもののほか、電気供給事業者間の適正な競争関係を阻害するものとして経済産業省令で定める行為をすること。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定に違反する行為があると認めるときは、一般送配電事業者の特定関係事業者に対し、当該行為の停止又は変更を命ずることができる。
      - caption: （電気供給事業者間の適正な競争関係を確保するための体制整備等）
        title: 第二十三条の四
        article_num: '23_4'
        paragraphs:
        - content: 一般送配電事業者は、経済産業省令で定めるところにより、託送供給及び電力量調整供給の業務に関して知り得た情報その他その一般送配電事業の業務に関する情報を適正に管理し、かつ、託送供給及び電力量調整供給の業務の実施状況を適切に監視するための体制の整備その他電気供給事業者間の適正な競争関係を確保するために必要な措置を講じなければならない。
        - paragraph_num: ２
          content: 一般送配電事業者は、毎年、経済産業省令で定めるところにより、前項の規定により講じた措置を経済産業大臣に報告しなければならない。
      - caption: （供給区域外に設置する電線路による供給）
        title: 第二十四条
        article_num: '24'
        paragraphs:
        - content: 一般送配電事業者は、その供給区域以外の地域に自らが維持し、及び運用する電線路を設置し、当該電線路により電気の供給を行おうとするときは、供給する場所ごとに、経済産業大臣の許可を受けなければならない。
            ただし、一般送配電事業又は配電事業の用に供するための電気を供給するとき、及び振替供給（小売電気事業、一般送配電事業、配電事業若しくは特定送配電事業の用に供するための電気又は第二条第一項第五号ロに掲げる接続供給に係る電気に係るものに限る。）を行うときは、この限りでない。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の許可の申請が次の各号のいずれにも適合していると認めるときでなければ、同項の許可をしてはならない。
          items:
          - title: 一
            content: その供給が他の一般送配電事業者又は配電事業者の供給区域における需要に応じ行われるものであるときは、当該他の一般送配電事業者又は配電事業者がその供給を行うことが容易かつ適切でないこと。
          - title: 二
            content: その供給を行うことがその供給を行おうとする一般送配電事業者の供給区域内の電気の使用者の利益を著しく阻害するおそれがないこと。
      - caption: （特定送配電事業者に対する協議の求め）
        title: 第二十五条
        article_num: '25'
        paragraphs:
        - content: 一般送配電事業者は、一般送配電事業を行うために電線路が新たに必要となる場合であつて、当該電線路を設置したならばその供給区域内の電気の使用者の利益を著しく阻害するおそれがあり、かつ、これを防止するため当該一般送配電事業者が特定送配電事業者から託送供給を受けて一般送配電事業を行う必要があると認めるときは、当該特定送配電事業者に対し、当該一般送配電事業者に託送供給を行うことにつき協議を求めることができる。
        - paragraph_num: ２
          content: 前項の協議をすることができず、又は協議が調わないときは、当事者は、経済産業大臣の裁定を申請することができる。 ただし、当事者が第三十六条第一項の規定による仲裁の申請をした後は、この限りでない。
        - paragraph_num: ３
          content: 経済産業大臣は、前項の規定による裁定の申請を受理したときは、その旨を他の当事者に通知し、期間を指定して答弁書を提出する機会を与えなければならない。
        - paragraph_num: ４
          content: 経済産業大臣は、第二項の裁定をしたときは、遅滞なく、その旨を当事者に通知しなければならない。
        - paragraph_num: ５
          content: 第二項の裁定があつたときは、その裁定の定めるところに従い、当事者間に協議が調つたものとみなす。
      - caption: （電圧及び周波数）
        title: 第二十六条
        article_num: '26'
        paragraphs:
        - content: 一般送配電事業者は、その供給する電気の電圧及び周波数の値を経済産業省令で定める値に維持するように努めなければならない。
        - paragraph_num: ２
          content: 経済産業大臣は、一般送配電事業者の供給する電気の電圧又は周波数の値が前項の経済産業省令で定める値に維持されていないため、電気の使用者の利益を阻害していると認めるときは、一般送配電事業者に対し、その値を維持するため電気工作物の修理又は改造、電気工作物の運用の方法の改善その他の必要な措置をとるべきことを命ずることができる。
        - paragraph_num: ３
          content: 一般送配電事業者は、経済産業省令で定めるところにより、その供給する電気の電圧及び周波数を測定し、その結果を記録し、これを保存しなければならない。
      - caption: （事故の備え及び事故時の措置）
        title: 第二十六条の二
        article_num: '26_2'
        paragraphs:
        - content: 一般送配電事業者は、事故により電気の供給に支障が生ずる場合に備え、その支障を速やかに除去するために必要な対策を講じておかなければならない。
        - paragraph_num: ２
          content: 一般送配電事業者は、事故により電気の供給に支障が生じている場合には、その支障を除去するために必要な修理その他の措置を速やかに行わなければならない。
      - caption: （電気工作物の台帳の作成等）
        title: 第二十六条の三
        article_num: '26_3'
        paragraphs:
        - content: 一般送配電事業者は、経済産業省令で定めるところにより、その事業の用に供する電気工作物の設置の時期、耐用年数その他経済産業省令で定める事項を記載した台帳を作成し、これを保管しなければならない。
        - paragraph_num: ２
          content: 一般送配電事業者は、前項の台帳の内容を踏まえ、長期的な観点から、その供給区域における需要に鑑み、その事業の用に供する電気工作物を計画的に更新しなければならない。
      - caption: （業務改善命令）
        title: 第二十七条
        article_num: '27'
        paragraphs:
        - content: 経済産業大臣は、一般送配電事業者が第二十六条の二又は前条の規定に違反していると認めるとき、その他一般送配電事業の運営が適切でないため、電気の使用者の利益の保護又は電気事業の健全な発達に支障が生じ、又は生ずるおそれがあると認めるときは、一般送配電事業者に対し、電気の使用者の利益又は公共の利益を確保するために必要な限度において、その一般送配電事業の運営の改善に必要な措置をとることを命ずることができる。
        - paragraph_num: ２
          content: 経済産業大臣は、一般送配電事業者が第十七条第五項の規定に違反したときは、一般送配電事業者に対し、その業務の方法の改善に必要な措置をとることを命ずることができる。
    - title: 第三款　会計及び財務
      article_num: 3
      articles:
      - caption: （会計の整理等）
        title: 第二十七条の二
        article_num: '27_2'
        paragraphs:
        - content: 一般送配電事業者は、経済産業省令で定めるところにより、その事業年度並びに勘定科目の分類及び貸借対照表、損益計算書その他の財務計算に関する諸表の様式を定め、その会計を整理しなければならない。
        - paragraph_num: ２
          content: 一般送配電事業者は、経済産業省令で定めるところにより、毎事業年度終了後、前項に規定する財務計算に関する諸表を経済産業大臣に提出しなければならない。
      - caption: （償却等）
        title: 第二十七条の三
        article_num: '27_3'
        paragraphs:
        - content: 経済産業大臣は、一般送配電事業の適確な遂行を図るため特に必要があると認めるときは、一般送配電事業者に対し、一般送配電事業の用に供する固定資産に関する相当の償却につき方法若しくは額を定めてこれを行うべきこと又は方法若しくは額を定めて積立金若しくは引当金を積み立てるべきことを命ずることができる。
  - title: 第三節　送電事業
    section_num: 3
    articles:
    - caption: （事業の許可）
      title: 第二十七条の四
      article_num: '27_4'
      paragraphs:
      - content: 送電事業を営もうとする者は、経済産業大臣の許可を受けなければならない。
    - caption: （許可の申請）
      title: 第二十七条の五
      article_num: '27_5'
      paragraphs:
      - content: 前条の許可を受けようとする者は、次に掲げる事項を記載した申請書を経済産業大臣に提出しなければならない。
        items:
        - title: 一
          content: 商号及び住所
        - title: 二
          content: 取締役（指名委員会等設置会社にあつては、取締役及び執行役。第二十七条の七第二項第三号において同じ。）の氏名
        - title: 三
          content: 主たる営業所その他の営業所の名称及び所在地
        - title: 四
          content: 振替供給の相手方である一般送配電事業者及び配電事業者
        - title: 五
          content: 送電事業の用に供する電気工作物に関する次に掲げる事項
          subitems:
          - level: 1
            title: イ
            content: 送電用のものにあつては、その設置の場所、電気方式、設置の方法、回線数、周波数及び電圧
          - level: 1
            title: ロ
            content: 変電用のものにあつては、その設置の場所、周波数及び出力
      - paragraph_num: ２
        content: 前項の申請書には、事業計画書、事業収支見積書その他経済産業省令で定める書類を添付しなければならない。
    - caption: （許可の基準）
      title: 第二十七条の六
      article_num: '27_6'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の四の許可の申請が次の各号のいずれにも適合していると認めるときでなければ、同条の許可をしてはならない。
        items:
        - title: 一
          content: その送電事業の開始が一般送配電事業又は配電事業の需要に適合すること。
        - title: 二
          content: その送電事業を適確に遂行するに足りる経理的基礎及び技術的能力があること。
        - title: 三
          content: その送電事業の計画が確実であること。
        - title: 四
          content: その送電事業の用に供する電気工作物が一般送配電事業者の供給区域内にあるものにあつては、その事業の開始によつて当該一般送配電事業者の供給区域内の電気の使用者の利益が阻害されるおそれがないこと。
        - title: 五
          content: 前各号に掲げるもののほか、その送電事業の開始が電気事業の総合的かつ合理的な発達その他の公共の利益の増進のため必要かつ適切であること。
    - caption: （許可証）
      title: 第二十七条の七
      article_num: '27_7'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の四の許可をしたときは、許可証を交付する。
      - paragraph_num: ２
        content: 許可証には、次に掲げる事項を記載しなければならない。
        items:
        - title: 一
          content: 許可の年月日及び許可の番号
        - title: 二
          content: 商号及び住所
        - title: 三
          content: 取締役の氏名
        - title: 四
          content: 主たる営業所その他の営業所の名称及び所在地
        - title: 五
          content: 振替供給の相手方である一般送配電事業者及び配電事業者
        - title: 六
          content: 送電事業の用に供する電気工作物に関する次に掲げる事項
          subitems:
          - level: 1
            title: イ
            content: 送電用のものにあつては、その設置の場所、電気方式、設置の方法、回線数、周波数及び電圧
          - level: 1
            title: ロ
            content: 変電用のものにあつては、その設置の場所、周波数及び出力
    - caption: （事業の開始の義務）
      title: 第二十七条の七の二
      article_num: '27_7_2'
      paragraphs:
      - content: 送電事業者は、事業の許可を受けた日から十年以内において経済産業大臣が指定する期間内に、その事業を開始しなければならない。
      - paragraph_num: ２
        content: 経済産業大臣は、特に必要があると認めるときは、振替供給の相手方である一般送配電事業者及び配電事業者を区分して前項の規定による指定をすることができる。
      - paragraph_num: ３
        content: 経済産業大臣は、送電事業者から申請があつた場合において、正当な理由があると認めるときは、第一項の規定により指定した期間を延長することができる。
      - paragraph_num: ４
        content: 送電事業者は、その事業（第二項の規定により振替供給の相手方である一般送配電事業者及び配電事業者を区分して第一項の規定による指定があつたときは、その区分に係る事業）を開始したときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
    - caption: （振替供給の相手方の変更）
      title: 第二十七条の七の三
      article_num: '27_7_3'
      paragraphs:
      - content: 送電事業者は、第二十七条の七第二項第五号に掲げる事項を変更しようとするときは、経済産業大臣の許可を受けなければならない。
      - paragraph_num: ２
        content: 第二十七条の六及び前条の規定は、前項の許可（同条の規定にあつては、振替供給の相手方である一般送配電事業者及び配電事業者の減少に係るものを除く。）に準用する。
    - caption: （事業の許可の取消し等）
      title: 第二十七条の八
      article_num: '27_8'
      paragraphs:
      - content: 経済産業大臣は、送電事業者が第二十七条の七の二第一項の規定により経済産業大臣が指定した期間（同条第三項の規定による延長があつたときは、延長後の期間）内に事業を開始しないときは、第二十七条の四の許可を取り消すことができる。
      - paragraph_num: ２
        content: 経済産業大臣は、前項に規定する場合を除くほか、送電事業者がこの法律又はこの法律に基づく命令の規定に違反した場合において、公共の利益を阻害すると認めるときは、第二十七条の四の許可を取り消すことができる。
      - paragraph_num: ３
        content: 経済産業大臣は、前二項に規定する場合を除くほか、送電事業者の送電事業の用に供する送電用の電気工作物が第二条第一項第十号の経済産業省令で定める要件に該当しなくなつた場合において、当該要件に該当するものとなることが見込まれないと認めるときは、第二十七条の四の許可を取り消すことができる。
      - paragraph_num: ４
        content: 経済産業大臣は、前三項の規定による許可の取消しをしたときは、理由を記載した文書をその送電事業者に送付しなければならない。
    - title: 第二十七条の九
      article_num: '27_9'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の七の三第一項の許可を受けた送電事業者が同条第二項において準用する第二十七条の七の二第一項の規定により経済産業大臣が指定した期間（同条第三項の規定による延長があつたときは、延長後の期間）内にその増加する振替供給の相手方である一般送配電事業者又は配電事業者に対して事業を開始しないときは、その許可を取り消すことができる。
      - paragraph_num: ２
        content: 前条第四項の規定は、前項の場合に準用する。
    - caption: （振替供給義務等）
      title: 第二十七条の十
      article_num: '27_10'
      paragraphs:
      - content: 送電事業者は、一般送配電事業者又は配電事業者に振替供給を行うことを約しているときは、正当な理由がなければ、振替供給を拒んではならない。
      - paragraph_num: ２
        content: 送電事業者は、発電等用電気工作物を維持し、及び運用し、又は維持し、及び運用しようとする者から、当該発電等用電気工作物と当該送電事業者が維持し、及び運用する電線路とを電気的に接続することを求められたときは、当該発電等用電気工作物が当該電線路の機能に電気的又は磁気的な障害を与えるおそれがあるときその他正当な理由がなければ、当該接続を拒んではならない。
    - caption: （振替供給）
      title: 第二十七条の十一
      article_num: '27_11'
      paragraphs:
      - content: 送電事業者は、一般送配電事業者及び配電事業者に対する振替供給（これに係る契約が経済産業省令で定める要件に該当するものであるものに限る。次項及び第三項第一号において同じ。）に係る料金その他の供給条件について、経済産業省令で定めるところにより、経済産業大臣に届け出なければならない。
          これを変更しようとするときも、同様とする。
      - paragraph_num: ２
        content: 送電事業者は、前項の規定による届出をした料金その他の供給条件以外の供給条件により一般送配電事業者及び配電事業者に対する振替供給を行つてはならない。
      - paragraph_num: ３
        content: 経済産業大臣は、第一項の規定による届出に係る料金その他の供給条件が次の各号のいずれかに該当しないと認めるときは、当該送電事業者に対し、相当の期限を定め、その料金その他の供給条件を変更すべきことを命ずることができる。
        items:
        - title: 一
          content: 第一項の規定による届出に係る料金その他の供給条件により電気の供給を受ける一般送配電事業者及び配電事業者が振替供給を受けることを著しく困難にするおそれがないこと。
        - title: 二
          content: 料金が定率又は定額をもつて明確に定められていること。
        - title: 三
          content: 送電事業者並びに第一項の規定による届出に係る料金その他の供給条件により電気の供給を受ける一般送配電事業者及び配電事業者の責任に関する事項並びに電気計器及び工事に関する費用の負担の方法が適正かつ明確に定められていること。
        - title: 四
          content: 特定の者に対して不当な差別的取扱いをするものでないこと。
        - title: 五
          content: 前各号に掲げるもののほか、公共の利益の増進に支障がないこと。
      - paragraph_num: ４
        content: 経済産業大臣は、送電事業者が正当な理由なく一般送配電事業者及び配電事業者に対する振替供給を拒んだときは、その送電事業者に対し、振替供給を行うべきことを命ずることができる。
    - caption: （兼業の制限等）
      title: 第二十七条の十一の二
      article_num: '27_11_2'
      paragraphs:
      - content: 送電事業者は、小売電気事業、発電事業（小売電気事業の用に供するための電気を発電するものに限る。次項において同じ。）又は特定卸供給事業（小売電気事業の用に供するための電気を供給するものに限る。同項において同じ。）を営んではならない。
          ただし、経済産業省令で定めるところにより、経済産業大臣の認可を受けたときは、この限りでない。
      - paragraph_num: ２
        content: 経済産業大臣は、前項ただし書の認可の申請があつたときは、当該申請に係る送電事業者が維持し、及び運用する送電用の電気工作物の総体としての規模、その設置の場所等を勘案して当該送電事業者が小売電気事業、発電事業又は特定卸供給事業を営むことが電気の使用者の利益を確保するため特に必要であると認める場合でなければ、これを認可してはならない。
      - paragraph_num: ３
        content: 次の各号に掲げる者については、当該各号に定める規定は、適用しない。
        items:
        - title: 一
          content: 第一項ただし書の認可を受けた送電事業者（以下この項において「認可送電事業者」という。） 次条第二項及び第二十七条の十一の四第二項から第四項までの規定
        - title: 二
          content: 認可送電事業者の取締役、執行役又は従業者 次条第一項の規定
        - title: 三
          content: 認可送電事業者の特定関係事業者（次条第一項に規定する特定関係事業者をいう。） 第二十七条の十一の五第一項及び第二十七条の十一の六第一項の規定
    - caption: （送電事業者の取締役又は執行役の兼職の制限等）
      title: 第二十七条の十一の三
      article_num: '27_11_3'
      paragraphs:
      - content: 送電事業者の取締役又は執行役は、その特定関係事業者（送電事業者の子会社、親会社若しくは当該送電事業者以外の当該親会社の子会社等に該当する小売電気事業者、発電事業者若しくは特定卸供給事業者又は当該小売電気事業者、発電事業者若しくは特定卸供給事業者の経営を実質的に支配していると認められる者として経済産業省令で定める要件に該当する者をいう。以下この節において同じ。）の取締役等又は従業者を、送電事業者の従業者は、その特定関係事業者の取締役等を、それぞれ兼ねてはならない。
          ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
      - paragraph_num: ２
        content: 送電事業者は、次の各号に掲げるその特定関係事業者ごとに当該各号に定める当該特定関係事業者の従業者を、当該送電事業者が営む送電事業の業務その他の変電及び送電に係る業務のうち、電気供給事業者間の適正な競争関係の確保のためその運営における中立性の確保が特に必要な業務として経済産業省令で定めるもの（第二十七条の十一の五第一項において「特定送電等業務」という。）に従事させてはならない。
          ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
        items:
        - title: 一
          content: 小売電気事業者 小売電気事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
        - title: 二
          content: 発電事業者 発電事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
        - title: 三
          content: 特定卸供給事業者 特定卸供給事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
        - title: 四
          content: 前項本文の経済産業省令で定める要件に該当する者 その経営を実質的に支配していると認められる小売電気事業者、発電事業者又は特定卸供給事業者の経営管理に係る業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
      - paragraph_num: ３
        content: 経済産業大臣は、送電事業者の取締役、執行役又は従業者が第一項の規定に違反した場合には送電事業者又はその特定関係事業者に対し、送電事業者が前項の規定に違反した場合には送電事業者に対し、当該違反を是正するために必要な措置をとることを命ずることができる。
    - caption: （送電事業者の禁止行為等）
      title: 第二十七条の十一の四
      article_num: '27_11_4'
      paragraphs:
      - content: 送電事業者は、次に掲げる行為をしてはならない。
        items:
        - title: 一
          content: 振替供給の業務に関して知り得た他の電気供給事業者及び電気の使用者に関する情報を当該業務の用に供する目的以外の目的のために利用し、又は提供すること。
        - title: 二
          content: その振替供給の業務その他の変電及び送電に係る業務について、特定の電気供給事業者に対し、不当に優先的な取扱いをし、若しくは利益を与え、又は不当に不利な取扱いをし、若しくは不利益を与えること。
        - title: 三
          content: 前二号に掲げるもののほか、電気供給事業者間の適正な競争関係を阻害するものとして経済産業省令で定める行為をすること。
      - paragraph_num: ２
        content: 送電事業者は、通常の取引の条件と異なる条件であつて電気供給事業者間の適正な競争関係を阻害するおそれのある条件で、その特定関係事業者その他送電事業者と経済産業省令で定める特殊の関係のある者（第百六条第五項において「送電事業者の特定関係事業者等」という。）と取引を行つてはならない。
          ただし、当該取引を行うことにつきやむを得ない事情がある場合において、あらかじめ経済産業大臣の承認を受けたときは、この限りでない。
      - paragraph_num: ３
        content: 送電事業者は、その振替供給の業務その他の変電及び送電に係る業務をその特定関係事業者又は当該特定関係事業者の子会社等（特定関係事業者に該当するものを除く。）に委託してはならない。
          ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
      - paragraph_num: ４
        content: 送電事業者は、その特定関係事業者である小売電気事業者、発電事業者又は特定卸供給事業者からその営む小売電気事業、発電事業又は特定卸供給事業の業務を受託してはならない。
          ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
      - paragraph_num: ５
        content: 経済産業大臣は、前各項の規定に違反する行為があると認めるときは、送電事業者に対し、当該行為の停止又は変更を命ずることができる。
    - caption: （送電事業者の特定関係事業者が送電事業者の従業者をその従業者として従事させることの制限等）
      title: 第二十七条の十一の五
      article_num: '27_11_5'
      paragraphs:
      - content: 次の各号に掲げる送電事業者の特定関係事業者は、当該送電事業者が営む特定送電等業務に従事する者を、当該各号に定める従業者として従事させてはならない。
          ただし、電気供給事業者間の適正な競争関係を阻害するおそれがない場合として経済産業省令で定める場合は、この限りでない。
        items:
        - title: 一
          content: 小売電気事業者 小売電気事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
        - title: 二
          content: 発電事業者 発電事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
        - title: 三
          content: 特定卸供給事業者 特定卸供給事業の業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
        - title: 四
          content: 第二十七条の十一の三第一項本文の経済産業省令で定める要件に該当する者 その経営を実質的に支配していると認められる小売電気事業者、発電事業者又は特定卸供給事業者の経営管理に係る業務の運営において重要な役割を担う従業者として経済産業省令で定める要件に該当するもの
      - paragraph_num: ２
        content: 経済産業大臣は、送電事業者の特定関係事業者が前項の規定に違反した場合には、送電事業者の特定関係事業者に対し当該違反を是正するために必要な措置をとることを命ずることができる。
    - caption: （送電事業者の特定関係事業者の禁止行為等）
      title: 第二十七条の十一の六
      article_num: '27_11_6'
      paragraphs:
      - content: 送電事業者の特定関係事業者は、次に掲げる行為をしてはならない。
        items:
        - title: 一
          content: 当該送電事業者に対し、第二十七条の十一の四第一項各号に掲げる行為又は同条第二項本文、第三項本文若しくは第四項本文の行為をするように要求し、又は依頼すること。
        - title: 二
          content: 前号に掲げるもののほか、電気供給事業者間の適正な競争関係を阻害するものとして経済産業省令で定める行為をすること。
      - paragraph_num: ２
        content: 経済産業大臣は、前項の規定に違反する行為があると認めるときは、送電事業者の特定関係事業者に対し、当該行為の停止又は変更を命ずることができる。
    - caption: （準用）
      title: 第二十七条の十二
      article_num: '27_12'
      paragraphs:
      - content: 第六条の二、第九条から第十一条まで、第十三条、第十四条、第二十二条、第二十三条の四、第二十六条の二、第二十六条の三、第二十七条第一項、第二十七条の二及び第二十七条の三の規定は、送電事業者に準用する。
          この場合において、第九条第一項中「第六条第二項第六号」とあるのは「第二十七条の七第二項第六号」と、同条第二項中「第六条第二項第二号から第四号まで」とあるのは「第二十七条の七第二項第二号から第四号まで」と、第十条第三項中「第五条」とあるのは「第二十七条の六」と、第二十二条第一項中「、送電及び配電」とあるのは「及び送電」と、第二十三条の四第一項中「託送供給及び電力量調整供給」とあるのは「振替供給」と、第二十六条の三第二項中「供給区域」とあるのは「振替供給の相手方である一般送配電事業者及び配電事業者」と読み替えるものとする。
  - title: 第三節の二　配電事業
    section_num: 3
    articles:
    - caption: （事業の許可）
      title: 第二十七条の十二の二
      article_num: '27_12_2'
      paragraphs:
      - content: 配電事業を営もうとする者は、経済産業大臣の許可を受けなければならない。
    - caption: （許可の申請）
      title: 第二十七条の十二の三
      article_num: '27_12_3'
      paragraphs:
      - content: 前条の許可を受けようとする者は、次に掲げる事項を記載した申請書を経済産業大臣に提出しなければならない。
        items:
        - title: 一
          content: 商号及び住所
        - title: 二
          content: 取締役（指名委員会等設置会社にあつては、取締役及び執行役。第二十七条の十二の五第二項第三号において同じ。）の氏名
        - title: 三
          content: 主たる営業所その他の営業所の名称及び所在地
        - title: 四
          content: 供給区域
        - title: 五
          content: 配電事業の用に供する電気工作物に関する次に掲げる事項
          subitems:
          - level: 1
            title: イ
            content: 配電用のものにあつては、その設置の場所、電気方式、周波数及び電圧
          - level: 1
            title: ロ
            content: 変電用のものにあつては、その周波数及び出力
          - level: 1
            title: ハ
            content: 発電用のものにあつては、その設置の場所、原動力の種類、周波数及び出力
          - level: 1
            title: ニ
            content: 蓄電用のものにあつては、その設置の場所、周波数、出力及び容量
      - paragraph_num: ２
        content: 前項の申請書には、事業計画書、事業収支見積書その他経済産業省令で定める書類を添付しなければならない。
    - caption: （許可の基準）
      title: 第二十七条の十二の四
      article_num: '27_12_4'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の十二の二の許可の申請が次の各号のいずれにも適合していると認めるときでなければ、同条の許可をしてはならない。
        items:
        - title: 一
          content: その配電事業の開始がその供給区域における需要に適合すること。
        - title: 二
          content: その配電事業を適確に遂行するに足りる経理的基礎及び技術的能力があること。
        - title: 三
          content: その配電事業の計画が確実であること。
        - title: 四
          content: その配電事業の用に供する電気工作物の能力がその供給区域における需要に応ずることができるものであること。
        - title: 五
          content: その配電事業の開始によつてその供給区域の全部又は一部について配電事業の用に供する電気工作物が著しく過剰とならないこと。
        - title: 六
          content: 前各号に掲げるもののほか、その配電事業の開始が電気事業の総合的かつ合理的な発達その他の公共の利益の増進のため必要かつ適切であること。
    - caption: （許可証）
      title: 第二十七条の十二の五
      article_num: '27_12_5'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の十二の二の許可をしたときは、許可証を交付する。
      - paragraph_num: ２
        content: 許可証には、次に掲げる事項を記載しなければならない。
        items:
        - title: 一
          content: 許可の年月日及び許可の番号
        - title: 二
          content: 商号及び住所
        - title: 三
          content: 取締役の氏名
        - title: 四
          content: 主たる営業所その他の営業所の名称及び所在地
        - title: 五
          content: 供給区域
        - title: 六
          content: 配電事業の用に供する電気工作物に関する次に掲げる事項
          subitems:
          - level: 1
            title: イ
            content: 配電用のものにあつては、その設置の場所、電気方式、周波数及び電圧
          - level: 1
            title: ロ
            content: 変電用のものにあつては、その周波数及び出力
          - level: 1
            title: ハ
            content: 発電用のものにあつては、その設置の場所、原動力の種類、周波数及び出力
          - level: 1
            title: ニ
            content: 蓄電用のものにあつては、その設置の場所、周波数、出力及び容量
    - caption: （事業の開始の義務）
      title: 第二十七条の十二の六
      article_num: '27_12_6'
      paragraphs:
      - content: 配電事業者は、事業の許可を受けた日から十年以内において経済産業大臣が指定する期間内に、その事業を開始しなければならない。
      - paragraph_num: ２
        content: 経済産業大臣は、特に必要があると認めるときは、供給区域を区分して前項の規定による指定をすることができる。
      - paragraph_num: ３
        content: 経済産業大臣は、配電事業者から申請があつた場合において、正当な理由があると認めるときは、第一項の規定により指定した期間を延長することができる。
      - paragraph_num: ４
        content: 配電事業者は、その事業（第二項の規定により供給区域を区分して第一項の規定による指定があつたときは、その区分に係る事業）を開始したときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
    - caption: （供給区域の変更）
      title: 第二十七条の十二の七
      article_num: '27_12_7'
      paragraphs:
      - content: 配電事業者は、第二十七条の十二の五第二項第五号に掲げる事項を変更しようとするときは、経済産業大臣の許可を受けなければならない。
      - paragraph_num: ２
        content: 第二十七条の十二の四及び前条の規定は、前項の許可（同条の規定にあつては、供給区域の減少に係るものを除く。）に準用する。
    - caption: （事業の許可の取消し等）
      title: 第二十七条の十二の八
      article_num: '27_12_8'
      paragraphs:
      - content: 経済産業大臣は、配電事業者が第二十七条の十二の六第一項の規定により経済産業大臣が指定した期間（同条第三項の規定による延長があつたときは、延長後の期間）内に事業を開始しないときは、第二十七条の十二の二の許可を取り消すことができる。
      - paragraph_num: ２
        content: 経済産業大臣は、前項に規定する場合を除くほか、配電事業者がこの法律又はこの法律に基づく命令の規定に違反した場合において、公共の利益を阻害すると認めるときは、第二十七条の十二の二の許可を取り消すことができる。
      - paragraph_num: ３
        content: 経済産業大臣は、前二項に規定する場合を除くほか、配電事業者の配電事業の用に供する配電用の電気工作物が第二条第一項第十一号の二の経済産業省令で定める要件に該当しなくなつた場合において、当該要件に該当するものとなることが見込まれないと認めるときは、第二十七条の十二の二の許可を取り消すことができる。
      - paragraph_num: ４
        content: 経済産業大臣は、前三項の規定による許可の取消しをしたときは、理由を記載した文書をその配電事業者に送付しなければならない。
    - title: 第二十七条の十二の九
      article_num: '27_12_9'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の十二の七第一項の許可を受けた配電事業者が同条第二項において準用する第二十七条の十二の六第一項の規定により経済産業大臣が指定した期間（同条第三項の規定による延長があつたときは、延長後の期間）内にその増加する供給区域において事業を開始しないときは、その許可を取り消すことができる。
      - paragraph_num: ２
        content: 経済産業大臣は、配電事業者がその供給区域の一部において配電事業を行つていない場合において、公共の利益を阻害すると認めるときは、その一部について供給区域を減少することができる。
      - paragraph_num: ３
        content: 前条第四項の規定は、前二項の場合に準用する。
    - caption: （託送供給義務等）
      title: 第二十七条の十二の十
      article_num: '27_12_10'
      paragraphs:
      - content: 配電事業者は、正当な理由がなければ、その供給区域における託送供給（振替供給にあつては、小売電気事業、一般送配電事業、配電事業若しくは特定送配電事業の用に供するための電気又は第二条第一項第五号ロに掲げる接続供給に係る電気に係るものであつて、経済産業省令で定めるものに限る。次条第一項において同じ。）を拒んではならない。
      - paragraph_num: ２
        content: 配電事業者は、その電力量調整供給を行うために過剰な供給能力を確保しなければならないこととなるおそれがあるときその他正当な理由がなければ、その供給区域における電力量調整供給を拒んではならない。
      - paragraph_num: ３
        content: 配電事業者は、発電等用電気工作物を維持し、及び運用し、又は維持し、及び運用しようとする者から、当該発電等用電気工作物と当該配電事業者が維持し、及び運用する電線路とを電気的に接続することを求められたときは、当該発電等用電気工作物が当該電線路の機能に電気的又は磁気的な障害を与えるおそれがあるときその他正当な理由がなければ、当該接続を拒んではならない。
    - caption: （託送供給等約款）
      title: 第二十七条の十二の十一
      article_num: '27_12_11'
      paragraphs:
      - content: 配電事業者は、その供給区域における託送供給及び電力量調整供給（以下この条及び次条において「託送供給等」という。）に係る料金その他の供給条件について、経済産業省令で定めるところにより、託送供給等約款を定め、経済産業大臣に届け出なければならない。
          これを変更しようとするときも、同様とする。
      - paragraph_num: ２
        content: 配電事業者は、前項の規定による届出をした託送供給等約款以外の供給条件により託送供給等を行つてはならない。 ただし、その託送供給等約款により難い特別の事情がある場合において、経済産業大臣の承認を受けた料金その他の供給条件により託送供給等を行うときは、この限りでない。
      - paragraph_num: ３
        content: 経済産業大臣は、第一項の規定による届出に係る託送供給等約款が次の各号のいずれかに該当しないと認めるときは、当該配電事業者に対し、相当の期限を定め、その託送供給等約款を変更すべきことを命ずることができる。
        items:
        - title: 一
          content: 料金が第二十七条の十二の五第二項第五号の供給区域の全部又は一部をその供給区域の一部とする一般送配電事業者の託送供給等に係る料金に比較して適正な水準であること。
        - title: 二
          content: 第一項の規定による届出に係る託送供給等約款により電気の供給を受ける者が託送供給等を受けることを著しく困難にするおそれがないこと。
        - title: 三
          content: 料金の額の算出方法が適正かつ明確に定められていること。
        - title: 四
          content: 配電事業者及び第一項の規定による届出に係る託送供給等約款により電気の供給を受ける者の責任に関する事項並びに電気計器及び工事に関する費用の負担の方法が適正かつ明確に定められていること。
        - title: 五
          content: 特定の者に対して不当な差別的取扱いをするものでないこと。
        - title: 六
          content: 前各号に掲げるもののほか、公共の利益の増進に支障がないこと。
      - paragraph_num: ４
        content: 配電事業者は、第一項の規定により託送供給等約款の届出をしたときは、経済産業省令で定めるところにより、その託送供給等約款を公表しなければならない。
    - caption: （引継計画の承認等）
      title: 第二十七条の十二の十二
      article_num: '27_12_12'
      paragraphs:
      - content: 配電事業者は、一般送配電事業者、他の配電事業者又は特定送配電事業者から譲り受け、又は借り受けた電気工作物を配電事業の用に供しようとするときは、経済産業省令で定めるところにより、当該一般送配電事業者、他の配電事業者又は特定送配電事業者と共同して、託送供給等の業務の引継ぎに関する計画（以下この条において「引継計画」という。）を作成し、経済産業大臣の承認を受けなければならない。
          その変更（経済産業省令で定める軽微な変更を除く。）をしようとするときも、同様とする。
      - paragraph_num: ２
        content: 経済産業大臣は、前項の承認の申請があつた場合において、その申請に係る計画が託送供給等の業務の適正かつ円滑な引継ぎを確保するために十分なものと認めるときは、その承認をするものとする。
      - paragraph_num: ３
        content: 第一項の承認を受けた配電事業者及び一般送配電事業者、他の配電事業者又は特定送配電事業者（次項及び第五項において「承認事業者」という。）は、第一項後段の経済産業省令で定める軽微な変更をしたときは、遅滞なく、その変更の内容を経済産業大臣に届け出なければならない。
      - paragraph_num: ４
        content: 経済産業大臣は、託送供給等の業務の円滑な引継ぎを確保するために必要があると認めるときは、承認事業者に対し、相当の期限を定め、第一項の承認を受けた引継計画を変更すべきことを命ずることができる。
      - paragraph_num: ５
        content: 経済産業大臣は、承認事業者が、正当な理由がなく、第一項の承認を受けた引継計画を実施していないため、電気の使用者の利益を阻害し、又は阻害するおそれがあると認めるときは、当該承認事業者に対し、当該引継計画を実施すべきことを勧告することができる。
    - caption: （準用）
      title: 第二十七条の十二の十三
      article_num: '27_12_13'
      paragraphs:
      - content: 第六条の二、第九条から第十一条まで、第十三条、第十四条、第二十二条から第二十二条の三まで、第二十三条（第四項を除く。）、第二十三条の二から第二十六条の三まで、第二十七条第一項、第二十七条の二及び第二十七条の三の規定は、配電事業者に準用する。
          この場合において、第九条第一項中「第六条第二項第六号」とあるのは「第二十七条の十二の五第二項第六号」と、同条第二項中「第六条第二項第二号から第四号まで」とあるのは「第二十七条の十二の五第二項第二号から第四号まで」と、第十条第三項中「第五条」とあるのは「第二十七条の十二の四」と、第二十二条第一項、第二十二条の三第二項並びに第二十三条第一項第二号及び第三項中「変電、送電」とあるのは「変電」と、第二十二条の二第二項中「送電用及び配電用」とあるのは「配電用」と、同条第三項第一号中「及び第二十三条第二項から第五項まで」とあるのは「並びに第二十三条第二項、第三項及び第五項」と、第二十三条第二項中「一般送配電事業者の特定関係事業者等」とあるのは「配電事業者の特定関係事業者等」と、第二十三条の三第一項第一号中「、第四項本文若しくは」とあるのは「若しくは」と読み替えるものとする。
  - title: 第四節　特定送配電事業
    section_num: 4
    articles:
    - caption: （事業の届出）
      title: 第二十七条の十三
      article_num: '27_13'
      paragraphs:
      - content: 特定送配電事業を営もうとする者は、経済産業省令で定めるところにより、次に掲げる事項を経済産業大臣に届け出なければならない。
        items:
        - title: 一
          content: 氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
        - title: 二
          content: 主たる営業所その他の営業所の名称及び所在地
        - title: 三
          content: 供給地点
        - title: 四
          content: 特定送配電事業の用に供する電気工作物に関する次に掲げる事項
          subitems:
          - level: 1
            title: イ
            content: 送電用のものにあつては、その設置の場所、電気方式、設置の方法、回線数、周波数及び電圧
          - level: 1
            title: ロ
            content: 配電用のものにあつては、その設置の場所、電気方式、周波数及び電圧
          - level: 1
            title: ハ
            content: 変電用のものにあつては、その設置の場所、周波数及び出力
          - level: 1
            title: ニ
            content: 発電用のものにあつては、その設置の場所、原動力の種類、周波数及び出力
          - level: 1
            title: ホ
            content: 蓄電用のものにあつては、その設置の場所、周波数、出力及び容量
        - title: 五
          content: 事業開始の予定年月日
        - title: 六
          content: その他経済産業省令で定める事項
      - paragraph_num: ２
        content: 前項の規定による届出をする場合には、経済産業省令で定める書類を添付しなければならない。
      - paragraph_num: ３
        content: 第一項の規定による届出をした者は、その届出が受理された日から二十日を経過した後でなければ、その届出に係る電気工作物を特定送配電事業の用に供してはならない。
      - paragraph_num: ４
        content: 経済産業大臣は、第一項の規定による届出に係る電気工作物を特定送配電事業の用に供することがその届出に係る供給地点を供給区域に含む一般送配電事業者又は配電事業者の供給区域内の電気の使用者の利益を著しく阻害するおそれがないと認めるときは、前項に規定する期間を短縮することができる。
      - paragraph_num: ５
        content: 経済産業大臣は、第一項の規定による届出に係る電気工作物を特定送配電事業の用に供することにより前項に規定する一般送配電事業者又は配電事業者の供給区域内の電気の使用者の利益が著しく阻害されるおそれがあると認めるときは、その届出をした者に対し、その届出を受理した日から二十日（次項の規定により第三項に規定する期間が延長された場合にあつては、当該延長後の期間）以内に限り、その届出の内容を変更し、又は中止すべきことを命ずることができる。
      - paragraph_num: ６
        content: 経済産業大臣は、第一項の規定による届出に係る電気工作物を特定送配電事業の用に供することにより第四項に規定する一般送配電事業者又は配電事業者の供給区域内の電気の使用者の利益が著しく阻害されるおそれがあるかどうかについて審査するため相当の期間を要し、当該審査が第三項に規定する期間内に終了しないと認める相当の理由があるときは、二十日の範囲内において、同項の期間を延長することができる。
          この場合において、経済産業大臣は、その届出をした者に対し、遅滞なく、当該延長後の期間及び当該延長の理由を通知しなければならない。
      - paragraph_num: ７
        content: 特定送配電事業者は、第一項第三号及び第四号に掲げる事項を変更しようとするときは、経済産業省令で定めるところにより、あらかじめ、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ８
        content: 第二項から第六項までの規定は、前項の規定による変更の届出に準用する。 この場合において、第三項中「特定送配電事業の用に供してはならない」とあるのは「変更してはならない。ただし、経済産業省令で定める軽微な変更については、この限りでない」と、第四項から第六項までの規定中「電気工作物を特定送配電事業の用に供すること」とあるのは「変更」と読み替えるものとする。
      - paragraph_num: ９
        content: 特定送配電事業者は、第一項第一号、第二号、第五号又は第六号に掲げる事項に変更があつたときは、経済産業省令で定めるところにより、遅滞なく、その旨を経済産業大臣に届け出なければならない。
    - caption: （託送供給義務）
      title: 第二十七条の十四
      article_num: '27_14'
      paragraphs:
      - content: 特定送配電事業者は、小売電気事業者、一般送配電事業者又は配電事業者にその小売電気事業、一般送配電事業又は配電事業の用に供するための電気に係る託送供給を行うことを約しているときは、正当な理由がなければ、託送供給を拒んではならない。
    - caption: （小売供給の登録）
      title: 第二十七条の十五
      article_num: '27_15'
      paragraphs:
      - content: 特定送配電事業者は、自らが維持し、及び運用する送電用及び配電用の電気工作物により小売供給を行おうとするときは、経済産業大臣の登録を受けなければならない。
    - caption: （登録の申請）
      title: 第二十七条の十六
      article_num: '27_16'
      paragraphs:
      - content: 前条の登録を受けようとする特定送配電事業者は、経済産業省令で定めるところにより、次に掲げる事項を記載した申請書を経済産業大臣に提出しなければならない。
        items:
        - title: 一
          content: 氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
        - title: 二
          content: 主たる営業所その他の営業所の名称及び所在地
        - title: 三
          content: 供給地点
        - title: 四
          content: 小売供給の相手方の電気の需要に応ずるために必要と見込まれる供給能力の確保に関する事項
        - title: 五
          content: 小売供給開始の予定年月日
        - title: 六
          content: その他経済産業省令で定める事項
      - paragraph_num: ２
        content: 前項の申請書には、第二十七条の十八第一項各号（第四号を除く。）に該当しないことを誓約する書面、小売供給を適正かつ確実に遂行する体制の整備に関する事項を記載した書類その他の経済産業省令で定める書類を添付しなければならない。
    - caption: （登録の実施）
      title: 第二十七条の十七
      article_num: '27_17'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の十五の登録の申請があつた場合においては、次条第一項の規定により登録を拒否する場合を除き、次に掲げる事項を小売供給特定送配電事業者登録簿に登録しなければならない。
        items:
        - title: 一
          content: 前条第一項各号（第六号を除く。）に掲げる事項
        - title: 二
          content: 登録年月日及び登録番号
      - paragraph_num: ２
        content: 経済産業大臣は、前項の規定による登録をしたときは、遅滞なく、その旨を申請者である特定送配電事業者に通知しなければならない。
    - caption: （登録の拒否）
      title: 第二十七条の十八
      article_num: '27_18'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の十六第一項の申請書を提出した特定送配電事業者が次の各号のいずれかに該当するとき、又は当該申請書若しくはその添付書類のうちに重要な事項について虚偽の記載があり、若しくは重要な事実の記載が欠けているときは、その登録を拒否しなければならない。
        items:
        - title: 一
          content: この法律又はこの法律に基づく命令の規定に違反し、罰金以上の刑に処せられ、その執行を終わり、又はその執行を受けることがなくなつた日から二年を経過しない者
        - title: 二
          content: 第二十七条の二十一第一項の規定により登録を取り消され、その取消しの日から二年を経過しない者
        - title: 三
          content: 法人であつて、その役員のうちに前二号のいずれかに該当する者があるもの
        - title: 四
          content: 小売供給の相手方の電気の需要に応ずるために必要な供給能力を確保できる見込みがないと認められる者その他の電気の使用者の利益の保護のために適切でないと認められる者
      - paragraph_num: ２
        content: 経済産業大臣は、前項の規定による登録の拒否をしたときは、理由を記載した文書をその申請書を提出した者に送付しなければならない。
    - caption: （変更登録等）
      title: 第二十七条の十九
      article_num: '27_19'
      paragraphs:
      - content: 第二十七条の十五の登録を受けた特定送配電事業者（以下「登録特定送配電事業者」という。）は、第二十七条の十六第一項第四号に掲げる事項を変更しようとするときは、経済産業大臣の変更登録を受けなければならない。
          ただし、経済産業省令で定める軽微な変更については、この限りでない。
      - paragraph_num: ２
        content: 前項の変更登録を受けようとする登録特定送配電事業者は、経済産業省令で定めるところにより、変更に係る事項を記載した申請書を経済産業大臣に提出しなければならない。
      - paragraph_num: ３
        content: 第二十七条の十六第二項及び前二条の規定は、第一項の変更登録に準用する。 この場合において、第二十七条の十七第一項中「次に掲げる事項」とあるのは「変更に係る事項」と、前条第一項中「第二十七条の十六第一項の申請書を提出した特定送配電事業者が次の各号」とあるのは「変更登録に係る申請書を提出した登録特定送配電事業者が次の各号（第二号を除く。）」と読み替えるものとする。
      - paragraph_num: ４
        content: 登録特定送配電事業者は、第二十七条の十六第一項各号（第四号を除く。）に掲げる事項に変更があつたとき、又は第一項ただし書の経済産業省令で定める軽微な変更をしたときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ５
        content: 経済産業大臣は、前項の規定による届出を受理したときは、その届出があつた事項のうち第二十七条の十七第一項第一号に掲げる事項を小売供給特定送配電事業者登録簿に登録しなければならない。
    - caption: （小売供給の休止及び廃止）
      title: 第二十七条の二十
      article_num: '27_20'
      paragraphs:
      - content: 登録特定送配電事業者は、自らが維持し、及び運用する送電用及び配電用の電気工作物による小売供給の全部又は一部を休止し、又は廃止したときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ２
        content: 登録特定送配電事業者は、自らが維持し、及び運用する送電用及び配電用の電気工作物による小売供給を休止し、又は廃止しようとするときは、経済産業省令で定めるところにより、あらかじめ、その小売供給の相手方に対し、その旨を周知させなければならない。
    - caption: （登録の取消し）
      title: 第二十七条の二十一
      article_num: '27_21'
      paragraphs:
      - content: 経済産業大臣は、登録特定送配電事業者が次の各号のいずれかに該当するときは、第二十七条の十五の登録を取り消すことができる。
        items:
        - title: 一
          content: この法律又はこの法律に基づく命令の規定に違反した場合において、公共の利益を阻害すると認めるとき。
        - title: 二
          content: 不正の手段により第二十七条の十五の登録又は第二十七条の十九第一項の変更登録を受けたとき。
        - title: 三
          content: 第二十七条の十八第一項第一号又は第三号に該当するに至つたとき。
      - paragraph_num: ２
        content: 第二十七条の十八第二項の規定は、前項の場合に準用する。
    - caption: （登録の抹消）
      title: 第二十七条の二十二
      article_num: '27_22'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の二十第一項の規定による小売供給の全部の廃止の届出があつたとき、前条第一項の規定による登録の取消しをしたとき、又は第二十七条の二十五第二項の規定による解散の届出があつたときは、当該登録特定送配電事業者の登録を抹消しなければならない。
    - caption: （経済産業省令への委任）
      title: 第二十七条の二十三
      article_num: '27_23'
      paragraphs:
      - content: 第二十七条の十五から前条までに定めるもののほか、登録特定送配電事業者の登録に関し必要な事項は、経済産業省令で定める。
    - caption: （承継）
      title: 第二十七条の二十四
      article_num: '27_24'
      paragraphs:
      - content: 特定送配電事業の全部の譲渡しがあり、又は特定送配電事業者について相続、合併若しくは分割（特定送配電事業の全部を承継させるものに限る。）があつたときは、特定送配電事業の全部を譲り受けた者又は相続人、合併後存続する法人若しくは合併により設立した法人若しくは分割により当該特定送配電事業の全部を承継した法人は、特定送配電事業者の地位を承継する。
          ただし、当該特定送配電事業が小売供給を行うものに係るものであつて、当該特定送配電事業の全部を譲り受けた者又は相続人、合併後存続する法人若しくは合併により設立した法人若しくは分割により当該特定送配電事業の全部を承継した法人が第二十七条の十八第一項各号（第四号を除く。）のいずれかに該当するときは、この限りでない。
      - paragraph_num: ２
        content: 前項の規定により特定送配電事業者の地位を承継した者は、遅滞なく、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ３
        content: 第二十七条の十九第五項の規定は、前項の規定による届出（登録特定送配電事業者に係るものに限る。）に準用する。
    - caption: （事業の休止及び廃止並びに法人の解散）
      title: 第二十七条の二十五
      article_num: '27_25'
      paragraphs:
      - content: 特定送配電事業者は、その事業の全部又は一部を休止し、又は廃止しようとするときは、経済産業省令で定めるところにより、あらかじめ、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ２
        content: 特定送配電事業者である法人が合併以外の事由により解散したときは、その清算人（解散が破産手続開始の決定による場合にあつては、破産管財人）は、遅滞なく、その旨を経済産業大臣に届け出なければならない。
    - caption: （準用）
      title: 第二十七条の二十六
      article_num: '27_26'
      paragraphs:
      - content: 第二十六条から第二十六条の三まで及び第二十七条第一項の規定は、特定送配電事業者に準用する。 この場合において、第二十六条の三第二項中「供給区域」とあるのは、「供給地点」と読み替えるものとする。
      - paragraph_num: ２
        content: 第二条の十二、第二条の十五、第二条の十六及び第二条の十七第三項の規定は、登録特定送配電事業者に準用する。 この場合において、第二条の十六第一項中「小売電気事業の」とあるのは「特定送配電事業（小売供給を行うものに限る。次項において同じ。）の」と、同条第二項中「小売電気事業を」とあるのは「特定送配電事業を」と読み替えるものとする。
      - paragraph_num: ３
        content: 第二条の十三、第二条の十四及び第二条の十七第二項の規定は、登録特定送配電事業者及び登録特定送配電事業者が行う小売供給に関する契約の締結の媒介、取次ぎ又は代理を業として行う者に準用する。
          この場合において、第二条の十三第一項中「小売電気事業者及び小売電気事業者」とあるのは「登録特定送配電事業者及び登録特定送配電事業者」と、同条、第二条の十四及び第二条の十七第二項中「小売電気事業者等」とあるのは「登録特定送配電事業者等」と読み替えるものとする。
  - title: 第五節　発電事業
    section_num: 5
    articles:
    - caption: （事業の届出）
      title: 第二十七条の二十七
      article_num: '27_27'
      paragraphs:
      - content: 発電事業を営もうとする者は、経済産業省令で定めるところにより、次に掲げる事項を経済産業大臣に届け出なければならない。
        items:
        - title: 一
          content: 氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
        - title: 二
          content: 主たる営業所その他の営業所の名称及び所在地
        - title: 三
          content: 発電事業の用に供する電気工作物に関する次に掲げる事項
          subitems:
          - level: 1
            title: イ
            content: 発電用のものにあつては、その設置の場所、原動力の種類、周波数及び出力
          - level: 1
            title: ロ
            content: 蓄電用のものにあつては、その設置の場所、周波数、出力及び容量
        - title: 四
          content: 事業開始の予定年月日
        - title: 五
          content: その他経済産業省令で定める事項
      - paragraph_num: ２
        content: 前項の規定による届出をする場合には、経済産業省令で定める書類を添付しなければならない。
      - paragraph_num: ３
        content: 発電事業者は、第一項第三号に掲げる事項を変更しようとするときは、経済産業省令で定めるところにより、その変更の日以前の経済産業省令で定める日までに、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ４
        content: 発電事業者は、第一項（第三号を除く。）の規定による届出に係る事項に変更があつたときは、経済産業省令で定めるところにより、遅滞なく、その旨を経済産業大臣に届け出なければならない。
    - caption: （発電等義務）
      title: 第二十七条の二十八
      article_num: '27_28'
      paragraphs:
      - content: 発電事業者は、一般送配電事業者及び配電事業者に、その維持し、及び運用する発電等用電気工作物を用いてその一般送配電事業及び配電事業の用に供するための電気を発電し、又は放電し、当該電気を供給することを約しているときは、正当な理由がなければ、発電又は放電及び電気の供給を拒んではならない。
    - caption: （準用）
      title: 第二十七条の二十九
      article_num: '27_29'
      paragraphs:
      - content: 第二条の七第一項本文及び第二項の規定は第二十七条の二十九の三第一項に規定する認可原子力発電事業者以外の発電事業者に、第二十六条の二、第二十七条第一項、第二十七条の二、第二十七条の三及び第二十七条の二十五の規定は発電事業者に、それぞれ準用する。
          この場合において、同条第一項中「事業の全部又は一部」とあるのは「事業」と、「あらかじめ」とあるのは「その休止又は廃止の日以前の経済産業省令で定める日までに」と読み替えるものとする。
    - caption: （原子力発電工作物である発電用原子炉の運転期間）
      title: 第二十七条の二十九の二
      article_num: '27_29_2'
      paragraphs:
      - content: 原子力発電事業者（原子力を原動力とする発電用の電気工作物（以下「原子力発電工作物」という。）をその発電事業の用に供する発電事業者をいう。以下同じ。）が、その発電事業の用に供するため、発電用原子炉（原子力発電事業者が維持し、及び運用する原子力発電工作物である核原料物質、核燃料物質及び原子炉の規制に関する法律（昭和三十二年法律第百六十六号。第四項、第五十四条及び第百十二条の三において「原子炉等規制法」という。）第二条第五項に規定する発電用原子炉をいう。以下この節において同じ。）を運転することができる期間（以下「運転期間」という。）は、当該発電用原子炉について最初に第四十九条第一項の検査に合格した日から起算して四十年とする。
      - paragraph_num: ２
        content: 原子力発電事業者は、その発電事業の用に供するため、前項の四十年を超えて発電用原子炉を運転しようとするときは、あらかじめ、経済産業大臣の認可を受けて、運転期間を延長することができる。
      - paragraph_num: ３
        content: 前項の認可を受けようとする原子力発電事業者は、次に掲げる事項を記載した申請書に経済産業省令で定める書類を添付して、経済産業大臣に提出しなければならない。
        items:
        - title: 一
          content: 氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
        - title: 二
          content: 運転期間を延長しようとする発電用原子炉を設置する営業所の名称及び所在地
        - title: 三
          content: 延長しようとする運転期間（二十年を超える場合にあつては、申請に係る発電用原子炉（次項において「申請発電用原子炉」という。）の運転を停止した期間（同項第五号イからホまでに掲げる期間に該当するものに限る。）及びその理由を含む。）
        - title: 四
          content: その他経済産業省令で定める事項
      - paragraph_num: ４
        content: 経済産業大臣は、第二項の認可の申請があつた場合において、当該申請が次の各号のいずれにも適合していると認めるときに限り、同項の認可をすることができる。
        items:
        - title: 一
          content: 申請発電用原子炉が平和の目的以外に利用されるおそれがないこと。
        - title: 二
          content: その原子力発電事業者が原子炉等規制法第四十三条の三の五第一項の許可の取消しを受けていないこと、申請発電用原子炉について原子炉等規制法第四十三条の三の二十第二項の規定による運転の停止の命令を受けていないこと並びに申請発電用原子炉に係る原子炉等規制法第四十三条の三の三十二第一項及び第三項の認可の申請並びに同条第四項の認可の申請（同条第九項の規定による命令を受けて行うものに限る。）に対し不認可の処分がなされていないこと。
        - title: 三
          content: 延長しようとする運転期間において申請発電用原子炉を運転することが、我が国において、脱炭素社会（地球温暖化対策の推進に関する法律（平成十年法律第百十七号）第二条の二に規定する脱炭素社会をいう。）の実現に向けた発電事業における非化石エネルギー源（エネルギー供給事業者によるエネルギー源の環境適合利用及び化石エネルギー原料の有効な利用の促進に関する法律（平成二十一年法律第七十二号）第二条第二項に規定する非化石エネルギー源をいう。）の利用の促進を図りつつ、電気の安定供給を確保することに資すると認められること。
        - title: 四
          content: その原子力発電事業者が、申請発電用原子炉に係る発電事業に関する法令の規定を遵守して当該発電事業に係る業務を実施するための態勢を整備していることその他当該発電事業を遂行する態勢の見直し及び改善に継続的に取り組むことが見込まれること。
        - title: 五
          content: 延長しようとする運転期間が二十年を超える場合にあつては、その二十年を超える期間が次に掲げる期間（平成二十三年三月十一日以降の期間に限る。）を合算した期間以下であること。
          subitems:
          - level: 1
            title: イ
            content: 申請発電用原子炉に係る発電事業に関する法令若しくは行政手続法（平成五年法律第八十八号）第二条第八号ロの審査基準若しくは同号ハの処分基準の制定若しくは改正又は当該法令の解釈若しくは運用の基準の変更に対応するため、その原子力発電事業者が申請発電用原子炉の運転を停止した期間と認められる期間
          - level: 1
            title: ロ
            content: 前条において準用する第二十七条第一項若しくは第四十条の規定による処分、原子炉等規制法第四十三条の三の二十、第四十三条の三の二十三若しくは第六十四条第三項の規定による処分又は武力攻撃事態等における国民の保護のための措置に関する法律（平成十六年法律第百十二号）第百六条（同法第百八十三条において準用する場合を含む。）の規定による処分（これらの処分をした行政官庁若しくは審査請求に対する裁決によつて取り消されたもの、これらの処分の取消し若しくはこれらの処分の無効若しくは不存在の確認の判決が確定したもの又は審査請求に対する裁決によつてこれらの処分の内容が変更されたものに限る。）による義務を履行するため申請発電用原子炉の運転を停止した原子力発電事業者にあつては、その停止した期間のうち、当該処分による義務を履行するため申請発電用原子炉の運転を停止する必要がなかつたと認められる期間
          - level: 1
            title: ハ
            content: 行政指導に従つて申請発電用原子炉の運転を停止した原子力発電事業者にあつては、当該行政指導に従つて申請発電用原子炉の運転を停止した期間と認められる期間
          - level: 1
            title: ニ
            content: 仮処分命令（債権者がその申立てを取り下げたもの又は民事保全法（平成元年法律第九十一号）の規定による保全異議の申立てについての決定若しくは同法の規定による保全抗告についての決定（以下このニにおいて「保全異議の申立て等についての決定」という。）若しくは同法の規定による保全取消しの申立てについての決定によつて取り消されたもの若しくは保全異議の申立て等についての決定によつて変更されたものであつて、その保全異議の申立て等についての決定若しくは保全取消しの申立てについての決定に対して抗告をすることができないものに限る。）を受けて申請発電用原子炉の運転を停止した原子力発電事業者にあつては、その停止した期間のうち、当該仮処分命令による義務を履行するため申請発電用原子炉の運転を停止する必要がなかつたと認められる期間
          - level: 1
            title: ホ
            content: ロに規定する処分以外の他の法律の規定に基づく申請発電用原子炉に関する処分であつてその取消しの判決が確定したものその他原子力発電事業者が申請発電用原子炉に係る発電事業の遂行上予見し難い事由として経済産業省令で定めるものに対応するため、その原子力発電事業者が申請発電用原子炉の運転を停止した期間と認められる期間
      - paragraph_num: ５
        content: 経済産業大臣は、第二項の認可をしようとする場合には、あらかじめ、前項第一号に掲げる基準の適用について、原子力委員会の意見を聴かなければならない。
      - paragraph_num: ６
        content: 経済産業大臣は、第二項の認可をしたときは、遅滞なく、その旨を原子力規制委員会及び当該認可を受けた原子力発電事業者が原子力発電における使用済燃料の再処理等の実施及び廃炉の推進に関する法律（平成十七年法律第四十八号）第十二条第一項の規定により届け出た使用済燃料再処理・廃炉推進機構（同法第十三条第一項の規定による変更の承認があつたときは、その変更後の使用済燃料再処理・廃炉推進機構）に通知するものとする。
      - paragraph_num: ７
        content: 第二項から前項までの規定は、第二項（この項において準用する場合を含む。）の認可を受けた原子力発電事業者が、その発電事業の用に供するため、当該認可により延長された運転期間を超えて当該認可に係る発電用原子炉を運転しようとする場合に準用する。
          この場合において、第二項中「前項の四十年」とあるのは「その認可により延長された運転期間」と、第三項第三号中「二十年を超える場合にあつては、申請」とあるのは「申請」と、第四項第五号中「二十年を超える場合にあつては、その二十年を超える期間が次に」とあるのは「次に」と、「期間に限る」とあるのは「期間に限り、過去になされた第二項（第七項において準用する場合を含む。）の認可により延長された運転期間に算入された期間を除く」と読み替えるものとする。
      - paragraph_num: ８
        content: 第二項から前項までに定めるもののほか、認可に関する申請の手続に関し必要な事項は、経済産業省令で定める。
    - caption: （事業の譲渡し及び譲受け並びに合併及び分割等）
      title: 第二十七条の二十九の三
      article_num: '27_29_3'
      paragraphs:
      - content: 前条第二項（同条第七項において準用する場合を含む。）の認可を受けた原子力発電事業者（以下「認可原子力発電事業者」という。）が営む発電事業（次項及び第四項において「認可発電事業」という。）の全部の譲渡し及び譲受けは、経済産業大臣の認可を受けなければ、その効力を生じない。
      - paragraph_num: ２
        content: 認可原子力発電事業者である法人の合併及び分割（認可発電事業の全部を承継させるものに限る。第四項において同じ。）は、経済産業大臣の認可を受けなければ、その効力を生じない。
      - paragraph_num: ３
        content: 前条第四項（第三号及び第五号を除く。）、第五項及び第八項の規定は、前二項の認可に準用する。
      - paragraph_num: ４
        content: 認可発電事業の全部の譲渡しがあり、又は認可原子力発電事業者について相続、合併若しくは分割があつたときは、認可発電事業の全部を譲り受けた者又は相続人、合併後存続する法人若しくは合併により設立した法人若しくは分割により当該認可発電事業の全部を承継した法人は、認可原子力発電事業者の地位を承継する。
      - paragraph_num: ５
        content: 前項の規定により認可原子力発電事業者の地位を承継した相続人は、遅滞なく、その旨を経済産業大臣に届け出なければならない。
    - caption: （認可の取消し）
      title: 第二十七条の二十九の四
      article_num: '27_29_4'
      paragraphs:
      - content: 経済産業大臣は、認可原子力発電事業者が次の各号のいずれかに該当するときは、第二十七条の二十九の二第二項（同条第七項において準用する場合を含む。）の認可を取り消すことができる。
        items:
        - title: 一
          content: 第二十七条の二十九の二第四項第一号、第二号又は第四号（これらの規定を同条第七項において準用する場合を含む。）に掲げる基準に適合しなくなつたとき。
        - title: 二
          content: この法律又はこの法律に基づく命令の規定に違反した場合において、公共の利益を阻害すると認めるとき。
      - paragraph_num: ２
        content: 第二十七条の二十九の二第六項の規定は、前項の場合に準用する。
    - caption: （運転停止命令）
      title: 第二十七条の二十九の五
      article_num: '27_29_5'
      paragraphs:
      - content: 経済産業大臣は、原子力発電事業者が第二十七条の二十九の二第二項（同条第七項において準用する場合を含む。）の認可を受けないで同条第一項の四十年を超えて発電用原子炉を運転したとき、又は当該認可により延長された運転期間を超えて当該認可に係る発電用原子炉を運転したときは、当該原子力発電事業者に対し、当該発電用原子炉の運転を停止すべきことを命ずることができる。
    - caption: （資料の提供等の要求）
      title: 第二十七条の二十九の六
      article_num: '27_29_6'
      paragraphs:
      - content: 経済産業大臣は、第二十七条の二十九の二第四項（同条第七項及び第二十七条の二十九の三第三項において準用する場合を含む。）及び第二十七条の二十九の四第一項の規定の運用に関し、必要があると認めるときは、関係行政機関又は地方公共団体の長に対し、資料又は情報の提供、意見の表明その他必要な協力を求めることができる。
  - title: 第五節の二　特定卸供給事業
    section_num: 5
    articles:
    - caption: （事業の届出）
      title: 第二十七条の三十
      article_num: '27_30'
      paragraphs:
      - content: 特定卸供給事業を営もうとする者は、経済産業省令で定めるところにより、次に掲げる事項を経済産業大臣に届け出なければならない。
        items:
        - title: 一
          content: 氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
        - title: 二
          content: 主たる営業所その他の営業所の名称及び所在地
        - title: 三
          content: 特定卸供給の相手方の電気の需要に応ずるために必要と見込まれる供給能力の確保に関する事項
        - title: 四
          content: 第二条第一項第十五号の二の経済産業省令で定める方法に関する事項
        - title: 五
          content: 事業開始の予定年月日
        - title: 六
          content: その他経済産業省令で定める事項
      - paragraph_num: ２
        content: 前項の規定による届出をする場合には、経済産業省令で定める書類を添付しなければならない。
      - paragraph_num: ３
        content: 第一項の規定による届出をした者（次項から第六項までにおいて「届出者」という。）は、その届出が受理された日から三十日を経過した後でなければ、特定卸供給事業を開始してはならない。
      - paragraph_num: ４
        content: 経済産業大臣は、届出者が特定卸供給事業を開始することが電気の使用者の利益の保護並びに一般送配電事業者及び配電事業者の電気の供給に支障を及ぼすおそれがないと認めるときは、前項に規定する期間を短縮することができる。
      - paragraph_num: ５
        content: 経済産業大臣は、届出者が特定卸供給事業を開始することにより電気の使用者の利益の保護又は一般送配電事業者若しくは配電事業者の電気の供給に支障を及ぼすおそれがあると認めるときは、当該届出者に対し、その届出を受理した日から三十日（次項の規定により第三項に規定する期間が延長された場合にあつては、当該延長後の期間）以内に限り、その届出の内容を変更し、又は中止すべきことを命ずることができる。
      - paragraph_num: ６
        content: 経済産業大臣は、届出者が特定卸供給事業を開始することにより電気の使用者の利益の保護又は一般送配電事業者若しくは配電事業者の電気の供給に支障を及ぼすおそれがあるかどうかについて審査するため相当の期間を要し、当該審査が第三項に規定する期間内に終了しないと認める相当の理由があるときは、三十日の範囲内において、同項の期間を延長することができる。
          この場合において、経済産業大臣は、当該届出者に対し、遅滞なく、当該延長後の期間及び当該延長の理由を通知しなければならない。
      - paragraph_num: ７
        content: 特定卸供給事業者は、第一項第三号又は第四号に掲げる事項を変更するときは、経済産業省令で定めるところにより、あらかじめ、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ８
        content: 第二項から第六項までの規定は、前項の規定による変更の届出に準用する。 この場合において、第三項中「特定卸供給事業を開始してはならない」とあるのは「当該届出に係る事項を変更してはならない。ただし、経済産業省令で定める軽微な変更については、この限りでない」と、第四項から第六項までの規定中「特定卸供給事業を開始する」とあるのは「当該届出に係る事項を変更する」と読み替えるものとする。
      - paragraph_num: ９
        content: 特定卸供給事業者は、第一項各号（第三号及び第四号を除く。）に掲げる事項に変更があつたときは、経済産業省令で定めるところにより、遅滞なく、その旨を経済産業大臣に届け出なければならない。
    - caption: （特定卸供給義務）
      title: 第二十七条の三十一
      article_num: '27_31'
      paragraphs:
      - content: 特定卸供給事業者は、一般送配電事業者又は配電事業者に、特定卸供給によりその一般送配電事業又は配電事業の用に供するための電気を供給することを約しているときは、正当な理由がなければ、特定卸供給を拒んではならない。
    - caption: （準用）
      title: 第二十七条の三十二
      article_num: '27_32'
      paragraphs:
      - content: 第二条の七第一項本文及び第二項、第二条の十七第一項並びに第二十七条の二十五の規定は、特定卸供給事業者に準用する。 この場合において、同条第一項中「事業の全部又は一部」とあるのは、「事業」と読み替えるものとする。
  - title: 第六節　特定供給
    section_num: 6
    articles:
    - title: 第二十七条の三十三
      article_num: '27_33'
      paragraphs:
      - content: 電気事業（発電事業を除く。）を営む場合及び次に掲げる場合を除き、電気を供給する事業を営もうとする者は、供給の相手方及び供給する場所ごとに、経済産業大臣の許可を受けなければならない。
        items:
        - title: 一
          content: 専ら一の建物内又は経済産業省令で定める構内の需要に応じ電気を供給するための発電等用電気工作物により電気を供給するとき。
        - title: 二
          content: 小売電気事業、一般送配電事業、配電事業、特定送配電事業又は特定卸供給事業の用に供するための電気を供給するとき。
      - paragraph_num: ２
        content: 前項の許可を受けようとする者は、次に掲げる事項を記載した申請書に経済産業省令で定める書類を添付して、経済産業大臣に提出しなければならない。
        items:
        - title: 一
          content: 氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
        - title: 二
          content: 供給の相手方の氏名又は名称及び住所
        - title: 三
          content: 供給する場所
        - title: 四
          content: その他経済産業省令で定める事項
      - paragraph_num: ３
        content: 経済産業大臣は、第一項の許可の申請が次の各号のいずれにも適合していると認めるときでなければ、同項の許可をしてはならない。
        items:
        - title: 一
          content: 電気を供給する事業を営む者が供給の相手方と経済産業省令で定める密接な関係を有すること。
        - title: 二
          content: 供給する場所が一般送配電事業者又は配電事業者の供給区域内にあるものにあつては、当該一般送配電事業者又は配電事業者の供給区域内の電気の使用者の利益が阻害されるおそれがないこと。
      - paragraph_num: ４
        content: 第一項の許可を受けた者は、第二項第一号、第二号又は第四号に掲げる事項に変更があつたときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ５
        content: 第一項の許可を受けた者は、その許可に係る電気を供給する事業を廃止したときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
      - paragraph_num: ６
        content: 経済産業大臣は、第一項の許可を受けた者が、第三項各号のいずれかに適合しなくなつたと認めるときは、第一項の許可を取り消すことができる。
  - title: 第七節　広域的運営
    section_num: 7
    subsections:
    - title: 第一款　電気事業者等の相互の協調
      article_num: 1
      articles:
      - title: 第二十八条
        article_num: '28'
        paragraphs:
        - content: 電気事業者及び発電用の自家用電気工作物を設置する者（電気事業者に該当するものを除く。）は、電源開発の実施、電気の供給、電気工作物の運用等の遂行に当たり、広域的運営による電気の安定供給の確保その他の電気事業の総合的かつ合理的な発達に資するように、相互に協調しなければならない。
      - title: 第二十八条の二
        article_num: '28_2'
        paragraphs:
        - content: 削除
    - title: 第二款　特定自家用電気工作物設置者の届出
      article_num: 2
      articles:
      - title: 第二十八条の三
        article_num: '28_3'
        paragraphs:
        - content: 発電用又は蓄電用の自家用電気工作物であつて経済産業省令で定める要件に該当するものを維持し、及び運用する者（小売電気事業者、一般送配電事業者、配電事業者、特定送配電事業者、発電事業者及び特定卸供給事業者を除く。）は、当該自家用電気工作物と一般送配電事業者若しくは配電事業者が維持し、及び運用する電線路とを直接に又は一般送配電事業者及び配電事業者以外の者が維持し、及び運用する電線路を通じて間接に電気的に接続したときは、経済産業省令で定めるところにより、遅滞なく、氏名又は名称及び住所その他経済産業省令で定める事項を記載した書類を添えて、その旨を経済産業大臣に届け出なければならない。
            ただし、経済産業省令で定める場合は、この限りでない。
        - paragraph_num: ２
          content: 前項の規定による届出をした者（第三十一条第二項において「特定自家用電気工作物設置者」という。）は、次の各号のいずれかに該当するときは、経済産業省令で定めるところにより、遅滞なく、その旨を経済産業大臣に届け出なければならない。
          items:
          - title: 一
            content: 前項の事項を変更したとき。
          - title: 二
            content: 前項の規定による届出に係る発電用又は蓄電用の自家用電気工作物が同項の経済産業省令で定める要件に該当しなくなつたとき。
          - title: 三
            content: 前項の規定による届出に係る発電用又は蓄電用の自家用電気工作物と一般送配電事業者若しくは配電事業者が維持し、及び運用する電線路とを直接に又は一般送配電事業者及び配電事業者以外の者が維持し、及び運用する電線路を通じて間接に電気的に接続されている状態でなくなつたとき。
          - title: 四
            content: その他経済産業省令で定める場合に該当するとき。
    - title: 第三款　広域的運営推進機関
      article_num: 3
    - title: 第四款　供給計画
      article_num: 4
      articles:
      - title: 第二十九条
        article_num: '29'
        paragraphs:
        - content: 電気事業者は、経済産業省令で定めるところにより、毎年度、当該年度以降経済産業省令で定める期間における電気の供給並びに電気工作物の設置及び運用についての計画（以下「供給計画」という。）を作成し、当該年度の開始前に（電気事業者となつた日を含む年度にあつては、電気事業者となつた後遅滞なく）、推進機関を経由して経済産業大臣に届け出なければならない。
        - paragraph_num: ２
          content: 推進機関は、前項の規定により電気事業者から供給計画を受け取つたときは、経済産業省令で定めるところにより、これを取りまとめ、送配電等業務指針、広域系統整備計画及びその業務の実施を通じて得られた知見に照らして検討するとともに、意見（供給能力の確保のために必要な措置に関するものを含む。）があるときは当該意見を付して、当該年度の開始前に（当該年度に電気事業者となつた者に係る供給計画にあつては、速やかに）、経済産業大臣に送付しなければならない。
        - paragraph_num: ３
          content: 電気事業者は、供給計画を変更したときは、遅滞なく、変更した事項を推進機関を経由して経済産業大臣に届け出なければならない。
        - paragraph_num: ４
          content: 第二項の規定は、前項の場合に準用する。 この場合において、第二項中「これを取りまとめ、」とあるのは「これを」と、「当該年度の開始前に（当該年度に電気事業者となつた者に係る供給計画にあつては、速やかに）」とあるのは「速やかに」と読み替えるものとする。
        - paragraph_num: ５
          content: 経済産業大臣は、第二項（前項において準用する場合を含む。）の規定による推進機関の意見を踏まえ、供給計画が広域的運営による電気の安定供給の確保その他の電気事業の総合的かつ合理的な発達を図るため適切でないと認めるときは、電気事業者に対し、その供給計画を変更すべきことを勧告することができる。
        - paragraph_num: ６
          content: 経済産業大臣は、前項の規定による勧告をした場合において特に必要があり、かつ、適切であると認めるときは、電気事業者に対し、次に掲げる事項を命ずることができる。
            ただし、第一号に掲げる事項は送電事業者に対して、第二号に掲げる事項は小売電気事業者、発電事業者及び特定卸供給事業者に対して、第三号に掲げる事項は送電事業者、発電事業者及び特定卸供給事業者に対しては、命ずることができない。
          items:
          - title: 一
            content: 小売電気事業者、一般送配電事業者、配電事業者又は特定送配電事業者に電気を供給すること。
          - title: 二
            content: 振替供給を行うこと。
          - title: 三
            content: 電気の供給を受けること。
          - title: 四
            content: 電気事業者に電気工作物を貸し渡し、若しくは電気事業者から電気工作物を借り受け、又は電気事業者と電気工作物を共用すること。
          - title: 五
            content: 前各号に掲げるもののほか、広域的運営を図るために必要な措置として経済産業省令で定めるものをとること。
      - title: 第三十条
        article_num: '30'
        paragraphs:
        - content: 削除
    - title: 第五款　災害等への対応
      article_num: 5
      articles:
      - caption: （供給命令等）
        title: 第三十一条
        article_num: '31'
        paragraphs:
        - content: 経済産業大臣は、電気の安定供給の確保に支障が生じ、又は生ずるおそれがある場合において公共の利益を確保するため特に必要があり、かつ、適切であると認めるときは電気事業者に対し、次に掲げる事項を命ずることができる。
            ただし、第一号に掲げる事項は送電事業者に対して、第二号に掲げる事項は小売電気事業者、発電事業者及び特定卸供給事業者に対して、第三号に掲げる事項は送電事業者、発電事業者及び特定卸供給事業者に対しては、命ずることができない。
          items:
          - title: 一
            content: 小売電気事業者、一般送配電事業者、配電事業者又は特定送配電事業者に電気を供給すること。
          - title: 二
            content: 小売電気事業者、一般送配電事業者、配電事業者又は特定送配電事業者に振替供給を行うこと。
          - title: 三
            content: 電気事業者から電気の供給を受けること。
          - title: 四
            content: 電気事業者に電気工作物を貸し渡し、若しくは電気事業者から電気工作物を借り受け、又は電気事業者と電気工作物を共用すること。
          - title: 五
            content: 前各号に掲げるもののほか、広域的運営による電気の安定供給の確保を図るために必要な措置をとること。
        - paragraph_num: ２
          content: 経済産業大臣は、前項に規定する措置を講じてもなお電気の安定供給を確保することが困難であると認められる場合において公共の利益を確保するため特に必要があり、かつ、適切であると認めるときは、特定自家用電気工作物設置者に対し、小売電気事業者に電気を供給することその他の電気の安定供給を確保するために必要な措置をとるべきことを勧告することができる。
        - paragraph_num: ３
          content: 経済産業大臣は、前項の規定による勧告をした場合において、当該勧告を受けた者が、正当な理由がなく、その勧告に従わなかつたときは、その旨を公表することができる。
        - paragraph_num: ４
          content: 経済産業大臣は、第一項又は第二項の措置を講じたときは、直ちに、その措置の内容を推進機関に通知するものとする。
        - paragraph_num: ５
          content: 第一項の規定による命令又は第二項の規定による勧告があつた場合において、当事者が支払い、又は受領すべき金額その他命令又は勧告の実施に関し必要な細目は、当事者間の協議により定める。
      - title: 第三十二条
        article_num: '32'
        paragraphs:
        - content: 第二十五条第二項から第五項までの規定は、前条第五項の協議に準用する。
      - title: 第三十三条
        article_num: '33'
        paragraphs:
        - content: 前条において準用する第二十五条第二項の裁定のうち当事者が支払い、又は受領すべき金額について不服のある者は、その裁定の通知を受けた日から六月以内に、訴えをもつてその金額の増減を請求することができる。
        - paragraph_num: ２
          content: 前項の訴えにおいては、他の当事者を被告とする。
        - paragraph_num: ３
          content: 前条において準用する第二十五条第二項の裁定についての審査請求においては、当事者が支払い、又は受領すべき金額についての不服をその裁定についての不服の理由とすることができない。
      - caption: （災害時連携計画）
        title: 第三十三条の二
        article_num: '33_2'
        paragraphs:
        - content: 一般送配電事業者は、共同して、経済産業省令で定めるところにより、災害その他の事由による事故により電気の安定供給の確保に支障が生ずる場合に備えるための一般送配電事業者相互の連携に関する計画（以下この条において「災害時連携計画」という。）を作成し、推進機関を経由して経済産業大臣に届け出なければならない。
            これを変更したときも、同様とする。
        - paragraph_num: ２
          content: 災害時連携計画においては、次に掲げる事項を定めるものとする。
          items:
          - title: 一
            content: 一般送配電事業者相互の連絡に関する事項
          - title: 二
            content: 一般送配電事業者による従業者及び電源車の派遣及び運用に関する事項
          - title: 三
            content: 迅速な復旧に資する電気工作物の仕様の共通化に関する事項
          - title: 四
            content: その他経済産業省令で定める事項
        - paragraph_num: ３
          content: 推進機関は、第一項の規定により一般送配電事業者から災害時連携計画を受け取つたときは、送配電等業務指針及びその業務の実施を通じて得られた知見に照らして検討するとともに、意見があるときは当該意見を付して、速やかに、経済産業大臣に送付しなければならない。
        - paragraph_num: ４
          content: 経済産業大臣は、第一項の規定による届出があつた場合において、その届出に係る災害時連携計画の内容が次の各号のいずれかに適合しないと認めるときは、その届出をした一般送配電事業者に対し、相当の期限を定め、その届出に係る災害時連携計画を変更すべきことを勧告することができる。
          items:
          - title: 一
            content: 災害その他の事由による事故の発生により特定の供給区域における電気の供給に支障が生じ、又は生ずるおそれがある場合においてその供給区域における電気の安定供給を確保するために必要かつ適切なものであること。
          - title: 二
            content: その届出をした一般送配電事業者のうち特定の者について不当に差別的でないこと。
          - title: 三
            content: 電気の使用者の利益又は一般送配電事業者から電気の供給を受ける者の利益を不当に害するおそれがないこと。
        - paragraph_num: ５
          content: 経済産業大臣は、一般送配電事業者が、正当な理由がなく、第一項の規定による届出に係る災害時連携計画を実施していないため、電気の安定供給の確保に支障が生じ、又は生ずるおそれがあると認めるときは、当該一般送配電事業者に対し、当該災害時連携計画を実施すべきことを勧告することができる。
      - caption: （燃料調達の要請）
        title: 第三十三条の三
        article_num: '33_3'
        paragraphs:
        - content: 経済産業大臣は、電気の安定供給の確保に支障が生じ、又は生ずるおそれがある場合において、発電の用に供する燃料（原油、石油ガス、可燃性天然ガス及び石炭並びにこれらから製造される製品であつて経済産業省令で定めるものに限る。次条において同じ。）の調達が特に必要であり、かつ、独立行政法人エネルギー・金属鉱物資源機構以外の者による調達を困難とする特別の事情があると認めるときは、独立行政法人エネルギー・金属鉱物資源機構に対し、当該燃料の調達を要請することができる。
      - caption: （独立行政法人エネルギー・金属鉱物資源機構による推進機関への情報提供）
        title: 第三十三条の四
        article_num: '33_4'
        paragraphs:
        - content: 独立行政法人エネルギー・金属鉱物資源機構は、推進機関の依頼に応じて、第二十八条の四十第一項第一号又は第二号に掲げる業務の適確な実施に資するよう、発電の用に供する燃料に関する情報の提供を行うものとする。
      - caption: （情報の提供の求め等）
        title: 第三十四条
        article_num: '34'
        paragraphs:
        - content: 経済産業大臣は、電気の安定供給の確保に支障が生ずることにより、国民の生命、身体又は財産に重大な被害が生じ、又は生ずるおそれがある緊急の事態への対処又は当該事態の発生の防止のため必要があると認める場合には、一般送配電事業者又は配電事業者に対し、関係行政機関又は地方公共団体の長に対して必要な情報を提供することを求めることができる。
        - paragraph_num: ２
          content: 一般送配電事業者又は配電事業者は、経済産業大臣から前項の規定による求めがあつたときは、正当な理由がない限り、速やかに、その求めに応じなければならない。
        - paragraph_num: ３
          content: 前項の場合には、当該一般送配電事業者又は配電事業者については、第二十三条第一項（第一号に係る部分に限り、第二十七条の十二の十三において準用する場合を含む。第三十七条の三第一項において同じ。）の規定は、適用しない。
    - title: 第六款　電気の使用制限等
      article_num: 6
      articles:
      - title: 第三十四条の二
        article_num: '34_2'
        paragraphs:
        - content: 経済産業大臣は、電気の需給の調整を行わなければ電気の供給の不足が国民経済及び国民生活に悪影響を及ぼし、公共の利益を阻害するおそれがあると認められるときは、その事態を克服するため必要な限度において、政令で定めるところにより、使用電力量の限度、使用最大電力の限度、用途若しくは使用を停止すべき日時を定めて、小売電気事業者、一般送配電事業者若しくは登録特定送配電事業者（以下この条において「小売電気事業者等」という。）から電気の供給を受ける者に対し、小売電気事業者等の供給する電気の使用を制限すべきこと又は受電電力の容量の限度を定めて、小売電気事業者等から電気の供給を受ける者に対し、小売電気事業者等からの受電を制限すべきことを命じ、又は勧告することができる。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定の施行に必要な限度において、政令で定めるところにより、小売電気事業者等から電気の供給を受ける者に対し、小売電気事業者等が供給する電気の使用の状況その他必要な事項について報告を求めることができる。
  - title: 第八節　あつせん及び仲裁
    section_num: 8
    articles:
    - caption: （あつせん）
      title: 第三十五条
      article_num: '35'
      paragraphs:
      - content: 電気供給事業者間において、電力の取引に係る契約その他の取決めであつて政令で定めるもの（以下この項及び次条第一項において「契約等」という。）について、一方が契約等の締結を申し入れたにもかかわらず他の一方が協議に応じず、若しくは協議が調わないとき、又は契約等の締結に関し、当事者が取得し、若しくは負担すべき金額、条件その他の細目について当事者間の協議が調わないときは、当事者は、電力・ガス取引監視等委員会（以下この節において「委員会」という。）に対し、あつせんを申請することができる。
          ただし、当事者が第二十五条第二項（第二十七条の十二の十三及び第三十二条において準用する場合を含む。）の規定による裁定の申請又は次条第一項の規定による仲裁の申請をした後は、この限りでない。
      - paragraph_num: ２
        content: 委員会は、事件がその性質上あつせんをするのに適当でないと認めるとき、又は当事者が不当な目的でみだりにあつせんの申請をしたと認めるときを除き、あつせんを行うものとする。
      - paragraph_num: ３
        content: 委員会によるあつせんは、委員会の委員その他の職員（委員会があらかじめ指定する者に限る。次条第三項において同じ。）のうちから委員会が事件ごとに指名するあつせん委員が行う。
      - paragraph_num: ４
        content: あつせん委員は、当事者間をあつせんし、双方の主張の要点を確かめ、事件が解決されるように努めなければならない。
      - paragraph_num: ５
        content: あつせん委員は、当事者から意見を聴取し、又は当事者に対し報告を求め、事件の解決に必要なあつせん案を作成し、これを当事者に提示することができる。
      - paragraph_num: ６
        content: あつせん委員は、あつせん中の事件について、当事者が第二十五条第二項（第二十七条の十二の十三及び第三十二条において準用する場合を含む。）の規定による裁定の申請又は次条第一項の規定による仲裁の申請をしたときは、当該あつせんを打ち切るものとする。
    - caption: （仲裁）
      title: 第三十六条
      article_num: '36'
      paragraphs:
      - content: 電気供給事業者間において、契約等の締結に関し、当事者が取得し、又は負担すべき金額、条件その他の細目について当事者間の協議が調わないときは、当事者の双方は、委員会に対し、仲裁を申請することができる。
          ただし、当事者が第二十五条第二項（第二十七条の十二の十三及び第三十二条において準用する場合を含む。）の規定による裁定の申請をした後は、この限りでない。
      - paragraph_num: ２
        content: 委員会による仲裁は、三人の仲裁委員が行う。
      - paragraph_num: ３
        content: 仲裁委員は、委員会の委員その他の職員のうちから当事者が合意によつて選定した者につき、委員会が指名する。 ただし、当事者の合意による選定がなされなかつたときは、委員会の委員その他の職員のうちから委員会が指名する。
      - paragraph_num: ４
        content: 仲裁については、この条に別段の定めがある場合を除いて、仲裁委員を仲裁人とみなして、仲裁法（平成十五年法律第百三十八号）の規定を準用する。
    - caption: （申請の経由）
      title: 第三十七条
      article_num: '37'
      paragraphs:
      - content: この節の規定により委員会に対してするあつせん又は仲裁の申請は、経済産業大臣を経由してしなければならない。
    - caption: （政令への委任）
      title: 第三十七条の二
      article_num: '37_2'
      paragraphs:
      - content: この節に規定するもののほか、あつせん及び仲裁の手続に関し必要な事項は、政令で定める。
- title: 第二章の二　電気使用者情報の利用及び提供
  chapter_num: 2
  articles:
  - caption: （電気使用者情報の提供の禁止の例外）
    title: 第三十七条の三
    article_num: '37_3'
    paragraphs:
    - content: 第二十三条第一項の規定にかかわらず、一般送配電事業者又は配電事業者は、認定電気使用者情報利用者等協会（次条の規定による認定を受けた者をいう。以下同じ。）に対し、同項第一号の電気の使用者に関する情報（同号の経済産業省令で定めるものを除く。以下「電気使用者情報」という。）を提供することができる。
    - paragraph_num: ２
      content: 前項の規定は、電気使用者情報の提供を制限する他の法律の規定の適用を妨げるものではない。
  - caption: （認定電気使用者情報利用者等協会の認定）
    title: 第三十七条の四
    article_num: '37_4'
    paragraphs:
    - content: 経済産業大臣は、経済産業省令で定めるところにより、電気使用者情報を利用しようとする者並びに前条第一項の規定により電気使用者情報を提供しようとする一般送配電事業者及び配電事業者（第二号において「電気使用者情報利用者等」という。）が設立した一般社団法人であつて、次に掲げる基準に適合すると認められるものを、その申請により、次条に規定する業務（以下この章において「情報利用等適正化業務」という。）を行う者として認定することができる。
      items:
      - title: 一
        content: 社員（以下この章において「会員」という。）による電気使用者情報の利用及び提供の適正化を図ることにより電気供給事業者間の適正な競争関係の確保に資することを目的とすること。
      - title: 二
        content: 電気使用者情報利用者等を会員に含む旨の定款の定めがあること。
      - title: 三
        content: 情報利用等適正化業務の適確な実施のために必要な業務の方法を定めているものであること。
      - title: 四
        content: 情報利用等適正化業務を適確に行うに足りる知識及び能力並びに財産的基礎を有するものであること。
  - caption: （認定電気使用者情報利用者等協会の業務）
    title: 第三十七条の五
    article_num: '37_5'
    paragraphs:
    - content: 認定電気使用者情報利用者等協会は、次に掲げる業務を行うものとする。
      items:
      - title: 一
        content: 一般送配電事業者又は配電事業者が第三十七条の三第一項の規定により提供した電気使用者情報を会員に提供する業務
      - title: 二
        content: 会員が電気使用者情報の利用及び提供をするに当たり、この法律その他の法令の規定及び第四号の規則を遵守させるための会員に対する指導、勧告その他の業務
      - title: 三
        content: 会員の行う電気使用者情報の利用及び提供の適正化を図るために必要な指導、勧告その他の業務
      - title: 四
        content: 会員の行う電気使用者情報の利用及び提供の適正化並びにその取り扱う情報の適正な取扱い及び安全な管理のために必要な規則の制定
      - title: 五
        content: 会員のこの法律若しくはこの法律に基づく命令若しくは処分又は前号の規則の遵守の状況の調査
      - title: 六
        content: 会員の行う電気使用者情報の利用及び提供の適正化を図るために必要な情報の収集、整理及び提供
      - title: 七
        content: 電気使用者情報の利用及び提供に関する電気供給事業者及び電気の使用者からの苦情の処理
      - title: 八
        content: 電気の使用者に対する広報
      - title: 九
        content: 前各号に掲げる業務に附帯する業務
      - title: 十
        content: 前各号に掲げるもののほか、電気使用者情報の利用及び提供に関し、電気供給事業者間の適正な競争関係の確保に資する業務
  - caption: （会員名簿の縦覧等）
    title: 第三十七条の六
    article_num: '37_6'
    paragraphs:
    - content: 認定電気使用者情報利用者等協会は、会員名簿を公衆の縦覧に供しなければならない。
    - paragraph_num: ２
      content: 認定電気使用者情報利用者等協会でない者は、その名称中に、認定電気使用者情報利用者等協会と誤認されるおそれのある文字を用いてはならない。
    - paragraph_num: ３
      content: 認定電気使用者情報利用者等協会の会員でない者は、その名称中に、認定電気使用者情報利用者等協会の会員と誤認されるおそれのある文字を用いてはならない。
  - caption: （電気供給事業者及び電気の使用者からの苦情に関する対応）
    title: 第三十七条の七
    article_num: '37_7'
    paragraphs:
    - content: 認定電気使用者情報利用者等協会は、電気供給事業者及び電気の使用者から会員の行う電気使用者情報の利用及び提供に関する苦情について解決の申出があつたときは、その相談に応じ、申出人に必要な助言をし、その苦情に係る事情を調査するとともに、当該会員に対しその苦情の内容を通知してその迅速な処理を求めなければならない。
    - paragraph_num: ２
      content: 認定電気使用者情報利用者等協会は、前項の申出に係る苦情の解決について必要があると認めるときは、当該会員に対し、文書若しくは口頭による説明を求め、又は資料の提出を求めることができる。
    - paragraph_num: ３
      content: 会員は、認定電気使用者情報利用者等協会から前項の規定による求めがあつたときは、正当な理由がないのに、これを拒んではならない。
    - paragraph_num: ４
      content: 認定電気使用者情報利用者等協会は、第一項の申出、苦情に係る事情及びその解決の結果について会員に周知させなければならない。
  - caption: （認定電気使用者情報利用者等協会への報告等）
    title: 第三十七条の八
    article_num: '37_8'
    paragraphs:
    - content: 会員は、他の会員が行つた電気使用者情報の利用及び提供に関し、電気供給事業者間の適正な競争関係を確保するために必要な情報として経済産業省令で定めるものを取得したときは、これを認定電気使用者情報利用者等協会に報告しなければならない。
    - paragraph_num: ２
      content: 認定電気使用者情報利用者等協会は、その保有する前項に規定する情報について会員から提供の請求があつたときは、正当な理由がある場合を除き、当該情報を提供しなければならない。
  - caption: （目的外利用の禁止）
    title: 第三十七条の九
    article_num: '37_9'
    paragraphs:
    - content: 認定電気使用者情報利用者等協会の役員若しくは職員又はこれらの職にあつた者は、その職務に関して知り得た情報を、情報利用等適正化業務の用に供する目的以外に利用してはならない。
  - caption: （定款の必要的記載事項）
    title: 第三十七条の十
    article_num: '37_10'
    paragraphs:
    - content: 認定電気使用者情報利用者等協会は、その定款において、一般社団法人及び一般財団法人に関する法律第十一条第一項各号に掲げる事項及び第三十七条の四第二号に規定する定款の定めのほか、この法律若しくはこの法律に基づく命令の規定又は第三十七条の五第四号の規則に違反した会員に対し、定款で定める会員の権利の停止若しくは制限を命じ、又は除名する旨を定めなければならない。
  - caption: （認定電気使用者情報利用者等協会に対する監督）
    title: 第三十七条の十一
    article_num: '37_11'
    paragraphs:
    - content: 経済産業大臣は、情報利用等適正化業務の運営に関し改善が必要であると認めるときは、この法律の施行に必要な限度において、認定電気使用者情報利用者等協会に対し、その改善に必要な措置をとるべきことを命ずることができる。
    - paragraph_num: ２
      content: 経済産業大臣は、情報利用等適正化業務の運営がこの法律又はこの法律に基づく命令の規定に違反したときは、認定電気使用者情報利用者等協会の認定を取り消し、又は六月以内の期間を定めて情報利用等適正化業務の全部若しくは一部の停止を命ずることができる。
  - caption: （経済産業大臣による情報提供）
    title: 第三十七条の十二
    article_num: '37_12'
    paragraphs:
    - content: 経済産業大臣は、認定電気使用者情報利用者等協会の求めに応じ、認定電気使用者情報利用者等協会が情報利用等適正化業務を適正に行うために必要な限度において、会員又は会員になろうとする者に関する情報であつて情報利用等適正化業務に資するものとして経済産業省令で定める情報を提供することができる。
- title: 第三章　電気工作物
  chapter_num: 3
  sections:
  - title: 第一節　定義
    section_num: 1
    articles:
    - title: 第三十八条
      article_num: '38'
      paragraphs:
      - content: この法律において「一般用電気工作物」とは、次に掲げる電気工作物であつて、構内（これに準ずる区域内を含む。以下同じ。）に設置するものをいう。
          ただし、小規模発電設備（低圧（経済産業省令で定める電圧以下の電圧をいう。第一号において同じ。）の電気に係る発電用の電気工作物であつて、経済産業省令で定めるものをいう。以下同じ。）以外の発電用の電気工作物と同一の構内に設置するもの又は爆発性若しくは引火性の物が存在するため電気工作物による事故が発生するおそれが多い場所として経済産業省令で定める場所に設置するものを除く。
        items:
        - title: 一
          content: 電気を使用するための電気工作物であつて、低圧受電電線路（当該電気工作物を設置する場所と同一の構内において低圧の電気を他の者から受電し、又は他の者に受電させるための電線路をいう。次号ロ及び第三項第一号ロにおいて同じ。）以外の電線路によりその構内以外の場所にある電気工作物と電気的に接続されていないもの
        - title: 二
          content: 小規模発電設備であつて、次のいずれにも該当するもの
          subitems:
          - level: 1
            title: イ
            content: 出力が経済産業省令で定める出力未満のものであること。
          - level: 1
            title: ロ
            content: 低圧受電電線路以外の電線路によりその構内以外の場所にある電気工作物と電気的に接続されていないものであること。
        - title: 三
          content: 前二号に掲げるものに準ずるものとして経済産業省令で定めるもの
      - paragraph_num: ２
        content: この法律において「事業用電気工作物」とは、一般用電気工作物以外の電気工作物をいう。
      - paragraph_num: ３
        content: この法律において「小規模事業用電気工作物」とは、事業用電気工作物のうち、次に掲げる電気工作物であつて、構内に設置するものをいう。
          ただし、第一項ただし書に規定するものを除く。
        items:
        - title: 一
          content: 小規模発電設備であつて、次のいずれにも該当するもの
          subitems:
          - level: 1
            title: イ
            content: 出力が第一項第二号イの経済産業省令で定める出力以上のものであること。
          - level: 1
            title: ロ
            content: 低圧受電電線路以外の電線路によりその構内以外の場所にある電気工作物と電気的に接続されていないものであること。
        - title: 二
          content: 前号に掲げるものに準ずるものとして経済産業省令で定めるもの
      - paragraph_num: ４
        content: この法律において「自家用電気工作物」とは、次に掲げる事業の用に供する電気工作物及び一般用電気工作物以外の電気工作物をいう。
        items:
        - title: 一
          content: 一般送配電事業
        - title: 二
          content: 送電事業
        - title: 三
          content: 配電事業
        - title: 四
          content: 特定送配電事業
        - title: 五
          content: 発電事業であつて、その事業の用に供する発電等用電気工作物が主務省令で定める要件に該当するもの
  - title: 第二節　事業用電気工作物
    section_num: 2
    subsections:
    - title: 第一款　技術基準への適合
      article_num: 1
      articles:
      - caption: （事業用電気工作物の維持）
        title: 第三十九条
        article_num: '39'
        paragraphs:
        - content: 事業用電気工作物を設置する者は、事業用電気工作物を主務省令で定める技術基準に適合するように維持しなければならない。
        - paragraph_num: ２
          content: 前項の主務省令は、次に掲げるところによらなければならない。
          items:
          - title: 一
            content: 事業用電気工作物は、人体に危害を及ぼし、又は物件に損傷を与えないようにすること。
          - title: 二
            content: 事業用電気工作物は、他の電気的設備その他の物件の機能に電気的又は磁気的な障害を与えないようにすること。
          - title: 三
            content: 事業用電気工作物の損壊により一般送配電事業者又は配電事業者の電気の供給に著しい支障を及ぼさないようにすること。
          - title: 四
            content: 事業用電気工作物が一般送配電事業又は配電事業の用に供される場合にあつては、その事業用電気工作物の損壊によりその一般送配電事業又は配電事業に係る電気の供給に著しい支障を生じないようにすること。
      - caption: （技術基準適合命令）
        title: 第四十条
        article_num: '40'
        paragraphs:
        - content: 主務大臣は、事業用電気工作物が前条第一項の主務省令で定める技術基準に適合していないと認めるときは、事業用電気工作物を設置する者に対し、その技術基準に適合するように事業用電気工作物を修理し、改造し、若しくは移転し、若しくはその使用を一時停止すべきことを命じ、又はその使用を制限することができる。
      - caption: （費用の負担等）
        title: 第四十一条
        article_num: '41'
        paragraphs:
        - content: 事業用電気工作物が他の者の電気的設備その他の物件の設置（政令で定めるものを除く。）により第三十九条第一項の主務省令で定める技術基準に適合しないこととなつたときは、その技術基準に適合するようにするため必要な措置又はその措置に要する費用の負担の方法は、当事者間の協議により定める。
            ただし、その費用の負担の方法については、政令で定める場合は、政令で定めるところによる。
        - paragraph_num: ２
          content: 第二十五条第二項本文及び第三項から第五項まで並びに第三十三条の規定は、前項の協議をすることができず、又は協議が調わない場合に準用する。
            この場合において、第二十五条第二項本文、第三項及び第四項中「経済産業大臣」とあるのは、「主務大臣」と読み替えるものとする。
        - paragraph_num: ３
          content: 主務大臣は、前項において準用する第二十五条第二項本文の裁定をしようとするときは、政令で定めるところにより、あらかじめ関係大臣に協議しなければならない。
    - title: 第二款　自主的な保安
      article_num: 2
      articles:
      - caption: （保安規程）
        title: 第四十二条
        article_num: '42'
        paragraphs:
        - content: 事業用電気工作物（小規模事業用電気工作物を除く。以下この款において同じ。）を設置する者は、事業用電気工作物の工事、維持及び運用に関する保安を確保するため、主務省令で定めるところにより、保安を一体的に確保することが必要な事業用電気工作物の組織ごとに保安規程を定め、当該組織における事業用電気工作物の使用（第五十一条第一項又は第五十二条第一項の自主検査を伴うものにあつては、その工事）の開始前に、主務大臣に届け出なければならない。
        - paragraph_num: ２
          content: 事業用電気工作物を設置する者は、保安規程を変更したときは、遅滞なく、変更した事項を主務大臣に届け出なければならない。
        - paragraph_num: ３
          content: 主務大臣は、事業用電気工作物の工事、維持及び運用に関する保安を確保するため必要があると認めるときは、事業用電気工作物を設置する者に対し、保安規程を変更すべきことを命ずることができる。
        - paragraph_num: ４
          content: 事業用電気工作物を設置する者及びその従業者は、保安規程を守らなければならない。
      - caption: （主任技術者）
        title: 第四十三条
        article_num: '43'
        paragraphs:
        - content: 事業用電気工作物を設置する者は、事業用電気工作物の工事、維持及び運用に関する保安の監督をさせるため、主務省令で定めるところにより、主任技術者免状の交付を受けている者のうちから、主任技術者を選任しなければならない。
        - paragraph_num: ２
          content: 自家用電気工作物（小規模事業用電気工作物を除く。）を設置する者は、前項の規定にかかわらず、主務大臣の許可を受けて、主任技術者免状の交付を受けていない者を主任技術者として選任することができる。
        - paragraph_num: ３
          content: 事業用電気工作物を設置する者は、主任技術者を選任したとき（前項の許可を受けて選任した場合を除く。）は、遅滞なく、その旨を主務大臣に届け出なければならない。
            これを解任したときも、同様とする。
        - paragraph_num: ４
          content: 主任技術者は、事業用電気工作物の工事、維持及び運用に関する保安の監督の職務を誠実に行わなければならない。
        - paragraph_num: ５
          content: 事業用電気工作物の工事、維持又は運用に従事する者は、主任技術者がその保安のためにする指示に従わなければならない。
      - caption: （主任技術者免状）
        title: 第四十四条
        article_num: '44'
        paragraphs:
        - content: 主任技術者免状の種類は、次のとおりとする。
          items:
          - title: 一
            content: 第一種電気主任技術者免状
          - title: 二
            content: 第二種電気主任技術者免状
          - title: 三
            content: 第三種電気主任技術者免状
          - title: 四
            content: 第一種ダム水路主任技術者免状
          - title: 五
            content: 第二種ダム水路主任技術者免状
          - title: 六
            content: 第一種ボイラー・タービン主任技術者免状
          - title: 七
            content: 第二種ボイラー・タービン主任技術者免状
        - paragraph_num: ２
          content: 主任技術者免状は、次の各号のいずれかに該当する者に対し、経済産業大臣が交付する。
          items:
          - title: 一
            content: 主任技術者免状の種類ごとに経済産業省令で定める学歴又は資格及び実務の経験を有する者
          - title: 二
            content: 前項第一号から第三号までに掲げる種類の主任技術者免状にあつては、電気主任技術者試験に合格した者
        - paragraph_num: ３
          content: 経済産業大臣は、次の各号のいずれかに該当する者に対しては、主任技術者免状の交付を行わないことができる。
          items:
          - title: 一
            content: 次項の規定により主任技術者免状の返納を命ぜられ、その日から一年を経過しない者
          - title: 二
            content: この法律又はこの法律に基づく命令の規定に違反し、罰金以上の刑に処せられ、その執行を終わり、又は執行を受けることがなくなつた日から二年を経過しない者
        - paragraph_num: ４
          content: 経済産業大臣は、主任技術者免状の交付を受けている者がこの法律又はこの法律に基づく命令の規定に違反したときは、その主任技術者免状の返納を命ずることができる。
        - paragraph_num: ５
          content: 主任技術者免状の交付を受けている者が保安について監督をすることができる事業用電気工作物の工事、維持及び運用の範囲並びに主任技術者免状の交付に関する手続的事項は、経済産業省令で定める。
      - caption: （免状交付事務の委託）
        title: 第四十四条の二
        article_num: '44_2'
        paragraphs:
        - content: 経済産業大臣は、政令で定めるところにより、主任技術者免状（前条第一項第一号から第三号までに掲げる種類のものに限る。）に関する事務（主任技術者免状の返納に係る事務その他政令で定める事務を除く。以下「免状交付事務」という。）の全部又は一部を次条第二項の指定試験機関に委託することができる。
        - paragraph_num: ２
          content: 前項の規定により免状交付事務の委託を受けた指定試験機関の役員若しくは職員又はこれらの職にあつた者は、当該委託に係る免状交付事務に関して知り得た秘密を漏らしてはならない。
      - caption: （電気主任技術者試験）
        title: 第四十五条
        article_num: '45'
        paragraphs:
        - content: 電気主任技術者試験は、主任技術者免状の種類ごとに、事業用電気工作物の工事、維持及び運用の保安に関して必要な知識及び技能について、経済産業大臣が行う。
        - paragraph_num: ２
          content: 経済産業大臣は、その指定する者（以下「指定試験機関」という。）に、電気主任技術者試験の実施に関する事務（以下「試験事務」という。）を行わせることができる。
        - paragraph_num: ３
          content: 電気主任技術者試験の試験科目、受験手続その他電気主任技術者試験の実施細目は、経済産業省令で定める。
      - caption: （小規模事業用電気工作物を設置する者の届出）
        title: 第四十六条
        article_num: '46'
        paragraphs:
        - content: 小規模事業用電気工作物を設置する者は、当該小規模事業用電気工作物の使用の開始前に、経済産業省令で定めるところにより、氏名又は名称及び住所その他経済産業省令で定める事項を記載した書類を添えて、その旨を経済産業大臣に届け出なければならない。
            ただし、経済産業省令で定める場合は、この限りでない。
        - paragraph_num: ２
          content: 前項の規定による届出をした者は、次の各号のいずれかに該当するときは、経済産業省令で定めるところにより、遅滞なく、その旨を経済産業大臣に届け出なければならない。
          items:
          - title: 一
            content: 前項の事項を変更したとき。
          - title: 二
            content: 前項の規定による届出に係る小規模事業用電気工作物が小規模事業用電気工作物でなくなつたとき。
          - title: 三
            content: その他経済産業省令で定める場合に該当するとき。
    - title: 第三款　環境影響評価に関する特例
      article_num: 3
      articles:
      - caption: （事業用電気工作物に係る環境影響評価）
        title: 第四十六条の二
        article_num: '46_2'
        paragraphs:
        - content: 事業用電気工作物の設置又は変更の工事であつて環境影響評価法（平成九年法律第八十一号）第二条第二項に規定する第一種事業又は同条第三項に規定する第二種事業に該当するものに係る同条第一項に規定する環境影響評価（以下「環境影響評価」という。）その他の手続については、同法及びこの款の定めるところによる。
      - caption: （簡易な方法による環境影響評価）
        title: 第四十六条の三
        article_num: '46_3'
        paragraphs:
        - content: 事業用電気工作物の設置又は変更の工事であつて環境影響評価法第二条第三項に規定する第二種事業に該当するものをしようとする者は、同法第四条第一項前段の書面には、同項前段に規定する事項のほか、その工事について経済産業省令で定める簡易な方法により環境影響評価を行つた結果を、経済産業省令で定めるところにより、記載しなければならない。
      - caption: （方法書の作成）
        title: 第四十六条の四
        article_num: '46_4'
        paragraphs:
        - content: 事業用電気工作物の設置又は変更の工事であつて環境影響評価法第二条第四項に規定する対象事業に該当するもの（以下「特定対象事業」という。）をしようとする者（以下「特定事業者」という。）は、同法第五条第一項の環境影響評価方法書（以下「方法書」という。）には、同項第七号の規定にかかわらず、特定対象事業に係る環境影響評価の項目並びに調査、予測及び評価の手法を記載しなければならない。
      - caption: （方法書の届出）
        title: 第四十六条の五
        article_num: '46_5'
        paragraphs:
        - content: 特定事業者は、環境影響評価法第六条第一項の規定による送付をするときは、併せて方法書及びこれを要約した書類を経済産業大臣に届け出なければならない。
      - caption: （方法書についての意見の概要等の届出等）
        title: 第四十六条の六
        article_num: '46_6'
        paragraphs:
        - content: 特定事業者は、環境影響評価法第九条の書類には、同条に規定する事項のほか、同法第八条第一項の意見についての事業者の見解を記載しなければならない。
        - paragraph_num: ２
          content: 特定事業者は、環境影響評価法第九条の規定による送付をするときは、併せて同条の書類を経済産業大臣に届け出なければならない。
      - caption: （方法書についての都道府県知事等の意見）
        title: 第四十六条の七
        article_num: '46_7'
        paragraphs:
        - content: 環境影響評価法第十条第一項の都道府県知事の意見並びに同条第四項の政令で定める市の長及び同条第五項の都道府県知事の意見であつて特定対象事業に係るものについては、これらの規定にかかわらず、事業者に替えて経済産業大臣に対し、これらの規定の意見として述べるものとする。
        - paragraph_num: ２
          content: 都道府県知事は、環境影響評価法第十条第一項の意見であつて特定対象事業に係るものについては、同条第三項の規定によるほか、前条第一項の規定により同法第九条の書類に記載された事業者の見解に配意しなければならない。
        - paragraph_num: ３
          content: 環境影響評価法第十条第四項の政令で定める市の長は、同項の意見であつて特定対象事業に係るものについては、同条第六項の規定によるほか、前条第一項の規定により同法第九条の書類に記載された事業者の見解に配意しなければならない。
      - caption: （方法書についての勧告）
        title: 第四十六条の八
        article_num: '46_8'
        paragraphs:
        - content: 経済産業大臣は、第四十六条の五の規定による方法書の届出があつた場合において、環境影響評価法第十条第一項の都道府県知事の意見又は同条第四項の政令で定める市の長の意見及び同条第五項の都道府県知事の意見がある場合にはその意見を勘案するとともに、第四十六条の六第二項の規定による届出に係る同法第八条第一項の意見の概要及び当該意見についての事業者の見解に配意して、その方法書を審査し、その方法書に係る特定対象事業につき、環境の保全についての適正な配慮がなされることを確保するため必要があると認めるときは、第四十六条の五の規定による届出を受理した日から経済産業省令で定める期間内に限り、特定事業者に対し、その特定対象事業に係る環境影響評価の項目並びに調査、予測及び評価の手法について必要な勧告をすることができる。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定による勧告をする必要がないと認めたときは、遅滞なく、その旨を特定事業者に通知しなければならない。
        - paragraph_num: ３
          content: 経済産業大臣は、第一項の規定による勧告又は前項の規定による通知を行うときは、併せて特定事業者に対し、環境影響評価法第十条第一項の書面又は同条第四項の書面及び同条第五項の書面がある場合にはその書面の写しを送付しなければならない。
      - caption: （環境影響評価の項目等の選定）
        title: 第四十六条の九
        article_num: '46_9'
        paragraphs:
        - content: 特定事業者は、前条第一項の規定による勧告があつたときは、環境影響評価法第十一条第一項の規定による検討において、同項の規定により同法第十条第一項、第四項又は第五項の意見を勘案するとともに同法第八条第一項の意見に配意するほか、その勧告を踏まえて、当該検討を加えなければならない。
      - caption: （準備書の作成）
        title: 第四十六条の十
        article_num: '46_10'
        paragraphs:
        - content: 特定事業者は、環境影響評価法第十四条第一項の環境影響評価準備書（以下「準備書」という。）には、同項各号に掲げる事項のほか、第四十六条の八第一項の規定による勧告の内容を記載しなければならない。
      - caption: （準備書の届出）
        title: 第四十六条の十一
        article_num: '46_11'
        paragraphs:
        - content: 特定事業者は、環境影響評価法第十五条の規定による送付をするときは、併せて準備書及びこれを要約した書類を経済産業大臣に届け出なければならない。
      - caption: （準備書についての意見の概要等の届出）
        title: 第四十六条の十二
        article_num: '46_12'
        paragraphs:
        - content: 特定事業者は、環境影響評価法第十九条の規定による送付をするときは、併せて同条の書類を経済産業大臣に届け出なければならない。
      - caption: （準備書についての関係都道府県知事等の意見）
        title: 第四十六条の十三
        article_num: '46_13'
        paragraphs:
        - content: 環境影響評価法第二十条第一項の関係都道府県知事の意見並びに同条第四項の政令で定める市の長及び同条第五項の関係都道府県知事の意見であつて特定対象事業に係るものについては、これらの規定にかかわらず、事業者に替えて経済産業大臣に対し、これらの規定の意見として述べるものとする。
      - caption: （準備書についての勧告）
        title: 第四十六条の十四
        article_num: '46_14'
        paragraphs:
        - content: 経済産業大臣は、第四十六条の十一の規定による準備書の届出があつた場合において、環境影響評価法第二十条第一項の関係都道府県知事の意見又は同条第四項の政令で定める市の長の意見及び同条第五項の関係都道府県知事の意見がある場合にはその意見を勘案するとともに、第四十六条の十二の規定による届出に係る同法第十八条第一項の意見の概要及び当該意見についての事業者の見解に配意して、その準備書を審査し、その準備書に係る特定対象事業につき、環境の保全についての適正な配慮がなされることを確保するため必要があると認めるときは、第四十六条の十一の規定による届出を受理した日から経済産業省令で定める期間内に限り、特定事業者に対し、その特定対象事業に係る環境影響評価について必要な勧告をすることができる。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定による審査をするときは、環境大臣の環境の保全の見地からの意見を聴かなければならない。
        - paragraph_num: ３
          content: 経済産業大臣は、第一項の規定による勧告をする必要がないと認めたときは、遅滞なく、その旨を特定事業者に通知しなければならない。
        - paragraph_num: ４
          content: 経済産業大臣は、第一項の規定による勧告又は前項の規定による通知を行うときは、併せて特定事業者に対し、環境影響評価法第二十条第一項の書面又は同条第四項の書面及び同条第五項の書面がある場合にはその書面の写しを送付しなければならない。
      - caption: （評価書の作成）
        title: 第四十六条の十五
        article_num: '46_15'
        paragraphs:
        - content: 特定事業者は、前条第一項の規定による勧告があつたときは、環境影響評価法第二十一条第一項の規定による検討において、同項の規定により同法第二十条第一項、第四項又は第五項の意見を勘案するとともに同法第十八条第一項の意見に配意するほか、その勧告を踏まえて、当該検討を加えなければならない。
        - paragraph_num: ２
          content: 特定事業者は、環境影響評価法第二十一条第二項の環境影響評価書（以下「評価書」という。）には、同項各号に掲げる事項のほか、第四十六条の八第一項及び前条第一項の規定による勧告の内容を記載しなければならない。
      - caption: （評価書の届出）
        title: 第四十六条の十六
        article_num: '46_16'
        paragraphs:
        - content: 特定事業者は、環境影響評価法第二十一条第二項の規定により評価書を作成したときは、その評価書を経済産業大臣に届け出なければならない。
            次条第一項の規定による命令があつた場合において、これを変更したときも、同様とする。
      - caption: （変更命令）
        title: 第四十六条の十七
        article_num: '46_17'
        paragraphs:
        - content: 経済産業大臣は、前条の規定による届出があつた評価書に係る特定対象事業につき、環境の保全についての適正な配慮がなされることを確保するため特に必要があり、かつ、適切であると認めるときは、同条の規定による届出を受理した日から経済産業省令で定める期間内に限り、特定事業者に対し、相当の期限を定め、その届出に係る評価書を変更すべきことを命ずることができる。
        - paragraph_num: ２
          content: 経済産業大臣は、前項の規定による命令をする必要がないと認めたときは、遅滞なく、その旨を特定事業者に通知しなければならない。
      - caption: （評価書の送付）
        title: 第四十六条の十八
        article_num: '46_18'
        paragraphs:
        - content: 経済産業大臣は、前条第二項の規定による通知をしたときは、その通知に係る評価書の写しを環境大臣に送付しなければならない。
        - paragraph_num: ２
          content: 特定事業者は、前条第二項の規定による通知を受けたときは、速やかに、環境影響評価法第十五条に規定する関係都道府県知事及び関係市町村長に対し、その通知に係る評価書、これを要約した書類及び前条第一項の規定による命令の内容を記載した書類を送付しなければならない。
      - caption: （評価書の公告及び縦覧）
        title: 第四十六条の十九
        article_num: '46_19'
        paragraphs:
        - content: 特定事業者に対する環境影響評価法第二十七条の適用については、同条中「第二十五条第三項の規定による送付又は通知をした」とあるのは「電気事業法第四十六条の十七第二項の規定による通知を受けた」と、「評価書を」とあるのは「当該通知に係る評価書を」と、「評価書等」とあるのは「当該通知に係る評価書、これを要約した書類及び同条第一項の規定による命令の内容を記載した書類」とする。
      - caption: （環境の保全の配慮）
        title: 第四十六条の二十
        article_num: '46_20'
        paragraphs:
        - content: 特定事業者は、環境影響評価法第三十八条第一項の規定により、環境の保全についての適正な配慮をしてその特定対象事業を実施するとともに、第四十六条の十七第二項の規定による通知に係る評価書に記載されているところにより、環境の保全についての適正な配慮をしてその特定対象事業に係る事業用電気工作物を維持し、及び運用しなければならない。
      - caption: （報告書の公表）
        title: 第四十六条の二十一
        article_num: '46_21'
        paragraphs:
        - content: 特定事業者に対する環境影響評価法第三十八条の三第一項の適用については、同項中「第二十二条第一項の規定により第二十一条第二項の評価書の送付を受けた者にこれを送付するとともに、これ」とあるのは、「これ」とする。
      - caption: （環境影響評価法の適用に当たつての技術的読替え等）
        title: 第四十六条の二十二
        article_num: '46_22'
        paragraphs:
        - content: この款に定めるもののほか、特定事業者に対する環境影響評価法の規定の適用に当たつての技術的読替えその他特定事業者に対する同法の規定の適用に関し必要な事項は、政令で定める。
      - caption: （環境影響評価法の適用除外）
        title: 第四十六条の二十三
        article_num: '46_23'
        paragraphs:
        - content: 特定事業者の特定対象事業については、環境影響評価法第二十二条から第二十六条まで、第三十三条から第三十七条まで、第三十八条の三第二項、第三十八条の四及び第三十八条の五の規定は、適用しない。
    - title: 第四款　工事計画及び検査
      article_num: 4
      articles:
      - caption: （工事計画）
        title: 第四十七条
        article_num: '47'
        paragraphs:
        - content: 事業用電気工作物の設置又は変更の工事であつて、公共の安全の確保上特に重要なものとして主務省令で定めるものをしようとする者は、その工事の計画について主務大臣の認可を受けなければならない。
            ただし、事業用電気工作物が滅失し、若しくは損壊した場合又は災害その他非常の場合において、やむを得ない一時的な工事としてするときは、この限りでない。
        - paragraph_num: ２
          content: 前項の認可を受けた者は、その認可を受けた工事の計画を変更しようとするときは、主務大臣の認可を受けなければならない。 ただし、その変更が主務省令で定める軽微なものであるときは、この限りでない。
        - paragraph_num: ３
          content: 主務大臣は、前二項の認可の申請に係る工事の計画が次の各号のいずれにも適合していると認めるときは、前二項の認可をしなければならない。
          items:
          - title: 一
            content: その事業用電気工作物が第三十九条第一項の主務省令で定める技術基準に適合しないものでないこと。
          - title: 二
            content: 事業用電気工作物が一般送配電事業又は配電事業の用に供される場合にあつては、その事業用電気工作物が電気の円滑な供給を確保するため技術上適切なものであること。
          - title: 三
            content: 特定対象事業に係るものにあつては、その特定対象事業に係る第四十六条の十七第二項の規定による通知に係る評価書に従つているものであること。
          - title: 四
            content: 環境影響評価法第二条第三項に規定する第二種事業（特定対象事業を除く。）に係るものにあつては、同法第四条第三項第二号（同条第四項及び同法第二十九条第二項において準用する場合を含む。）の措置がとられたものであること。
        - paragraph_num: ４
          content: 事業用電気工作物を設置する者は、第一項ただし書の場合は、工事の開始の後、遅滞なく、その旨を主務大臣に届け出なければならない。
        - paragraph_num: ５
          content: 第一項の認可を受けた者は、第二項ただし書の場合は、その工事の計画を変更した後、遅滞なく、その変更した工事の計画を主務大臣に届け出なければならない。
            ただし、主務省令で定める場合は、この限りでない。
      - title: 第四十八条
        article_num: '48'
        paragraphs:
        - content: 事業用電気工作物の設置又は変更の工事（前条第一項の主務省令で定めるものを除く。）であつて、主務省令で定めるものをしようとする者は、その工事の計画を主務大臣に届け出なければならない。
            その工事の計画の変更（主務省令で定める軽微なものを除く。）をしようとするときも、同様とする。
        - paragraph_num: ２
          content: 前項の規定による届出をした者は、その届出が受理された日から三十日を経過した後でなければ、その届出に係る工事を開始してはならない。
        - paragraph_num: ３
          content: 主務大臣は、第一項の規定による届出のあつた工事の計画が次の各号のいずれにも適合していると認めるときは、前項に規定する期間を短縮することができる。
          items:
          - title: 一
            content: 前条第三項各号に掲げる要件
          - title: 二
            content: 水力を原動力とする発電用の事業用電気工作物に係るものにあつては、その事業用電気工作物が発電水力の有効な利用を確保するため技術上適切なものであること。
        - paragraph_num: ４
          content: 主務大臣は、第一項の規定による届出のあつた工事の計画が前項各号のいずれかに適合していないと認めるときは、その届出をした者に対し、その届出を受理した日から三十日（次項の規定により第二項に規定する期間が延長された場合にあつては、当該延長後の期間）以内に限り、その工事の計画を変更し、又は廃止すべきことを命ずることができる。
        - paragraph_num: ５
          content: 主務大臣は、第一項の規定による届出のあつた工事の計画が第三項各号に適合するかどうかについて審査するため相当の期間を要し、当該審査が第二項に規定する期間内に終了しないと認める相当の理由があるときは、当該期間を相当と認める期間に延長することができる。
            この場合において、主務大臣は、当該届出をした者に対し、遅滞なく、当該延長後の期間及び当該延長の理由を通知しなければならない。
      - caption: （技術基準の適合性確認）
        title: 第四十八条の二
        article_num: '48_2'
        paragraphs:
        - content: 事業用電気工作物であつて荷重及び外力に対して安全な構造が特に必要なものとして経済産業省令で定めるもの（以下「特殊電気工作物」という。）について、前条第一項の規定による届出をする者は、当該特殊電気工作物が第三十九条第一項の主務省令で定める技術基準に適合するものであることについて、経済産業大臣の登録を受けた者の確認（以下「適合性確認」という。）を受けなければならない。
        - paragraph_num: ２
          content: 前項の登録を受けた者は、特殊電気工作物について適合性確認を行い、当該特殊電気工作物が第三十九条第一項の主務省令で定める技術基準に適合しているときは、その旨を記載した証明書を交付することができる。
      - caption: （使用前検査）
        title: 第四十九条
        article_num: '49'
        paragraphs:
        - content: 第四十七条第一項若しくは第二項の認可を受けて設置若しくは変更の工事をする事業用電気工作物又は第四十八条第一項の規定による届出をして設置若しくは変更の工事をする事業用電気工作物（その工事の計画について、同条第四項の規定による命令があつた場合において同条第一項の規定による届出をしていないものを除く。）であつて、公共の安全の確保上特に重要なものとして主務省令で定めるもの（第百十二条の三第三項において「特定事業用電気工作物」という。）は、その工事について主務省令で定めるところにより主務大臣の検査を受け、これに合格した後でなければ、これを使用してはならない。
            ただし、主務省令で定める場合は、この限りでない。
        - paragraph_num: ２
          content: 前項の検査においては、その事業用電気工作物が次の各号のいずれにも適合しているときは、合格とする。
          items:
          - title: 一
            content: その工事が第四十七条第一項若しくは第二項の認可を受けた工事の計画（同項ただし書の主務省令で定める軽微な変更をしたものを含む。）又は第四十八条第一項の規定による届出をした工事の計画（同項後段の主務省令で定める軽微な変更をしたものを含む。）に従つて行われたものであること。
          - title: 二
            content: 第三十九条第一項の主務省令で定める技術基準に適合しないものでないこと。
      - title: 第五十条
        article_num: '50'
        paragraphs:
        - content: 主務大臣は、前条第一項に規定する事業用電気工作物について同項の検査を行つた場合においてやむを得ない必要があると認めるときは、期間及び使用の方法を定めて、その事業用電気工作物を仮合格とすることができる。
        - paragraph_num: ２
          content: 前項の規定により仮合格とされた事業用電気工作物は、前条第一項の規定にかかわらず、前項の規定により定められた期間内は、同項の規定により定められた方法により使用することを妨げない。
      - caption: （使用前安全管理検査）
        title: 第五十一条
        article_num: '51'
        paragraphs:
        - content: 第四十八条第一項の規定による届出をして設置又は変更の工事をする事業用電気工作物（その工事の計画について同条第四項の規定による命令があつた場合において同条第一項の規定による届出をしていないもの及び第四十九条第一項の主務省令で定めるものを除く。）であつて、主務省令で定めるものを設置する者は、主務省令で定めるところにより、その使用の開始前に、当該事業用電気工作物について自主検査を行い、その結果を記録し、これを保存しなければならない。
        - paragraph_num: ２
          content: 前項の自主検査（以下「使用前自主検査」という。）においては、その事業用電気工作物が次の各号のいずれにも適合していることを確認しなければならない。
          items:
          - title: 一
            content: その工事が第四十八条第一項の規定による届出をした工事の計画（同項後段の主務省令で定める軽微な変更をしたものを含む。）に従つて行われたものであること。
          - title: 二
            content: 第三十九条第一項の主務省令で定める技術基準に適合するものであること。
        - paragraph_num: ３
          content: 使用前自主検査を行う事業用電気工作物を設置する者は、使用前自主検査の実施に係る体制について、主務省令で定める時期（第七項の通知を受けている場合にあつては、当該通知に係る使用前自主検査の過去の評定の結果に応じ、主務省令で定める時期）に、事業用電気工作物（原子力を原動力とする発電用のものを除く。）であつて経済産業省令で定めるものを設置する者にあつては経済産業大臣の登録を受けた者が、その他の者にあつては主務大臣が行う審査を受けなければならない。
        - paragraph_num: ４
          content: 前項の審査は、事業用電気工作物の安全管理を旨として、使用前自主検査の実施に係る組織、検査の方法、工程管理その他主務省令で定める事項について行う。
        - paragraph_num: ５
          content: 第三項の経済産業大臣の登録を受けた者は、同項の審査を行つたときは、遅滞なく、当該審査の結果を経済産業省令で定めるところにより経済産業大臣に通知しなければならない。
        - paragraph_num: ６
          content: 主務大臣は、第三項の審査の結果（前項の規定により通知を受けた審査の結果を含む。）に基づき、当該事業用電気工作物を設置する者の使用前自主検査の実施に係る体制について、総合的な評定をするものとする。
        - paragraph_num: ７
          content: 主務大臣は、第三項の審査及び前項の評定の結果を、当該審査を受けた者に通知しなければならない。
      - caption: （設置者による事業用電気工作物の自己確認）
        title: 第五十一条の二
        article_num: '51_2'
        paragraphs:
        - content: 事業用電気工作物であつて公共の安全の確保上重要なものとして主務省令で定めるものを設置する者は、その使用を開始しようとするときは、当該事業用電気工作物が、第三十九条第一項の主務省令で定める技術基準に適合することについて、主務省令で定めるところにより、自ら確認しなければならない。
            ただし、第四十七条第一項の認可（設置の工事に係るものに限る。）又は同条第四項若しくは第四十八条第一項の規定による届出（設置の工事に係るものに限る。）に係る事業用電気工作物を使用するとき、及び主務省令で定めるときは、この限りでない。
        - paragraph_num: ２
          content: 前項の規定は、同項に規定する事業用電気工作物を設置する者が当該事業用電気工作物について主務省令で定める変更をした場合であつて、当該変更をした事業用電気工作物の使用を開始しようとするときに準用する。
            この場合において、同項中「事業用電気工作物が」とあるのは「変更をした事業用電気工作物が」と、「設置の工事」とあるのは「変更の工事」と読み替えるものとする。
        - paragraph_num: ３
          content: 第一項に規定する事業用電気工作物を設置する者は、同項（前項において準用する場合を含む。）の規定による確認をした場合には、当該事業用電気工作物の使用の開始前に、主務省令で定めるところにより、当該確認の結果（当該事業用電気工作物が小規模事業用電気工作物である場合であつて、その設置者が当該確認を委託して行つた場合にあつては、その委託先の氏名又は名称及び住所その他経済産業省令で定める事項を含む。）を主務大臣に届け出なければならない。
      - caption: （溶接自主検査）
        title: 第五十二条
        article_num: '52'
        paragraphs:
        - content: 発電用のボイラー、タービンその他の主務省令で定める機械若しくは器具である電気工作物（以下「ボイラー等」という。）であつて、主務省令で定める圧力以上の圧力を加えられる部分（以下「耐圧部分」という。）について溶接をするもの又は耐圧部分について溶接をしたボイラー等であつて輸入したものを設置する者は、その溶接について主務省令で定めるところにより、その使用の開始前に、当該電気工作物について自主検査を行い、その結果を記録し、これを保存しなければならない。
            ただし、主務省令で定める場合は、この限りでない。
        - paragraph_num: ２
          content: 前項の自主検査においては、その溶接が第三十九条第一項の主務省令で定める技術基準に適合していることを確認しなければならない。
      - caption: （自家用電気工作物の使用の開始）
        title: 第五十三条
        article_num: '53'
        paragraphs:
        - content: 自家用電気工作物を設置する者は、その自家用電気工作物の使用の開始の後、遅滞なく、その旨を主務大臣に届け出なければならない。 ただし、第四十七条第一項の認可又は第四十六条第一項、第四十七条第四項、第四十八条第一項若しくは第五十一条の二第三項の規定による届出に係る自家用電気工作物を使用する場合及び主務省令で定める場合は、この限りでない。
      - caption: （定期検査）
        title: 第五十四条
        article_num: '54'
        paragraphs:
        - content: 特定重要電気工作物（発電用のボイラー、タービンその他の電気工作物のうち、公共の安全の確保上特に重要なものとして主務省令で定めるものであつて、主務省令で定める圧力以上の圧力を加えられる部分があるもの並びに発電用原子炉（原子炉等規制法第二条第五項に規定する発電用原子炉をいう。次条第一項第三号において同じ。）及びその附属設備であつて主務省令で定めるものをいう。）については、これらを設置する者は、主務省令で定めるところにより、主務省令で定める時期ごとに、主務大臣が行う検査を受けなければならない。
            ただし、主務省令で定める場合は、この限りでない。
      - caption: （定期安全管理検査）
        title: 第五十五条
        article_num: '55'
        paragraphs:
        - content: 次に掲げる電気工作物（以下この条において「特定電気工作物」という。）を設置する者は、主務省令で定めるところにより、定期に、当該特定電気工作物について自主検査を行い、その結果を記録し、これを保存しなければならない。
          items:
          - title: 一
            content: 発電用のボイラー、タービンその他の主務省令で定める電気工作物であつて前条で定める圧力以上の圧力を加えられる部分があるもの
          - title: 二
            content: 電気工作物のうち、屋外に設置される機械、器具その他の設備であつて主務省令で定めるもの（前号に掲げるものを除く。）
          - title: 三
            content: 発電用原子炉及びその附属設備であつて主務省令で定めるもの（前二号に掲げるものを除く。）
        - paragraph_num: ２
          content: 前項の自主検査（以下「定期自主検査」という。）においては、その特定電気工作物が第三十九条第一項の主務省令で定める技術基準に適合していることを確認しなければならない。
        - paragraph_num: ３
          content: 定期自主検査を行う特定電気工作物を設置する者は、当該定期自主検査の際、原子力を原動力とする発電用の特定電気工作物であつて主務省令で定めるものに関し、一定の期間が経過した後に第三十九条第一項の主務省令で定める技術基準に適合しなくなるおそれがある部分があると認めるときは、当該部分が同項の主務省令で定める技術基準に適合しなくなると見込まれる時期その他の主務省令で定める事項について、主務省令で定めるところにより、評価を行い、その結果を記録し、これを保存するとともに、主務省令で定める事項については、これを主務大臣に報告しなければならない。
        - paragraph_num: ４
          content: 定期自主検査を行う特定電気工作物を設置する者は、定期自主検査の実施に係る体制について、主務省令で定める時期（第六項において準用する第五十一条第七項の通知を受けている場合にあつては、当該通知に係る定期自主検査の過去の評定の結果に応じ、主務省令で定める時期）に、特定電気工作物（原子力を原動力とする発電用のものを除く。）であつて経済産業省令で定めるものを設置する者にあつては経済産業大臣の登録を受けた者が、その他の者にあつては経済産業大臣が行う審査を受けなければならない。
        - paragraph_num: ５
          content: 前項の審査は、特定電気工作物の安全管理を旨として、定期自主検査の実施に係る組織、検査の方法、工程管理その他主務省令で定める事項について行う。
        - paragraph_num: ６
          content: 第五十一条第五項から第七項までの規定は、第四項の審査に準用する。 この場合において、同条第五項中「第三項」とあるのは「第四項」と、同条第六項中「当該事業用電気工作物」とあるのは「当該特定電気工作物」と、「使用前自主検査」とあるのは「定期自主検査」と読み替えるものとする。
    - title: 第五款　承継
      article_num: 5
      articles:
      - caption: （事業用電気工作物を設置する者の地位の承継）
        title: 第五十五条の二
        article_num: '55_2'
        paragraphs:
        - content: 事業用電気工作物を設置する者について相続、合併又は分割（当該事業用電気工作物を承継させるものに限る。）があつたときは、相続人、合併後存続する法人若しくは合併により設立した法人又は分割により当該事業用電気工作物を承継した法人は、その事業用電気工作物を設置する者のこの法律の規定による地位を承継する。
        - paragraph_num: ２
          content: 前項の規定により事業用電気工作物を設置する者の地位を承継した者は、遅滞なく、その事実を証する書面を添えて、その旨を主務大臣に届け出なければならない。
    - title: 第六款　認定高度保安実施設置者
      article_num: 6
      articles:
      - caption: （認定）
        title: 第五十五条の三
        article_num: '55_3'
        paragraphs:
        - content: 事業用電気工作物（原子力を原動力とする発電用のものを除き、経済産業省令で定めるものに限る。以下この款において同じ。）を設置する者は、経済産業省令で定めるところにより、保安を一体的に確保することが必要な事業用電気工作物の組織ごとに、高度な保安を確保することができると認められる旨の経済産業大臣の認定（以下この款において単に「認定」という。）を受けることができる。
      - caption: （認定の基準）
        title: 第五十五条の四
        article_num: '55_4'
        paragraphs:
        - content: 経済産業大臣は、認定の申請が次の各号のいずれにも該当すると認めるときでなければ、その認定をしてはならない。
          items:
          - title: 一
            content: 保安の確保のための組織がその業務遂行能力を持続的に向上させる仕組みを有することその他の経済産業省令で定める基準に適合するものであること。
          - title: 二
            content: 保安の確保の方法が高度な情報通信技術を用いたものであることその他の経済産業省令で定める基準に適合するものであること。
      - caption: （欠格条項）
        title: 第五十五条の五
        article_num: '55_5'
        paragraphs:
        - content: 次の各号のいずれかに該当する者は、認定を受けることができない。
          items:
          - title: 一
            content: 認定の申請に係る組織において事業用電気工作物の使用を開始した日から二年を経過しない者
          - title: 二
            content: 認定の申請に係る組織の使用する事業用電気工作物に関して、その責めに帰すべき事由により、電気その他による災害を発生させた日から二年を経過しない者
          - title: 三
            content: この法律又はこの法律に基づく命令の規定に違反し、罰金以上の刑に処せられ、その執行を終わり、又は執行を受けることがなくなつた日から二年を経過しない者
          - title: 四
            content: 第五十五条の九の規定により認定を取り消され、その取消しの日から二年を経過しない者
          - title: 五
            content: 法人であつて、その業務を行う役員のうちに前二号のいずれかに該当する者があるもの
        - paragraph_num: ２
          content: 第五十五条の二第一項の規定による事業用電気工作物を設置する者の地位の承継があつた場合において、当該事業用電気工作物を設置する者が事業用電気工作物の使用を開始した日から二年を経過したときは、前項第一号の規定は、適用しない。
            ただし、当該承継が分割による承継であつて、認定に係る事業の全部を承継するものでない場合は、この限りでない。
      - caption: （認定の更新）
        title: 第五十五条の六
        article_num: '55_6'
        paragraphs:
        - content: 認定は、五年以上十年以内において政令で定める期間ごとにその更新を受けなければ、その期間の経過によつて、その効力を失う。
        - paragraph_num: ２
          content: 第五十五条の三及び第五十五条の四の規定は、前項の認定の更新に準用する。
      - caption: （変更の届出）
        title: 第五十五条の七
        article_num: '55_7'
        paragraphs:
        - content: 認定を受けた者（以下「認定高度保安実施設置者」という。）は、保安の確保のための組織又は保安の確保の方法に変更があつたときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
      - caption: （承継）
        title: 第五十五条の八
        article_num: '55_8'
        paragraphs:
        - content: 第五十五条の二第一項の規定により事業用電気工作物を設置する者（認定高度保安実施設置者に限る。）の地位を承継した者は、認定高度保安実施設置者でないとき、又は認定高度保安実施設置者である場合において次の各号のいずれかに該当するときは、同項の規定にかかわらず、認定高度保安実施設置者の地位を承継しない。
          items:
          - title: 一
            content: その行う承継が分割による承継であつて、認定に係る事業の全部を承継するものでないとき。
          - title: 二
            content: その認定に係る組織の使用する事業用電気工作物に関して、その責めに帰すべき事由により、電気その他による災害を発生させた日から二年を経過しないとき。
          - title: 三
            content: 第五十五条の五第一項第三号から第五号までのいずれかに該当するとき。
      - caption: （認定の取消し）
        title: 第五十五条の九
        article_num: '55_9'
        paragraphs:
        - content: 経済産業大臣は、認定高度保安実施設置者が次の各号のいずれかに該当するときは、認定を取り消すことができる。
          items:
          - title: 一
            content: 認定に係る組織の使用する事業用電気工作物に関して、その責めに帰すべき事由により、電気その他による災害を発生させたとき。
          - title: 二
            content: 認定に係る組織の使用する事業用電気工作物に関して、その責めに帰すべき事由により、電気その他による災害の発生のおそれのある事故を発生させたとき。
          - title: 三
            content: 第四十条の規定により電気工作物の使用の一時停止の命令又は使用の制限の処分を受けたとき。
          - title: 四
            content: 第五十五条の四各号のいずれかに該当していないと認められるとき。
          - title: 五
            content: 第五十五条の五第一項第三号又は第五号に該当するに至つたとき。
          - title: 六
            content: 不正の手段により認定又はその更新を受けたとき。
      - caption: （保安規程に係る特例）
        title: 第五十五条の十
        article_num: '55_10'
        paragraphs:
        - content: 認定高度保安実施設置者は、保安規程を定め、又は変更したときは、第四十二条第一項及び第二項の規定にかかわらず、これらの規定による届出を要しない。
            この場合においては、経済産業省令で定めるところにより、当該保安規程を保存し、経済産業大臣から提出を求められたときは、速やかにこれを提出しなければならない。
      - caption: （主任技術者に係る特例）
        title: 第五十五条の十一
        article_num: '55_11'
        paragraphs:
        - content: 認定高度保安実施設置者は、第四十三条第一項の規定による主任技術者の選任又はその解任については、同条第三項の規定にかかわらず、同項の規定による届出を要しない。
            この場合においては、経済産業省令で定めるところにより、当該選任又は解任に係る記録を作成し、これを保存しなければならない。
      - caption: （使用前安全管理検査の特例）
        title: 第五十五条の十二
        article_num: '55_12'
        paragraphs:
        - content: 第五十一条第三項から第七項までの規定は、認定高度保安実施設置者については、適用しない。
      - caption: （定期安全管理検査の特例）
        title: 第五十五条の十三
        article_num: '55_13'
        paragraphs:
        - content: 認定高度保安実施設置者であつて、第五十五条第一項第一号又は第二号に掲げる電気工作物を設置するものは、同項の自主検査については、同項の規定にかかわらず、これを定期に行うことを要しない。
            この場合においては、経済産業省令で定めるところにより、これを行わなければならない。
        - paragraph_num: ２
          content: 第五十五条第四項から第六項までの規定は、認定高度保安実施設置者については、適用しない。
  - title: 第三節　一般用電気工作物
    section_num: 3
    articles:
    - caption: （技術基準適合命令）
      title: 第五十六条
      article_num: '56'
      paragraphs:
      - content: 経済産業大臣は、一般用電気工作物が経済産業省令で定める技術基準に適合していないと認めるときは、その所有者又は占有者に対し、その技術基準に適合するように一般用電気工作物を修理し、改造し、若しくは移転し、若しくはその使用を一時停止すべきことを命じ、又はその使用を制限することができる。
      - paragraph_num: ２
        content: 第三十九条第二項（第三号及び第四号を除く。）の規定は、前項の経済産業省令に準用する。
    - caption: （調査の義務）
      title: 第五十七条
      article_num: '57'
      paragraphs:
      - content: 一般用電気工作物と直接に電気的に接続する電線路を維持し、及び運用する者（以下この条、次条及び第八十九条において「電線路維持運用者」という。）は、経済産業省令で定める場合を除き、経済産業省令で定めるところにより、その一般用電気工作物が前条第一項の経済産業省令で定める技術基準に適合しているかどうかを調査しなければならない。
          ただし、その一般用電気工作物の設置の場所に立ち入ることにつき、その所有者又は占有者の承諾を得ることができないときは、この限りでない。
      - paragraph_num: ２
        content: 電線路維持運用者は、前項の規定による調査の結果、一般用電気工作物が前条第一項の経済産業省令で定める技術基準に適合していないと認めるときは、遅滞なく、その技術基準に適合するようにするためとるべき措置及びその措置をとらなかつた場合に生ずべき結果をその所有者又は占有者に通知しなければならない。
      - paragraph_num: ３
        content: 経済産業大臣は、電線路維持運用者が第一項の規定による調査若しくは前項の規定による通知をせず、又はその調査若しくは通知の方法が適当でないときは、その電線路維持運用者に対し、その調査若しくは通知を行い、又はその調査若しくは通知の方法を改善すべきことを命ずることができる。
      - paragraph_num: ４
        content: 電線路維持運用者は、帳簿を備え、第一項の規定による調査及び第二項の規定による通知に関する業務に関し経済産業省令で定める事項を記載しなければならない。
      - paragraph_num: ５
        content: 前項の帳簿は、経済産業省令で定めるところにより、保存しなければならない。
    - caption: （調査業務の委託）
      title: 第五十七条の二
      article_num: '57_2'
      paragraphs:
      - content: 電線路維持運用者は、経済産業大臣の登録を受けた者（以下「登録調査機関」という。）に、その電線路維持運用者が維持し、及び運用する電線路と直接に電気的に接続する一般用電気工作物について、その一般用電気工作物が第五十六条第一項の経済産業省令で定める技術基準に適合しているかどうかを調査すること並びにその調査の結果その一般用電気工作物がその技術基準に適合していないときは、その技術基準に適合するようにするためとるべき措置及びその措置をとらなかつた場合に生ずべき結果をその所有者又は占有者に通知すること（以下「調査業務」という。）を委託することができる。
      - paragraph_num: ２
        content: 電線路維持運用者は、前項の規定により登録調査機関に調査業務を委託したときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
          委託に係る契約が効力を失つたときも、同様とする。
      - paragraph_num: ３
        content: 前条第一項の規定は、電線路維持運用者が第一項の規定により登録調査機関に調査業務を委託しているときは、その委託に係る一般用電気工作物については、適用しない。
- title: 第四章　土地等の使用
  chapter_num: 4
  articles:
  - caption: （一時使用）
    title: 第五十八条
    article_num: '58'
    paragraphs:
    - content: 電気事業者（小売電気事業者及び特定卸供給事業者を除く。以下この章において同じ。）は、次に掲げる目的のため他人の土地又はこれに定着する建物その他の工作物（以下「土地等」という。）を利用することが必要であり、かつ、やむを得ないときは、その土地等の利用を著しく妨げない限度において、これを一時使用することができる。
        ただし、建物その他の工作物にあつては、電線路（その電線路の維持及び運用に必要な通信の用に供する線路を含む。）又はその附属設備（以下この章において「電線路」と総称する。）を支持するために利用する場合に限る。
      items:
      - title: 一
        content: 電気事業（小売電気事業及び特定卸供給事業を除く。以下この章において同じ。）の用に供する電線路に関する工事の施行のため必要な資材若しくは車両の置場、土石の捨場、作業場、架線のためのやぐら又は索道の設置
      - title: 二
        content: 天災、事変その他の非常事態が発生した場合において、緊急に電気を供給するための電線路の設置
      - title: 三
        content: 電気事業の用に供する電気工作物の設置のための測標の設置
    - paragraph_num: ２
      content: 電気事業者は、前項の規定により他人の土地等を一時使用しようとするときは、経済産業大臣の許可を受けなければならない。 ただし、天災、事変その他の非常事態が発生した場合において、十五日以内の期間一時使用するときは、この限りでない。
    - paragraph_num: ３
      content: 経済産業大臣は、前項の許可の申請があつたときは、その旨を土地等の所有者及び占有者に通知し、意見書を提出する機会を与えなければならない。
    - paragraph_num: ４
      content: 電気事業者は、第一項の規定により他人の土地等を一時使用しようとするときは、あらかじめ、土地等の占有者に通知しなければならない。 ただし、あらかじめ通知することが困難なときは、使用の開始の後、遅滞なく、通知することをもつて足りる。
    - paragraph_num: ５
      content: 第一項の規定により一時使用しようとする土地等が居住の用に供されているときは、その居住者の承諾を得なければならない。
    - paragraph_num: ６
      content: 第一項の規定による一時使用の期間は、六月（同項第二号の場合において、仮電線路を設置したとき、又は同項第三号の規定により一時使用するときは、一年）をこえることができない。
    - paragraph_num: ７
      content: 第一項の規定による一時使用のため他人の土地等に立ち入る者は、第二項の許可を受けたことを証する書面を携帯し、関係人の請求があつたときは、これを提示しなければならない。
        ただし、同項ただし書の場合は、この限りでない。
  - caption: （立入り）
    title: 第五十九条
    article_num: '59'
    paragraphs:
    - content: 電気事業者は、電気事業の用に供する電気工作物に関する測量又は実地調査のため必要があるときは、経済産業大臣の許可を受けて、他人の土地に立ち入ることができる。
    - paragraph_num: ２
      content: 前条第三項の規定は、前項の許可の申請があつた場合に準用する。
    - paragraph_num: ３
      content: 前条第四項、第五項及び第七項本文の規定は、電気事業者が第一項の規定により他人の土地に立ち入る場合に準用する。
  - caption: （通行）
    title: 第六十条
    article_num: '60'
    paragraphs:
    - content: 電気事業者は、電気事業の用に供する電線路に関する工事又は電線路の維持のため必要があるときは、他人の土地を通行することができる。
    - paragraph_num: ２
      content: 前項の規定により他人の土地を通行する者は、その身分を示す証明書を携帯し、関係人の請求があつたときは、これを提示しなければならない。
    - paragraph_num: ３
      content: 第五十八条第四項及び第五項の規定は、電気事業者が第一項の規定により他人の土地を通行する場合に準用する。
  - caption: （植物の伐採又は移植）
    title: 第六十一条
    article_num: '61'
    paragraphs:
    - content: 電気事業者は、植物が電気事業の用に供する電線路に障害を及ぼし、若しくは及ぼすおそれがある場合又は植物が電気事業の用に供する電気工作物に関する測量若しくは実地調査若しくは電気事業の用に供する電線路に関する工事に支障を及ぼす場合において、やむを得ないときは、経済産業大臣の許可を受けて、その植物を伐採し、又は移植することができる。
    - paragraph_num: ２
      content: 電気事業者は、前項の規定により植物を伐採し、又は移植しようとするときは、あらかじめ、植物の所有者に通知しなければならない。 ただし、あらかじめ通知することが困難なときは、伐採又は移植の後、遅滞なく、通知することをもつて足りる。
    - paragraph_num: ３
      content: 電気事業者は、植物が電気事業の用に供する電線路に障害を及ぼしている場合において、その障害を放置するときは、電線路を著しく損壊して電気の供給に重大な支障を生じ、又は火災その他の災害を発生して公共の安全を阻害するおそれがあると認められるときは、第一項の規定にかかわらず、経済産業大臣の許可を受けないで、その植物を伐採し、又は移植することができる。
        この場合においては、伐採又は移植の後、遅滞なく、その旨を経済産業大臣に届け出るとともに、植物の所有者に通知しなければならない。
    - paragraph_num: ４
      content: 第五十八条第三項の規定は、第一項の許可の申請があつた場合に準用する。
  - caption: （損失補償）
    title: 第六十二条
    article_num: '62'
    paragraphs:
    - content: 電気事業者は、第五十八条第一項の規定により他人の土地等を一時使用し、第五十九条第一項の規定により他人の土地に立ち入り、第六十条第一項の規定により他人の土地を通行し、又は前条第一項若しくは第三項の規定により植物を伐採し、若しくは移植したことによつて損失を生じたときは、損失を受けた者に対し、通常生ずる損失を補償しなければならない。
  - title: 第六十三条
    article_num: '63'
    paragraphs:
    - content: 前条の規定による損失の補償について、電気事業者と損失を受けた者との間に協議をすることができず、又は協議が調わないときは、電気事業者又は損失を受けた者は、当該土地等若しくは土地又は障害となつた植物の所在地を管轄する都道府県知事の裁定を申請することができる。
    - paragraph_num: ２
      content: 第二十五条第三項から第五項まで及び第三十三条の規定は、前項の裁定に準用する。 この場合において、第二十五条第三項及び第四項中「経済産業大臣」とあるのは、「都道府県知事」と読み替えるものとする。
    - paragraph_num: ３
      content: 損失の補償をすべき旨を定める裁定においては、補償金の額並びにその支払の時期及び方法を定めなければならない。
  - caption: （原状回復の義務）
    title: 第六十四条
    article_num: '64'
    paragraphs:
    - content: 電気事業者は、第五十八条第一項の規定による土地等の一時使用が終わつたときは、その土地等を原状に回復し、又は原状に回復しないことによつて通常生ずる損失を補償して、その土地等を返還しなければならない。
  - caption: （公共用の土地の使用）
    title: 第六十五条
    article_num: '65'
    paragraphs:
    - content: 電気事業者は、道路、橋、溝、河川、堤防その他公共の用に供せられる土地に電気事業の用に供する電線路を設置する必要があるときは、その効用を妨げない限度において、その管理者の許可を受けて、これを使用することができる。
    - paragraph_num: ２
      content: 前項の場合においては、電気事業者は、管理者の定めるところにより、使用料を納めなければならない。
    - paragraph_num: ３
      content: 管理者が正当な理由がないのに第一項の許可を拒んだとき、又は管理者の定めた使用料の額が適正でないときは、主務大臣は、電気事業者の申請により、使用を許可し、又は使用料の額を定めることができる。
    - paragraph_num: ４
      content: 前三項の規定は、道路法（昭和二十七年法律第百八十号）の規定による道路並びに同法第十八条第一項の規定により決定された道路の区域内の土地及び当該土地に設置された道路の附属物となるべきものについては、適用しない。
    - paragraph_num: ５
      content: 主務大臣は、次に掲げる場合は、あらかじめ、経済産業大臣に協議しなければならない。
      items:
      - title: 一
        content: 第三項の規定により使用を許可し、又は使用料の額を定めようとするとき。
      - title: 二
        content: 電気事業者が電気事業の用に供する電線路を設置するため前項の道路又は道路となるべき区域内の土地若しくは当該土地に設置された道路の附属物となるべきものを占用しようとする場合において、道路法第三十九条第一項（同法第九十一条第二項において準用する場合を含む。）の規定により道路管理者が徴収する占用料の額の決定又は同法第八十七条第一項（同法第九十一条第二項において準用する場合を含む。）の規定により許可若しくは承認に条件を付したことについての審査請求に対して裁決をしようとするとき。
  - caption: （準用）
    title: 第六十六条
    article_num: '66'
    paragraphs:
    - content: 第六十一条第三項、第六十二条及び第六十三条の規定は、小売電気事業者、特定卸供給事業者及び自家用電気工作物を設置する者に準用する。 この場合において、第六十一条第三項中「電線路を著しく損壊して電気の供給に重大な支障を生じ、又は火災その他の災害を発生して公共の安全を阻害する」とあるのは、「火災その他の災害を発生して公共の安全を阻害する」と読み替えるものとする。
- title: 第五章　電力・ガス取引監視等委員会
  chapter_num: 5
  articles:
  - caption: （設置）
    title: 第六十六条の二
    article_num: '66_2'
    paragraphs:
    - content: 経済産業省に、電力・ガス取引監視等委員会（以下「委員会」という。）を置く。
  - caption: （権限）
    title: 第六十六条の三
    article_num: '66_3'
    paragraphs:
    - content: 委員会は、この法律、ガス事業法（昭和二十九年法律第五十一号）、熱供給事業法（昭和四十七年法律第八十八号）及び再生可能エネルギー電気特措法の規定によりその権限に属させられた事項を処理する。
  - caption: （職権の行使）
    title: 第六十六条の四
    article_num: '66_4'
    paragraphs:
    - content: 委員会の委員長及び委員は、独立してその職権を行う。
  - caption: （組織）
    title: 第六十六条の五
    article_num: '66_5'
    paragraphs:
    - content: 委員会は、委員長及び委員四人をもつて組織する。
    - paragraph_num: ２
      content: 委員長及び委員は、非常勤とする。
  - caption: （委員長）
    title: 第六十六条の六
    article_num: '66_6'
    paragraphs:
    - content: 委員長は、会務を総理し、委員会を代表する。
    - paragraph_num: ２
      content: 委員長に事故があるときは、あらかじめその指名する委員が、その職務を代理する。
  - caption: （委員長及び委員の任命）
    title: 第六十六条の七
    article_num: '66_7'
    paragraphs:
    - content: 委員長及び委員は、法律、経済、金融又は工学に関して専門的な知識と経験を有し、その職務に関し公正かつ中立な判断をすることができる者のうちから、経済産業大臣が任命する。
  - caption: （委員長及び委員の任期）
    title: 第六十六条の八
    article_num: '66_8'
    paragraphs:
    - content: 委員長及び委員の任期は、三年とする。 ただし、補欠の委員長又は委員の任期は、前任者の残任期間とする。
    - paragraph_num: ２
      content: 委員長及び委員は、再任されることができる。
    - paragraph_num: ３
      content: 委員長及び委員の任期が満了したときは、当該委員長及び委員は、後任者が任命されるまで引き続きその職務を行うものとする。
  - caption: （会議）
    title: 第六十六条の九
    article_num: '66_9'
    paragraphs:
    - content: 委員会は、委員長が招集する。
    - paragraph_num: ２
      content: 委員会は、委員長及び二人以上の委員の出席がなければ、会議を開き、議決をすることができない。
    - paragraph_num: ３
      content: 委員会の議事は、出席者の過半数でこれを決し、可否同数のときは、委員長の決するところによる。
    - paragraph_num: ４
      content: 委員長に事故がある場合の第二項の規定の適用については、第六十六条の六第二項に規定する委員は、委員長とみなす。
  - caption: （事務局）
    title: 第六十六条の十
    article_num: '66_10'
    paragraphs:
    - content: 委員会の事務を処理させるため、委員会に事務局を置く。
    - paragraph_num: ２
      content: 事務局に、事務局長及び所要の職員を置く。
    - paragraph_num: ３
      content: 事務局長は、委員長の命を受けて、局務を掌理する。
    - paragraph_num: ４
      content: 事務局の内部組織は、政令で定める。
  - caption: （委員会の意見の聴取）
    title: 第六十六条の十一
    article_num: '66_11'
    paragraphs:
    - content: 経済産業大臣は、次に掲げる場合には、あらかじめ、委員会の意見を聴かなければならない。
      items:
      - title: 一
        content: 第二条の二又は第二十七条の十五の登録をしようとするとき。
      - title: 二
        content: 第二条の九第一項又は第二十七条の二十一第一項の規定による登録の取消しをしようとするとき。
      - title: 三
        content: 第二条の十七第一項（第二十七条の三十二において準用する場合を含む。）、第二条の十七第二項（第二十七条の二十六第三項において準用する場合を含む。）、第二条の十七第三項（第二十七条の二十六第二項において準用する場合を含む。）、第九条第五項（第十三条第二項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第十七条の三第一項、第十八条第六項若しくは第十一項、第十九条第一項、第二十条第三項若しくは第二十一条第三項、第二十二条の三第三項、第二十三条第六項、第二十三条の二第二項若しくは第二十三条の三第二項（これらの規定を第二十七条の十二の十三において準用する場合を含む。）、第二十七条第一項（第二十七条の十二、第二十七条の十二の十三、第二十七条の二十六第一項及び第二十七条の二十九において準用する場合を含む。）、第二十七条第二項、第二十七条の三（第二十七条の十二、第二十七条の十二の十三及び第二十七条の二十九において準用する場合を含む。）、第二十七条の十一第三項若しくは第四項、第二十七条の十一の三第三項、第二十七条の十一の四第五項、第二十七条の十一の五第二項、第二十七条の十一の六第二項、第二十七条の十二の十一第三項、第二十七条の十二の十二第四項、第二十七条の十三第五項（同条第八項において準用する場合を含む。）、第二十七条の三十第五項（同条第八項において準用する場合を含む。）、第二十八条の四十六第三項、第二十八条の四十八第四項、第二十八条の五十九、第二十九条第六項、第三十七条の十一、第九十九条第二項、第九十九条の十三、第九十九条の十四又は第百三条の二第三項の規定による命令をしようとするとき。
      - title: 四
        content: 第三条、第八条第一項、第十四条第一項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第二十四条第一項（第二十七条の十二の十三において準用する場合を含む。）、第二十七条の四、第二十七条の七の三第一項、第二十七条の十二の二、第二十七条の十二の七第一項、第二十七条の三十三第一項又は第九十九条の九第一項の規定による許可をしようとするとき。
      - title: 五
        content: 第十条第一項若しくは第二項（これらの規定を第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第十四条第二項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第十八条第一項若しくは第二項ただし書、第二十二条の二第一項ただし書（第二十七条の十二の十三において準用する場合を含む。）、第二十七条の十一の二第一項ただし書、第二十八条の十四第一項、第二十八条の四十一第三項、第二十八条の四十六第一項、第二十八条の五十二、第二十八条の五十五第一項若しくは第六項、第九十九条第一項又は第九十九条の七第一項の認可をしようとするとき。
      - title: 六
        content: 第十五条第二項、第二十七条の八第二項、第二十七条の十二の八第二項又は第二十七条の三十三第六項の規定による許可の取消しをしようとするとき。
      - title: 七
        content: 第十六条第二項又は第二十七条の十二の九第二項の規定による供給区域の減少の処分をしようとするとき。
      - title: 八
        content: 第十七条の二第一項、第二十条第二項ただし書、第二十一条第二項ただし書、第二十三条第二項ただし書（第二十七条の十二の十三において準用する場合を含む。）、第二十七条の十一の四第二項ただし書、第二十七条の十二の十一第二項ただし書、第二十七条の十二の十二第一項又は第二十八条の五十三第一項の規定による承認をしようとするとき。
      - title: 九
        content: 第十七条の三第二項又は第十九条第二項の規定による変更の処分をしようとするとき。
      - title: 十
        content: 第二十条の二第一項又は第九十七条第一項の規定による指定をしようとするとき。
      - title: 十一
        content: 第二十条の二第三項の規定による指定の解除をしようとするとき。
      - title: 十二
        content: 第二十五条第二項（第二十七条の十二の十三及び第三十二条において準用する場合を含む。）の規定による裁定をしようとするとき。
      - title: 十三
        content: 第二十七条の十二の十二第五項、第二十九条第五項又は第三十三条の二第四項若しくは第五項の規定による勧告をしようとするとき。
      - title: 十四
        content: 第三十七条の四の規定による認定をしようとするとき。
      - title: 十五
        content: 第三十七条の十一第二項の規定による認定の取消しをしようとするとき。
      - title: 十六
        content: 第九十九条の十四の規定による指定の取消しをしようとするとき。
    - paragraph_num: ２
      content: 委員会は、前項の規定により意見を述べたときは、遅滞なく、その内容を公表しなければならない。
  - caption: （勧告）
    title: 第六十六条の十二
    article_num: '66_12'
    paragraphs:
    - content: 委員会は、第百十四条第一項又は第二項の規定により委任された第百五条、第百六条第三項から第五項まで、第八項から第十項まで、第十二項若しくは第十三項又は第百七条第二項、第三項、第六項、第七項、第九項若しくは第十項の規定による権限を行使した場合において、電力の適正な取引の確保を図るため必要があると認めるときは、電気事業者又は第百三条の二第二項に規定する届出者に対し、必要な勧告をすることができる。
        ただし、次条第一項の規定による勧告をした場合は、この限りでない。
    - paragraph_num: ２
      content: 委員会は、前項の規定による勧告をした場合において、当該勧告を受けた電気事業者又は第百三条の二第二項に規定する届出者が、正当な理由がなく、その勧告に従わなかつたときは、その旨を経済産業大臣に報告するものとする。
    - paragraph_num: ３
      content: 委員会は、前項の規定による報告をした場合には、経済産業大臣に対し、当該報告に基づいてとつた措置について報告を求めることができる。
  - title: 第六十六条の十三
    article_num: '66_13'
    paragraphs:
    - content: 委員会は、第百十四条第一項又は第二項の規定により委任された第百五条、第百六条第三項から第五項まで、第八項から第十項まで、第十二項若しくは第十三項又は第百七条第二項、第三項、第六項、第七項、第九項若しくは第十項の規定による権限を行使した場合において、電力の適正な取引の確保を図るため特に必要があると認めるときは、経済産業大臣に対し、必要な勧告をすることができる。
        ただし、前条第一項の規定による勧告をした場合は、この限りでない。
    - paragraph_num: ２
      content: 委員会は、前項の規定による勧告をしたときは、遅滞なく、その内容を公表しなければならない。
    - paragraph_num: ３
      content: 委員会は、第一項の規定による勧告をした場合には、経済産業大臣に対し、当該勧告に基づいてとつた措置について報告を求めることができる。
  - caption: （建議）
    title: 第六十六条の十四
    article_num: '66_14'
    paragraphs:
    - content: 委員会は、この法律の規定によりその権限に属させられた事項に関し、電力の適正な取引の確保を図るため必要があると認めるときは、電気事業に関し講ずべき施策について経済産業大臣に建議することができる。
    - paragraph_num: ２
      content: 委員会は、前項の規定による建議をしたときは、遅滞なく、その内容を公表しなければならない。
    - paragraph_num: ３
      content: 委員会は、第一項の規定による建議をした場合には、経済産業大臣に対し、当該建議に基づき講じた施策について報告を求めることができる。
  - caption: （資料の提出等の要求）
    title: 第六十六条の十五
    article_num: '66_15'
    paragraphs:
    - content: 委員会は、この法律の規定によりその権限に属させられた事項を処理するため必要があると認めるときは、関係行政機関の長その他の関係者に対し、資料の提出、意見の表明、説明その他の必要な協力を求めることができる。
  - caption: （公表）
    title: 第六十六条の十六
    article_num: '66_16'
    paragraphs:
    - content: 委員会は、毎年、その事務の処理状況を公表しなければならない。
  - caption: （政令への委任）
    title: 第六十六条の十七
    article_num: '66_17'
    paragraphs:
    - content: この編に規定するもののほか、委員会に関し必要な事項は、政令で定める。
- title: 第六章　登録適合性確認機関、登録安全管理審査機関、指定試験機関及び登録調査機関
  chapter_num: 6
  sections:
  - title: 第一節　登録適合性確認機関
    section_num: 1
    articles:
    - caption: （登録）
      title: 第六十七条
      article_num: '67'
      paragraphs:
      - content: 第四十八条の二第一項の登録（以下この節において単に「登録」という。）は、経済産業省令で定めるところにより、適合性確認を行おうとする者の申請により行う。
    - caption: （欠格条項）
      title: 第六十八条
      article_num: '68'
      paragraphs:
      - content: 次の各号のいずれかに該当する者は、登録を受けることができない。
        items:
        - title: 一
          content: この法律又はこの法律に基づく命令の規定に違反し、罰金以上の刑に処せられ、その執行を終わり、又は執行を受けることがなくなつた日から二年を経過しない者
        - title: 二
          content: 第七十八条の規定により登録を取り消され、その取消しの日から二年を経過しない者
        - title: 三
          content: 法人であつて、その業務を行う役員のうちに前二号のいずれかに該当する者があるもの
    - caption: （登録の基準）
      title: 第六十九条
      article_num: '69'
      paragraphs:
      - content: 経済産業大臣は、第六十七条の規定により登録を申請した者（以下この項において「登録申請者」という。）が次に掲げる要件の全てに適合しているときは、登録をしなければならない。
          この場合において、登録に関して必要な手続は、経済産業省令で定める。
        items:
        - title: 一
          content: 特殊電気工作物の性能を総合的に評価する手法を用いて適合性確認を行うものであること。
        - title: 二
          content: 次のいずれかに該当する者が適合性確認を実施し、その人数が二名以上であること。
          subitems:
          - level: 1
            title: イ
            content: 学校教育法（昭和二十二年法律第二十六号）に基づく大学（短期大学を除く。）又は旧大学令（大正七年勅令第三百八十八号）に基づく大学において電気工学、土木工学、機械工学若しくは建築学の課程又はこれらに相当する課程を修めて卒業した者であつて、電気工作物の工事、維持若しくは運用に関する実務又は適合性確認に関する実務に通算して二年以上従事した経験を有するもの
          - level: 1
            title: ロ
            content: 学校教育法に基づく短期大学（同法に基づく専門職大学の前期課程を含む。）若しくは高等専門学校又は旧専門学校令（明治三十六年勅令第六十一号）に基づく専門学校において電気工学、土木工学、機械工学若しくは建築学の課程又はこれらに相当する課程を修めて卒業した者（同法に基づく専門職大学の前期課程にあつては、修了した者）であつて、電気工作物の工事、維持若しくは運用に関する実務又は適合性確認に関する実務に通算して四年以上従事した経験を有するもの
          - level: 1
            title: ハ
            content: 電気工作物の工事、維持若しくは運用に関する実務又は適合性確認に関する実務に通算して六年以上従事した経験を有する者
        - title: 三
          content: 登録申請者が、特殊電気工作物を設置する者（以下この号及び第七十五条第二項において「特殊電気工作物設置者」という。）に支配されているものとして次のいずれかに該当するものでないこと。
          subitems:
          - level: 1
            title: イ
            content: 登録申請者が株式会社である場合にあつては、特殊電気工作物設置者がその親法人（会社法第八百七十九条第一項に規定する親法人をいう。）であること。
          - level: 1
            title: ロ
            content: 登録申請者の役員（持分会社（会社法第五百七十五条第一項に規定する持分会社をいう。）にあつては、業務を執行する社員）に占める特殊電気工作物設置者の役員又は職員（過去二年間に当該特殊電気工作物設置者の役員又は職員であつた者を含む。）の割合が二分の一を超えていること。
          - level: 1
            title: ハ
            content: 登録申請者（法人にあつては、その代表権を有する役員）が、特殊電気工作物設置者の役員又は職員（過去二年間に当該特殊電気工作物設置者の役員又は職員であつた者を含む。）であること。
      - paragraph_num: ２
        content: 登録は、適合性確認機関登録簿に次に掲げる事項を記載してするものとする。
        items:
        - title: 一
          content: 登録年月日及び登録番号
        - title: 二
          content: 登録を受けた者の氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
        - title: 三
          content: 登録を受けた者が適合性確認を行う事業所の所在地
        - title: 四
          content: 前三号に掲げるもののほか、経済産業省令で定める事項
    - caption: （登録の更新）
      title: 第七十条
      article_num: '70'
      paragraphs:
      - content: 登録は、三年を下らない政令で定める期間ごとにその更新を受けなければ、その期間の経過によつて、その効力を失う。
      - paragraph_num: ２
        content: 前三条の規定は、前項の登録の更新に準用する。
    - caption: （適合性確認の義務）
      title: 第七十一条
      article_num: '71'
      paragraphs:
      - content: 登録を受けた者（以下「登録適合性確認機関」という。）は、適合性確認を行うべきことを求められたときは、正当な理由がある場合を除き、遅滞なく、適合性確認を行わなければならない。
      - paragraph_num: ２
        content: 登録適合性確認機関は、公正に、かつ、経済産業省令で定める方法により適合性確認を行わなければならない。
      - paragraph_num: ３
        content: 登録適合性確認機関は、適合性確認を行うときは、第六十九条第一項第二号に規定する者に適合性確認を実施させなければならない。
    - caption: （変更の届出）
      title: 第七十二条
      article_num: '72'
      paragraphs:
      - content: 登録適合性確認機関は、第六十九条第二項第二号から第四号までに掲げる事項を変更しようとするときは、変更しようとする日の二週間前までに、経済産業大臣に届け出なければならない。
    - caption: （業務規程）
      title: 第七十三条
      article_num: '73'
      paragraphs:
      - content: 登録適合性確認機関は、適合性確認の業務に関する規程（以下この節において「業務規程」という。）を定め、適合性確認の業務の開始前に、経済産業大臣に届け出なければならない。
          これを変更しようとするときも、同様とする。
      - paragraph_num: ２
        content: 業務規程には、適合性確認の実施方法、適合性確認に関する料金の算定方法その他の経済産業省令で定める事項を定めておかなければならない。
      - paragraph_num: ３
        content: 経済産業大臣は、第一項の規定による届出のあつた業務規程が適合性確認の適正かつ確実な実施上不適当となつたと認めるときは、その業務規程を変更すべきことを命ずることができる。
    - caption: （業務の休廃止）
      title: 第七十四条
      article_num: '74'
      paragraphs:
      - content: 登録適合性確認機関は、適合性確認の業務の全部又は一部を休止し、又は廃止しようとするときは、経済産業省令で定めるところにより、あらかじめ、その旨を経済産業大臣に届け出なければならない。
    - caption: （財務諸表等の備置き及び閲覧等）
      title: 第七十五条
      article_num: '75'
      paragraphs:
      - content: 登録適合性確認機関は、毎事業年度経過後三月以内に、その事業年度の財産目録、貸借対照表及び損益計算書又は収支計算書並びに事業報告書（これらのものが電磁的記録（電子的方式、磁気的方式その他の人の知覚によつては認識することができない方式で作られる記録であつて、電子計算機による情報処理の用に供されるものをいう。以下この条において同じ。）で作成され、又はその作成に代えて電磁的記録の作成がされている場合における当該電磁的記録を含む。次項及び第百二十六条において「財務諸表等」という。）を作成し、五年間事業所に備え置かなければならない。
      - paragraph_num: ２
        content: 特殊電気工作物設置者その他の利害関係人は、登録適合性確認機関の業務時間内は、いつでも、次に掲げる請求をすることができる。 ただし、第二号又は第四号の請求をするには、登録適合性確認機関の定めた費用を支払わなければならない。
        items:
        - title: 一
          content: 財務諸表等が書面をもつて作成されているときは、当該書面の閲覧又は謄写の請求
        - title: 二
          content: 前号の書面の謄本又は抄本の請求
        - title: 三
          content: 財務諸表等が電磁的記録をもつて作成されているときは、当該電磁的記録に記録された事項を経済産業省令で定める方法により表示したものの閲覧又は謄写の請求
        - title: 四
          content: 前号の電磁的記録に記録された事項を電磁的方法であつて経済産業省令で定めるものにより提供することの請求又は当該事項を記載した書面の交付の請求
    - caption: （適合命令）
      title: 第七十六条
      article_num: '76'
      paragraphs:
      - content: 経済産業大臣は、登録適合性確認機関が第六十九条第一項各号のいずれかに適合しなくなつたと認めるときは、その登録適合性確認機関に対し、これらの規定に適合するため必要な措置をとるべきことを命ずることができる。
    - caption: （改善命令）
      title: 第七十七条
      article_num: '77'
      paragraphs:
      - content: 経済産業大臣は、登録適合性確認機関が第七十一条の規定に違反していると認めるときは、その登録適合性確認機関に対し、適合性確認を行うべきこと又は適合性確認の方法その他の業務の方法の改善に関し必要な措置をとるべきことを命ずることができる。
    - caption: （登録の取消し等）
      title: 第七十八条
      article_num: '78'
      paragraphs:
      - content: 経済産業大臣は、登録適合性確認機関が次の各号のいずれかに該当するときは、登録を取り消し、又は期間を定めて適合性確認の業務の全部若しくは一部の停止を命ずることができる。
        items:
        - title: 一
          content: 第七十一条、第七十二条、第七十三条第一項、第七十四条、第七十五条第一項又は次条の規定に違反したとき。
        - title: 二
          content: 第六十八条第一号又は第三号に該当するに至つたとき。
        - title: 三
          content: 正当な理由がないのに第七十五条第二項各号の規定による請求を拒んだとき。
        - title: 四
          content: 第七十三条第三項又は前二条の規定による命令に違反したとき。
        - title: 五
          content: 不正の手段により登録を受けたとき。
    - caption: （帳簿の記載）
      title: 第七十九条
      article_num: '79'
      paragraphs:
      - content: 登録適合性確認機関は、帳簿を備え、適合性確認の業務に関し経済産業省令で定める事項を記載しなければならない。
      - paragraph_num: ２
        content: 前項の帳簿は、経済産業省令で定めるところにより、保存しなければならない。
    - caption: （経済産業大臣による適合性確認業務の実施）
      title: 第八十条
      article_num: '80'
      paragraphs:
      - content: 経済産業大臣は、登録を受ける者がいないとき、第七十四条の規定による適合性確認の業務の全部又は一部の休止又は廃止の届出があつたとき、第七十八条の規定により登録を取り消し、又は登録適合性確認機関に対し適合性確認の業務の全部若しくは一部の停止を命じたとき、登録適合性確認機関が天災その他の事由により適合性確認の業務の全部又は一部を実施することが困難となつたときその他必要があると認めるときは、当該適合性確認の業務の全部又は一部を自ら行うことができる。
      - paragraph_num: ２
        content: 経済産業大臣が前項の規定により適合性確認の業務の全部又は一部を自ら行う場合における適合性確認の業務の引継ぎその他の必要な事項については、経済産業省令で定める。
  - title: 第二節　登録安全管理審査機関
    section_num: 2
    articles:
    - caption: （登録）
      title: 第八十条の二
      article_num: '80_2'
      paragraphs:
      - content: 第五十一条第三項又は第五十五条第四項の登録（以下この節において単に「登録」という。）は、経済産業省令で定めるところにより、次に掲げる審査の区分（次条において単に「審査の区分」という。）ごとに、これらの審査（以下「安全管理審査」と総称する。）を行おうとする者の申請により行う。
        items:
        - title: 一
          content: 第五十一条第三項の審査
        - title: 二
          content: 第五十五条第四項の審査
    - caption: （登録の基準）
      title: 第八十条の三
      article_num: '80_3'
      paragraphs:
      - content: 経済産業大臣は、前条の規定により登録を申請した者（以下この項において「登録申請者」という。）が次に掲げる要件の全てに適合しているときは、登録をしなければならない。
          この場合において、登録に関して必要な手続は、経済産業省令で定める。
        items:
        - title: 一
          content: 次のいずれかに該当する者が安全管理審査を実施し、その人数が審査の区分ごとに二名以上であること。
          subitems:
          - level: 1
            title: イ
            content: 学校教育法に基づく大学（短期大学を除く。）又は旧大学令に基づく大学において電気工学、土木工学、機械工学若しくは経営工学の課程又はこれらに相当する課程を修めて卒業した者であつて、電気工作物の工事、維持若しくは運用に関する実務又は安全管理審査に関する実務に通算して二年以上従事した経験を有するもの
          - level: 1
            title: ロ
            content: 学校教育法に基づく短期大学（同法に基づく専門職大学の前期課程を含む。）若しくは高等専門学校又は旧専門学校令に基づく専門学校において電気工学、土木工学、機械工学若しくは経営工学の課程又はこれらに相当する課程を修めて卒業した者（同法に基づく専門職大学の前期課程にあつては、修了した者）であつて、電気工作物の工事、維持若しくは運用に関する実務又は安全管理審査に関する実務に通算して四年以上従事した経験を有するもの
          - level: 1
            title: ハ
            content: 電気工作物の工事、維持若しくは運用に関する実務又は安全管理審査に関する実務に通算して六年以上従事した経験を有する者
        - title: 二
          content: 登録申請者が、第五十一条第三項又は第五十五条第四項の規定により安全管理審査を受けなければならないこととされる電気工作物を設置する者（以下この号において「審査対象電気工作物設置者」という。）に支配されているものとして次のいずれかに該当するものでないこと。
          subitems:
          - level: 1
            title: イ
            content: 登録申請者が株式会社である場合にあつては、審査対象電気工作物設置者がその親法人（会社法第八百七十九条第一項に規定する親法人をいう。）であること。
          - level: 1
            title: ロ
            content: 登録申請者の役員（持分会社（会社法第五百七十五条第一項に規定する持分会社をいう。）にあつては、業務を執行する社員）に占める審査対象電気工作物設置者の役員又は職員（過去二年間に当該審査対象電気工作物設置者の役員又は職員であつた者を含む。）の割合が二分の一を超えていること。
          - level: 1
            title: ハ
            content: 登録申請者（法人にあつては、その代表権を有する役員）が、審査対象電気工作物設置者の役員又は職員（過去二年間に当該審査対象電気工作物設置者の役員又は職員であつた者を含む。）であること。
      - paragraph_num: ２
        content: 登録は、安全管理審査機関登録簿に次に掲げる事項を記載してするものとする。
        items:
        - title: 一
          content: 登録年月日及び登録番号
        - title: 二
          content: 登録を受けた者の氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
        - title: 三
          content: 審査の区分
        - title: 四
          content: 登録を受けた者が安全管理審査を行う事業所の所在地
    - caption: （業務規程）
      title: 第八十条の四
      article_num: '80_4'
      paragraphs:
      - content: 登録を受けた者（以下「登録安全管理審査機関」という。）は、安全管理審査の業務に関する規程（以下この節において「業務規程」という。）を定め、安全管理審査の業務の開始前に、経済産業大臣に届け出なければならない。
          これを変更しようとするときも、同様とする。
      - paragraph_num: ２
        content: 業務規程には、安全管理審査の実施方法、安全管理審査に関する料金の算定方法その他の経済産業省令で定める事項を定めておかなければならない。
    - caption: （登録の取消し等）
      title: 第八十条の五
      article_num: '80_5'
      paragraphs:
      - content: 経済産業大臣は、登録安全管理審査機関が次の各号のいずれかに該当するときは、登録を取り消し、又は期間を定めて安全管理審査の業務の全部若しくは一部の停止を命ずることができる。
        items:
        - title: 一
          content: 第五十一条第五項（第五十五条第六項において準用する場合を含む。）若しくは前条第一項の規定又は次条において準用する第七十一条、第七十二条、第七十四条、第七十五条第一項若しくは第七十九条の規定に違反したとき。
        - title: 二
          content: 次条において準用する第六十八条第一号又は第三号に該当するに至つたとき。
        - title: 三
          content: 正当な理由がないのに次条において準用する第七十五条第二項各号の規定による請求を拒んだとき。
        - title: 四
          content: 次条において準用する第七十六条又は第七十七条の規定による命令に違反したとき。
        - title: 五
          content: 不正の手段により登録を受けたとき。
    - caption: （準用）
      title: 第八十条の六
      article_num: '80_6'
      paragraphs:
      - content: 第六十八条、第七十条から第七十二条まで、第七十四条から第七十七条まで、第七十九条及び第八十条の規定は、登録安全管理審査機関に準用する。
          この場合において、第六十八条第二号及び第八十条第一項中「第七十八条」とあるのは「第八十条の五」と、第七十条第二項中「前三条の規定」とあるのは「第八十条の二及び第八十条の三の規定並びに第八十条の六において準用する第六十八条の規定」と、第七十一条の見出し及び第八十条第二項中「適合性確認」とあるのは「安全管理審査」と、第七十一条及び第七十七条中「適合性確認を」とあるのは「安全管理審査を」と、第七十一条第三項中「第六十九条第一項第二号」とあるのは「第八十条の三第一項第一号」と、第七十二条中「第六十九条第二項第二号から第四号までに掲げる事項」とあるのは「その名称又は安全管理審査を行う事業所の所在地」と、第七十四条、第七十七条、第七十九条第一項及び第八十条第一項中「適合性確認の」とあるのは「安全管理審査の」と、第七十五条第二項中「特殊電気工作物設置者」とあるのは「使用前自主検査又は定期自主検査を行う電気工作物を設置する者」と、第七十六条中「第六十九条第一項各号」とあるのは「第八十条の三第一項各号」と、第八十条の見出し中「適合性確認業務」とあるのは「安全管理審査業務」と読み替えるものとする。
  - title: 第三節　指定試験機関
    section_num: 3
    articles:
    - caption: （指定）
      title: 第八十一条
      article_num: '81'
      paragraphs:
      - content: 第四十五条第二項の指定は、経済産業省令で定めるところにより、試験事務を行おうとする者の申請により行う。
      - paragraph_num: ２
        content: 経済産業大臣は、第四十五条第二項の指定をしたときは、試験事務を行わないものとする。
    - caption: （欠格条項）
      title: 第八十二条
      article_num: '82'
      paragraphs:
      - content: 次の各号のいずれかに該当する者は、第四十五条第二項の指定を受けることができない。
        items:
        - title: 一
          content: この法律又はこの法律に基づく命令の規定に違反し、罰金以上の刑に処せられ、その執行を終わり、又は執行を受けることがなくなつた日から二年を経過しない者
        - title: 二
          content: 第八十七条第二項の規定により指定を取り消され、その取消しの日から二年を経過しない者
        - title: 三
          content: その業務を行う役員のうちに、次のいずれかに該当する者がある者
          subitems:
          - level: 1
            title: イ
            content: 第一号に該当する者
          - level: 1
            title: ロ
            content: 第八十四条の五の規定による命令により解任され、解任の日から二年を経過しない者
    - caption: （指定の基準）
      title: 第八十三条
      article_num: '83'
      paragraphs:
      - content: 経済産業大臣は、他に第四十五条第二項の指定を受けた者がなく、かつ、同項の指定の申請が次の各号のいずれにも適合していると認めるときでなければ、その指定をしてはならない。
        items:
        - title: 一
          content: 職員、設備、試験事務の実施の方法その他の事項についての試験事務の実施に関する計画が、試験事務の適確な実施のために適切なものであること。
        - title: 二
          content: 前号の試験事務の実施に関する計画を適確に実施するに足りる経理的基礎及び技術的能力があること。
        - title: 三
          content: 一般社団法人又は一般財団法人であること。
        - title: 四
          content: 試験事務以外の業務を行つているときは、その業務を行うことによつて試験事務が不公正になるおそれがないものであること。
    - caption: （試験員）
      title: 第八十四条
      article_num: '84'
      paragraphs:
      - content: 指定試験機関は、試験事務を行う場合において、第四十四条第一項第一号から第三号までに掲げる種類の主任技術者免状に係る主任技術者として必要な知識及び技能を有するかどうかの判定に関する事務については、試験員に行わせなければならない。
      - paragraph_num: ２
        content: 指定試験機関は、試験員を選任しようとするときは、経済産業省令で定める要件を備える者のうちから選任しなければならない。
      - paragraph_num: ３
        content: 指定試験機関は、試験員を選任したときは、経済産業省令で定めるところにより、経済産業大臣にその旨を届け出なければならない。 試験員に変更があつたときも、同様とする。
    - caption: （業務規程）
      title: 第八十四条の二
      article_num: '84_2'
      paragraphs:
      - content: 指定試験機関は、試験事務に関する規程（以下この節において「業務規程」という。）を定め、経済産業大臣の認可を受けなければならない。
          これを変更しようとするときも、同様とする。
      - paragraph_num: ２
        content: 業務規程で定めるべき事項は、経済産業省令で定める。
      - paragraph_num: ３
        content: 経済産業大臣は、第一項の認可をした業務規程が試験事務の公正な遂行上不適当となつたと認めるときは、指定試験機関に対し、業務規程を変更すべきことを命ずることができる。
    - caption: （業務の休廃止）
      title: 第八十四条の二の二
      article_num: '84_2_2'
      paragraphs:
      - content: 指定試験機関は、経済産業大臣の許可を受けなければ、試験事務の全部又は一部を休止し、又は廃止してはならない。
    - caption: （事業計画等）
      title: 第八十四条の三
      article_num: '84_3'
      paragraphs:
      - content: 指定試験機関は、毎事業年度開始前に（第四十五条第二項の指定を受けた日の属する事業年度にあつては、その指定を受けた後遅滞なく）、その事業年度の事業計画及び収支予算を作成し、経済産業大臣の認可を受けなければならない。
          これを変更しようとするときも、同様とする。
      - paragraph_num: ２
        content: 指定試験機関は、毎事業年度経過後三月以内に、その事業年度の事業報告書及び収支決算書を作成し、経済産業大臣に提出しなければならない。
    - caption: （役員の選任及び解任）
      title: 第八十四条の四
      article_num: '84_4'
      paragraphs:
      - content: 指定試験機関の役員の選任及び解任は、経済産業大臣の認可を受けなければ、その効力を生じない。
    - caption: （解任命令）
      title: 第八十四条の五
      article_num: '84_5'
      paragraphs:
      - content: 経済産業大臣は、指定試験機関の役員又は試験員がこの法律若しくはこの法律に基づく命令の規定又は業務規程に違反したときは、その指定試験機関に対し、その役員又は試験員を解任すべきことを命ずることができる。
    - caption: （秘密保持義務）
      title: 第八十五条
      article_num: '85'
      paragraphs:
      - content: 指定試験機関の役員若しくは職員（試験員を含む。）又はこれらの職にあつた者は、試験事務に関して知り得た秘密を漏らしてはならない。
    - caption: （役員及び職員の地位）
      title: 第八十五条の二
      article_num: '85_2'
      paragraphs:
      - content: 試験事務に従事する指定試験機関の役員又は職員（試験員を含む。）は、刑法その他の罰則の適用については、法令により公務に従事する職員とみなす。
    - caption: （適合命令等）
      title: 第八十六条
      article_num: '86'
      paragraphs:
      - content: 経済産業大臣は、指定試験機関が第八十三条各号（第三号を除く。以下この項において同じ。）のいずれかに適合しなくなつたと認めるときは、指定試験機関に対し、当該各号に適合するため必要な措置をとるべきことを命ずることができる。
      - paragraph_num: ２
        content: 経済産業大臣は、前項に定めるもののほか、この法律を施行するため必要があると認めるときは、指定試験機関に対し、試験事務に関し監督上必要な命令をすることができる。
    - caption: （指定の取消し等）
      title: 第八十七条
      article_num: '87'
      paragraphs:
      - content: 経済産業大臣は、指定試験機関が第八十三条第三号に適合しなくなつたときは、第四十五条第二項の指定を取り消さなければならない。
      - paragraph_num: ２
        content: 経済産業大臣は、指定試験機関が次の各号のいずれかに該当するときは、第四十五条第二項の指定を取り消し、又は期間を定めて試験事務の全部若しくは一部の停止を命ずることができる。
        items:
        - title: 一
          content: 第八十二条第一号又は第三号に該当するに至つたとき。
        - title: 二
          content: 第八十四条、第八十四条の二第一項、第八十四条の二の二、第八十四条の三又は次条の規定に違反したとき。
        - title: 三
          content: 第八十四条の二第一項の認可を受けた業務規程によらないで試験事務を行つたとき。
        - title: 四
          content: 第八十四条の二第三項、第八十四条の五又は前条の規定による命令に違反したとき。
        - title: 五
          content: 不正の手段により第四十五条第二項の指定を受けたとき。
    - caption: （帳簿の記載）
      title: 第八十七条の二
      article_num: '87_2'
      paragraphs:
      - content: 指定試験機関は、帳簿を備え、試験事務に関し経済産業省令で定める事項を記載しなければならない。
      - paragraph_num: ２
        content: 前項の帳簿は、経済産業省令で定めるところにより、保存しなければならない。
    - caption: （経済産業大臣による試験）
      title: 第八十八条
      article_num: '88'
      paragraphs:
      - content: 経済産業大臣は、指定試験機関が第八十四条の二の二の許可を受けて試験事務の全部若しくは一部を休止したとき、第八十七条第二項の規定により指定試験機関に対し試験事務の全部若しくは一部の停止を命じたとき、又は指定試験機関が天災その他の事由により試験事務の全部若しくは一部を実施することが困難となつた場合において必要があると認めるときは、当該試験事務の全部又は一部を自ら行うものとする。
      - paragraph_num: ２
        content: 経済産業大臣が前項の規定により試験事務の全部若しくは一部を自ら行う場合、指定試験機関が第八十四条の二の二の許可を受けて試験事務の全部若しくは一部を廃止する場合又は第八十七条の規定により経済産業大臣が指定試験機関の指定を取り消した場合における試験事務の引継ぎその他の必要な事項については、経済産業省令で定める。
  - title: 第四節　登録調査機関
    section_num: 4
    articles:
    - caption: （登録）
      title: 第八十九条
      article_num: '89'
      paragraphs:
      - content: 第五十七条の二第一項の登録（以下この節において単に「登録」という。）は、経済産業省令で定めるところにより、電線路維持運用者の委託を受けて調査業務を行おうとする者の申請により行う。
    - caption: （登録の基準）
      title: 第九十条
      article_num: '90'
      paragraphs:
      - content: 経済産業大臣は、前条の規定により登録を申請した者が次に掲げる要件の全てに適合しているときは、登録をしなければならない。 この場合において、登録に関して必要な手続は、経済産業省令で定める。
        items:
        - title: 一
          content: 次に掲げる測定器を用いて調査業務を行うものであること。
          subitems:
          - level: 1
            title: イ
            content: 絶縁抵抗計
          - level: 1
            title: ロ
            content: 接地抵抗計
          - level: 1
            title: ハ
            content: 漏れ電流計
          - level: 1
            title: ニ
            content: 交流電流計
          - level: 1
            title: ホ
            content: 交流電圧計
        - title: 二
          content: 次のいずれかに該当する者が調査業務を実施するものであること。
          subitems:
          - level: 1
            title: イ
            content: 第四十四条第一項第一号から第三号までに掲げる種類の主任技術者免状の交付を受けている者
          - level: 1
            title: ロ
            content: 電気工事士法（昭和三十五年法律第百三十九号）第三条第一項に規定する第一種電気工事士又は同条第二項に規定する第二種電気工事士
          - level: 1
            title: ハ
            content: 学校教育法に基づく大学、高等専門学校、高等学校若しくは中等教育学校、旧大学令に基づく大学、旧専門学校令に基づく専門学校又は旧中等学校令（昭和十八年勅令第三十六号）に基づく実業学校において電気工学の課程又はこれに相当する課程を修めて卒業した者
      - paragraph_num: ２
        content: 登録は、調査機関登録簿に次に掲げる事項を記載してするものとする。
        items:
        - title: 一
          content: 登録年月日及び登録番号
        - title: 二
          content: 登録を受けた者の氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
    - title: 第九十一条
      article_num: '91'
      paragraphs:
      - content: 削除
    - caption: （調査の義務）
      title: 第九十二条
      article_num: '92'
      paragraphs:
      - content: 登録調査機関は、第五十七条の二第一項の規定による調査業務の委託を受けているときは、第五十七条第一項の経済産業省令で定めるところにより、その調査業務を行わなければならない。
          ただし、一般用電気工作物の設置の場所に立ち入ることにつき、その所有者又は占有者の承諾を得ることができないときは、この限りでない。
      - paragraph_num: ２
        content: 経済産業大臣は、登録調査機関が第五十七条の二第一項の規定による調査業務の委託を受けている場合において、その調査業務を行わず、又はその方法が適当でないときは、登録調査機関に対し、その調査業務を行い、又はその方法を改善すべきことを命ずることができる。
    - caption: （調査業務の廃止）
      title: 第九十三条
      article_num: '93'
      paragraphs:
      - content: 登録調査機関は、調査業務を廃止したときは、遅滞なく、その旨を経済産業大臣に届け出なければならない。
    - caption: （業務規程）
      title: 第九十四条
      article_num: '94'
      paragraphs:
      - content: 登録調査機関は、調査業務に関する規程（以下この節において「業務規程」という。）を定め、調査業務の開始前に、経済産業大臣に届け出なければならない。
          これを変更しようとするときも、同様とする。
      - paragraph_num: ２
        content: 業務規程には、調査業務の実施方法、調査業務に関する料金の算定方法その他の経済産業省令で定める事項を定めておかなければならない。
    - caption: （登録の取消し）
      title: 第九十五条
      article_num: '95'
      paragraphs:
      - content: 経済産業大臣は、登録調査機関が次の各号のいずれかに該当するときは、登録を取り消すことができる。
        items:
        - title: 一
          content: 次条において準用する第六十八条第一号又は第三号に該当するに至つたとき。
        - title: 二
          content: 正当な理由がないのに次条において準用する第七十五条第二項各号の規定による請求を拒んだとき。
        - title: 三
          content: 第九十二条第一項、第九十三条若しくは前条第一項の規定又は次条において準用する第七十五条第一項若しくは第七十九条の規定に違反したとき。
        - title: 四
          content: 第九十二条第二項の規定又は次条において準用する第七十六条の規定による命令に違反したとき。
        - title: 五
          content: 不正の手段により登録を受けたとき。
    - caption: （準用）
      title: 第九十六条
      article_num: '96'
      paragraphs:
      - content: 第六十八条、第七十条、第七十五条、第七十六条及び第七十九条の規定は、登録調査機関に準用する。 この場合において、第六十八条第二号中「第七十八条」とあるのは「第九十五条」と、第七十条第二項中「前三条の規定」とあるのは「第八十九条及び第九十条の規定並びに第九十六条において準用する第六十八条の規定」と、第七十五条第二項中「特殊電気工作物設置者」とあるのは「登録調査機関が調査業務を行う一般用電気工作物の所有者又は占有者」と、第七十六条中「第六十九条第一項各号」とあるのは「第九十条第一項各号」と、第七十九条第一項中「適合性確認の業務」とあるのは「調査業務」と読み替えるものとする。
- title: 第七章　卸電力取引所
  chapter_num: 7
  articles:
  - caption: （指定）
    title: 第九十七条
    article_num: '97'
    paragraphs:
    - content: 経済産業大臣は、電気事業者に対する電力の卸取引の機会の拡大を図るとともに、当該卸取引の指標として用いられる適正な価格の形成を図り、もつてその円滑な取引に資することを目的とする一般社団法人、一般財団法人その他政令で定める法人であつて、次条第一項に規定する業務（以下「市場開設業務」という。）に関し次に掲げる基準に適合すると認められるものを、その申請により、卸電力取引所として指定することができる。
      items:
      - title: 一
        content: 職員、市場開設業務の実施の方法その他の事項についての市場開設業務の実施に関する計画が、市場開設業務の適確な実施のために適切なものであること。
      - title: 二
        content: 前号の市場開設業務の実施に関する計画を適確に実施するに足りる経理的及び技術的な基礎を有するものであること。
      - title: 三
        content: 役員又は職員の構成が、市場開設業務の公正な実施に支障を及ぼすおそれがないものであること。
      - title: 四
        content: 市場開設業務以外の業務を行う場合には、その業務を行うことによつて市場開設業務の公正な実施に支障を及ぼすおそれがないものであること。
      - title: 五
        content: 第九十九条の十四の規定により指定を取り消され、その取消しの日から二年を経過しない者でないこと。
      - title: 六
        content: 役員のうちに次のいずれかに該当する者がないこと。
        subitems:
        - level: 1
          title: イ
          content: 拘禁刑以上の刑に処せられ、その刑の執行を終わり、又は執行を受けることがなくなつた日から二年を経過しない者
        - level: 1
          title: ロ
          content: この法律又はこの法律に基づく命令の規定に違反したことにより罰金の刑に処せられ、その刑の執行を終わり、又は執行を受けることがなくなつた日から二年を経過しない者
    - paragraph_num: ２
      content: 卸電力取引所は、その名称若しくは住所又は市場開設業務を行う事務所の所在地を変更しようとするときは、変更しようとする日の二週間前までに、その旨を経済産業大臣に届け出なければならない。
  - caption: （業務）
    title: 第九十八条
    article_num: '98'
    paragraphs:
    - content: 卸電力取引所は、次に掲げる業務を行うものとする。
      items:
      - title: 一
        content: 電気事業者に対する電力の卸取引の機会の拡大及び当該卸取引の指標として用いられる価格の形成に必要なその売買取引を行うための市場（次項及び第九十九条の二において「卸電力取引市場」という。）を開設すること。
      - title: 二
        content: 前号に掲げる業務に附帯する業務を行うこと。
      - title: 三
        content: 前二号に掲げるもののほか、卸電力取引所の目的を達成するために必要な業務を行うこと。
    - paragraph_num: ２
      content: 卸電力取引所は、前項第一号に掲げる業務として、翌日に受け渡される経済産業省令で定める時間を単位とする電力の売買取引を行うための市場（次項、第九十九条の四第二項及び第九十九条の八において「翌日市場」という。）その他市場開設業務の実施に関する規程（以下この章において「業務規程」という。）で定める卸電力取引市場を開設するものとする。
    - paragraph_num: ３
      content: 卸電力取引所は、翌日市場における地域間の売買取引に係る電力の量が、当該地域間を電気的に接続する電線路の容量を超えるときは、業務規程で定めるところにより、地域ごとに取引価格を算定するものとする。
  - caption: （業務規程の認可）
    title: 第九十九条
    article_num: '99'
    paragraphs:
    - content: 卸電力取引所は、市場開設業務を行うときは、当該業務の開始前に、業務規程を作成し、経済産業大臣の認可を受けなければならない。 これを変更しようとするときも、同様とする。
    - paragraph_num: ２
      content: 経済産業大臣は、前項の認可をした業務規程が市場開設業務の公正かつ適確な実施上不適当となつたと認めるときは、その業務規程を変更すべきことを命ずることができる。
    - paragraph_num: ３
      content: 業務規程に記載すべき事項及び第一項の認可の基準については、経済産業省令で定める。
  - caption: （売買取引を行うことができる者）
    title: 第九十九条の二
    article_num: '99_2'
    paragraphs:
    - content: 卸電力取引市場における電力の売買取引（以下この章において単に「売買取引」という。）を行うことができる者は、電気事業者その他これに準ずる者であつて電力の卸取引の業務を適確に遂行するに足りる資力信用を有するものとして業務規程で定める者とする。
  - caption: （売買取引）
    title: 第九十九条の三
    article_num: '99_3'
    paragraphs:
    - content: 売買取引は、入札の方法その他業務規程で定める方法によらなければならない。
    - paragraph_num: ２
      content: 卸電力取引所は、売買取引において、不正な行為が行われ、又は不当な価格が形成されていると認めるときは、業務規程で定めるところにより、売買取引を行う者に対し、売買取引の制限その他の売買取引の公正を確保するために必要な措置を講ずることができる。
    - paragraph_num: ３
      content: 卸電力取引所は、前項に規定する措置を講じたときは、速やかに、その旨を経済産業大臣に報告しなければならない。
  - caption: （取引の決済）
    title: 第九十九条の四
    article_num: '99_4'
    paragraphs:
    - content: 売買取引の決済は、卸電力取引所を経て行う方法その他業務規程で定める方法によらなければならない。
    - paragraph_num: ２
      content: 翌日市場における電力の売買取引の決済は、卸電力取引所を経て行う方法によるものとする。
  - caption: （売買取引数量等の公表）
    title: 第九十九条の五
    article_num: '99_5'
    paragraphs:
    - content: 卸電力取引所は、経済産業省令で定めるところにより、売買取引の数量及び価格その他経済産業省令で定める事項を公表しなければならない。
  - caption: （差別的取扱いの禁止）
    title: 第九十九条の六
    article_num: '99_6'
    paragraphs:
    - content: 卸電力取引所は、市場開設業務の運営に関し、売買取引を行う者に対して、不当に差別的な取扱いをしてはならない。
  - caption: （事業計画等）
    title: 第九十九条の七
    article_num: '99_7'
    paragraphs:
    - content: 卸電力取引所は、毎事業年度開始前に（第九十七条第一項の指定を受けた日の属する事業年度にあつては、その指定を受けた後遅滞なく）、その事業年度の事業計画及び収支予算を作成し、経済産業大臣の認可を受けなければならない。
        これを変更しようとするときも、同様とする。
    - paragraph_num: ２
      content: 卸電力取引所は、毎事業年度経過後三月以内に、その事業年度の事業報告書及び収支決算書を作成し、経済産業大臣に提出しなければならない。
  - caption: （地域間売買取引の決済に係る利益の納付）
    title: 第九十九条の八
    article_num: '99_8'
    paragraphs:
    - content: 卸電力取引所は、推進機関が行う広域系統整備交付金交付等業務に要する費用に充てるため、推進機関に対し、経済産業省令で定めるところにより、翌日市場における地域間の売買取引の決済に係る収入からその決済に要する費用を控除した金額を納付するものとする。
  - caption: （業務の休廃止等）
    title: 第九十九条の九
    article_num: '99_9'
    paragraphs:
    - content: 卸電力取引所は、経済産業大臣の許可を受けなければ、市場開設業務の全部又は一部を休止し、又は廃止してはならない。
    - paragraph_num: ２
      content: 経済産業大臣が前項の規定により市場開設業務の全部の廃止を許可したときは、当該許可に係る指定は、その効力を失う。
  - caption: （役員の選任及び解任）
    title: 第九十九条の十
    article_num: '99_10'
    paragraphs:
    - content: 卸電力取引所の役員の選任及び解任は、経済産業大臣の認可を受けなければ、その効力を生じない。
  - caption: （解任命令）
    title: 第九十九条の十一
    article_num: '99_11'
    paragraphs:
    - content: 経済産業大臣は、卸電力取引所の役員がこの法律若しくはこの法律に基づく命令の規定又は業務規程に違反したときは、その卸電力取引所に対し、その役員を解任すべきことを命ずることができる。
  - caption: （秘密保持義務）
    title: 第九十九条の十二
    article_num: '99_12'
    paragraphs:
    - content: 卸電力取引所の役員若しくは職員又はこれらの職にあつた者は、市場開設業務に関して知り得た秘密を漏らし、又は盗用してはならない。
  - caption: （監督命令）
    title: 第九十九条の十三
    article_num: '99_13'
    paragraphs:
    - content: 経済産業大臣は、市場開設業務の公正かつ適確な実施を確保するため必要があると認めるときは、卸電力取引所に対し、市場開設業務に関し監督上必要な命令をすることができる。
  - caption: （指定の取消し等）
    title: 第九十九条の十四
    article_num: '99_14'
    paragraphs:
    - content: 経済産業大臣は、卸電力取引所が次の各号のいずれかに該当するときは、その指定を取り消し、又は期間を定めて市場開設業務の全部若しくは一部の停止を命ずることができる。
      items:
      - title: 一
        content: 第九十七条第一項第一号から第四号までに掲げる基準に適合していないと認めるとき。
      - title: 二
        content: 第九十七条第一項第六号に掲げる基準に適合しないこととなつたとき。
      - title: 三
        content: 第九十七条第二項、第九十九条第一項、第九十九条の三第三項、第九十九条の五から第九十九条の七まで又は第九十九条の九第一項の規定に違反したとき。
      - title: 四
        content: 第九十九条第一項の認可を受けた業務規程によらないで市場開設業務を行つたとき。
      - title: 五
        content: 第九十九条第二項、第九十九条の十一又は前条の規定による命令に違反したとき。
      - title: 六
        content: 不正の手段により第九十七条第一項の指定を受けたとき。
- title: 第八章　雑則
  chapter_num: 8
  articles:
  - caption: （登録等の条件）
    title: 第百条
    article_num: '100'
    paragraphs:
    - content: 登録、変更登録、許可、指定、認可又は承認には、条件を付し、及びこれを変更することができる。
    - paragraph_num: ２
      content: 前項の条件は、公共の利益を増進し、又は登録、変更登録、許可、指定、認可若しくは承認に係る事項の確実な実施を図るため必要な最小限度のものに限り、かつ、当該登録、変更登録、許可、指定、認可又は承認を受ける者に不当な義務を課することとなるものであつてはならない。
  - caption: （発電水力）
    title: 第百一条
    article_num: '101'
    paragraphs:
    - content: 経済産業大臣は、発電水力の開発上必要な調査を行なわなければならない。
  - title: 第百二条
    article_num: '102'
    paragraphs:
    - content: 経済産業大臣は、発電水力の開発上必要があると認めるときは、水力を原動力とする発電用の電気工作物を設置している者に対し、その電気工作物を設置している河川について、経済産業省令で定めるところにより、その流量を測定し、その測定の結果を報告すべきことを命ずることができる。
  - title: 第百三条
    article_num: '103'
    paragraphs:
    - content: 都道府県知事又は地方自治法（昭和二十二年法律第六十七号）第二百五十二条の十九第一項の指定都市（以下「指定都市」という。）の長は、河川法（昭和三十九年法律第百六十七号）第二十三条若しくは第二十九条第二項の許可又は同法第二十四条若しくは第二十六条第一項の許可（同法第二十三条の二の登録の対象となる流水の占用に係る水利使用（同条に規定する水利使用をいう。第三項において同じ。）に関する許可を除く。）の申請があつた場合において、その申請が発電水力の利用のためのものであつて政令で定めるものであるときは、意見を付して経済産業大臣に報告し、経済産業大臣の意見を求めなければならない。
    - paragraph_num: ２
      content: 経済産業大臣は、前項の規定により意見を求められたときは、国土交通大臣に協議するものとする。
    - paragraph_num: ３
      content: 経済産業大臣は、都道府県知事又は指定都市の長に対し河川法第二十三条若しくは第二十九条第二項の許可又は同法第二十四条若しくは第二十六条第一項の許可（同法第二十三条の二の登録の対象となる流水の占用に係る水利使用に関する許可を除く。）の申請があつた場合（第一項に規定する場合を除く。）において、発電水力の有効な利用を確保するため必要があると認めるときは、その都道府県知事又は指定都市の長に対し、これらの規定による処分に関し必要な勧告をすることができる。
  - caption: （特定計量の届出等）
    title: 第百三条の二
    article_num: '103_2'
    paragraphs:
    - content: 電力の取引又は証明（計量法（平成四年法律第五十一号）第二条第二項に規定する取引又は証明をいう。）における法定計量単位（同法第八条第一項に規定する法定計量単位をいう。）による計量（同法第二条第一項に規定する計量をいう。）であつて、その適正を確保することが特に必要なものとして経済産業省令で定めるもの（以下この条、第百十一条第四項及び第百十七条の六において「特定計量」という。）をする者は、経済産業省令で定めるところにより、あらかじめ、次に掲げる事項を経済産業大臣に届け出なければならない。
        これを変更するときも、同様とする。
      items:
      - title: 一
        content: 氏名又は名称及び住所並びに法人にあつては、その代表者の氏名
      - title: 二
        content: 主たる営業所その他の営業所の名称及び所在地
      - title: 三
        content: 特定計量の内容
      - title: 四
        content: 特定計量の適正を確保するための措置の内容
      - title: 五
        content: 特定計量の開始の予定年月日
      - title: 六
        content: その他経済産業省令で定める事項
    - paragraph_num: ２
      content: 前項の規定による届出を行つた者（以下「届出者」という。）は、経済産業省令で定める基準に従つて、特定計量をしなければならない。
    - paragraph_num: ３
      content: 経済産業大臣は、届出者が前項の経済産業省令で定める基準に従つて特定計量をしていない場合において、電気の使用者の利益の保護又は電気事業の健全な発達に支障が生じ、又は生ずるおそれがあると認めるときは、当該届出者に対し、その特定計量の中止又はその方法の改善その他の必要な措置をとるべきことを命ずることができる。
    - paragraph_num: ４
      content: 計量法第十六条第一項及び第四十条から第四十八条までの規定は、第一項の規定による届出に係る特定計量に使用される電気計器については、適用しない。
  - caption: （電気工作物検査官）
    title: 第百四条
    article_num: '104'
    paragraphs:
    - content: 経済産業省及び原子力規制委員会に、電気工作物検査官を置く。
    - paragraph_num: ２
      content: 経済産業省の電気工作物検査官は、第四十九条第一項若しくは第五十四条の検査又は第五十一条第三項若しくは第五十五条第四項の審査に関する事務に従事する。
    - paragraph_num: ３
      content: 原子力規制委員会の電気工作物検査官は、第四十九条第一項若しくは第五十四条の検査又は第五十一条第三項の審査に関する事務に従事する。
    - paragraph_num: ４
      content: 電気工作物検査官の資格に関し必要な事項は、政令で定める。
  - caption: （監査）
    title: 第百五条
    article_num: '105'
    paragraphs:
    - content: 経済産業大臣は、毎年、一般送配電事業者、送電事業者及び配電事業者の業務及び経理の監査をしなければならない。
  - caption: （調査の要請）
    title: 第百五条の二
    article_num: '105_2'
    paragraphs:
    - content: 経済産業大臣は、認定高度保安実施設置者その他の保安の確保上特に重要な者として経済産業省令で定める者において保安に係るサイバーセキュリティ（サイバーセキュリティ基本法（平成二十六年法律第百四号）第二条に規定するサイバーセキュリティをいう。）に関する重大な事態が生じ、又は生じた疑いがある場合において、必要があると認めるときは、独立行政法人情報処理推進機構に対し、その原因究明のための調査を要請することができる。
  - caption: （報告の徴収）
    title: 第百六条
    article_num: '106'
    paragraphs:
    - content: 主務大臣は、第三十九条、第四十条、第四十七条、第四十九条及び第五十条の規定の施行に必要な限度において、政令で定めるところにより、原子力発電工作物を設置する者に対し、その原子力発電工作物の保安に係る業務の状況に関し報告又は資料の提出をさせることができる。
    - paragraph_num: ２
      content: 主務大臣は、前項の規定によるもののほか、同項の規定により原子力発電工作物を設置する者に対し報告又は資料の提出をさせた場合において、原子力発電工作物の保安を確保するため特に必要があると認めるときは、第三十九条、第四十条、第四十七条、第四十九条及び第五十条の規定の施行に必要な限度において、当該原子力発電工作物の保守点検を行つた事業者に対し、必要な事項の報告又は資料の提出をさせることができる。
    - paragraph_num: ３
      content: 経済産業大臣は、第一項の規定によるもののほか、この法律の施行に必要な限度において、政令で定めるところにより、小売電気事業者等、一般送配電事業者、送電事業者、配電事業者、特定送配電事業者、発電事業者又は特定卸供給事業者に対し、その業務又は経理の状況に関し報告又は資料の提出をさせることができる。
    - paragraph_num: ４
      content: 経済産業大臣は、第二十二条の三から第二十三条の三まで、第二十七条の十一の三から第二十七条の十一の六まで又は第二十七条の十二の十三において準用する第二十二条の三、第二十三条（第四項を除く。）、第二十三条の二若しくは第二十三条の三の規定の施行に必要な限度において、第二十二条の三第一項に規定する特定関係事業者（小売電気事業者等、一般送配電事業者、送電事業者、配電事業者、特定送配電事業者、発電事業者及び特定卸供給事業者を除く。次項及び次条第三項において「一般送配電事業者の特定関係事業者」という。）、第二十七条の十一の三第一項に規定する特定関係事業者（小売電気事業者等、一般送配電事業者、送電事業者、配電事業者、特定送配電事業者、発電事業者及び特定卸供給事業者を除く。次項及び次条第三項において「送電事業者の特定関係事業者」という。）又は第二十七条の十二の十三において準用する第二十二条の三第一項に規定する特定関係事業者（小売電気事業者等、一般送配電事業者、送電事業者、配電事業者、特定送配電事業者、発電事業者及び特定卸供給事業者を除く。次項及び次条第三項において「配電事業者の特定関係事業者」という。）に対し、必要な事項の報告又は資料の提出をさせることができる。
    - paragraph_num: ５
      content: 経済産業大臣は、第三項の規定により一般送配電事業者、送電事業者又は配電事業者に対し報告又は資料の提出をさせた場合において、電気供給事業者間の適正な競争関係を確保するため特に必要があると認めるときは、第二十三条第二項（第二十七条の十二の十三において準用する場合を含む。）又は第二十七条の十一の四第二項の規定の施行に必要な限度において、当該一般送配電事業者の特定関係事業者等（一般送配電事業者の特定関係事業者を除く。）、当該送電事業者の特定関係事業者等（送電事業者の特定関係事業者を除く。）又は当該配電事業者の特定関係事業者等（配電事業者の特定関係事業者を除く。）に対し、必要な事項の報告又は資料の提出をさせることができる。
    - paragraph_num: ６
      content: 経済産業大臣は、第一項の規定によるもののほか、この法律の施行に必要な限度において、政令で定めるところにより、自家用電気工作物を設置する者、自家用電気工作物の保守点検を行つた事業者又は登録調査機関に対し、その業務の状況に関し報告又は資料の提出をさせることができる。
    - paragraph_num: ７
      content: 経済産業大臣は、この法律の施行に必要な限度において、一般用電気工作物（小規模発電設備であるものに限る。）の所有者又は占有者に対し、必要な事項の報告又は資料の提出をさせることができる。
    - paragraph_num: ８
      content: 経済産業大臣は、この法律の施行に必要な限度において、推進機関に対し、その業務又は経理の状況に関し報告又は資料の提出をさせることができる。
    - paragraph_num: ９
      content: 経済産業大臣は、第三十七条の四から第三十七条の十二までの規定の施行に必要な限度において、認定電気使用者情報利用者等協会に対し、その業務又は経理の状況に関し報告又は資料の提出をさせることができる。
    - paragraph_num: １０
      content: 経済産業大臣は、前項の規定により認定電気使用者情報利用者等協会に対し報告又は資料の提出をさせた場合において、電気供給事業者間の適正な競争関係を確保するために特に必要があると認めるときは、第三十七条の四から第三十七条の十二までの規定の施行に必要な限度において、当該認定電気使用者情報利用者等協会の会員（第三十七条の四第一号に規定する会員をいう。第百二十条第六号において同じ。）に対し、必要な事項の報告又は資料の提出をさせることができる。
    - paragraph_num: １１
      content: 経済産業大臣は、この法律の施行に必要な限度において、登録適合性確認機関又は登録安全管理審査機関に対し、その業務又は経理の状況に関し報告又は資料の提出をさせることができる。
    - paragraph_num: １２
      content: 経済産業大臣は、この法律の施行に必要な限度において、指定試験機関又は卸電力取引所に対し、その業務又は経理の状況に関し報告又は資料の提出をさせることができる。
    - paragraph_num: １３
      content: 経済産業大臣は、第百三条の二の規定の施行に必要な限度において、届出者に対し、その業務の状況に関し報告又は資料の提出をさせることができる。
  - caption: （立入検査）
    title: 第百七条
    article_num: '107'
    paragraphs:
    - content: 主務大臣は、第三十九条、第四十条、第四十七条、第四十九条及び第五十条の規定の施行に必要な限度において、その職員に、原子力発電工作物を設置する者又はボイラー等（原子力発電工作物に係るものに限る。）の溶接をする者の工場又は営業所、事務所その他の事業場に立ち入り、原子力発電工作物、帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: ２
      content: 経済産業大臣は、前項の規定による立入検査のほか、この法律の施行に必要な限度において、その職員に、電気事業者の営業所、事務所その他の事業場に立ち入り、業務若しくは経理の状況又は電気工作物、帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: ３
      content: 経済産業大臣は、第二十二条の三から第二十三条の三まで、第二十七条の十一の三から第二十七条の十一の六まで又は第二十七条の十二の十三において準用する第二十二条の三、第二十三条（第四項を除く。）、第二十三条の二若しくは第二十三条の三の規定の施行に必要な限度において、その職員に、一般送配電事業者の特定関係事業者、送電事業者の特定関係事業者又は配電事業者の特定関係事業者の営業所、事務所その他の事業場に立ち入り、業務若しくは経理の状況又は帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: ４
      content: 経済産業大臣は、第一項の規定による立入検査のほか、この法律の施行に必要な限度において、その職員に、自家用電気工作物を設置する者、自家用電気工作物の保守点検を行つた事業者又はボイラー等の溶接をする者の工場又は営業所、事務所その他の事業場に立ち入り、電気工作物、帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: ５
      content: 経済産業大臣は、この法律の施行に必要な限度において、その職員に、一般用電気工作物の設置の場所（当該一般用電気工作物が小規模発電設備以外のものである場合にあつては、居住の用に供されているものを除く。）に立ち入り、一般用電気工作物を検査させることができる。
        ただし、居住の用に供されている場所に立ち入る場合においては、あらかじめ、その居住者の承諾を得なければならない。
    - paragraph_num: ６
      content: 経済産業大臣は、この法律の施行に必要な限度において、その職員に、推進機関の事務所に立ち入り、業務の状況又は帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: ７
      content: 経済産業大臣は、第三十七条の四から第三十七条の十二までの規定の施行に必要な限度において、その職員に、認定電気使用者情報利用者等協会の事務所に立ち入り、業務の状況又は帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: ８
      content: 経済産業大臣は、この法律の施行に必要な限度において、その職員に、登録適合性確認機関、登録安全管理審査機関又は登録調査機関の事務所又は事業所に立ち入り、業務の状況又は帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: ９
      content: 経済産業大臣は、この法律の施行に必要な限度において、その職員に、指定試験機関又は卸電力取引所の事務所に立ち入り、業務の状況又は帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: １０
      content: 経済産業大臣は、第百三条の二の規定の施行に必要な限度において、その職員に、届出者の営業所、事務所その他の事業場に立ち入り、業務の状況又は帳簿、書類その他の物件を検査させることができる。
    - paragraph_num: １１
      content: 前各項の規定により立入検査をする職員は、その身分を示す証明書を携帯し、関係人の請求があつたときは、これを提示しなければならない。
    - paragraph_num: １２
      content: 経済産業大臣は、必要があると認めるときは、推進機関に、第二項の規定による立入検査（次に掲げる事項を調査するために行うものに限る。）を行わせることができる。
      items:
      - title: 一
        content: 第二十八条の四十三の規定による情報の提供が適正に行われていること。
      - title: 二
        content: 第二十八条の四十四第一項の規定による指示を受けた推進機関の会員がその指示に係る措置をとつていること。
    - paragraph_num: １３
      content: 経済産業大臣は、前項の規定により推進機関に立入検査を行わせる場合には、推進機関に対し、当該立入検査の場所その他必要な事項を示してこれを実施すべきことを指示するものとする。
    - paragraph_num: １４
      content: 推進機関は、前項の指示に従つて第十二項に規定する立入検査を行つたときは、その結果を経済産業大臣に報告しなければならない。
    - paragraph_num: １５
      content: 第十二項の規定により立入検査をする推進機関の職員は、その身分を示す証明書を携帯し、関係人の請求があつたときは、これを提示しなければならない。
    - paragraph_num: １６
      content: 経済産業大臣は、必要があると認めるときは、独立行政法人製品評価技術基盤機構（次項、次条及び第百二十七条において「機構」という。）に、第四項（ボイラー等の溶接をする者に係る部分を除く。）又は第五項の規定による立入検査を行わせることができる。
    - paragraph_num: １７
      content: 第十三項から第十五項までの規定は、機構の行う立入検査に準用する。
    - paragraph_num: １８
      content: 第一項から第十項までの規定による権限は、犯罪捜査のために認められたものと解釈してはならない。
  - caption: （機構に対する命令）
    title: 第百七条の二
    article_num: '107_2'
    paragraphs:
    - content: 経済産業大臣は、前条第十六項に規定する立入検査の業務の適正な実施を確保するため必要があると認めるときは、機構に対し、当該業務に関し必要な命令をすることができる。
  - caption: （聴聞の特例）
    title: 第百八条
    article_num: '108'
    paragraphs:
    - content: 経済産業大臣は、第十六条第二項又は第二十七条の十二の九第二項の規定による供給区域の減少をしようとするときは、行政手続法第十三条第一項の規定による意見陳述のための手続の区分にかかわらず、聴聞を行わなければならない。
    - paragraph_num: ２
      content: 第二条の九第一項、第十五条第一項若しくは第二項、第十六条第一項若しくは第二項、第二十七条の八第一項から第三項まで、第二十七条の九第一項、第二十七条の十二の八第一項から第三項まで、第二十七条の十二の九第一項若しくは第二項、第二十七条の二十一第一項、第二十八条の二十三第六項、第三十七条の十一第二項、第七十八条、第八十条の五、第八十四条の五、第八十七条、第九十五条、第九十九条の十一又は第九十九条の十四の規定による処分に係る聴聞の期日における審理は、公開により行わなければならない。
  - caption: （指定試験機関の処分等に係る審査請求）
    title: 第百九条
    article_num: '109'
    paragraphs:
    - content: 指定試験機関が行う試験事務に係る処分又はその不作為について不服がある者は、経済産業大臣に対し、審査請求をすることができる。 この場合において、経済産業大臣は、行政不服審査法（平成二十六年法律第六十八号）第二十五条第二項及び第三項、第四十六条第一項及び第二項並びに第四十九条第三項の規定の適用については、指定試験機関の上級行政庁とみなす。
  - caption: （審査請求の手続における意見の聴取）
    title: 第百十条
    article_num: '110'
    paragraphs:
    - content: この法律又はこの法律に基づく命令の規定による処分又はその不作為についての審査請求に対する裁決は、行政不服審査法第二十四条の規定により当該審査請求を却下する場合を除き、審査請求人に対し、相当な期間をおいて予告をした上、同法第十一条第二項に規定する審理員が公開による意見の聴取をした後にしなければならない。
    - paragraph_num: ２
      content: 前項の意見の聴取に際しては、審査請求人及び利害関係人に対し、その事案について証拠を提示し、意見を述べる機会を与えなければならない。
    - paragraph_num: ３
      content: 第一項に規定する審査請求については、行政不服審査法第三十一条の規定は適用せず、同項の意見の聴取については、同条第二項から第五項までの規定を準用する。
  - caption: （苦情の申出）
    title: 第百十一条
    article_num: '111'
    paragraphs:
    - content: 小売電気事業者等、一般送配電事業者、送電事業者、配電事業者、特定送配電事業者、発電事業者又は特定卸供給事業者の電気の供給又は小売供給契約の締結の媒介、取次ぎ若しくは代理に関し苦情のある者は、経済産業大臣又は委員会に対し、理由を記載した文書を提出して苦情の申出（委員会に対するものにあつては、電力の取引に関するものに限る。次項及び第四項において同じ。）をすることができる。
    - paragraph_num: ２
      content: 認定電気使用者情報利用者等協会の情報利用等適正化業務（第三十七条の四に規定する情報利用等適正化業務をいう。第百十七条の三において同じ。）に関し苦情のある者は、経済産業大臣又は委員会に対し、理由を記載した文書を提出して苦情の申出をすることができる。
    - paragraph_num: ３
      content: 登録調査機関の調査業務に関し苦情のある者は、経済産業大臣に対し、理由を記載した文書を提出して苦情の申出をすることができる。
    - paragraph_num: ４
      content: 届出者のする特定計量に関し苦情のある者は、経済産業大臣又は委員会に対し、理由を記載した文書を提出して苦情の申出をすることができる。
    - paragraph_num: ５
      content: 経済産業大臣及び委員会は、前各項の申出（委員会にあつては、第一項、第二項又は前項の申出）があつたときは、これを誠実に処理し、処理の結果を申出者に通知しなければならない。
  - caption: （手数料）
    title: 第百十二条
    article_num: '112'
    paragraphs:
    - content: 次に掲げる者は、実費を勘案して経済産業省令で定める額の手数料を納めなければならない。
      items:
      - title: 一
        content: 第四十四条第二項第一号の規定により、又は指定試験機関がその試験事務を行う電気主任技術者試験に合格したことにより主任技術者免状の交付を受けようとする者
      - title: 二
        content: 電気主任技術者試験を受けようとする者
      - title: 三
        content: 主任技術者免状の再交付を受けようとする者
      - title: 四
        content: 第五十五条第四項の審査（経済産業大臣が行う場合に限る。）を受けようとする者
      - title: 四の二
        content: 第五十五条の三の認定又はその更新を受けようとする者
      - title: 五
        content: 第八十条第一項の規定により経済産業大臣の行う適合性確認を受けようとする者
      - title: 六
        content: 第八十条の六において読み替えて準用する第八十条第一項の規定により経済産業大臣の行う安全管理審査を受けようとする者
    - paragraph_num: ２
      content: 次に掲げる者は、実費を勘案して主務省令で定める額の手数料を納めなければならない。
      items:
      - title: 一
        content: 第四十九条第一項の検査を受けようとする者
      - title: 二
        content: 第五十四条の検査を受ける者
      - title: 三
        content: 第五十一条第三項の審査（登録安全管理審査機関が行う場合を除く。）を受けようとする者
    - paragraph_num: ３
      content: 前二項の手数料は、第四十四条の二第一項の規定による委託を受けて指定試験機関がその免状交付事務を行う主任技術者免状の交付を受けようとする者及び指定試験機関がその試験事務を行う電気主任技術者試験を受けようとする者の納めるものについては当該指定試験機関の、その他のものについては国庫の収入とする。
  - caption: （公示）
    title: 第百十二条の二
    article_num: '112_2'
    paragraphs:
    - content: 経済産業大臣は、次に掲げる場合には、その旨を官報に公示しなければならない。
      items:
      - title: 一
        content: 第三十七条の四の規定により認定し、又は第三十七条の十一第二項の規定により認定を取り消し、若しくはその業務の全部若しくは一部の停止を命じたとき。
      - title: 二
        content: 第四十五条第二項又は第九十七条第一項の指定をしたとき。
      - title: 三
        content: 第四十八条の二第一項、第五十一条第三項、第五十五条第四項又は第五十七条の二第一項の登録をしたとき。
      - title: 四
        content: 第五十七条の二第二項、第七十二条（第八十条の六において準用する場合を含む。）、第七十四条（第八十条の六において準用する場合を含む。）、第九十三条又は第九十七条第二項の規定による届出があつたとき。
      - title: 五
        content: 第七十八条の規定により登録を取り消し、又は適合性確認の業務の全部若しくは一部の停止を命じたとき。
      - title: 六
        content: 第八十条第一項の規定により経済産業大臣が適合性確認の業務の全部若しくは一部を自ら行うものとするとき、又は自ら行つていた適合性確認の業務の全部若しくは一部を行わないこととするとき。
      - title: 七
        content: 第八十条の五の規定により登録を取り消し、又は安全管理審査の業務の全部若しくは一部の停止を命じたとき。
      - title: 八
        content: 第八十条の六において読み替えて準用する第八十条第一項の規定により経済産業大臣が安全管理審査の業務の全部若しくは一部を自ら行うものとするとき、又は自ら行つていた安全管理審査の業務の全部若しくは一部を行わないこととするとき。
      - title: 九
        content: 第八十四条の二の二又は第九十九条の九第一項の許可をしたとき。
      - title: 十
        content: 第八十七条の規定により指定を取り消し、又は同条第二項の規定により試験事務の全部若しくは一部の停止を命じたとき。
      - title: 十一
        content: 第八十八条の規定により経済産業大臣が試験事務の全部若しくは一部を自ら行うものとするとき、又は自ら行つていた試験事務の全部若しくは一部を行わないこととするとき。
      - title: 十二
        content: 第九十五条の規定により登録を取り消したとき。
      - title: 十三
        content: 第九十九条の十四の規定により指定を取り消し、又は市場開設業務の全部若しくは一部の停止を命じたとき。
  - caption: （原子炉等規制法との関係）
    title: 第百十二条の三
    article_num: '112_3'
    paragraphs:
    - content: 原子炉等規制法第四十三条の三の九第一項の規定による認可を受けた設計及び工事の方法その他の工事の計画（以下この条において「設計及び工事の計画」という。）に係る原子力発電工作物の設置又は変更の工事の計画に対する第四十七条第三項又は第四十八条第三項の規定の適用については、当該設計及び工事の計画が第四十七条第三項第一号に掲げる要件（第三十九条第二項第一号に掲げる事項に係る部分であつて原子炉等規制法第四十三条の三の十四の技術上の基準に該当する部分に限る。次項において同じ。）又は第四十八条第三項第一号に掲げる要件（第四十七条第三項第一号に掲げる要件（第三十九条第二項第一号に掲げる事項に係る部分であつて原子炉等規制法第四十三条の三の十四の技術上の基準に該当する部分に限る。）に限る。次項において同じ。）に適合しているものとみなす。
    - paragraph_num: ２
      content: 原子炉等規制法第四十三条の三の十第一項の規定による届出をした設計及び工事の計画（同条第四項の規定による命令があつた場合において同条第一項の規定による届出をしていないものを除く。）に係る原子力発電工作物の設置又は変更の工事の計画に対する第四十七条第三項又は第四十八条第三項の規定の適用については、当該設計及び工事の計画が第四十七条第三項第一号に掲げる要件又は第四十八条第三項第一号に掲げる要件に適合しているものとみなす。
    - paragraph_num: ３
      content: 原子炉等規制法第四十三条の三の十一第三項の規定による確認を受けた原子炉等規制法第四十三条の三の五第二項第五号に規定する発電用原子炉施設である特定事業用電気工作物に対する第四十九条第二項の規定の適用については、当該特定事業用電気工作物が同項第二号に掲げる要件（第三十九条第二項第一号に掲げる事項に係る部分であつて原子炉等規制法第四十三条の三の十四の技術上の基準に該当する部分に限る。）に適合しているものとみなす。
    - paragraph_num: ４
      content: 第五十一条、第五十二条、第五十四条及び第五十五条の規定は、原子炉等規制法及びこれに基づく命令の規定による検査を受けるべき原子力発電工作物については、適用しない。
  - caption: （経過措置）
    title: 第百十三条
    article_num: '113'
    paragraphs:
    - content: この法律の規定に基づき政令又は経済産業省令若しくは主務省令を制定し、又は改廃する場合においては、それぞれ、政令又は経済産業省令若しくは主務省令で、その制定又は改廃に伴い合理的に必要と判断される範囲内において、所要の経過措置を定めることができる。
  - caption: （主務大臣等）
    title: 第百十三条の二
    article_num: '113_2'
    paragraphs:
    - content: この法律（第六十五条第三項及び第五項を除く。）における主務大臣は、次の各号に掲げる事項の区分に応じ、当該各号に定める大臣又は委員会とする。
      items:
      - title: 一
        content: 原子力発電工作物に関する事項 原子力規制委員会及び経済産業大臣
      - title: 二
        content: 前号に掲げる事項以外の事項 経済産業大臣
    - paragraph_num: ２
      content: 第六十五条第三項及び第五項における主務大臣は、同条第一項に規定する道路、橋、溝、河川、堤防その他公共の用に供せられる土地の管理を所掌する大臣とする。
    - paragraph_num: ３
      content: この法律における主務省令は、第一項各号に掲げる区分に応じ、それぞれ当該各号に定める主務大臣の発する命令とする。
  - caption: （権限の委任）
    title: 第百十四条
    article_num: '114'
    paragraphs:
    - content: 経済産業大臣は、第百六条第三項及び第八項、同条第十二項（卸電力取引所に係るものに限る。）並びに同条第十三項並びに第百七条第二項及び第六項、同条第九項（卸電力取引所に係るものに限る。）並びに同条第十項の規定による権限（電力の適正な取引の確保に係る規定として政令で定める規定に関するものに限る。）並びに第百六条第四項及び第五項並びに第百七条第三項の規定による権限を委員会に委任する。
        ただし、報告又は資料の提出を命ずる権限は、経済産業大臣が自ら行うことを妨げない。
    - paragraph_num: ２
      content: 経済産業大臣は、政令で定めるところにより、第百五条、第百六条第九項及び第十項並びに第百七条第七項の規定による権限並びに第百六条第三項及び第八項並びに同条第十二項（卸電力取引所に係るものに限る。）並びに第百七条第二項及び第六項並びに同条第九項（卸電力取引所に係るものに限る。）の規定による権限（前項の政令で定める規定に関するものを除く。）を委員会に委任することができる。
    - paragraph_num: ３
      content: 委員会は、前項の規定により委任された権限を行使したときは、速やかに、その結果について経済産業大臣に報告するものとする。
    - paragraph_num: ４
      content: 経済産業大臣は、政令で定めるところにより、この法律の規定による権限（第一項又は第二項の規定により委員会に委任されたものを除く。）の一部を経済産業局長又は産業保安監督部長に委任することができる。
    - paragraph_num: ５
      content: 委員会は、政令で定めるところにより、第一項又は第二項の規定により委任された権限の一部を経済産業局長に委任することができる。
    - paragraph_num: ６
      content: 前項の規定により経済産業局長に委任された権限に係る事務に関しては、委員会が経済産業局長を指揮監督する。
  - caption: （委員会に対する審査請求）
    title: 第百十四条の二
    article_num: '114_2'
    paragraphs:
    - content: 委員会が前条第一項又は第二項の規定により委任された第百六条第三項から第五項まで、第八項から第十項まで、第十二項又は第十三項の規定により行う報告又は資料の提出の命令（前条第五項の規定により経済産業局長が行う場合を含む。）についての審査請求は、委員会に対してのみ行うことができる。
- title: 第九章　罰則
  chapter_num: 9
  articles:
  - title: 第百十五条
    article_num: '115'
    paragraphs:
    - content: 電気事業の用に供する電気工作物を損壊し、その他電気事業の用に供する電気工作物の機能に障害を与えて発電、蓄電、変電、送電又は配電を妨害した者は、五年以下の拘禁刑又は百万円以下の罰金に処する。
    - paragraph_num: ２
      content: みだりに電気事業の用に供する電気工作物を操作して発電、蓄電、変電、送電又は配電を妨害した者は、二年以下の拘禁刑又は五十万円以下の罰金に処する。
    - paragraph_num: ３
      content: 電気事業に従事する者が正当な理由がないのに電気事業の用に供する電気工作物の維持又は運行の業務を取り扱わず、発電、蓄電、変電、送電又は配電に障害を生ぜしめたときも、前項と同様とする。
    - paragraph_num: ４
      content: 第一項及び第二項の未遂罪は、罰する。
  - title: 第百十六条
    article_num: '116'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、当該違反行為をした者は、三年以下の拘禁刑若しくは三百万円以下の罰金に処し、又はこれを併科する。
      items:
      - title: 一
        content: 第三条の規定に違反して一般送配電事業を営んだとき。
      - title: 二
        content: 第二十七条の四の規定に違反して送電事業を営んだとき。
      - title: 三
        content: 第二十七条の十二の二の規定に違反して配電事業を営んだとき。
      - title: 四
        content: 第二十七条の二十九の五の規定による命令に違反したとき。
      - title: 五
        content: 第四十条（原子力発電工作物に係る場合に限る。）の規定による命令又は処分に違反したとき。
      - title: 六
        content: 第四十七条第一項（原子力発電工作物に係る場合に限る。）の規定に違反して電気工作物の設置又は変更の工事をしたとき。
  - title: 第百十七条
    article_num: '117'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、当該違反行為をした者は、二年以下の拘禁刑若しくは三百万円以下の罰金に処し、又はこれを併科する。
      items:
      - title: 一
        content: 第十四条第一項の規定に違反して一般送配電事業の全部又は一部を休止し、又は廃止したとき。
      - title: 二
        content: 第十七条第一項若しくは第二項、同条第三項（離島等供給に係る場合に限る。）、第二十七条の十第一項又は第二十七条の十二の十第一項若しくは第二項の規定に違反して電気の供給を拒んだとき。
      - title: 三
        content: 第二十七条の十二において準用する第十四条第一項の規定に違反して送電事業の全部又は一部を休止し、又は廃止したとき。
      - title: 四
        content: 第二十七条の十二の十三において準用する第十四条第一項の規定に違反して配電事業の全部又は一部を休止し、又は廃止したとき。
  - title: 第百十七条の二
    article_num: '117_2'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、当該違反行為をした者は、一年以下の拘禁刑若しくは百万円以下の罰金に処し、又はこれを併科する。
      items:
      - title: 一
        content: 第二条の二の規定に違反して小売電気事業を営んだとき。
      - title: 二
        content: 第二条の十六第一項の規定に違反してその名義を他人に小売電気事業のため利用させたとき。
      - title: 三
        content: 第二条の十六第二項の規定に違反して小売電気事業を他人にその名において経営させたとき。
      - title: 四
        content: 第二十二条の二第一項（第二十七条の十二の十三において準用する場合を含む。）又は第二十七条の十一の二第一項の規定に違反して小売電気事業、発電事業又は特定卸供給事業を営んだとき。
      - title: 五
        content: 第二十七条の十三第一項の規定による届出をせず、又は虚偽の届出をして特定送配電事業を営んだとき。
      - title: 六
        content: 第二十七条の十五の規定に違反して小売供給を行つたとき。
      - title: 七
        content: 第二十七条の二十六第二項において読み替えて準用する第二条の十六第一項の規定に違反してその名義を他人に特定送配電事業（小売供給を行うものに限る。次号において同じ。）のため利用させたとき。
      - title: 八
        content: 第二十七条の二十六第二項において読み替えて準用する第二条の十六第二項の規定に違反して特定送配電事業を他人にその名において経営させたとき。
      - title: 九
        content: 第二十七条の三十第一項の規定による届出をせず、又は虚偽の届出をして特定卸供給事業を営んだとき。
      - title: 十
        content: 第四十九条第一項（原子力発電工作物に係る場合に限る。）の規定に違反して電気工作物を使用したとき。
      - title: 十一
        content: 第五十五条第三項の規定に違反して、記録をせず、虚偽の記録をし、若しくは記録を保存せず、又は報告をせず、若しくは虚偽の報告をしたとき。
      - title: 十二
        content: 第百七条第一項の規定による審査又は検査を拒み、妨げ、又は忌避したとき。
      - title: 十三
        content: 第七十八条又は第八十条の五の規定による適合性確認又は安全管理審査の業務の停止の命令に違反したとき。
      - title: 十四
        content: 第百六条第一項の規定による報告若しくは資料の提出をせず、又は虚偽の報告若しくは資料の提出をしたとき。
  - title: 第百十七条の三
    article_num: '117_3'
    paragraphs:
    - content: 第三十七条の十一第二項、第八十七条第二項又は第九十九条の十四の規定による情報利用等適正化業務、試験事務又は市場開設業務の停止の命令に違反したときは、その違反行為をした認定電気使用者情報利用者等協会、指定試験機関又は卸電力取引所の役員又は職員は、一年以下の拘禁刑又は百万円以下の罰金に処する。
  - title: 第百十七条の四
    article_num: '117_4'
    paragraphs:
    - content: 次の各号のいずれかに該当する者は、一年以下の拘禁刑又は百万円以下の罰金に処する。
      items:
      - title: 一
        content: 第四十四条の二第二項又は第八十五条の規定に違反して秘密を漏らした者
      - title: 二
        content: 第九十九条の十二の規定に違反して秘密を漏らし、又は盗用した者
  - title: 第百十七条の五
    article_num: '117_5'
    paragraphs:
    - content: 第二十八条の二十九第一項若しくは第二項又は第三十七条の九の規定に違反した者は、一年以下の拘禁刑又は五十万円以下の罰金に処する。
  - title: 第百十七条の六
    article_num: '117_6'
    paragraphs:
    - content: 第百三条の二第一項の規定による届出をせず、又は虚偽の届出をして特定計量をした場合には、当該違反行為をした者は、六月以下の拘禁刑又は五十万円以下の罰金に処する。
  - title: 第百十八条
    article_num: '118'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、当該違反行為をした者は、三百万円以下の罰金に処する。
      items:
      - title: 一
        content: 第二条の十二第二項（第二十七条の二十六第二項において準用する場合を含む。）、第二条の十七第一項（第二十七条の三十二において準用する場合を含む。）、第二条の十七第二項（第二十七条の二十六第三項において準用する場合を含む。）、第二条の十七第三項（第二十七条の二十六第二項において準用する場合を含む。）、第九条第五項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第十八条第六項若しくは第十一項、第二十条第三項若しくは第二十一条第三項、第二十二条の三第三項、第二十三条第六項、第二十三条の二第二項若しくは第二十三条の三第二項（これらの規定を第二十七条の十二の十三において準用する場合を含む。）、第二十六条第二項（第二十七条の十二の十三及び第二十七条の二十六第一項において準用する場合を含む。）、第二十七条第一項（第二十七条の十二、第二十七条の十二の十三、第二十七条の二十六第一項及び第二十七条の二十九において準用する場合を含む。）、第二十七条第二項、第二十七条の十一第三項若しくは第四項、第二十七条の十一の三第三項、第二十七条の十一の四第五項、第二十七条の十一の五第二項、第二十七条の十一の六第二項、第二十七条の十二の十一第三項、第二十七条の十二の十二第四項、第二十七条の十三第五項（同条第八項において準用する場合を含む。）、第二十七条の三十第五項（同条第八項において準用する場合を含む。）、第二十九条第六項、第三十一条第一項、第五十七条第三項又は第九十二条第二項の規定による命令に違反したとき。
      - title: 二
        content: 第十七条第三項（離島等供給に係る場合を除く。）又は第二十七条の十四の規定に違反して電気の供給を拒んだとき。
      - title: 三
        content: 第十八条第二項、第二十一条第二項、第二十四条第一項（第二十七条の十二の十三において準用する場合を含む。）、第二十七条の十一第二項又は第二十七条の十二の十一第二項の規定に違反して電気を供給したとき。
      - title: 四
        content: 第二十七条の二十八の規定に違反して発電及び電気の供給を拒んだとき。
      - title: 五
        content: 第二十七条の三十一の規定に違反して特定卸供給を拒んだとき。
      - title: 六
        content: 第四十条（原子力発電工作物に係る場合を除く。）の規定による命令又は処分に違反したとき。
      - title: 七
        content: 第四十三条第一項の規定に違反して主任技術者を選任しなかつたとき。
      - title: 八
        content: 第四十七条第一項（原子力発電工作物に係る場合を除く。）の規定に違反して電気工作物の設置又は変更の工事をしたとき。
  - title: 第百十九条
    article_num: '119'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、当該違反行為をした者は、百万円以下の罰金に処する。
      items:
      - title: 一
        content: 第二条の六第一項の規定に違反して第二条の三第一項第三号に掲げる事項を変更したとき。
      - title: 二
        content: 第九条第一項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第二十七条の十三第七項又は第二十七条の三十第七項の規定による届出をせず、又は虚偽の届出をしたとき。
      - title: 三
        content: 第九条第三項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第二十七条の十三第三項（同条第八項において準用する場合を含む。）又は第二十七条の三十第三項（同条第八項において準用する場合を含む。）の規定に違反したとき。
      - title: 四
        content: 第二十条第二項の規定に違反して電気を供給したとき。
      - title: 五
        content: 第二十七条の十三第二項（同条第八項において準用する場合を含む。）、第二十七条の二十七第二項又は第二十七条の三十第二項（同条第八項において準用する場合を含む。）の規定に違反して添付書類を提出せず、又は添付書類に虚偽の記載をして提出したとき。
      - title: 六
        content: 第二十七条の十九第一項の規定に違反して第二十七条の十六第一項第四号に掲げる事項について変更をしたとき。
      - title: 七
        content: 第二十七条の二十七第一項の規定による届出をせず、又は虚偽の届出をして発電事業を営んだとき。
      - title: 八
        content: 第二十七条の三十三第一項の規定に違反して電気を供給する事業を営んだとき。
      - title: 九
        content: 第三十四条の二第一項又は第百三条の二第三項の規定による命令に違反したとき。
      - title: 十
        content: 第四十八条第四項の規定による命令に違反して電気工作物の設置又は変更の工事をしたとき。
      - title: 十一
        content: 第四十九条第一項（原子力発電工作物に係る場合を除く。）の規定に違反して電気工作物を使用したとき。
  - title: 第百十九条の二
    article_num: '119_2'
    paragraphs:
    - content: 第三十七条の十一第一項の規定による命令に違反した認定電気使用者情報利用者等協会の役員又は職員は、百万円以下の罰金に処する。
  - title: 第百十九条の三
    article_num: '119_3'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、その違反行為をした推進機関の発起人、役員又は職員は、三十万円以下の罰金に処する。
      items:
      - title: 一
        content: 第二十八条の十四第一項又は第二項の規定による申請書又は添付書類に虚偽の記載をしてこれを提出したとき。
      - title: 二
        content: 第二十九条第二項（同条第四項において準用する場合を含む。）又は第三十三条の二第三項の規定による送付をしなかつたとき。
      - title: 三
        content: 第百六条第八項の規定による報告若しくは資料の提出をせず、又は虚偽の報告若しくは資料の提出をしたとき。
      - title: 四
        content: 第百七条第六項の規定による検査を拒み、妨げ、又は忌避したとき。
  - title: 第百十九条の四
    article_num: '119_4'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、その違反行為をした認定電気使用者情報利用者等協会、指定試験機関又は卸電力取引所の役員又は職員は、三十万円以下の罰金に処する。
      items:
      - title: 一
        content: 第八十四条の二の二又は第九十九条の九第一項の許可を受けないで試験事務又は市場開設業務の全部を廃止したとき。
      - title: 二
        content: 第八十七条の二第一項の規定に違反して同項に規定する事項の記載をせず、又は虚偽の記載をしたとき。
      - title: 三
        content: 第八十七条の二第二項の規定に違反して帳簿を保存しなかつたとき。
      - title: 四
        content: 第百六条第九項又は第十二項の規定による報告若しくは資料の提出をせず、又は虚偽の報告若しくは資料の提出をしたとき。
      - title: 五
        content: 第百七条第七項又は第九項の規定による検査を拒み、妨げ、又は忌避したとき。
  - title: 第百二十条
    article_num: '120'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、当該違反行為をした者は、三十万円以下の罰金に処する。
      items:
      - title: 一
        content: 第二条の七第二項（第二十七条の二十九及び第二十七条の三十二において準用する場合を含む。）、第二条の八第一項、第七条第四項（第八条第二項において準用する場合を含む。）、第二十条第一項、第二十一条第一項、第二十七条の七の二第四項（第二十七条の七の三第二項において準用する場合を含む。）、第二十七条の十一第一項、第二十七条の十二の六第四項（第二十七条の十二の七第二項において準用する場合を含む。）、第二十七条の十二の十一第一項、第二十七条の二十第一項、第二十七条の二十四第二項、第二十七条の二十五第一項（第二十七条の二十九及び第二十七条の三十二において準用する場合を含む。）、第二十七条の二十九の三第五項、第二十八条の三第一項、第二十九条第一項若しくは第三項、第四十二条第一項若しくは第二項、第四十三条第三項、第四十六条第一項若しくは第二項、第四十七条第四項若しくは第五項、第五十一条の二第三項、第五十五条の七、第五十七条の二第二項又は第七十四条（第八十条の六において準用する場合を含む。）の規定による届出をせず、又は虚偽の届出をしたとき。
      - title: 二
        content: 第二条の十四第一項（第二十七条の二十六第三項において準用する場合を含む。以下この号において同じ。）の規定に違反して第二条の十四第一項に規定する書面を交付せず、又は虚偽の記載若しくは表示をした書面を交付したとき。
      - title: 三
        content: 第十七条の二第六項、第十八条第十二項（第二十条第四項及び第二十一条第四項において準用する場合を含む。）又は第二十七条の十二の十一第四項の規定に違反したとき。
      - title: 四
        content: 第二十三条の四第二項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）又は第三十四条の二第二項の規定による報告をせず、又は虚偽の報告をしたとき。
      - title: 五
        content: 第二十六条第三項（第二十七条の十二の十三及び第二十七条の二十六第一項において準用する場合を含む。）又は第五十一条第一項、第五十二条第一項若しくは第五十五条第一項（原子力発電工作物に係る場合を除く。）若しくは第五十五条の十一の規定に違反して、記録をせず、虚偽の記録をし、又は記録を保存しなかつたとき。
      - title: 六
        content: 第三十七条の六第三項の規定に違反して、その名称中に認定電気使用者情報利用者等協会の会員と誤認されるおそれのある文字を用いたとき。
      - title: 七
        content: 第四十二条第三項の規定による命令に違反したとき。
      - title: 八
        content: 第四十八条第一項又は第二項の規定に違反して電気工作物の設置又は変更の工事をしたとき。
      - title: 八の二
        content: 第五十五条の十の規定に違反して保安規程を保存せず、又は保安規程の提出を拒んだとき。
      - title: 九
        content: 第五十一条第三項、第五十四条若しくは第五十五条第四項（原子力発電工作物に係る場合を除く。）又は第百七条第二項から第五項まで、第八項若しくは第十項の規定による審査又は検査を拒み、妨げ、又は忌避したとき。
      - title: 十
        content: 第五十六条第一項の規定による命令又は処分に違反したとき。
      - title: 十一
        content: 第五十七条第四項又は第七十九条第一項（第八十条の六及び第九十六条において準用する場合を含む。）の規定に違反して第五十七条第四項又は第七十九条第一項（第八十条の六及び第九十六条において準用する場合を含む。）に規定する事項の記載をせず、又は虚偽の記載をしたとき。
      - title: 十二
        content: 第五十七条第五項又は第七十九条第二項（第八十条の六及び第九十六条において準用する場合を含む。）の規定に違反して帳簿を保存しなかつたとき。
      - title: 十三
        content: 第百二条又は第百六条第二項から第七項まで、第十項、第十一項若しくは第十三項の規定による報告若しくは資料の提出をせず、又は虚偽の報告若しくは資料の提出をしたとき。
  - title: 第百二十一条
    article_num: '121'
    paragraphs:
    - content: 法人の代表者又は法人若しくは人の代理人、従業者がその法人又は人の業務に関し、次の各号に掲げる規定の違反行為をしたときは、行為者を罰するほか、その法人に対して当該各号に定める罰金刑を、その人に対して各本条の罰金刑を科する。
      items:
      - title: 一
        content: 第百十六条第五号又は第六号 三億円以下の罰金刑
      - title: 二
        content: 第百十七条の二（第一号から第九号まで及び第十三号に係る部分を除く。） 一億円以下の罰金刑
      - title: 三
        content: 第百十六条第一号から第四号まで、第百十七条、第百十七条の二（第一号から第九号まで及び第十三号に係る部分に限る。）、第百十七条の六から第百十九条まで又は前条
          各本条の罰金刑
  - title: 第百二十二条
    article_num: '122'
    paragraphs:
    - content: 次の各号のいずれかに該当する者は、百万円以下の過料に処する。
      items:
      - title: 一
        content: 第十三条第二項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）において準用する第九条第五項、第二十七条の三（第二十七条の十二、第二十七条の十二の十三及び第二十七条の二十九において準用する場合を含む。）又は第四十六条の十七第一項の規定による命令に違反した者
      - title: 二
        content: 第二十二条第一項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）又は第二十七条の二第一項（第二十七条の十二、第二十七条の十二の十三及び第二十七条の二十九において準用する場合を含む。）の規定に違反した者
      - title: 三
        content: 第二十二条第二項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）の規定に違反して公表することを怠り、又は不実の公表をした者
      - title: 四
        content: 第二十七条の二第二項（第二十七条の十二、第二十七条の十二の十三及び第二十七条の二十九において準用する場合を含む。）の規定による書類の提出をせず、又は虚偽の書類の提出をした者
  - title: 第百二十三条
    article_num: '123'
    paragraphs:
    - content: 正当な理由がないのに第三十七条の六第一項の規定による名簿の縦覧を拒んだ認定電気使用者情報利用者等協会の役員又は職員は、五十万円以下の過料に処する。
  - title: 第百二十四条
    article_num: '124'
    paragraphs:
    - content: 次の各号のいずれかに該当する場合には、その違反行為をした推進機関の発起人又は役員は、二十万円以下の過料に処する。
      items:
      - title: 一
        content: この法律の規定により経済産業大臣の認可を受けなければならない場合において、その認可を受けなかつたとき。
      - title: 二
        content: 第二十八条の八第一項の規定による政令に違反して登記することを怠つたとき。
      - title: 三
        content: 第二十八条の十第二項の規定に違反したとき。
      - title: 四
        content: 第二十八条の十三第二項の規定による公告をすることを怠り、又は不正の公告をしたとき。
      - title: 五
        content: 第二十八条の四十第一項及び第二項に規定する業務以外の業務を行つたとき。
      - title: 六
        content: 第二十八条の四十四第二項又は第三項の規定に違反して、報告をせず、又は虚偽の報告をしたとき。
      - title: 七
        content: 第二十八条の四十六第三項、第二十八条の四十八第四項又は第二十八条の五十九の規定による命令に違反したとき。
      - title: 八
        content: 第二十八条の四十六第四項の規定による届出をせず、又は虚偽の届出をしたとき。
      - title: 九
        content: 第二十八条の五十三第一項又は第二項に規定する書類を提出せず、又は虚偽の書類を提出したとき。
      - title: 十
        content: 第二十八条の五十七の規定に違反して業務上の余裕金を運用したとき。
  - title: 第百二十五条
    article_num: '125'
    paragraphs:
    - content: 第二十八条の七第二項の規定に違反した者は、二十万円以下の過料に処する。
  - title: 第百二十六条
    article_num: '126'
    paragraphs:
    - content: 第七十五条第一項（第八十条の六及び第九十六条において準用する場合を含む。）の規定に違反して財務諸表等を備えて置かず、財務諸表等に記載すべき事項を記載せず、若しくは虚偽の記載をし、又は正当な理由がないのに第七十五条第二項各号（第八十条の六及び第九十六条において準用する場合を含む。）の規定による請求を拒んだ者は、二十万円以下の過料に処する。
  - title: 第百二十七条
    article_num: '127'
    paragraphs:
    - content: 第百七条の二の規定による命令に違反した場合には、その違反行為をした機構の役員は、二十万円以下の過料に処する。
  - title: 第百二十八条
    article_num: '128'
    paragraphs:
    - content: 次の各号のいずれかに該当する者は、十万円以下の過料に処する。
      items:
      - title: 一
        content: 第二条の六第四項若しくは第二条の八第二項、第九条第二項若しくは第十三条第一項（これらの規定を第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）、第二十七条の十三第九項、第二十七条の十九第四項、第二十七条の二十五第二項（第二十七条の二十九及び第二十七条の三十二において準用する場合を含む。）、第二十七条の二十七第三項若しくは第四項、第二十七条の三十第九項、第二十七条の三十三第四項若しくは第五項、第二十八条の三第二項、第五十三条、第五十五条の二第二項又は第九十三条の規定による届出をせず、又は虚偽の届出をした者
      - title: 二
        content: 第十三条第二項（第二十七条の十二及び第二十七条の十二の十三において準用する場合を含む。）において準用する第九条第三項の規定に違反して設備を譲り渡し、又は所有権以外の権利の目的とした者
      - title: 三
        content: 正当な理由がないのに第四十四条第四項の規定による命令に違反して主任技術者免状を返納しなかつた者
  - title: 第百二十九条
    article_num: '129'
    paragraphs:
    - content: 第三十七条の六第二項の規定に違反して、その名称中に認定電気使用者情報利用者等協会と誤認されるおそれのある文字を用いた者は、十万円以下の過料に処する。
